# Render Blueprint (Infrastructure-as-Code) — Captain.Food BFF (ADR-0042, build model ADR-20260721-175411).
#
# Hosted in Frankfurt, co-located with Supabase (eu-central-1) for low app<->DB latency, both in the EU.
#
# BUILD MODEL (ADR-20260721-175411): Render does NOT build this service. The Rust image is compiled in
# GitHub Actions (.github/workflows/build-image.yml — free/unlimited on this PUBLIC repo) and pushed to
# GHCR; Render only PULLS and runs it, so it spends ZERO build-pipeline minutes. Deploys are triggered by
# that workflow via a Render deploy hook that pins the exact image **by immutable digest**
# (`imgURL=...@sha256:<digest>`); therefore git-push auto-deploy is OFF (`autoDeploy: false`).
#
# VERSION PINNING: production NEVER resolves a moving tag. Every deploy runs a content-addressed digest, and
# Render's deploy/event history is the version-of-record (it names the exact digest, even for a container
# that never starts). The `image.url: ...:latest` below is ONLY the bootstrap seed Render pulls the first
# time the blueprint is created/synced — it is not what running deploys resolve. Rollback = re-hit the
# deploy hook with a previous `sha-<commit>`/digest (no rebuild). Optionally, after the first digest deploy,
# pin `image.url` to that exact `@sha256:...` so even the bootstrap carries no moving tag.
#
# GHCR image visibility: the package `ghcr.io/captain-food/captain-food` must be PUBLIC for Render to pull
# it without credentials (Packages -> package settings -> change visibility -> Public). If kept private,
# add a `registryCredential` here referencing a credential created in the Render dashboard instead.
#
# Secrets (`sync: false`) are entered in the Render dashboard, never committed:
#   DATABASE_URL  -> Supabase *Session pooler* string (IPv4), port 5432, with ?sslmode=require.
#                    Do NOT use the direct db.<ref>.supabase.co host — it is IPv6-only and unreachable from Render.
#
# Migrations (ADR-0043): applied out-of-band by sqlx-cli in CI (.github/workflows/db-migrate.yml), NOT by
# this service. The app only CHECKS the schema version at /health (REQUIRED_SCHEMA_VERSION) and refuses to
# be ready if the DB is behind — so a deploy that races ahead of the migration is held until CI applies it.
# /ping (liveness) is also exposed for uptime pingers / keep-warm; Render's Health Check Path stays /health.
#
# Projector: runs in-process in this web service for now (Render Background Workers are paid); it will move
# to a dedicated worker service later (ADR-0040/0043).
#
# This file is the single source of truth ONLY once the repo is linked as a Blueprint in Render (Blueprints
# -> New Blueprint Instance); Render then matches the existing `captain-food` service by name and re-syncs
# this config on every push. Secrets stay dashboard-managed via `sync: false`.
services:
  - type: web
    name: captain-food
    runtime: image
    image:
      # Pre-built in CI and pushed to GHCR (see .github/workflows/build-image.yml). Bootstrap default only;
      # real deploys pin an immutable `:sha-<commit>` tag via the deploy hook.
      url: ghcr.io/captain-food/captain-food:latest
    region: frankfurt
    plan: free
    branch: main
    healthCheckPath: /health
    # Deploys are driven by the build-image workflow's deploy hook (pinned image), never by git push.
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false
      # Pre-shared service tokens for EXTERNAL machine callers (`X-External-Api-Key`, ADR-0047),
      # comma-separated. Optional — unset means only a Supabase JWT (captain_role EXTERNAL) reaches /external.
      - key: EXTERNAL_API_TOKENS
        sync: false
      # Stripe webhook signing secret (`whsec_…`) for `POST /adapters/stripe/webhooks` signature verification
      # (ADR-20260718-145856). Unset ⇒ the endpoint fails closed (503).
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # HubRise app client secret — the HMAC key for `POST /adapters/hubrise/webhooks` callback verification
      # (`X-HubRise-Hmac-SHA256`, ADR-20260718-145856). Unset ⇒ the endpoint fails closed (503).
      - key: HUBRISE_WEBHOOK_SECRET
        sync: false
      # HubRise access token for the outbound API client (pull catalog/inventory). HubRise tokens do not
      # expire, so a connected location's token is a configured secret for V0 (ADR-20260718-213352).
      - key: HUBRISE_ACCESS_TOKEN
        sync: false
