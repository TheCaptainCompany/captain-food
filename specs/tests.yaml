      data: { deliveryJobId: "deliv-1", reason: "No courier available" }
    then: []

  TestDispatchAcceptedAfterReoffer:
    name: "The partner accepts a re-offered job: the run advances to ACCEPTED (happy path after a decline)"
    rules:
      - { $ref: 'rules.yaml#/DispatchRetriesAreBounded' }
