version: 2
description: >
  Captain.Food BEHAVIOUR tests (Given / When / Then) over the actor model. Reusable EVENT instances
  (with their sample data) are CENTRALIZED in `fixtures` and referenced by `$ref: '#/fixtures/<name>'`
  from a test's `given` / `then`, so the same fact is declared once and reused everywhere (a `then` of
  one test is often the `given` of another). A test names the ACTOR under test; `when` is the message
  it receives — a COMMAND (aggregate handler) OR an EVENT (process-manager reaction) — and the outcome
  is asserted with:
    - then   : the events the handler must emit (an EMPTY list `[]` asserts a NO-OP → idempotency /
               a saga reaction that records nothing);
    - thrown : the error(s) the message is rejected with — a LIST, since several errors may apply to
               one rejection scenario (validated against the handler's declared `throws`).

  Naming: a test key is `Test<Aggregate><Behaviour>` (PascalCase) so related cases regroup by actor;
  `name` is a readable sentence. Suffixes: `…IsRejected` (error), `…IsNoOp` / `…Again…` (idempotency).

  Validated by the codegen (tests.yaml is a source file) — see `make validate`:
    - every `$ref` resolves (events / commands / actors / errors / local fixtures);
    - the `when` message is one the named actor RECEIVES (actors.yaml inbox);
    - each `then` event is one that handler EMITS, and each `thrown` error one it may THROW;
    - every `data` key exists AND every required property is set (recursive, incl. nested value objects);
    - COVERAGE: every inbox message, emitted event and throwable error is exercised by some test.

# =====================================================================
# Centralized event fixtures (declare each fact + its data ONCE, reuse it)
# =====================================================================
