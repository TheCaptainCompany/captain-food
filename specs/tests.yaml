      data: { deliveryJobId: "deliv-1", reason: "Restaurant closed" }
    then:
      - { $ref: '#/fixtures/deliveryCancelled' }

  TestCancelDeliveryIsRejected:
    name: "Rejects cancelling a missing or already-delivered job"
    rules: [{ $ref: 'rules.yaml#/DeliveryCancellableBeforeCompletion' }]
    actor: { $ref: 'actors.yaml#/DeliveryJob' }
    given:
      - { $ref: '#/fixtures/deliveryRequested' }
      - { $ref: '#/fixtures/deliveryAcceptedByRider' }
