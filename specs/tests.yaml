    name: "A partner-reported status change applies to the job as a valid transition"
    rules: [{ $ref: 'rules.yaml#/DeliveryPartnerAssignmentLifecycle' }]
    actor: { $ref: 'actors.yaml#/DeliveryJob' }
    given:
      - { $ref: '#/fixtures/deliveryRequested' }
      - { $ref: '#/fixtures/deliveryAcceptedByPartner' }
    when:
      type: { $ref: 'commands.yaml#/UpdateDeliveryPartnerStatus' }
      data: { deliveryJobId: "deliv-1", partnerRef: "avelo-77", status: "PICKED_UP" }
    then:
      - { $ref: '#/fixtures/deliveryPartnerStatusUpdated' }

  TestDeliveryDeclinedByRider:
    name: "An independent rider declines a pending job; it stays PENDING and re-offerable"
    rules: [{ $ref: 'rules.yaml#/DeliveryDeclineKeepsJobPending' }]
    actor: { $ref: 'actors.yaml#/DeliveryJob' }
    given:
      - { $ref: '#/fixtures/deliveryRequested' }
    when:
      type: { $ref: 'commands.yaml#/DeclineDelivery' }
      data: { deliveryJobId: "deliv-1", riderId: "rider-1", reason: "Too far" }
    then:
      - { $ref: '#/fixtures/deliveryDeclinedByRider' }

  TestDeliveryIssueReported:
    name: "An issue is reported on a non-delivered job"
    rules: [{ $ref: 'rules.yaml#/DeliveryIssueLifecycle' }]
    actor: { $ref: 'actors.yaml#/DeliveryJob' }
    given:
      - { $ref: '#/fixtures/deliveryRequested' }
      - { $ref: '#/fixtures/deliveryAcceptedByRider' }
    when:
      type: { $ref: 'commands.yaml#/ReportDeliveryIssue' }
      data: { deliveryJobId: "deliv-1", riderId: "rider-1", issue: "Customer unreachable at the door" }
    then:
      - { $ref: '#/fixtures/deliveryIssueReported' }

  TestDeliveryIssueResolved:
    name: "A previously reported delivery issue is resolved"
    rules: [{ $ref: 'rules.yaml#/DeliveryIssueLifecycle' }]
    actor: { $ref: 'actors.yaml#/DeliveryJob' }
    given:
      - { $ref: '#/fixtures/deliveryRequested' }
      - { $ref: '#/fixtures/deliveryAcceptedByRider' }
      - { $ref: '#/fixtures/deliveryIssueReported' }
    when:
      type: { $ref: 'commands.yaml#/ResolveDeliveryIssue' }
      data: { deliveryJobId: "deliv-1", resolution: "Customer called back; order handed over" }
    then:
      - { $ref: '#/fixtures/deliveryIssueResolved' }

  # ----------------------- Rider --------------------------------------
  TestRiderRegistered:
    name: "A rider registers (linked to the auth provider user)"
    rules: [{ $ref: 'rules.yaml#/RiderLifecycle' }]
    actor: { $ref: 'actors.yaml#/Rider' }
    given: []
    when:
      type: { $ref: 'commands.yaml#/RegisterRider' }
      data: { riderId: "rider-1", authRef: "auth-supabase-9", displayName: "Léa", phone: "+33611223344" }
    then:
      - { $ref: '#/fixtures/riderRegistered' }

  TestRiderRegisterAgainIsRejected:
    name: "Registering the same rider twice is rejected"
    rules: [{ $ref: 'rules.yaml#/RiderLifecycle' }]
    actor: { $ref: 'actors.yaml#/Rider' }
    given:
      - { $ref: '#/fixtures/riderRegistered' }
    when:
      type: { $ref: 'commands.yaml#/RegisterRider' }
      data: { riderId: "rider-1", authRef: "auth-supabase-9", displayName: "Léa", phone: "+33611223344" }
    thrown:
      - { $ref: 'errors.yaml#/RiderAlreadyRegistered' }

  TestRiderInfoUpdated:
    name: "A rider updates editable profile fields"
    rules: [{ $ref: 'rules.yaml#/RiderLifecycle' }]
    actor: { $ref: 'actors.yaml#/Rider' }
    given:
      - { $ref: '#/fixtures/riderRegistered' }
    when:
      type: { $ref: 'commands.yaml#/UpdateRiderInfo' }
      data: { riderId: "rider-1", displayName: "Léa B." }
    then:
      - { $ref: '#/fixtures/riderInfoUpdated' }

  TestRiderUpdateIsRejectedWhenNotFound:
    name: "Updating an unknown rider is rejected"
    rules: [{ $ref: 'rules.yaml#/RiderLifecycle' }]
    actor: { $ref: 'actors.yaml#/Rider' }
    given: []
    when:
      type: { $ref: 'commands.yaml#/UpdateRiderInfo' }
      data: { riderId: "rider-missing", displayName: "Nobody" }
    thrown:
      - { $ref: 'errors.yaml#/RiderNotFound' }

  TestRiderStatusChanged:
    name: "A rider goes AVAILABLE (valid transition from OFFLINE)"
    rules: [{ $ref: 'rules.yaml#/RiderLifecycle' }]
    actor: { $ref: 'actors.yaml#/Rider' }
    given:
      - { $ref: '#/fixtures/riderRegistered' }
    when:
      type: { $ref: 'commands.yaml#/ChangeRiderStatus' }
      data: { riderId: "rider-1", status: "AVAILABLE" }
    then:
      - { $ref: '#/fixtures/riderStatusChanged' }

  TestRiderStatusChangeIsRejected:
    name: "An OFFLINE rider cannot jump straight to ON_DELIVERY (invalid transition)"
    rules: [{ $ref: 'rules.yaml#/RiderLifecycle' }]
    actor: { $ref: 'actors.yaml#/Rider' }
    given:
      - { $ref: '#/fixtures/riderRegistered' }
    when:
      type: { $ref: 'commands.yaml#/ChangeRiderStatus' }
      data: { riderId: "rider-1", status: "ON_DELIVERY" }
    thrown:
      - { $ref: 'errors.yaml#/InvalidRiderStatusTransition' }

  # ----------------------- PlaceOrderProcess (error guards) ----------
  TestPaymentCaptureOrphanIsFlagged:
    name: "A capture matching no checkout run aborts the saga with a typed error (never a silent skip)"
    rules: [{ $ref: 'rules.yaml#/OrphanPaymentEventFlagged' }]
    actor: { $ref: 'processmanager.yaml#/PlaceOrderProcess' }
    given: []
    when:
      type: { $ref: 'events.yaml#/PaymentCaptured' }
      data: { paymentIntentId: "pi_unknown", restaurantId: "resto-1", amount: { amountCents: 1960, currency: "EUR" } }
    thrown:
      - { $ref: 'errors.yaml#/PaymentEventOrphaned' }
