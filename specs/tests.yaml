      data: { deliveryJobId: "deliv-1", partnerRef: "avelo-77", courier: { displayName: "Léa", phone: "+33611223344" } }
    then: []

  TestDispatchFailsAfterOfferCap:
    name: "The 3rd partner decline exhausts the offer cap: DeliveryDispatchFailed is recorded and the run closes FAILED"
    rules: [{ $ref: 'rules.yaml#/DispatchRetriesAreBounded' }]
