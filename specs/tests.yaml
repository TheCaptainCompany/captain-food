      - { $ref: 'errors.yaml#/InvalidOrderStatus' }
      - { $ref: 'errors.yaml#/OrderAlreadyRated' }

  TestOrderRestaurantRated:
    name: "Customer rates the restaurant after delivery"
    actor: { $ref: 'actors.yaml#/Order' }
    given:
