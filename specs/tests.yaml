    data: { deliveryJobId: "deliv-1", partnerRef: "avelo-77" }
  deliveryUnassignedFromPartner:
    type: { $ref: 'events.yaml#/DeliveryUnassignedFromPartner' }
    data: { deliveryJobId: "deliv-1", reason: "Re-offering to another channel" }
  deliveryPartnerStatusUpdated:
    type: { $ref: 'events.yaml#/DeliveryPartnerStatusUpdated' }
    data: { deliveryJobId: "deliv-1", partnerRef: "avelo-77", status: "PICKED_UP" }
  deliveryDeclinedByRider:
    type: { $ref: 'events.yaml#/DeliveryDeclinedByRider' }
    data: { deliveryJobId: "deliv-1", riderId: "rider-1", reason: "Too far" }
  deliveryIssueReported:
    type: { $ref: 'events.yaml#/DeliveryIssueReported' }
    data: { deliveryJobId: "deliv-1", riderId: "rider-1", issue: "Customer unreachable at the door" }
  deliveryIssueResolved:
    type: { $ref: 'events.yaml#/DeliveryIssueResolved' }
    data: { deliveryJobId: "deliv-1", resolution: "Customer called back; order handed over" }

  # --- Rider ---
  riderRegistered:
    type: { $ref: 'events.yaml#/RiderRegistered' }
    data: { riderId: "rider-1", authRef: "auth-supabase-9", displayName: "Léa", phone: "+33611223344", status: "OFFLINE" }
  riderInfoUpdated:
    type: { $ref: 'events.yaml#/RiderInfoUpdated' }
    data: { riderId: "rider-1", displayName: "Léa B." }
  riderStatusChanged:
    type: { $ref: 'events.yaml#/RiderStatusChanged' }
    data: { riderId: "rider-1", status: "AVAILABLE" }

# =====================================================================
# Tests (Given / When / Then) — grouped by the actor under test
# =====================================================================
tests:
  # ----------------------- RestaurantAccount -------------------------
  TestRestaurantAccountRegistered:
    name: "Registers a restaurant account"
    rules: [{ $ref: 'rules.yaml#/AccountRegistrationValidCurrencyUniqueRef' }]
    actor: { $ref: 'actors.yaml#/RestaurantAccount' }
    given: []
    when:
      type: { $ref: 'commands.yaml#/RegisterRestaurantAccount' }
      data: { restaurantAccountId: "acct-1", legalName: "SARL Chez Marco", defaultCurrency: "EUR", defaultTaxRate: { delivery: 10.0 }, timezone: "Europe/Paris" }
    then:
      - { $ref: '#/fixtures/restaurantAccountRegistered' }

  TestRestaurantAccountRegisterIsRejected:
    name: "Rejects registering an account with an invalid currency or an already-used external ref"
    rules: [{ $ref: 'rules.yaml#/AccountRegistrationValidCurrencyUniqueRef' }]
    actor: { $ref: 'actors.yaml#/RestaurantAccount' }
    given: []
    when:
      type: { $ref: 'commands.yaml#/RegisterRestaurantAccount' }
      data: { restaurantAccountId: "acct-1", legalName: "SARL Chez Marco", defaultCurrency: "EURO", defaultTaxRate: { delivery: 10.0 } }
    thrown:
      - { $ref: 'errors.yaml#/InvalidCurrency' }
      - { $ref: 'errors.yaml#/RefAlreadyUsed' }

  TestRestaurantAccountUpdated:
    name: "Updates account-level fields (legal name)"
    rules: [{ $ref: 'rules.yaml#/AccountUpdateRequiresExistingAccountAndField' }]
    actor: { $ref: 'actors.yaml#/RestaurantAccount' }
    given:
      - { $ref: '#/fixtures/restaurantAccountRegistered' }
    when:
      type: { $ref: 'commands.yaml#/UpdateRestaurantAccount' }
      data: { restaurantAccountId: "acct-1", legalName: "SARL Chez Marco II" }
    then:
      - { $ref: '#/fixtures/restaurantAccountUpdated' }

  TestRestaurantAccountUpdateIsRejected:
    name: "Rejects updating a missing account or an update with no editable field"
    rules: [{ $ref: 'rules.yaml#/AccountUpdateRequiresExistingAccountAndField' }]
    actor: { $ref: 'actors.yaml#/RestaurantAccount' }
    given: []
    when:
      type: { $ref: 'commands.yaml#/UpdateRestaurantAccount' }
      data: { restaurantAccountId: "acct-missing" }
    thrown:
      - { $ref: 'errors.yaml#/RestaurantAccountNotFound' }
      - { $ref: 'errors.yaml#/NoEditableFieldProvided' }

  TestRestaurantAccountDeleted:
    name: "Deletes a restaurant account"
    rules: [{ $ref: 'rules.yaml#/AccountDeletion' }]
    actor: { $ref: 'actors.yaml#/RestaurantAccount' }
    given:
      - { $ref: '#/fixtures/restaurantAccountRegistered' }
    when:
      type: { $ref: 'commands.yaml#/DeleteRestaurantAccount' }
      data: { restaurantAccountId: "acct-1", reason: "Closed business" }
    then:
      - { $ref: '#/fixtures/restaurantAccountDeleted' }

  # -------------------------- Restaurant -----------------------------
  TestRestaurantLocationRegistered:
    name: "Registers a location under an existing account"
    rules: [{ $ref: 'rules.yaml#/LocationRegistrationUnderAccountUniqueSlug' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given:
      - { $ref: '#/fixtures/restaurantAccountRegistered' }
    when:
      type: { $ref: 'commands.yaml#/RegisterRestaurant' }
      data: { restaurantId: "resto-1", accountId: "acct-1", listingStatus: "ACTIVE_PARTNER", slug: "chez-marco", displayName: "Chez Marco", marginRate: 62.0, cuisineCategory: "PIZZA", uberPricesOptIn: true, address: { line1: "1 Rue Nationale", postalCode: "37000", city: "Tours", country: "FR" }, timezone: "Europe/Paris" }
    then:
      - { $ref: '#/fixtures/restaurantRegistered' }

  TestRestaurantRegisterIsRejected:
    name: "Rejects registering a location when the account is missing, the slug is taken, or the external ref is already used"
    rules: [{ $ref: 'rules.yaml#/LocationRegistrationUnderAccountUniqueSlug' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given: []
    when:
      type: { $ref: 'commands.yaml#/RegisterRestaurant' }
      data: { restaurantId: "resto-1", accountId: "acct-missing", slug: "chez-marco", displayName: "Chez Marco", address: { line1: "1 Rue Nationale", postalCode: "37000", city: "Tours", country: "FR" } }
    thrown:
      - { $ref: 'errors.yaml#/RestaurantAccountNotFound' }
      - { $ref: 'errors.yaml#/SlugAlreadyTaken' }
      - { $ref: 'errors.yaml#/RefAlreadyUsed' }

  TestRestaurantActivated:
    name: "Activates a registered restaurant"
    rules: [{ $ref: 'rules.yaml#/RestaurantActivationVisibility' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given:
      - { $ref: '#/fixtures/restaurantRegistered' }
    when:
      type: { $ref: 'commands.yaml#/ActivateRestaurant' }
      data: { restaurantId: "resto-1" }
    then:
      - { $ref: '#/fixtures/restaurantActivated' }

  TestRestaurantActivateAgainIsNoOp:
    name: "Re-activating an already-active restaurant is a no-op (idempotent)"
    rules: [{ $ref: 'rules.yaml#/RestaurantActivationIdempotent' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given:
      - { $ref: '#/fixtures/restaurantRegistered' }
      - { $ref: '#/fixtures/restaurantActivated' }
    when:
      type: { $ref: 'commands.yaml#/ActivateRestaurant' }
      data: { restaurantId: "resto-1" }
    then: []

  TestRestaurantActivateIsRejected:
    name: "Rejects activating a missing restaurant or one with no orderable offer"
    rules: [{ $ref: 'rules.yaml#/RestaurantActivationVisibility' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given: []
    when:
      type: { $ref: 'commands.yaml#/ActivateRestaurant' }
      data: { restaurantId: "resto-missing" }
    thrown:
      - { $ref: 'errors.yaml#/RestaurantNotFound' }
      - { $ref: 'errors.yaml#/RestaurantNotReadyForActivation' }

  TestRestaurantUpdated:
    name: "Updates editable location fields (display name)"
    rules: [{ $ref: 'rules.yaml#/RestaurantLocationFieldsUpdate' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given:
      - { $ref: '#/fixtures/restaurantRegistered' }
    when:
      type: { $ref: 'commands.yaml#/UpdateRestaurant' }
      data: { restaurantId: "resto-1", displayName: "Chez Marco — Centre" }
    then:
      - { $ref: '#/fixtures/restaurantUpdated' }

  TestRestaurantUpdateIsRejected:
    name: "Rejects updating a missing restaurant or an update with no editable field"
    rules: [{ $ref: 'rules.yaml#/RestaurantLocationFieldsUpdate' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given: []
    when:
      type: { $ref: 'commands.yaml#/UpdateRestaurant' }
      data: { restaurantId: "resto-missing" }
    thrown:
      - { $ref: 'errors.yaml#/RestaurantNotFound' }
      - { $ref: 'errors.yaml#/NoEditableFieldProvided' }

  TestRestaurantDeactivated:
    name: "Deactivates an active restaurant"
    rules: [{ $ref: 'rules.yaml#/RestaurantDeactivation' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given:
      - { $ref: '#/fixtures/restaurantRegistered' }
      - { $ref: '#/fixtures/restaurantActivated' }
    when:
      type: { $ref: 'commands.yaml#/DeactivateRestaurant' }
      data: { restaurantId: "resto-1", reason: "Holidays" }
    then:
      - { $ref: '#/fixtures/restaurantDeactivated' }

  TestRestaurantAcceptanceModeChanged:
    name: "Switches an active restaurant to BUSY"
    rules: [{ $ref: 'rules.yaml#/OrderAcceptanceModeManagement' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given:
      - { $ref: '#/fixtures/restaurantRegistered' }
      - { $ref: '#/fixtures/restaurantActivated' }
    when:
      type: { $ref: 'commands.yaml#/ChangeOrderAcceptanceMode' }
      data: { restaurantId: "resto-1", mode: "BUSY" }
    then:
      - { $ref: '#/fixtures/restaurantAcceptanceModeChanged' }

  TestRestaurantAcceptanceModeIsRejected:
    name: "Rejects changing acceptance mode when the restaurant is inactive or already in that mode"
    rules: [{ $ref: 'rules.yaml#/OrderAcceptanceModeManagement' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given:
      - { $ref: '#/fixtures/restaurantRegistered' }
    when:
      type: { $ref: 'commands.yaml#/ChangeOrderAcceptanceMode' }
      data: { restaurantId: "resto-1", mode: "BUSY" }
    thrown:
      - { $ref: 'errors.yaml#/RestaurantNotActive' }
      - { $ref: 'errors.yaml#/AcceptanceModeUnchanged' }

  TestRestaurantRemoved:
    name: "Removes (delists) a location from its account"
    rules: [{ $ref: 'rules.yaml#/RestaurantRemoval' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given:
      - { $ref: '#/fixtures/restaurantRegistered' }
    when:
      type: { $ref: 'commands.yaml#/RemoveRestaurant' }
      data: { restaurantId: "resto-1", accountId: "acct-1", reason: "Delisted" }
    then:
      - { $ref: '#/fixtures/restaurantRemoved' }

  # ------------------- Listing & pre-registration --------------------
  TestRestaurantSeededFromSync:
    name: "Sync ACL seeds a public NON_PARTNER listing (no account)"
    rules: [{ $ref: 'rules.yaml#/ListingSeededFromOpenData' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given: []
    when:
      type: { $ref: 'commands.yaml#/RegisterRestaurant' }
      data: { restaurantId: "resto-2", listingStatus: "NON_PARTNER", slug: "le-saint-honore", displayName: "Le Saint-Honoré", website: "https://le-saint-honore.fr", cuisineCategory: "BISTRONOMIC", tags: ["bistronomie", "français"], address: { line1: "5 Rue Colbert", postalCode: "37000", city: "Tours", country: "FR" }, location: { latitude: 47.3941, longitude: 0.6848 }, externalIdentifiers: [{ key: "siret", value: "12345678900012" }, { key: "google_place_id", value: "ChIJxyz" }] }
    then:
      - { $ref: '#/fixtures/restaurantSeeded' }
  TestRestaurantGoogleBusinessProfileUpdated:
    name: "Records Google Business Profile enrichment"
    rules: [{ $ref: 'rules.yaml#/GoogleBusinessProfileEnrichment' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given:
      - { $ref: '#/fixtures/restaurantSeeded' }
    when:
      type: { $ref: 'commands.yaml#/UpdateRestaurantGoogleBusinessProfile' }
      data: { restaurantId: "resto-2", googlePlaceId: "ChIJxyz", rating: 4.4, reviewsCount: 18 }
    then:
      - { $ref: '#/fixtures/restaurantGoogleBusinessProfileUpdated' }
  TestRestaurantMarkedClosed:
    name: "Marks a listing closed (Sirene closure)"
    rules: [{ $ref: 'rules.yaml#/ClosedListingSyncedFromSource' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given:
      - { $ref: '#/fixtures/restaurantSeeded' }
    when:
      type: { $ref: 'commands.yaml#/MarkRestaurantClosed' }
      data: { restaurantId: "resto-2", reason: "Sirene: établissement fermé" }
    then:
      - { $ref: '#/fixtures/restaurantMarkedClosed' }
  TestRestaurantListingClaimed:
    name: "Owner claims a listing with a valid Google ownership proof"
    rules: [{ $ref: 'rules.yaml#/ListingClaimRequiresVerifiedOwnership' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given:
      - { $ref: '#/fixtures/restaurantSeeded' }
    when:
      type: { $ref: 'commands.yaml#/ClaimRestaurantListing' }
      data: { restaurantId: "resto-2", accountId: "acct-9", googleOwnershipProof: "gbp-proof-ref-1" }
    then:
      - { $ref: '#/fixtures/restaurantListingClaimed' }
  TestRestaurantListingClaimUnverifiedIsRejected:
    name: "Rejects a claim whose Google ownership proof fails"
    rules: [{ $ref: 'rules.yaml#/ListingClaimRequiresVerifiedOwnership' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given:
      - { $ref: '#/fixtures/restaurantSeeded' }
    when:
      type: { $ref: 'commands.yaml#/ClaimRestaurantListing' }
      data: { restaurantId: "resto-2", googleOwnershipProof: "bad-token" }
    thrown:
      - { $ref: 'errors.yaml#/ListingOwnershipNotVerified' }
  TestRestaurantListingClaimAgainIsRejected:
    name: "Rejects claiming an already-claimed listing"
    rules: [{ $ref: 'rules.yaml#/ListingClaimRequiresVerifiedOwnership' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given:
      - { $ref: '#/fixtures/restaurantSeeded' }
      - { $ref: '#/fixtures/restaurantListingClaimed' }
    when:
      type: { $ref: 'commands.yaml#/ClaimRestaurantListing' }
      data: { restaurantId: "resto-2", accountId: "acct-9", googleOwnershipProof: "gbp-proof-ref-1" }
    thrown:
      - { $ref: 'errors.yaml#/ListingAlreadyClaimed' }
  TestRestaurantListingOptedOut:
    name: "Owner opts a listing out (proven via GBP)"
    rules: [{ $ref: 'rules.yaml#/ListingOptOut' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given:
      - { $ref: '#/fixtures/restaurantSeeded' }
    when:
      type: { $ref: 'commands.yaml#/OptOutRestaurantListing' }
      data: { restaurantId: "resto-2", googleOwnershipProof: "gbp-proof-ref-1", reason: "Please remove my listing" }
    then:
      - { $ref: '#/fixtures/restaurantListingOptedOut' }
  TestRestaurantListingStatusChanged:
    name: "Admin moves a listing along the partnership funnel"
    rules: [{ $ref: 'rules.yaml#/ListingFunnelProgression' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given:
      - { $ref: '#/fixtures/restaurantSeeded' }
    when:
      type: { $ref: 'commands.yaml#/ChangeRestaurantListingStatus' }
      data: { restaurantId: "resto-2", listingStatus: "PASSIVE_PARTNER", reason: "HubRise menu connected" }
    then:
      - { $ref: '#/fixtures/restaurantListingStatusChanged' }
  TestRestaurantGbpOrderLinkConfigured:
    name: "Configures the Google 'Order online' link"
    rules: [{ $ref: 'rules.yaml#/GbpOrderLinkSetupAndVerification' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given:
      - { $ref: '#/fixtures/restaurantRegistered' }
    when:
      type: { $ref: 'commands.yaml#/ConfigureGoogleBusinessProfileOrderLink' }
      data: { restaurantId: "resto-1", gbpOrderUrl: "https://chez-marco.captain.food" }
    then:
      - { $ref: '#/fixtures/restaurantGbpOrderLinkConfigured' }
  TestRestaurantGbpOrderLinkVerified:
    name: "Verifies the configured Google 'Order online' link"
    rules: [{ $ref: 'rules.yaml#/GbpOrderLinkSetupAndVerification' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given:
      - { $ref: '#/fixtures/restaurantRegistered' }
      - { $ref: '#/fixtures/restaurantGbpOrderLinkConfigured' }
    when:
      type: { $ref: 'commands.yaml#/VerifyGoogleBusinessProfileOrderLink' }
      data: { restaurantId: "resto-1" }
    then:
      - { $ref: '#/fixtures/restaurantGbpOrderLinkVerified' }
  TestRestaurantGbpOrderLinkVerifyIsRejected:
    name: "Rejects verifying when no order link is configured"
    rules: [{ $ref: 'rules.yaml#/GbpOrderLinkSetupAndVerification' }]
    actor: { $ref: 'actors.yaml#/Restaurant' }
    given:
      - { $ref: '#/fixtures/restaurantRegistered' }
    when:
      type: { $ref: 'commands.yaml#/VerifyGoogleBusinessProfileOrderLink' }
      data: { restaurantId: "resto-1" }
    thrown:
      - { $ref: 'errors.yaml#/GbpOrderLinkNotConfigured' }

  # ------------------------- Prospection -----------------------------
  TestProspectContacted:
    name: "Records the first prospection contact (prospect is born)"
    rules: [{ $ref: 'rules.yaml#/ProspectContactScheduleAndLimit' }]
    actor: { $ref: 'actors.yaml#/Prospect' }
    given: []
    when:
      type: { $ref: 'commands.yaml#/RecordProspectContact' }
      data: { restaurantId: "resto-2", channel: "EMAIL", sequenceStep: 0 }
    then:
      - { $ref: '#/fixtures/prospectContacted' }
  TestProspectContactedTooRecently:
    name: "Rejects a new contact too soon after the previous one (≥7 days apart)"
    rules: [{ $ref: 'rules.yaml#/ProspectContactScheduleAndLimit' }]
    actor: { $ref: 'actors.yaml#/Prospect' }
    given:
      - { $ref: '#/fixtures/prospectContacted' }
    when:
      type: { $ref: 'commands.yaml#/RecordProspectContact' }
      data: { restaurantId: "resto-2", channel: "EMAIL", sequenceStep: 7 }
    thrown:
      - { $ref: 'errors.yaml#/ProspectContactedTooRecently' }
  TestProspectContactLimitReached:
    name: "Rejects a 4th contact (anti-spam: ≤ 3)"
    rules: [{ $ref: 'rules.yaml#/ProspectContactScheduleAndLimit' }]
    actor: { $ref: 'actors.yaml#/Prospect' }
    given:
      - { $ref: '#/fixtures/prospectContacted' }
      - { $ref: '#/fixtures/prospectContactedRelance' }
      - { $ref: '#/fixtures/prospectContactedFinal' }
    when:
      type: { $ref: 'commands.yaml#/RecordProspectContact' }
      data: { restaurantId: "resto-2", channel: "EMAIL", sequenceStep: 28 }
    thrown:
      - { $ref: 'errors.yaml#/ProspectContactLimitReached' }
  TestProspectMarkedCold:
    name: "Marks a contacted prospect cold"
    rules: [{ $ref: 'rules.yaml#/ProspectOutreachStateTransitions' }]
    actor: { $ref: 'actors.yaml#/Prospect' }
    given:
      - { $ref: '#/fixtures/prospectContacted' }
    when:
      type: { $ref: 'commands.yaml#/MarkProspectCold' }
      data: { restaurantId: "resto-2", reason: "No reply by J+21" }
    then:
      - { $ref: '#/fixtures/prospectMarkedCold' }
  TestProspectReplied:
    name: "Records a prospect reply"
    rules: [{ $ref: 'rules.yaml#/ProspectOutreachStateTransitions' }]
    actor: { $ref: 'actors.yaml#/Prospect' }
    given:
      - { $ref: '#/fixtures/prospectContacted' }
    when:
      type: { $ref: 'commands.yaml#/RecordProspectReply' }
      data: { restaurantId: "resto-2", note: "Interested — call back" }
    then:
      - { $ref: '#/fixtures/prospectReplied' }
  TestProspectMarkColdNotFound:
    name: "Rejects marking cold a prospect that was never contacted"
    rules: [{ $ref: 'rules.yaml#/ProspectOutreachStateTransitions' }]
    actor: { $ref: 'actors.yaml#/Prospect' }
    given: []
    when:
      type: { $ref: 'commands.yaml#/MarkProspectCold' }
      data: { restaurantId: "resto-2", reason: "n/a" }
    thrown:
      - { $ref: 'errors.yaml#/ProspectNotFound' }

  # --------------------------- Catalog -------------------------------
  TestCatalogCreated:
    name: "Creates a catalog for a registered restaurant"
    rules: [{ $ref: 'rules.yaml#/CatalogCreationForRestaurant' }]
    actor: { $ref: 'actors.yaml#/Catalog' }
    given:
      - { $ref: '#/fixtures/restaurantRegistered' }
    when:
      type: { $ref: 'commands.yaml#/CreateCatalog' }
      data: { catalogId: "cat-1", restaurantId: "resto-1", name: "Main" }
    then:
      - { $ref: '#/fixtures/catalogCreated' }

  TestCatalogCreateIsRejected:
    name: "Rejects creating a catalog for a missing restaurant or with a duplicate ref"
    rules: [{ $ref: 'rules.yaml#/CatalogCreationForRestaurant' }]
    actor: { $ref: 'actors.yaml#/Catalog' }
    given: []
    when:
      type: { $ref: 'commands.yaml#/CreateCatalog' }
      data: { catalogId: "cat-1", restaurantId: "resto-missing", name: "Main" }
    thrown:
      - { $ref: 'errors.yaml#/RestaurantNotFound' }
      - { $ref: 'errors.yaml#/RefNotUnique' }

  TestCatalogProductAdded:
    name: "Adds a product with one offer to a catalog"
    rules: [{ $ref: 'rules.yaml#/CatalogProductManagement' }]
    actor: { $ref: 'actors.yaml#/Catalog' }
    given:
      - { $ref: '#/fixtures/catalogCreated' }
    when:
      type: { $ref: 'commands.yaml#/AddProduct' }
      data:
        productId: "prod-1"
        catalogId: "cat-1"
        restaurantId: "resto-1"
        name: "Margherita"
        taxRate: { delivery: 10.0 }
        offers:
          - { id: "off-1", productId: "prod-1", name: "Default", price: { amountCents: 980, currency: "EUR" }, availability: "AVAILABLE" }
    then:
      - { $ref: '#/fixtures/productAdded' }

  TestCatalogAddProductIsRejected:
    name: "Rejects adding a product when the catalog/category is missing, a price currency mismatches, or a ref is duplicated"
    rules: [{ $ref: 'rules.yaml#/CatalogProductManagement' }]
    actor: { $ref: 'actors.yaml#/Catalog' }
    given: []
    when:
      type: { $ref: 'commands.yaml#/AddProduct' }
      data:
        productId: "prod-1"
        catalogId: "cat-missing"
        restaurantId: "resto-1"
        name: "Margherita"
        taxRate: { delivery: 10.0 }
        offers:
          - { id: "off-1", productId: "prod-1", name: "Default", price: { amountCents: 980, currency: "USD" }, availability: "AVAILABLE" }
    thrown:
      - { $ref: 'errors.yaml#/CatalogNotFound' }
      - { $ref: 'errors.yaml#/CurrencyMismatch' }
      - { $ref: 'errors.yaml#/CatalogCategoryRefNotFound' }
      - { $ref: 'errors.yaml#/RefNotUnique' }

  TestCatalogProductUpdated:
    name: "Updates an existing product (full replace)"
    rules: [{ $ref: 'rules.yaml#/CatalogProductManagement' }]
    actor: { $ref: 'actors.yaml#/Catalog' }
    given:
      - { $ref: '#/fixtures/catalogCreated' }
      - { $ref: '#/fixtures/productAdded' }
    when:
      type: { $ref: 'commands.yaml#/UpdateProduct' }
      data:
        catalogId: "cat-1"
        restaurantId: "resto-1"
        product:
          id: "prod-1"
          catalogId: "cat-1"
          restaurantId: "resto-1"
          name: "Margherita (large)"
          taxRate: { delivery: 10.0 }
          offers:
            - { id: "off-1", productId: "prod-1", name: "Default", price: { amountCents: 1180, currency: "EUR" }, availability: "AVAILABLE" }
    then:
      - { $ref: '#/fixtures/productUpdated' }

  TestCatalogUpdateProductIsRejected:
    name: "Rejects updating a missing product, removing its last offer, or mismatching the currency"
    rules: [{ $ref: 'rules.yaml#/CatalogProductManagement' }]
    actor: { $ref: 'actors.yaml#/Catalog' }
    given: []
    when:
