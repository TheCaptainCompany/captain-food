      - { $ref: '#/fixtures/cartLineAdded' }
    when:
      type: { $ref: 'commands.yaml#/ChangeCartLineQuantity' }
      data: { cartId: "cart-1", cartLineId: "line-1", quantity: 3 }
    then:
      - { $ref: '#/fixtures/cartLineQuantityChanged' }

  TestCartLineRemoved:
