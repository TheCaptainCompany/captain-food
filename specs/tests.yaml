      data: { orderId: "order-1", restaurantId: "resto-1", reason: "Late delivery" }
    then:
      - { $ref: '#/fixtures/refundRequested' }

  # ---------------------- PlaceOrderProcess (saga) -------------------
  TestPlaceOrderCreatesPaymentIntent:
    name: "Checkout reads the open cart, prices it, and creates a Stripe payment intent"
    actor: { $ref: 'actors.yaml#/PlaceOrderProcess' }
    given:
      - { $ref: '#/fixtures/cartStarted' }
      - { $ref: '#/fixtures/cartLineAdded' }
    when:
      type: { $ref: 'commands.yaml#/PlaceOrder' }
      data:
        orderId: "order-1"
        restaurantId: "resto-1"
        cartId: "cart-1"
        customerContact: { displayName: "Johnny", phone: "+33612345678" }
        serviceType: "DELIVERY"
        deliveryAddress: { line1: "1 Rue Nationale", postalCode: "37000", city: "Tours", country: "FR" }
        paymentMethodId: "pm_123"
    then:
      - { $ref: '#/fixtures/paymentIntentCreated' }

  TestPlaceOrderIsRejected:
    name: "Rejects checkout when the restaurant is paused, the cart is empty, the delivery address is missing or out of area, or the payment is declined"
    actor: { $ref: 'actors.yaml#/PlaceOrderProcess' }
    given:
      - { $ref: '#/fixtures/cartStarted' }
    when:
      type: { $ref: 'commands.yaml#/PlaceOrder' }
      data:
        orderId: "order-1"
        restaurantId: "resto-1"
        cartId: "cart-1"
        customerContact: { displayName: "Johnny", phone: "+33612345678" }
        serviceType: "DELIVERY"
        paymentMethodId: "pm_declined"
    thrown:
      - { $ref: 'errors.yaml#/RestaurantPaused' }
      - { $ref: 'errors.yaml#/CartEmpty' }
      - { $ref: 'errors.yaml#/DeliveryAddressRequired' }
      - { $ref: 'errors.yaml#/OutsideDeliveryArea' }
      - { $ref: 'errors.yaml#/PaymentDeclined' }

  TestPlaceOrderPaymentCapturedPlacesOrder:
    name: "On payment capture the saga materializes the order and closes the cart"
    actor: { $ref: 'actors.yaml#/PlaceOrderProcess' }
    given:
      - { $ref: '#/fixtures/paymentIntentCreated' }
    when:
      type: { $ref: 'events.yaml#/PaymentCaptured' }
      data: { paymentIntentId: "pi_123", restaurantId: "resto-1", amount: { amountCents: 1960, currency: "EUR" } }
    then:
      - { $ref: '#/fixtures/orderPlaced' }
      - { $ref: '#/fixtures/cartCheckedOut' }

  TestPlaceOrderPaymentFailedPlacesNothing:
    name: "On payment failure the saga aborts and places no order (cart stays open)"
    actor: { $ref: 'actors.yaml#/PlaceOrderProcess' }
    given:
      - { $ref: '#/fixtures/paymentIntentCreated' }
    when:
      type: { $ref: 'events.yaml#/PaymentFailed' }
      data: { paymentIntentId: "pi_123", restaurantId: "resto-1", reason: "card_declined" }
    then: []

