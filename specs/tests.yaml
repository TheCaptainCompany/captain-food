  # ----------------------------- Cart --------------------------------
  TestCartFirstLineAdded:
    name: "Adds the first line to a new cart (the cart is created)"
    actor: { $ref: 'actors.yaml#/Cart' }
    given: []
    when:
      type: { $ref: 'commands.yaml#/AddCartLine' }
      data: { cartId: "cart-1", restaurantId: "resto-1", line: { cartLineId: "line-1", offerId: "off-1", quantity: 2 } }
    then:
      - { $ref: '#/fixtures/cartStarted' }
      - { $ref: '#/fixtures/cartLineAdded' }

  TestCartAddLineIsRejectedWhenOfferNotOrderable:
    name: "Rejects adding a line when the offer is unknown, unavailable, or out of stock"
    actor: { $ref: 'actors.yaml#/Cart' }
    given: []
    when:
      type: { $ref: 'commands.yaml#/AddCartLine' }
      data: { cartId: "cart-1", restaurantId: "resto-1", line: { cartLineId: "line-1", offerId: "off-missing", quantity: 99 } }
    thrown:
      - { $ref: 'errors.yaml#/OfferNotFound' }
      - { $ref: 'errors.yaml#/OfferUnavailable' }
      - { $ref: 'errors.yaml#/InsufficientStock' }

  TestCartAddLineIsRejectedWhenCartInvalid:
    name: "Rejects adding a line on a missing/closed/mismatched cart, with a bad option selection, or over the quantity limit"
    actor: { $ref: 'actors.yaml#/Cart' }
    given: []
    when:
      type: { $ref: 'commands.yaml#/AddCartLine' }
      data: { cartId: "cart-1", restaurantId: "resto-2", line: { cartLineId: "line-1", offerId: "off-1", quantity: 1 } }
    thrown:
      - { $ref: 'errors.yaml#/CartNotFound' }
      - { $ref: 'errors.yaml#/CartNotOpen' }
      - { $ref: 'errors.yaml#/CartRestaurantMismatch' }
      - { $ref: 'errors.yaml#/InvalidOptionSelection' }
      - { $ref: 'errors.yaml#/QuantityExceedsLimit' }

  TestCartLineQuantityChanged:
    name: "Changes the quantity of an existing cart line"
    actor: { $ref: 'actors.yaml#/Cart' }
    given:
