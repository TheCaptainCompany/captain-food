      data: { deliveryJobId: "deliv-1", riderId: "rider-1" }
    then:
      - { $ref: '#/fixtures/deliveryCompleted' }

  TestCancelDelivery:
    name: "The restaurant cancels a pending delivery job"
    rules: [{ $ref: 'rules.yaml#/DeliveryCancellableBeforeCompletion' }]
    actor: { $ref: 'actors.yaml#/DeliveryJob' }
    given:
      - { $ref: '#/fixtures/deliveryRequested' }
    when:
