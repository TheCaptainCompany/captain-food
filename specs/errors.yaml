version: 1
description: >
  Captain.Food anticipated errors. A command handler rejects a request by raising one of these —
  they are the old command `invariants`, now first-class. An error carries CONTEXT (typed data
  identifying the failure) and a default, HUMAN-FRIENDLY MESSAGE in English and French. Which
  errors each command can raise is mapped in actors.yaml (`throws`). Transport/HTTP-level failures
  are out of scope.

  Cross-cutting errors (Unauthorized, Forbidden, ValidationError, Conflict, RateLimited, Internal)
  may occur on ANY command; they are NOT repeated in every actors.yaml `throws` list — only
  domain-specific errors are listed there.

  Convention:
    - key      : PascalCase stable error code (also the wire `code`).
    - context  : typed fields carried with the error ($ref to scalars where applicable); {} if none.
                 Includes ids (for logging/handling) AND human names (for the message) when the
                 offending entity is known. *NotFound errors omit the name (it is unknown).
    - messages : default user-facing text; `en` and `fr` both required. They may contain
                 `{placeholder}` tokens that reference a `context` field name; the server
                 interpolates them (e.g. "The restaurant '{restaurantName}' is not active.").

# =====================================================================
# Cross-cutting (may occur on any command)
# =====================================================================

Unauthorized:
  description: "No valid authentication for this path/role."
  context: {}
  messages:
    en: "You must be signed in to do this."
    fr: "Vous devez être connecté pour effectuer cette action."

Forbidden:
  description: "Authenticated, but not allowed to act on this resource (e.g. not the owner)."
  context: {}
  messages:
    en: "You are not allowed to perform this action."
    fr: "Vous n'êtes pas autorisé à effectuer cette action."

ValidationError:
  description: "Input failed schema validation (type, format, required, bounds)."
  context:
    field: { type: string }
  messages:
    en: "The field '{field}' is invalid."
    fr: "Le champ '{field}' est invalide."

Conflict:
  description: "Concurrent modification (optimistic-concurrency version clash); retry."
  context: {}
  messages:
    en: "This item was modified meanwhile. Please retry."
    fr: "Cet élément a été modifié entre-temps. Veuillez réessayer."

RateLimited:
  description: "Too many requests on this path."
  context: {}
  messages:
    en: "Too many requests. Please slow down."
    fr: "Trop de requêtes. Veuillez patienter."

Internal:
  description: "Unexpected server error."
  context: {}
  messages:
    en: "Something went wrong on our side."
    fr: "Une erreur est survenue de notre côté."

# =====================================================================
# Restaurant
# =====================================================================

RestaurantAccountNotFound:
  description: "No restaurant account with this id (e.g. registering a location under a missing account)."
  context:
    restaurantAccountId: { $ref: 'scalars.yaml#/RestaurantAccountId' }
  messages:
    en: "Restaurant account not found."
    fr: "Compte restaurant introuvable."

RestaurantNotFound:
  description: "No restaurant with this id."
  context:
    restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
  messages:
    en: "Restaurant not found."
    fr: "Restaurant introuvable."

SlugAlreadyTaken:
  description: "Another restaurant already uses this slug."
  context:
    slug: { $ref: 'scalars.yaml#/Slug' }
  messages:
    en: "The address '{slug}' is already taken."
    fr: "L'adresse '{slug}' est déjà utilisée."

RefAlreadyUsed:
  description: "The external reference (idempotent import key) is already owned by another aggregate."
  context:
    ref: { $ref: 'scalars.yaml#/ExternalReference' }
  messages:
    en: "The reference '{ref}' is already in use."
    fr: "La référence '{ref}' est déjà utilisée."

InvalidCurrency:
  description: "Currency is not a valid ISO 4217 code."
  context:
    currency: { $ref: 'scalars.yaml#/CurrencyCode' }
  messages:
    en: "'{currency}' is not a valid currency."
    fr: "'{currency}' n'est pas une devise valide."

# (RestaurantAlreadyActive removed: ActivateRestaurant is idempotent — re-activating is a no-op, not an error.)

RestaurantNotActive:
  description: "Operation requires an ACTIVE restaurant."
  context:
    restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
    restaurantName: { $ref: 'scalars.yaml#/RestaurantDisplayName' }
  messages:
    en: "The restaurant '{restaurantName}' is not active."
    fr: "Le restaurant '{restaurantName}' n'est pas actif."

RestaurantNotReadyForActivation:
  description: "Activation requires at least one catalog with one orderable offer."
  context:
    restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
    restaurantName: { $ref: 'scalars.yaml#/RestaurantDisplayName' }
  messages:
    en: "Add at least one orderable product before activating '{restaurantName}'."
    fr: "Ajoutez au moins un produit commandable avant d'activer '{restaurantName}'."

RestaurantPaused:
  description: "Restaurant acceptance mode is PAUSED; it cannot take orders."
  context:
    restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
    restaurantName: { $ref: 'scalars.yaml#/RestaurantDisplayName' }
  messages:
    en: "'{restaurantName}' is not taking orders right now."
    fr: "'{restaurantName}' ne prend pas de commandes pour le moment."

AcceptanceModeUnchanged:
  description: "Requested acceptance mode equals the current one."
  context:
    restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
    restaurantName: { $ref: 'scalars.yaml#/RestaurantDisplayName' }
    mode: { $ref: 'scalars.yaml#/OrderAcceptanceMode' }
  messages:
    en: "'{restaurantName}' is already in '{mode}' mode."
    fr: "'{restaurantName}' est déjà en mode '{mode}'."

NoEditableFieldProvided:
  description: "Update command carried no editable field."
  context: {}
  messages:
    en: "Provide at least one field to update."
    fr: "Indiquez au moins un champ à modifier."

# --- Restaurant listing & pre-registration (ADR-0019/0021) ---

ListingAlreadyClaimed:
  description: "The restaurant listing has already been claimed by an owner."
  context:
    restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
  messages:
    en: "This restaurant listing has already been claimed."
    fr: "Cette fiche restaurant a déjà été revendiquée."

ListingOwnershipNotVerified:
  description: "Could not verify ownership of the listing (Google Business Profile proof rejected)."
  context:
    restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
  messages:
    en: "We couldn't verify that you own this restaurant. Please confirm via your Google Business Profile."
    fr: "Nous n'avons pas pu vérifier que ce restaurant vous appartient. Confirmez via votre fiche Google Business Profile."

GbpOrderLinkNotConfigured:
  description: "No Google Business Profile 'Order online' link is configured to verify."
  context:
    restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
  messages:
    en: "Configure the Google 'Order online' link before verifying it."
    fr: "Configurez le lien Google « Commander en ligne » avant de le vérifier."

# --- Prospection (ADR-0020) ---

ProspectContactLimitReached:
  description: "The prospect already received the maximum number of outreach contacts (anti-spam: ≤ 3)."
  context:
    restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
  messages:
    en: "This prospect has already been contacted the maximum number of times."
    fr: "Ce prospect a déjà été contacté le nombre maximum de fois."

ProspectContactedTooRecently:
  description: "A new contact is too soon after the previous one (anti-spam: ≥ 7 days apart)."
  context:
    restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
  messages:
    en: "This prospect was contacted too recently; wait before contacting again."
    fr: "Ce prospect a été contacté trop récemment ; patientez avant de le recontacter."

ProspectNotFound:
  description: "No prospect (contact history) exists for this restaurant."
  context:
    restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
  messages:
    en: "Prospect not found."
    fr: "Prospect introuvable."

# =====================================================================
# Catalog (Catalog / CatalogCategory / Product / Offer / OptionList)
# =====================================================================

CatalogNotFound:
  description: "No catalog with this id (or it does not belong to the restaurant)."
  context:
    catalogId: { $ref: 'scalars.yaml#/CatalogId' }
  messages:
    en: "Catalog not found."
    fr: "Catalog introuvable."

CurrencyMismatch:
  description: "A offer price currency differs from the restaurant default currency."
  context:
    restaurantName: { $ref: 'scalars.yaml#/RestaurantDisplayName' }
    currency: { $ref: 'scalars.yaml#/CurrencyCode' }
  messages:
    en: "Prices must use the currency of '{restaurantName}' ('{currency}')."
    fr: "Les prix doivent utiliser la devise de '{restaurantName}' ('{currency}')."

RefNotUnique:
  description: "The ref is not unique within the catalog."
  context:
    ref: { $ref: 'scalars.yaml#/ExternalReference' }
    catalogId: { $ref: 'scalars.yaml#/CatalogId' }
  messages:
    en: "The reference '{ref}' is already used in this catalog."
    fr: "La référence '{ref}' est déjà utilisée dans ce catalog."

CatalogCategoryNotFound:
  description: "No category with this id in the catalog."
  context:
    productCategoryId: { $ref: 'scalars.yaml#/ProductCategoryId' }
  messages:
    en: "CatalogCategory not found."
    fr: "Catégorie introuvable."

CatalogCategoryRefNotFound:
  description: "Referenced category ref does not exist in the catalog."
  context:
    ref: { $ref: 'scalars.yaml#/ExternalReference' }
  messages:
    en: "No category with reference '{ref}'."
    fr: "Aucune catégorie avec la référence '{ref}'."

ParentCatalogCategoryNotFound:
  description: "parentRef points to a category that does not exist in the catalog."
  context:
    parentRef: { $ref: 'scalars.yaml#/ExternalReference' }
  messages:
    en: "The parent category '{parentRef}' does not exist."
    fr: "La catégorie parente '{parentRef}' n'existe pas."

CatalogCategoryCycle:
  description: "parentRef would introduce a cycle in the category tree."
  context:
    productCategoryId: { $ref: 'scalars.yaml#/ProductCategoryId' }
    categoryName: { $ref: 'scalars.yaml#/CatalogCategoryName' }
  messages:
    en: "Moving '{categoryName}' there would create a category loop."
    fr: "Déplacer '{categoryName}' ici créerait une boucle de catégories."

CatalogCategoryNotEmpty:
  description: "CatalogCategory has child categories or products referencing it."
  context:
    productCategoryId: { $ref: 'scalars.yaml#/ProductCategoryId' }
    categoryName: { $ref: 'scalars.yaml#/CatalogCategoryName' }
  messages:
    en: "Empty the category '{categoryName}' before removing it."
    fr: "Videz la catégorie '{categoryName}' avant de la supprimer."

ProductNotFound:
  description: "No product with this id in the catalog."
  context:
    productId: { $ref: 'scalars.yaml#/ProductId' }
  messages:
    en: "Product not found."
    fr: "Produit introuvable."

ProductMustHaveOffer:
  description: "A product must keep at least one offer."
  context:
    productId: { $ref: 'scalars.yaml#/ProductId' }
    productName: { $ref: 'scalars.yaml#/ProductName' }
  messages:
    en: "'{productName}' must keep at least one offer."
    fr: "'{productName}' doit conserver au moins une offere."

OptionListNotFound:
  description: "No option list with this id in the catalog."
  context:
    optionListId: { $ref: 'scalars.yaml#/OptionListId' }
  messages:
    en: "Option list not found."
    fr: "Liste d'options introuvable."

OptionListMustHaveOption:
  description: "An option list must keep at least one option."
  context:
    optionListId: { $ref: 'scalars.yaml#/OptionListId' }
    optionListName: { $ref: 'scalars.yaml#/OptionListName' }
  messages:
    en: "The option list '{optionListName}' must have at least one option."
    fr: "La liste d'options '{optionListName}' doit contenir au moins une option."

InvalidSelectionBounds:
  description: "minSelections is greater than maxSelections."
  context:
    optionListId: { $ref: 'scalars.yaml#/OptionListId' }
    optionListName: { $ref: 'scalars.yaml#/OptionListName' }
  messages:
    en: "In '{optionListName}', the minimum cannot exceed the maximum number of selections."
    fr: "Dans '{optionListName}', le minimum ne peut pas dépasser le maximum de sélections."

OptionListInUse:
  description: "Option list is still referenced by a offer and cannot be removed."
  context:
    optionListId: { $ref: 'scalars.yaml#/OptionListId' }
    optionListName: { $ref: 'scalars.yaml#/OptionListName' }
  messages:
    en: "The option list '{optionListName}' is still used by a product."
    fr: "La liste d'options '{optionListName}' est encore utilisée par un produit."

OfferNotFound:
  description: "No offer with this id in the catalog."
  context:
    offerId: { $ref: 'scalars.yaml#/OfferId' }
  messages:
    en: "Product offer not found."
    fr: "Offere de produit introuvable."

OfferNotStockTracked:
  description: "Offer is not stock-tracked, so its stock cannot be set."
  context:
    offerId: { $ref: 'scalars.yaml#/OfferId' }
    productName: { $ref: 'scalars.yaml#/ProductName' }
    offerName: { $ref: 'scalars.yaml#/OfferName' }
  messages:
    en: "'{productName}' ({offerName}) does not track stock."
    fr: "'{productName}' ({offerName}) ne suit pas de stock."

CatalogTranslationFailed:
  description: "The ACL could not map external (HubRise) shapes to domain types on import."
  context: {}
  messages:
    en: "The imported catalog could not be processed."
    fr: "Le catalogue importé n'a pas pu être traité."

MissingRef:
  description: "An imported entity is missing its ref (idempotency key)."
  context: {}
  messages:
    en: "Every imported item must have a reference."
    fr: "Chaque élément importé doit avoir une référence."

# =====================================================================
# Availability & stock (shared by cart and checkout)
# =====================================================================

OfferUnavailable:
  description: "Offer availability is UNAVAILABLE (manual flag)."
  context:
    offerId: { $ref: 'scalars.yaml#/OfferId' }
    productName: { $ref: 'scalars.yaml#/ProductName' }
    offerName: { $ref: 'scalars.yaml#/OfferName' }
  messages:
    en: "'{productName}' ({offerName}) is currently unavailable."
    fr: "'{productName}' ({offerName}) est actuellement indisponible."

InsufficientStock:
  description: "Requested quantity exceeds available stock."
  context:
    offerId: { $ref: 'scalars.yaml#/OfferId' }
    productName: { $ref: 'scalars.yaml#/ProductName' }
    offerName: { $ref: 'scalars.yaml#/OfferName' }
    requested: { $ref: 'scalars.yaml#/Quantity' }
    available: { $ref: 'scalars.yaml#/Quantity' }
  messages:
    en: "Only {available} left of '{productName}' ({offerName}), but {requested} were requested."
    fr: "Il ne reste que {available} de '{productName}' ({offerName}), mais {requested} ont été demandés."

QuantityExceedsLimit:
  description: "Requested quantity exceeds the per-line maximum."
  context:
    offerId: { $ref: 'scalars.yaml#/OfferId' }
    productName: { $ref: 'scalars.yaml#/ProductName' }
  messages:
    en: "You can't order that many of '{productName}'."
    fr: "Vous ne pouvez pas commander autant de '{productName}'."

InvalidOptionSelection:
  description: "A selected option does not belong to the offer, or violates the option list's min/max."
  context:
    offerId: { $ref: 'scalars.yaml#/OfferId' }
    productName: { $ref: 'scalars.yaml#/ProductName' }
  messages:
    en: "Invalid option selection for '{productName}'."
    fr: "Sélection d'options invalide pour '{productName}'."

# =====================================================================
# Cart
# =====================================================================

CartNotFound:
  description: "No cart with this id."
  context:
    cartId: { $ref: 'scalars.yaml#/CartId' }
  messages:
    en: "Cart not found."
    fr: "Panier introuvable."

CartNotOpen:
  description: "Cart is not OPEN (already checked out)."
  context:
    cartId: { $ref: 'scalars.yaml#/CartId' }
    status: { $ref: 'scalars.yaml#/CartStatus' }
  messages:
    en: "This cart can no longer be modified."
    fr: "Ce panier ne peut plus être modifié."

CartRestaurantMismatch:
  description: "Line/checkout restaurant differs from the cart's restaurant (no mixing)."
  context:
    cartId: { $ref: 'scalars.yaml#/CartId' }
    restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
    restaurantName: { $ref: 'scalars.yaml#/RestaurantDisplayName' }
  messages:
    en: "Your cart already has items from another restaurant, not '{restaurantName}'."
    fr: "Votre panier contient déjà des articles d'un autre restaurant que '{restaurantName}'."

CartLineNotFound:
  description: "No line with this id in the cart."
  context:
    cartId: { $ref: 'scalars.yaml#/CartId' }
    cartLineId: { $ref: 'scalars.yaml#/CartLineId' }
  messages:
    en: "This cart line no longer exists."
    fr: "Cette ligne du panier n'existe plus."

CartEmpty:
  description: "Checkout attempted on an empty cart."
  context:
    cartId: { $ref: 'scalars.yaml#/CartId' }
  messages:
    en: "Your cart is empty."
    fr: "Votre panier est vide."

# =====================================================================
# Customer
# =====================================================================

InvalidVerificationCode:
  description: "The SMS OTP code does not match (rejected by Supabase Auth)."
  context:
    phone: { $ref: 'scalars.yaml#/PhoneNumber' }
  messages:
    en: "The verification code is incorrect. Please try again."
    fr: "Le code de vérification est incorrect. Veuillez réessayer."

VerificationCodeExpired:
  description: "The SMS OTP (or email link) has expired; request a new one."
  context: {}
  messages:
    en: "The verification code has expired. Please request a new one."
    fr: "Le code de vérification a expiré. Veuillez en demander un nouveau."

InvalidVerificationToken:
  description: "The email magic-link token failed server-side verification with Supabase Auth."
  context: {}
  messages:
    en: "This email verification link is invalid or has already been used."
    fr: "Ce lien de vérification d'e-mail est invalide ou a déjà été utilisé."

EmailAlreadyInUse:
  description: "The email is already linked to another customer."
  context:
    email: { $ref: 'scalars.yaml#/EmailAddress' }
  messages:
    en: "The email '{email}' is already in use by another account."
    fr: "L'e-mail '{email}' est déjà utilisé par un autre compte."

PhoneAlreadyInUse:
  description: "The phone number is already linked to another customer (on change)."
  context:
    phone: { $ref: 'scalars.yaml#/PhoneNumber' }
  messages:
    en: "The phone number '{phone}' is already in use by another account."
    fr: "Le numéro '{phone}' est déjà utilisé par un autre compte."

# =====================================================================
# Order
# =====================================================================

OrderNotFound:
  description: "No order with this id."
  context:
    orderId: { $ref: 'scalars.yaml#/OrderId' }
  messages:
    en: "Order not found."
    fr: "Commande introuvable."

InvalidOrderStatus:
  description: "Order is not in a status that allows this transition."
  context:
    orderId: { $ref: 'scalars.yaml#/OrderId' }
    currentStatus: { $ref: 'scalars.yaml#/OrderStatus' }
  messages:
    en: "This action is not allowed while the order is '{currentStatus}'."
    fr: "Cette action n'est pas autorisée tant que la commande est '{currentStatus}'."

OrderAlreadyRated:
  description: "The delivery (rider thumb) has already been rated for this order; final."
  context:
    orderId: { $ref: 'scalars.yaml#/OrderId' }
  messages:
    en: "You have already rated this delivery."
    fr: "Vous avez déjà noté cette livraison."

RestaurantAlreadyRated:
  description: "The restaurant has already been rated for this order; final (one per order)."
  context:
    orderId: { $ref: 'scalars.yaml#/OrderId' }
  messages:
    en: "You have already rated the restaurant for this order."
    fr: "Vous avez déjà noté le restaurant pour cette commande."

DeliverySatisfactionAlreadyRecorded:
  description: "The delivery-delay satisfaction survey has already been answered for this order; final (one per order)."
  context:
    orderId: { $ref: 'scalars.yaml#/OrderId' }
  messages:
    en: "You have already answered the delivery survey for this order."
    fr: "Vous avez déjà répondu au questionnaire de livraison pour cette commande."

InvalidTipRecipient:
  description: "The tipper cannot tip this recipient (e.g. a restaurant tipping itself)."
  context:
    tippedBy: { $ref: 'scalars.yaml#/Tipper' }
    recipient: { $ref: 'scalars.yaml#/TipRecipient' }
  messages:
    en: "You can't send a tip to this recipient."
    fr: "Vous ne pouvez pas envoyer de pourboire à ce destinataire."

DeliveryAddressRequired:
  description: "serviceType is DELIVERY but no delivery address was provided."
  context: {}
  messages:
    en: "A delivery address is required for delivery."
    fr: "Une adresse de livraison est requise pour la livraison."

OutsideDeliveryArea:
  description: "Delivery address is outside the restaurant's delivery area."
  context:
    restaurantName: { $ref: 'scalars.yaml#/RestaurantDisplayName' }
  messages:
    en: "This address is outside the delivery area of '{restaurantName}'."
    fr: "Cette adresse est en dehors de la zone de livraison de '{restaurantName}'."

DeliveryJobNotFound:
  description: "No delivery job with this id."
  context:
    deliveryJobId: { $ref: 'scalars.yaml#/DeliveryJobId' }
  messages:
    en: "Delivery job not found."
    fr: "Livraison introuvable."

InvalidDeliveryStatus:
  description: "The delivery job is not in a status that allows this transition."
  context:
    deliveryJobId: { $ref: 'scalars.yaml#/DeliveryJobId' }
    currentStatus: { $ref: 'scalars.yaml#/DeliveryStatus' }
    expectedStatus: { $ref: 'scalars.yaml#/DeliveryStatus' }
  messages:
    en: "This action is not allowed while the delivery is '{currentStatus}'."
    fr: "Cette action n'est pas autorisée tant que la livraison est '{currentStatus}'."

DeliveryAlreadyAssigned:
  description: "The delivery job has already been accepted by a courier/rider."
  context:
    deliveryJobId: { $ref: 'scalars.yaml#/DeliveryJobId' }
  messages:
    en: "This delivery has already been taken."
    fr: "Cette livraison a déjà été prise en charge."

# --- Delivery partner self-registration (#61) ---
DeliveryPartnerAvailabilityAlreadyRequested:
  description: "A registration with this id already exists (idempotent self-registration guard)."
  context:
    registrationId: { $ref: 'scalars.yaml#/DeliveryPartnerRegistrationId' }
  messages:
    en: "This availability registration already exists."
    fr: "Cette demande de disponibilité existe déjà."

DeliveryPartnerAvailabilityNotFound:
  description: "No delivery-partner availability registration with this id."
  context:
    registrationId: { $ref: 'scalars.yaml#/DeliveryPartnerRegistrationId' }
  messages:
    en: "Availability registration not found."
    fr: "Demande de disponibilité introuvable."

DeliveryPartnerAvailabilityNotPending:
  description: "The availability registration is not PENDING, so it cannot be approved."
  context:
    registrationId: { $ref: 'scalars.yaml#/DeliveryPartnerRegistrationId' }
    currentStatus: { $ref: 'scalars.yaml#/CityAvailabilityStatus' }
  messages:
    en: "This availability registration is not awaiting review."
    fr: "Cette demande de disponibilité n'est pas en attente de validation."

# =====================================================================
# Rider
# =====================================================================

RiderAlreadyRegistered:
  description: "A rider is already registered for this identity (authRef/id)."
  context:
    riderId: { $ref: 'scalars.yaml#/RiderId' }
  messages:
    en: "You are already registered as a rider."
    fr: "Vous êtes déjà inscrit en tant que livreur."

RiderNotFound:
  description: "No rider with this id."
  context:
    riderId: { $ref: 'scalars.yaml#/RiderId' }
  messages:
    en: "Rider not found."
    fr: "Livreur introuvable."

InvalidRiderStatusTransition:
  description: "The rider is not in a status that allows this transition."
  context:
    riderId: { $ref: 'scalars.yaml#/RiderId' }
    currentStatus: { $ref: 'scalars.yaml#/RiderStatus' }
    targetStatus: { $ref: 'scalars.yaml#/RiderStatus' }
  messages:
    en: "A rider cannot move from '{currentStatus}' to '{targetStatus}'."
    fr: "Un livreur ne peut pas passer de '{currentStatus}' à '{targetStatus}'."

# =====================================================================
# Payment
# =====================================================================

PaymentDeclined:
  description: "Stripe declined the payment synchronously at checkout (no order placed)."
  context: {}
  messages:
    en: "Payment was declined."
    fr: "Le paiement a été refusé."

PriceMismatch:
  description: >
    The client-submitted confirmation total (PlaceOrder.expectedTotal) differs from the total the
    server recomputed from the live catalog. The server is the only price authority: the checkout is
    rejected so the customer is never charged an amount other than the one they were shown.
  context:
    cartId: { $ref: 'scalars.yaml#/CartId' }
    expectedAmountCents: { $ref: 'scalars.yaml#/MoneyCents' }
    submittedAmountCents: { $ref: 'scalars.yaml#/MoneyCents' }
    currency: { $ref: 'scalars.yaml#/CurrencyCode' }
  messages:
    en: "Prices have changed since you loaded the menu. Please review your cart and try again."
    fr: "Les prix ont changé depuis l'affichage du menu. Veuillez vérifier votre panier et réessayer."

PriceUnresolvable:
  description: >
    A cart line's price could not be resolved from the live catalog at checkout (offer or selected
    option no longer present). Fail-closed: the checkout is rejected — the server never falls back
    to a client-supplied amount.
  context:
    cartId: { $ref: 'scalars.yaml#/CartId' }
    offerId: { $ref: 'scalars.yaml#/OfferId' }
  messages:
    en: "An item in your cart is no longer available at a known price. Please review your cart."
    fr: "Un article de votre panier n'a plus de prix connu. Veuillez vérifier votre panier."

PaymentEventOrphaned:
  description: >
    A Stripe payment outcome (capture or failure) references a PaymentIntent that matches no known
    checkout run. The inbound fact stays recorded on the Payment, but the process manager aborts and
    surfaces this error for ops attention (money may have been taken with no order to materialize) —
    an anomaly is never silently skipped.
  context:
    paymentIntentId: { $ref: 'scalars.yaml#/PaymentIntentId' }
  messages:
    en: "Payment event received for an unknown checkout."
    fr: "Événement de paiement reçu pour un checkout inconnu."

RefundNotPending:
  description: >
    The refund decision (ApproveRefund / DenyRefund, by the restaurant or an admin) targets an order with no refund pending
    approval — either no refund run exists for the order, or it was already approved, denied or settled.
  context:
    orderId: { $ref: 'scalars.yaml#/OrderId' }
  messages:
    en: "No refund is pending approval for this order."
    fr: "Aucun remboursement n'est en attente d'approbation pour cette commande."

CannotOrderTestRestaurant:
  description: >
    A production (LIVE) order was placed against a TEST restaurant (ADR-0038 test-mode isolation). Real
    customers never reach test data; a TEST order may instead target a LIVE restaurant (receipt validation).
  context:
    restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
  messages:
    en: "This restaurant is not available."
    fr: "Ce restaurant n'est pas disponible."
