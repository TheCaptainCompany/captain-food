# --- Value Objects ---

Money:
  type: object
  description: >
    Stronger-typed money than HubRise's "9.80 EUR" string. Converted at the
    HubRise boundary (parse + x100), kept as integer minor units + currency internally.
  properties:
    amountCents:
      $ref: 'scalars.yaml#/MoneyCents'
    currency:
      $ref: 'scalars.yaml#/CurrencyCode'
  required: [amountCents, currency]

PaymentBreakdown:
  type: object
  description: >
    The order's money breakdown, computed server-side by PlaceOrderProcess (ADR-0016/0017/0018). Carries
    BOTH the buyer-facing checkout lines and the 3-way Stripe Connect split, in one place so they can't
    diverge. Invariants: total = articles + delivery + serviceFee; restaurantPayout = articles −
    restaurantContribution; riderPayout = delivery; captainNet = serviceFee + restaurantContribution
    (gross of Stripe fees, which Captain absorbs as merchant of record). 0% commission on food:
    restaurantContribution is a distinct service line, never a cut of the menu price.
  properties:
    # buyer-facing (checkout display, ADR-0018)
    articles:
      $ref: '#/Money'
      description: "Food sub-total TTC (100% to the restaurant, minus its service contribution)."
    delivery:
      $ref: '#/Money'
      description: "Delivery fee (→ rider); zero for collection. Delivery integration is post-V0."
    serviceFee:
      $ref: '#/Money'
      description: "Captain service fee shown to the buyer (the buyer part of the fee)."
    total:
      $ref: '#/Money'
      description: "What the buyer pays = articles + delivery + serviceFee (the PaymentIntent amount)."
    # 3-way split (ADR-0017)
    restaurantContribution:
      $ref: '#/Money'
      description: "Restaurant's variable service part (margin-proportional); deducted from its payout."
    restaurantPayout:
      $ref: '#/Money'
      description: "Transfer to the restaurant Connect account = articles − restaurantContribution."
    riderPayout:
      $ref: '#/Money'
      description: "Transfer to the rider Connect account = delivery."
    captainNet:
      $ref: '#/Money'
      description: "Kept on the Captain platform account = serviceFee + restaurantContribution (gross of Stripe)."
  required: [articles, delivery, serviceFee, total, restaurantContribution, restaurantPayout, riderPayout, captainNet]

UberComparison:
  type: object
  description: >
    What the same order would cost — and how it would be split — on Uber Eats, for the pedagogical
    comparison (ADR-0022/0025). `basis` says whether these are the restaurant's REAL Uber prices (shared
    via HubRise opt-in, ADR-0023) or a labelled ESTIMATE (coefficient-based, ADR-0024). Estimated split:
    restaurantShare = uberFood × (1 − uber_commission); riderShare ≈ rider_base (+/km, not modelled in V0);
    platformShare = total − restaurantShare − riderShare. The client derives "you save" = captainTotal − total.
  properties:
    total:
      $ref: '#/Money'
      description: "Estimated (or real) all-in Uber Eats price for the same order."
    restaurantShare:
      $ref: '#/Money'
      description: "What the restaurant would net on Uber (after its ~30% commission)."
    riderShare:
      $ref: '#/Money'
      description: "What the courier would earn on Uber (base + per-km; per-km not modelled in V0)."
    platformShare:
      $ref: '#/Money'
      description: "What Uber Eats would keep = total − restaurantShare − riderShare."
    basis:
      $ref: 'scalars.yaml#/ComparisonBasis'
      description: "REAL (HubRise opt-in) or ESTIMATED (labelled). V0 shows ESTIMATED."
  required: [total, restaurantShare, riderShare, platformShare, basis]

Tip:
  type: object
  description: "One customer tip to a single recipient (ADR-012). Optional, separate from the price; Captain keeps 0%."
  properties:
    recipient:
      $ref: 'scalars.yaml#/TipRecipient'
    amount:
      $ref: '#/Money'
  required: [recipient, amount]

Courier:
  type: object
  description: >
    The person delivering an order. For an INDEPENDENT rider, `riderId` is set (a Captain RIDER);
    for a PARTNER courier (e.g. Avelo37) only `displayName`/`phone` are known, reported by the partner.
  properties:
    displayName:
      type: string
      maxLength: 140
    phone:
      $ref: 'scalars.yaml#/PhoneNumber'
      nullable: true
    riderId:
      $ref: 'scalars.yaml#/RiderId'
      nullable: true
      description: "Set when the courier is an independent Captain rider; null for a partner courier."
  required: [displayName]

TaxRate:
  type: object
  description: "Per-service-mode VAT, mirroring HubRise product tax_rate."
  properties:
    delivery:
      $ref: 'scalars.yaml#/TaxRatePercent'
    collection:
      $ref: 'scalars.yaml#/TaxRatePercent'
      nullable: true
    eatIn:
      $ref: 'scalars.yaml#/TaxRatePercent'
      nullable: true
  required: [delivery]

Stock:
  type: object
  description: >
    Inventory of a offer/option. status is DERIVED from quantity and
    lowStockThreshold (see scalars.yaml#/StockStatus).
  properties:
    quantity:
      $ref: 'scalars.yaml#/Quantity'
    lowStockThreshold:
      $ref: 'scalars.yaml#/Quantity'
      nullable: true
      description: "If quantity <= threshold, status becomes LOW_STOCK."
    status:
      $ref: 'scalars.yaml#/StockStatus'
      readOnly: true
      description: "DERIVED server-side from quantity vs lowStockThreshold — never a client input."
    expiresAt:
      type: string
      format: date-time
      nullable: true
      description: "Restock/availability date for out-of-stock items (HubRise inventory expires_at)."
  required: [quantity, status]

Address:
  type: object
  properties:
    line1:
      $ref: 'scalars.yaml#/AddressLine'
    line2:
      $ref: 'scalars.yaml#/AddressLine'
      nullable: true
    postalCode:
      $ref: 'scalars.yaml#/PostalCode'
    city:
      $ref: 'scalars.yaml#/CityName'
    country:
      $ref: 'scalars.yaml#/CountryCode'
  required: [line1, postalCode, city, country]

OpeningHoursSlot:
  type: object
  description: "One opening time window for a given weekday (HubRise opening_hours)."
  properties:
    weekday:
      $ref: 'scalars.yaml#/Weekday'
    from:
      $ref: 'scalars.yaml#/TimeOfDay'
    to:
      $ref: 'scalars.yaml#/TimeOfDay'
  required: [weekday, from, to]

RestaurantContact:
  type: object
  description: >
    Both fields optional: HubRise locations do not expose email/phone, so an
    imported restaurant starts without contact info, to be completed by the admin.
  properties:
    email:
      $ref: 'scalars.yaml#/EmailAddress'
      nullable: true
    phone:
      $ref: 'scalars.yaml#/PhoneNumber'
      nullable: true
  required: []

GeoPoint:
  type: object
  description: "WGS84 geographic coordinates of the restaurant location (e.g. from Google Maps, for map display & distance)."
  properties:
    latitude:
      $ref: 'scalars.yaml#/Latitude'
    longitude:
      $ref: 'scalars.yaml#/Longitude'
  required: [latitude, longitude]

ExternalIdentifier:
  type: object
  description: >
    A generic external identifier kept on a Restaurant listing, preserving the ORIGINAL source key/value
    (e.g. siret/naf from INSEE Sirene, google_place_id from Google, hubrise_ref). Source-agnostic and
    multi-valued: a restaurant may carry several, and a key (e.g. siret) is NOT unique across restaurants.
  properties:
    key:
      $ref: 'scalars.yaml#/ExternalIdentifierKey'
    value:
      type: string
      maxLength: 255
  required: [key, value]

Prospect:
  type: object
  description: >
    Sales/CRM state of a NON_PARTNER restaurant listing being worked as a B2B prospect (ADR-0020).
    Id is the restaurantId (1:1). The prospection SCORE is NOT here — it is computed by the
    ProspectionPipeline projection, never stored. This holds only the outreach state.
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    pipelineStatus:
      $ref: 'scalars.yaml#/ProspectPipelineStatus'
    lastContactedAt:
      type: string
      format: date-time
      nullable: true
  required: [restaurantId, pipelineStatus]

CustomerContact:
  type: object
  properties:
    displayName:
      $ref: 'scalars.yaml#/CustomerDisplayName'
    email:
      $ref: 'scalars.yaml#/EmailAddress'
    phone:
      $ref: 'scalars.yaml#/PhoneNumber'
  required: [displayName, phone]

# --- Restaurant account & location (HubRise-aligned) ---
# A RestaurantAccount (HubRise *restaurant*) groups one or more Restaurant locations (HubRise
# *location*). Account-level facts (legal entity, billing contact, currency, default tax, timezone)
# live on the ACCOUNT; location-level facts (slug, display name, address, opening hours, live
# status/acceptance) live on each LOCATION, which links to its account via `accountId`.
# (A location may also hold multiple catalogs — one per service type — see Catalog; not modelled yet.)

RestaurantAccount:
  type: object
  description: "The business account that owns one or more restaurant locations (HubRise: restaurant)."
  properties:
    id:
      $ref: 'scalars.yaml#/RestaurantAccountId'
    ref:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
      description: "HubRise restaurant (account) reference, when imported."
    legalName:
      $ref: 'scalars.yaml#/RestaurantLegalName'
    contact:
      $ref: '#/RestaurantContact'
    defaultCurrency:
      $ref: 'scalars.yaml#/CurrencyCode'
    defaultTaxRate:
      $ref: '#/TaxRate'
    timezone:
      $ref: 'scalars.yaml#/TimeZone'
      nullable: true
    createdBy:
      $ref: 'scalars.yaml#/UserId'
    createdAt:
      type: string
      format: date-time
  required:
    - id
    - legalName
    - contact
    - defaultCurrency
    - defaultTaxRate
    - createdBy
    - createdAt

Restaurant:
  type: object
  description: "A single restaurant location (HubRise: location); belongs to a RestaurantAccount."
  properties:
    mode: { $ref: 'scalars.yaml#/Mode' }   # test mode (ADR-0038); optional, absent = LIVE
    id:
      $ref: 'scalars.yaml#/RestaurantId'
    accountId:
      $ref: 'scalars.yaml#/RestaurantAccountId'
      nullable: true
      description: "The owning RestaurantAccount; NULL for a non-partner listing (no account yet), set on claim/conversion."
    listingStatus:
      $ref: 'scalars.yaml#/RestaurantListingStatus'
      description: "Partnership funnel: NON_PARTNER (seeded from open data) → PASSIVE_PARTNER → ACTIVE_PARTNER."
    ref:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
      description: "HubRise location reference, when imported."
    externalIdentifiers:
      type: array
      items:
        $ref: '#/ExternalIdentifier'
      description: "Source-agnostic identifiers preserving original keys (siret/naf/google_place_id/hubrise_ref…). Not unique."
    googlePlaceId:
      $ref: 'scalars.yaml#/GooglePlaceId'
      nullable: true
      description: "Google Place id, when known (enrichment / GBP)."
    slug:
      $ref: 'scalars.yaml#/Slug'
    displayName:
      $ref: 'scalars.yaml#/RestaurantDisplayName'
    contact:
      $ref: '#/RestaurantContact'
      nullable: true
      description: "Location-specific contact; falls back to the account contact when absent."
    website:
      $ref: 'scalars.yaml#/WebUrl'
      nullable: true
      description: "Restaurant website (general restaurant info; any source may provide it)."
    tags:
      type: array
      items:
        $ref: 'scalars.yaml#/Tag'
      description: "Cuisine/attribute tags (general restaurant info; source-agnostic)."
    marginRate:
      $ref: 'scalars.yaml#/MarginPercent'
      nullable: true
      description: "Food margin %, input to the Captain service-fee split (ADR-0017); null → 0 restaurant contribution."
    cuisineCategory:
      $ref: 'scalars.yaml#/CuisineCategory'
      nullable: true
      description: "SINGLE primary cuisine, selects the Uber Eats estimate coefficient (ADR-0024); null → no estimate. Multi-cuisine discovery lives in `tags`."
    uberPricesOptIn:
      type: boolean
      nullable: true
      description: "The restaurant authorized showing its real Uber Eats prices for comparison (ADR-0023 opt-in). Null/false → estimate only."
    address:
      $ref: '#/Address'
    location:
      $ref: '#/GeoPoint'
      nullable: true
      description: "Geo coordinates (general restaurant info; typically from the Google Maps sync)."
    status:
      $ref: 'scalars.yaml#/RestaurantStatus'
    orderAcceptance:
      $ref: 'scalars.yaml#/OrderAcceptanceMode'
    timezone:
      $ref: 'scalars.yaml#/TimeZone'
      nullable: true
      description: "Location timezone (a chain may span zones); falls back to the account timezone when absent."
    preparationTimeMinutes:
      type: integer
      minimum: 0
      nullable: true
      description: "Base preparation time (HubRise preparation_time)."
    openingHours:
      type: array
      items:
        $ref: '#/OpeningHoursSlot'
    createdBy:
      $ref: 'scalars.yaml#/UserId'
    createdAt:
      type: string
      format: date-time
  required:
    - id
    - listingStatus
    - slug
    - displayName
    - address
    - status
    - orderAcceptance
    - createdBy
    - createdAt

# --- Catalog: Catalog / CatalogCategory / Product / Offer ---
# Mirrors the HubRise catalog tree: categories form a tree (parentRef),
# products belong to a category and hold one or more offers (SKUs).

Catalog:
  type: object
  description: "A catalog (HubRise: catalog)."
  properties:
    id:
      $ref: 'scalars.yaml#/CatalogId'
    ref:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    name:
      $ref: 'scalars.yaml#/CatalogName'
  required: [id, restaurantId, name]

CatalogCategory:
  type: object
  description: "Catalog category, hierarchical via parentRef (HubRise categories tree)."
  properties:
    id:
      $ref: 'scalars.yaml#/ProductCategoryId'
    ref:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    parentRef:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
      description: "Null for a top-level category."
    name:
      $ref: 'scalars.yaml#/CatalogCategoryName'
    description:
      $ref: 'scalars.yaml#/ProductDescription'
      nullable: true
    tags:
      type: array
      items:
        $ref: 'scalars.yaml#/Tag'
    imageIds:
      type: array
      items:
        $ref: 'scalars.yaml#/ImageId'
  required: [id, catalogId, name]

Product:
  type: object
  description: "A catalog product grouping one or more offers (HubRise: product + SKUs)."
  properties:
    id:
      $ref: 'scalars.yaml#/ProductId'
    ref:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    categoryRef:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
    name:
      $ref: 'scalars.yaml#/ProductName'
    description:
      $ref: 'scalars.yaml#/ProductDescription'
      nullable: true
    tags:
      type: array
      items:
        $ref: 'scalars.yaml#/Tag'
    imageIds:
      type: array
      items:
        $ref: 'scalars.yaml#/ImageId'
    taxRate:
      $ref: '#/TaxRate'
    offers:
      type: array
      items:
        $ref: '#/Offer'
      minItems: 1
  required:
    - id
    - catalogId
    - restaurantId
    - name
    - taxRate
    - offers

Offer:
  type: object
  description: "A purchasable offer of a product (HubRise: SKU)."
  properties:
    id:
      $ref: 'scalars.yaml#/OfferId'
    ref:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
    productId:
      $ref: 'scalars.yaml#/ProductId'
    name:
      $ref: 'scalars.yaml#/OfferName'
    price:
      $ref: '#/Money'
    availability:
      $ref: 'scalars.yaml#/CatalogItemAvailability'
    stock:
      $ref: '#/Stock'
      nullable: true
      description: "Null when the offer is not stock-tracked."
    optionListIds:
      type: array
      items:
        $ref: 'scalars.yaml#/OptionListId'
  required:
    - id
    - productId
    - name
    - price
    - availability

# --- Options / Modifiers (HubRise option lists) ---

OptionList:
  type: object
  properties:
    id:
      $ref: 'scalars.yaml#/OptionListId'
    ref:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
    name:
      $ref: 'scalars.yaml#/OptionListName'
    minSelections:
      type: integer
      minimum: 0
    maxSelections:
      type: integer
      minimum: 1
      nullable: true
      description: "Null means unlimited."
    multipleSelection:
      type: boolean
      description: "Whether the same option can be selected more than once."
    options:
      type: array
      items:
        $ref: '#/ProductItemOption'
      minItems: 1
  required: [id, name, minSelections, multipleSelection, options]

ProductItemOption:
  type: object
  properties:
    id:
      $ref: 'scalars.yaml#/OptionId'
    ref:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
    optionListId:
      $ref: 'scalars.yaml#/OptionListId'
    name:
      $ref: 'scalars.yaml#/OptionName'
    price:
      $ref: '#/Money'
    default:
      type: boolean
    availability:
      $ref: 'scalars.yaml#/CatalogItemAvailability'
    stock:
      $ref: '#/Stock'
      nullable: true
  required: [id, optionListId, name, price, default, availability]

# --- Cart ---
# Pre-checkout selection, built (possibly by a guest) before a Customer exists. Stored as
# intent (ids + quantity) only; display prices/totals are computed by the read projection from
# the live catalog, never stored on the cart — same rule as orders (client prices not trusted).
# Converted to an Order at checkout (CartCheckedOut); Cart and Order stay distinct aggregates.

CartLineItem:
  type: object
  description: "A line stored in a cart: the customer's selection by id (no prices stored)."
  properties:
    cartLineId:
      $ref: 'scalars.yaml#/CartLineId'
    offerId:
      $ref: 'scalars.yaml#/OfferId'
    quantity:
      type: integer
      minimum: 1
    selectedOptionIds:
      type: array
      items:
        $ref: 'scalars.yaml#/OptionId'
  required: [cartLineId, offerId, quantity]

Cart:
  type: object
  description: >
    A customer's in-progress selection for a SINGLE restaurant. customerId is null while the
    visitor is still a guest; it is bound at checkout once the phone is verified.
  properties:
    id:
      $ref: 'scalars.yaml#/CartId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
      nullable: true
    status:
      $ref: 'scalars.yaml#/CartStatus'
    lines:
      type: array
      items:
        $ref: '#/CartLineItem'
  required: [id, restaurantId, status, lines]

# --- Orders ---

SelectedOption:
  type: object
  description: "An option chosen by the customer on a line item, priced at order time."
  properties:
    optionId:
      $ref: 'scalars.yaml#/OptionId'
    optionListId:
      $ref: 'scalars.yaml#/OptionListId'
    name:
      $ref: 'scalars.yaml#/OptionName'
    price:
      $ref: '#/Money'
  required: [optionId, name, price]

OrderLineItem:
  type: object
  properties:
    offerId:
      $ref: 'scalars.yaml#/OfferId'
    productId:
      $ref: 'scalars.yaml#/ProductId'
    name:
      $ref: 'scalars.yaml#/ProductName'
    offerName:
      $ref: 'scalars.yaml#/OfferName'
      nullable: true
    quantity:
      type: integer
      minimum: 1
    unitPrice:
      $ref: '#/Money'
    selectedOptions:
      type: array
      items:
        $ref: '#/SelectedOption'
    lineTotal:
      $ref: '#/Money'
      description: "(unitPrice + sum(selectedOptions.price)) * quantity, computed server-side."
  required:
    - offerId
    - name
    - quantity
    - unitPrice
    - lineTotal

CheckoutSnapshot:
  type: object
  description: >
    The validated, server-priced checkout PlaceOrderProcess freezes onto events.yaml#/PaymentIntentCreated
    when it creates the Stripe PaymentIntent — everything events.yaml#/OrderPlaced +
    events.yaml#/CartCheckedOut need beyond the inbound PaymentCaptured fact, so the order is
    reconstructable from the event log alone (no out-of-log store). Mirrors the application
    `CheckoutSnapshot` port type. Invariant: totalAmount == breakdown.total (== the PaymentIntent amount).
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    cartId:
      $ref: 'scalars.yaml#/CartId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
      nullable: true
    mode:
      $ref: 'scalars.yaml#/Mode'
      nullable: true
    ref:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
    customerContact:
      $ref: '#/CustomerContact'
    serviceType:
      $ref: 'scalars.yaml#/ServiceType'
    deliveryAddress:
      $ref: '#/Address'
      nullable: true
    items:
      type: array
      items:
        $ref: '#/OrderLineItem'
      description: "Priced order lines frozen at checkout — recomputed server-side from the live catalog (rules.yaml#/ServerPriceAuthority)."
    totalAmount:
      $ref: '#/Money'
    breakdown:
      $ref: '#/PaymentBreakdown'
    note:
      $ref: 'scalars.yaml#/OrderNote'
      nullable: true
  required:
    - orderId
    - cartId
    - restaurantId
    - customerContact
    - serviceType
    - items
    - totalAmount
    - breakdown

Order:
  type: object
  properties:
    mode: { $ref: 'scalars.yaml#/Mode' }   # test mode (ADR-0038); optional, absent = LIVE
    id:
      $ref: 'scalars.yaml#/OrderId'
    ref:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
      nullable: true
    customerContact:
      $ref: '#/CustomerContact'
    serviceType:
      $ref: 'scalars.yaml#/ServiceType'
    deliveryAddress:
      $ref: '#/Address'
      nullable: true
    items:
      type: array
      items:
        $ref: '#/OrderLineItem'
      minItems: 1
    totalAmount:
      $ref: '#/Money'
    status:
      $ref: 'scalars.yaml#/OrderStatus'
    note:
      $ref: 'scalars.yaml#/OrderNote'
      nullable: true
  required:
    - id
    - restaurantId
    - customerContact
    - serviceType
    - items
    - totalAmount
    - status
