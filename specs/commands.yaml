version: 2
description: >
  Captain.Food command PAYLOAD spec. A command is a request to change state that the system can
  reject. This file defines ONLY each command's input payload — strongly typed, with exactly the
  same shape as an event or a value object (description + type + properties + required). It is a
  pure catalog, parallel to events.yaml.

  Everything ABOUT a command lives where it is owned, not here:
  - the PERSONA that may send it, the USE CASE it derives from, its release SLICE
      -> story-map.md (+ api.yaml `@auth` path-role + traceability.md)
  - the aggregate that HANDLES it and the events it EMITS / reacts to
      -> actors.yaml
  - the ERRORS it may raise when rejected (what were `invariants`)
      -> errors.yaml, mapped per message in actors.yaml `throws`

  Conventions:
  - Properties carry the caller's INTENT. Aggregate IDs are CLIENT-GENERATED (UUIDs) and supplied IN
    the command, so creates are idempotent (retry-safe) and the client can read the projection by that
    id without a round-trip. Two ids are NOT client-minted: `paymentIntentId` (assigned by Stripe), and
    `customerId` may be re-resolved to an existing Customer on a returning phone — so
    RegisterCustomerPayload returns the authoritative `customerId` + `created`.
  - Money (lineTotal, totalAmount) and StockStatus are computed server-side, never trusted from the client.

# =====================================================================
# Command value objects
# (Intent-level types; distinct from entities.yaml read/aggregate shapes.
#  No `Input` suffix here — that is a GraphQL-layer convention only.)
# =====================================================================

CartLine:
  type: object
  description: >
    A single cart line as expressed by the customer. References the catalog by id;
    the handler resolves names/prices/tax from the current catalog and computes totals.
    Client-supplied prices are NEVER trusted.
  properties:
    cartLineId:
      $ref: 'scalars.yaml#/CartLineId'
      description: "Client-generated id for this line (lets the client edit/remove it immediately)."
    offerId:
      $ref: 'scalars.yaml#/OfferId'
    quantity:
      type: integer
      minimum: 1
    selectedOptionIds:
      type: array
      items:
        $ref: 'scalars.yaml#/OptionId'
  required: [cartLineId, offerId, quantity]

# =====================================================================
# 1. Onboard the restaurant  (persona: admin)  — story-map activity 1
# =====================================================================

RegisterRestaurantAccount:
  description: >
    Admin creates a restaurant ACCOUNT (HubRise: restaurant) that will own one or more locations.
    Account-level facts (legal entity, billing contact, currency, default tax, timezone) live here.
  type: object
  properties:
    restaurantAccountId:
      $ref: 'scalars.yaml#/RestaurantAccountId'
      description: "Client-generated id for the new account."
    legalName:
      $ref: 'scalars.yaml#/RestaurantLegalName'
    contact:
      $ref: 'entities.yaml#/RestaurantContact'
      nullable: true
    defaultCurrency:
      $ref: 'scalars.yaml#/CurrencyCode'
    defaultTaxRate:
      $ref: 'entities.yaml#/TaxRate'
    timezone:
      $ref: 'scalars.yaml#/TimeZone'
      nullable: true
    ref:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
      description: "HubRise restaurant (account) reference, when seeded externally."
  required: [restaurantAccountId, legalName, defaultCurrency, defaultTaxRate]

UpdateRestaurantAccount:
  description: "Owner/admin edits account-level fields (legal name, billing contact, default tax, timezone)."
  type: object
  properties:
    restaurantAccountId:
      $ref: 'scalars.yaml#/RestaurantAccountId'
    legalName:
      $ref: 'scalars.yaml#/RestaurantLegalName'
      nullable: true
    contact:
      $ref: 'entities.yaml#/RestaurantContact'
      nullable: true
    defaultTaxRate:
      $ref: 'entities.yaml#/TaxRate'
      nullable: true
    timezone:
      $ref: 'scalars.yaml#/TimeZone'
      nullable: true
  required: [restaurantAccountId]

DeleteRestaurantAccount:
  description: "Owner/admin closes a restaurant account (its locations must already be removed)."
  type: object
  properties:
    restaurantAccountId:
      $ref: 'scalars.yaml#/RestaurantAccountId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [restaurantAccountId]

RegisterRestaurant:
  description: >
    The single, generic way to register a restaurant LOCATION. Used by an owner/admin onboarding a partner
    location (accountId set), AND by the Sirene/Google sync ACL seeding a public listing as if it were the
    owner (no accountId, listingStatus NON_PARTNER, externalIdentifiers from the source). Starts in DRAFT.
  type: object
  properties:
    mode: { $ref: 'scalars.yaml#/Mode' }   # test mode (ADR-0038); optional, absent = LIVE
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
      description: "Client/ACL-generated id for the new location."
    accountId:
      $ref: 'scalars.yaml#/RestaurantAccountId'
      nullable: true
      description: "The owning account (must already exist) — omitted for a non-partner public listing."
    listingStatus:
      $ref: 'scalars.yaml#/RestaurantListingStatus'
      nullable: true
      description: "Partnership funnel; defaults to NON_PARTNER when omitted (e.g. sync-seeded listing)."
    slug:
      $ref: 'scalars.yaml#/Slug'
    displayName:
      $ref: 'scalars.yaml#/RestaurantDisplayName'
    contact:
      $ref: 'entities.yaml#/RestaurantContact'
      nullable: true
      description: "Location-specific contact; falls back to the account contact when absent."
    website:
      $ref: 'scalars.yaml#/WebUrl'
      nullable: true
    tags:
      type: array
      items:
        $ref: 'scalars.yaml#/Tag'
    marginRate:
      $ref: 'scalars.yaml#/MarginPercent'
      nullable: true
      description: "Food margin %, input to the service-fee split (ADR-0017)."
    cuisineCategory:
      $ref: 'scalars.yaml#/CuisineCategory'
      nullable: true
      description: "Cuisine bucket; selects the Uber Eats price-estimate coefficient (ADR-0024)."
    uberPricesOptIn:
      type: boolean
      nullable: true
      description: "Authorize showing real Uber Eats prices for comparison (ADR-0023 opt-in)."
    address:
      $ref: 'entities.yaml#/Address'
    location:
      $ref: 'entities.yaml#/GeoPoint'
      nullable: true
      description: "Geo coordinates (typically from the Google Maps sync)."
    timezone:
      $ref: 'scalars.yaml#/TimeZone'
      nullable: true
      description: "Location timezone; falls back to the account timezone when absent."
    preparationTimeMinutes:
      type: integer
      minimum: 0
      nullable: true
    openingHours:
      type: array
      items:
        $ref: 'entities.yaml#/OpeningHoursSlot'
    externalIdentifiers:
      type: array
      items:
        $ref: 'entities.yaml#/ExternalIdentifier'
      description: "Source-agnostic identifiers preserving original keys (siret/naf/google_place_id…). Not unique."
    ref:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
      description: "Set only when seeded from an external source (e.g. HubRise location)."
  required: [restaurantId, slug, displayName, address]

ActivateRestaurant:
  description: "Admin makes a restaurant visible and orderable by customers."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [restaurantId]


UpdateRestaurant:
  description: >
    Admin edits one or more mutable LOCATION fields (full replace of provided fields). Account-level
    facts (legalName, defaultTaxRate, currency) are edited on the account, not here.
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    displayName:
      $ref: 'scalars.yaml#/RestaurantDisplayName'
      nullable: true
    contact:
      $ref: 'entities.yaml#/RestaurantContact'
      nullable: true
    website:
      $ref: 'scalars.yaml#/WebUrl'
      nullable: true
    tags:
      type: array
      items:
        $ref: 'scalars.yaml#/Tag'
      nullable: true
    marginRate:
      $ref: 'scalars.yaml#/MarginPercent'
      nullable: true
    cuisineCategory:
      $ref: 'scalars.yaml#/CuisineCategory'
      nullable: true
      description: "Cuisine bucket; selects the Uber Eats price-estimate coefficient (ADR-0024)."
    uberPricesOptIn:
      type: boolean
      nullable: true
      description: "Authorize showing real Uber Eats prices for comparison (ADR-0023 opt-in)."
    address:
      $ref: 'entities.yaml#/Address'
      nullable: true
    location:
      $ref: 'entities.yaml#/GeoPoint'
      nullable: true
    timezone:
      $ref: 'scalars.yaml#/TimeZone'
      nullable: true
    preparationTimeMinutes:
      type: integer
      minimum: 0
      nullable: true
    openingHours:
      type: array
      items:
        $ref: 'entities.yaml#/OpeningHoursSlot'
      nullable: true
  required: [restaurantId]

DeactivateRestaurant:
  description: "Admin takes a restaurant offline so it can no longer receive orders."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [restaurantId]

RemoveRestaurant:
  description: "Owner/admin removes a location from its account (delisted; no longer orderable)."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    accountId:
      $ref: 'scalars.yaml#/RestaurantAccountId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [restaurantId, accountId]

ChangeOrderAcceptanceMode:
  description: "Restaurant toggles its live order-acceptance mode (NORMAL / BUSY / PAUSED)."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    mode:
      $ref: 'scalars.yaml#/OrderAcceptanceMode'
  required: [restaurantId, mode]

# --- Restaurant listing & pre-registration (ADR-0019/0021). The Sirene/Google sync is an ACL that
#     issues RegisterRestaurant / UpdateRestaurantGoogleBusinessProfile / MarkRestaurantClosed as the
#     owner — no dedicated "pre-register" command. ---

UpdateRestaurantGoogleBusinessProfile:
  description: >
    Record GBP-SPECIFIC metrics (Google place id + rating/reviews) for a restaurant. Issued by the
    Sirene/Google sync ACL (or admin). Carries ONLY Google-listing data — general restaurant info
    (name/address/hours/phone/website/tags) is set via Register/UpdateRestaurant, so the two data sources
    stay independent.
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    googlePlaceId:
      $ref: 'scalars.yaml#/GooglePlaceId'
      nullable: true
    rating:
      $ref: 'scalars.yaml#/GoogleRating'
      nullable: true
    reviewsCount:
      type: integer
      minimum: 0
      nullable: true
  required: [restaurantId]

MarkRestaurantClosed:
  description: "Record that the establishment is closed (e.g. Sirene closure); issued by the sync ACL or admin."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [restaurantId]

ClaimRestaurantListing:
  description: >
    An owner claims a public listing. Ownership is proven by verifying the restaurant's Google Business
    Profile (delegated to Google as a start); the backend validates the proof server-side before accepting.
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    accountId:
      $ref: 'scalars.yaml#/RestaurantAccountId'
      nullable: true
      description: "Account to attach the claimed listing to, when the claimant already has one."
    googleOwnershipProof:
      type: string
      maxLength: 4096
      description: "Opaque Google Business Profile ownership proof/token, verified server-side."
  required: [restaurantId, googleOwnershipProof]

OptOutRestaurantListing:
  description: "An owner opts a public listing out (edit/remove), proven via Google Business Profile ownership."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    googleOwnershipProof:
      type: string
      maxLength: 4096
      description: "Opaque Google Business Profile ownership proof/token, verified server-side."
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [restaurantId, googleOwnershipProof]

ChangeRestaurantListingStatus:
  description: "Admin moves a listing along the partnership funnel (NON_PARTNER → PASSIVE_PARTNER → ACTIVE_PARTNER)."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    listingStatus:
      $ref: 'scalars.yaml#/RestaurantListingStatus'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [restaurantId, listingStatus]

ConfigureGoogleBusinessProfileOrderLink:
  description: "Restaurant/admin sets the GBP 'Order online' link to its {slug}.captain.food page (ADR-0021; V1)."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    gbpOrderUrl:
      $ref: 'scalars.yaml#/WebUrl'
  required: [restaurantId, gbpOrderUrl]

VerifyGoogleBusinessProfileOrderLink:
  description: "Ping the configured GBP 'Order online' link and record whether it is live (ADR-0021; V1)."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
  required: [restaurantId]

# --- Prospection (ADR-0020). Issued by the prospection-acl worker (it reads the pipeline score +
#     schedule, fires HubSpot/Resend/Slack, then records the fact). The score is never an input. ---

RecordProspectContact:
  description: >
    Record a B2B outreach contact to a prospect. The worker decides WHO/WHEN from the read-model score +
    schedule; this just records the fact. First contact is the prospect's birth. Anti-spam invariants apply.
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    channel:
      $ref: 'scalars.yaml#/OutreachChannel'
    sequenceStep:
      type: integer
      minimum: 0
  required: [restaurantId, channel, sequenceStep]

MarkProspectCold:
  description: "Mark a prospect cold (no reply by J+21); stops the outreach sequence."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [restaurantId]

RecordProspectReply:
  description: "Record that a prospect replied (CRM/admin or inbound), stopping the sequence."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    note:
      type: string
      maxLength: 500
      nullable: true
  required: [restaurantId]

# =====================================================================
# 2. Publish the catalog  (persona: admin)  — story-map activity 2
# =====================================================================

CreateCatalog:
  description: "Admin creates a catalog for a restaurant."
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
      description: "Client-generated id for the new catalog."
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    name:
      $ref: 'scalars.yaml#/CatalogName'
    ref:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
  required: [catalogId, restaurantId, name]

AddProduct:
  description: >
    Admin adds a product (with its one-or-more offers) to a catalog. The client supplies the product
    id and each offer id (client-generated).
  type: object
  properties:
    productId:
      $ref: 'scalars.yaml#/ProductId'
      description: "Client-generated id for the new product."
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    categoryRef:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
    name:
      $ref: 'scalars.yaml#/ProductName'
    description:
      $ref: 'scalars.yaml#/ProductDescription'
      nullable: true
    tags:
      type: array
      items:
        $ref: 'scalars.yaml#/Tag'
    taxRate:
      $ref: 'entities.yaml#/TaxRate'
    offers:
      type: array
      items:
        $ref: 'entities.yaml#/Offer'
      minItems: 1
    ref:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
  required: [productId, catalogId, restaurantId, name, taxRate, offers]

UpdateProduct:
  description: "Admin updates an existing product (full replace, including offers)."
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    product:
      $ref: 'entities.yaml#/Product'
  required: [catalogId, restaurantId, product]

RemoveProduct:
  description: "Admin removes a product from a catalog."
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    productId:
      $ref: 'scalars.yaml#/ProductId'
  required: [catalogId, restaurantId, productId]

AddCatalogCategory:
  description: "Admin adds a category to a catalog (categories form a tree via parentRef)."
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    category:
      $ref: 'entities.yaml#/CatalogCategory'
  required: [catalogId, restaurantId, category]

UpdateCatalogCategory:
  description: "Admin updates a category (full replace)."
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    category:
      $ref: 'entities.yaml#/CatalogCategory'
  required: [catalogId, restaurantId, category]

RemoveCatalogCategory:
  description: "Admin removes a category from a catalog."
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    productCategoryId:
      $ref: 'scalars.yaml#/ProductCategoryId'
  required: [catalogId, restaurantId, productCategoryId]

AddOptionList:
  description: "Admin adds an option list (modifier group) to a catalog."
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    optionList:
      $ref: 'entities.yaml#/OptionList'
  required: [catalogId, restaurantId, optionList]

UpdateOptionList:
  description: "Admin updates an option list (full replace)."
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    optionList:
      $ref: 'entities.yaml#/OptionList'
  required: [catalogId, restaurantId, optionList]

RemoveOptionList:
  description: "Admin removes an option list from a catalog."
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    optionListId:
      $ref: 'scalars.yaml#/OptionListId'
  required: [catalogId, restaurantId, optionListId]

UpdateOfferStock:
  description: >
    Admin (or inventory sync) sets the stock level of a offer. The StockStatus
    is derived server-side from quantity vs lowStockThreshold.
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    offerId:
      $ref: 'scalars.yaml#/OfferId'
    quantity:
      $ref: 'scalars.yaml#/Quantity'
    lowStockThreshold:
      $ref: 'scalars.yaml#/Quantity'
      nullable: true
    expiresAt:
      type: string
      format: date-time
      nullable: true
  required: [catalogId, restaurantId, offerId, quantity]

ImportCatalog:
  description: >
    Admin/system imports or re-syncs a full catalog from an external source (HubRise),
    replacing the current catalog content. Idempotent via entity `ref`s (HubRise import key).
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    source:
      type: string
      enum: [HUBRISE, MANUAL]
    categories:
      type: array
      items:
        $ref: 'entities.yaml#/CatalogCategory'
    products:
      type: array
      items:
        $ref: 'entities.yaml#/Product'
    optionLists:
      type: array
      items:
        $ref: 'entities.yaml#/OptionList'
  required: [catalogId, restaurantId, source, categories, products, optionLists]

# =====================================================================
# 4. Build the cart  (persona: anonymous)  — story-map activity 4
# =====================================================================
# The cart is a server-side aggregate so each line edit is validated against the live catalog
# and can be rejected (out of stock, illegal option, mixed restaurant). Built by a guest;
# customerId is bound at checkout (see PlaceOrder). Carts are high-churn — see the note on
# event-log churn in story-map.md.

AddCartLine:
  description: >
    Visitor adds a line to a cart, validated against the live catalog. The client generates the
    cartId and sends it on every add; the first add for a new cartId creates the cart (idempotently),
    binding it to the restaurant.
  type: object
  properties:
    cartId:
      $ref: 'scalars.yaml#/CartId'
      description: "Client-generated cart id; the first add for it creates the cart (session-owned)."
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    line:
      $ref: '#/CartLine'
    sessionId:
      $ref: 'scalars.yaml#/SessionId'
      description: "Optional session id (ADR-0038) to bind the cart to a session for test-mode carts."
  required: [cartId, restaurantId, line, sessionId]

RemoveCartLine:
  description: "Visitor removes a line from a cart."
  type: object
  properties:
    cartId:
      $ref: 'scalars.yaml#/CartId'
    cartLineId:
      $ref: 'scalars.yaml#/CartLineId'
    sessionId:
      $ref: 'scalars.yaml#/SessionId'
      description: "Optional session id (ADR-0038) to bind the cart to a session for test-mode carts."
  required: [cartId, cartLineId, sessionId]

ChangeCartLineQuantity:
  description: "Visitor changes the quantity of an existing cart line."
  type: object
  properties:
    cartId:
      $ref: 'scalars.yaml#/CartId'
    cartLineId:
      $ref: 'scalars.yaml#/CartLineId'
    quantity:
      type: integer
      minimum: 1
    sessionId:
      $ref: 'scalars.yaml#/SessionId'
      description: "Optional session id (ADR-0038) to bind the cart to a session for test-mode carts."
  required: [cartId, cartLineId, quantity, sessionId]

# =====================================================================
# 5. Identify via phone OTP  (persona: customer)  — story-map activity 5
# =====================================================================
# We WRAP Supabase Auth behind our GraphQL (ADR-0015). The phone is given as a DialingCode ('+33', the
# value the country picker emits) + NationalPhoneNumber; the handler composes the canonical E.164 phone.
# OTP send IS a command (we can reject it) but emits NO event; only the verified FACTS are events.

RequestPhoneVerification:
  description: >
    Ask Supabase Auth to send an SMS OTP to a phone (Twilio; a mock provider in dev). Emits no event.
    `locale` localizes the message; when absent it defaults from the dialing code (e.g. '+33' → fr-FR).
  type: object
  properties:
    dialingCode:
      $ref: 'scalars.yaml#/DialingCode'
    nationalNumber:
      $ref: 'scalars.yaml#/NationalPhoneNumber'
    locale:
      $ref: 'scalars.yaml#/Locale'
      nullable: true
      description: "SMS language; defaults from the dialing code's country when absent."
  required: [dialingCode, nationalNumber]

VerifyPhone:
  description: >
    Verify the SMS OTP with Supabase Auth, then register-or-identify: a first verified phone CREATES the
    Customer (CustomerRegistered), a returning phone RESOLVES + signs in (CustomerIdentified). The
    backend decides new-vs-returning; the client never calls register/identify directly.
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
      description: "Client-generated id, used only when the phone is new; ignored for a returning phone."
    dialingCode:
      $ref: 'scalars.yaml#/DialingCode'
    nationalNumber:
      $ref: 'scalars.yaml#/NationalPhoneNumber'
    code:
      $ref: 'scalars.yaml#/OtpCode'
    sessionId:
      $ref: 'scalars.yaml#/SessionId'
      description: "The visitor session verifying the phone — carried onto CustomerIdentified so CartBindingProcess binds this session's open carts."
    displayName:
      $ref: 'scalars.yaml#/CustomerDisplayName'
      nullable: true
    locale:
      $ref: 'scalars.yaml#/Locale'
      nullable: true
      description: "Persisted on registration; defaults from the dialing code when absent."
    timezone:
      $ref: 'scalars.yaml#/TimeZone'
      nullable: true
  required: [customerId, dialingCode, nationalNumber, code, sessionId]

RequestEmailVerification:
  description: >
    Ask Supabase Auth to email a magic link to verify/link an email for the signed-in customer. Emits no
    event; the message is localized via the customer's STORED locale (no per-call language param).
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    email:
      $ref: 'scalars.yaml#/EmailAddress'
  required: [customerId, email]

ConfirmEmailVerification:
  description: >
    Confirm an email magic link: the client returns the Supabase token, we VERIFY it server-side and
    link the now-verified email to the Customer. Used for both the initial email and later changes.
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    token:
      $ref: 'scalars.yaml#/EmailVerificationToken'
  required: [customerId, token]

RequestPhoneChange:
  description: "Ask Supabase to send an SMS OTP to a NEW phone for a signed-in customer (stored locale). Emits no event."
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    newDialingCode:
      $ref: 'scalars.yaml#/DialingCode'
    newNationalNumber:
      $ref: 'scalars.yaml#/NationalPhoneNumber'
  required: [customerId, newDialingCode, newNationalNumber]

ConfirmPhoneChange:
  description: "Verify the OTP on the new phone and change the customer's phone (→ canonical E.164 PhoneNumber)."
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    newDialingCode:
      $ref: 'scalars.yaml#/DialingCode'
    newNationalNumber:
      $ref: 'scalars.yaml#/NationalPhoneNumber'
    code:
      $ref: 'scalars.yaml#/OtpCode'
  required: [customerId, newDialingCode, newNationalNumber, code]

# =====================================================================
# 5b. Customer self-service: favorites & profile  (persona: customer)
# =====================================================================
# NOTE: password / OTP / session are handled by the auth provider (Supabase Auth) and WRAPPED by the
# commands above (ADR-0015); there is deliberately no ChangeCustomerPassword.

ChangeLanguage:
  description: >
    Persist the customer's preferred language (the single locale setter). The stored locale then
    localizes subsequent authenticated SMS/email sends — so they need no per-call language param.
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    locale:
      $ref: 'scalars.yaml#/Locale'
  required: [customerId, locale]

MarkRestaurantAsFavorite:
  description: "Customer marks a restaurant as a favorite for quick access."
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
  required: [customerId, restaurantId]

UnmarkRestaurantAsFavorite:
  description: "Customer removes a restaurant from their favorites."
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
  required: [customerId, restaurantId]

UpdateCustomerInfo:
  description: "Customer updates their display name. (Email is verified-only — set via ConfirmEmailVerification.)"
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    displayName:
      $ref: 'scalars.yaml#/CustomerDisplayName'
      nullable: true
  required: [customerId]

SetCustomerPreferences:
  description: "Customer sets discovery + i18n preferences (timezone, dietary restrictions, favorite cuisines). Language is set via ChangeLanguage."
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    timezone:
      $ref: 'scalars.yaml#/TimeZone'
      nullable: true
    dietaryTags:
      type: array
      items:
        $ref: 'scalars.yaml#/Tag'
    favoriteCuisines:
      type: array
      items:
        $ref: 'scalars.yaml#/Tag'
  required: [customerId]

SetCustomerAddress:
  description: "Customer adds or updates a saved delivery address in their address book."
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    addressId:
      $ref: 'scalars.yaml#/AddressId'
      description: "Client-generated id; re-using it updates that address."
    label:
      type: string
      maxLength: 80
      nullable: true
    address:
      $ref: 'entities.yaml#/Address'
  required: [customerId, addressId, address]

RemoveCustomerAddress:
  description: "Customer removes a saved address from their address book."
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    addressId:
      $ref: 'scalars.yaml#/AddressId'
  required: [customerId, addressId]

SetCustomerPaymentMethod:
  description: "Customer sets or updates their preferred Stripe payment method."
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    paymentMethodId:
      $ref: 'scalars.yaml#/PaymentMethodId'
  required: [customerId, paymentMethodId]

# =====================================================================
# 6. Pay & place order  (persona: customer)  — story-map activity 6
# =====================================================================

PlaceOrder:
  description: >
    SAGA (checkout). Reads the OPEN cart referenced by cartId, re-validates it against the live
    catalog, prices it server-side, takes payment via Stripe, records the order, then closes the
    cart. This is the V0 risk point: it depends on an external actor (Stripe) and must be a saga
    with a failure branch. Now that the customer has verified their phone, customerId is bound here.
  type: object
  properties:
    mode: { $ref: 'scalars.yaml#/Mode' }   # test mode (ADR-0038); optional, absent = LIVE
    orderId:
      $ref: 'scalars.yaml#/OrderId'
      description: "Client-generated id for the order the saga will materialize on payment capture."
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    cartId:
      $ref: 'scalars.yaml#/CartId'
      description: "The OPEN cart to check out; its lines become the order's line items."
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
      nullable: true
      description: "Resolved from the now-authenticated session; bound onto the cart at checkout."
    customerContact:
      $ref: 'entities.yaml#/CustomerContact'
    serviceType:
      $ref: 'scalars.yaml#/ServiceType'
    deliveryAddress:
      $ref: 'entities.yaml#/Address'
      nullable: true
    note:
      $ref: 'scalars.yaml#/OrderNote'
      nullable: true
    paymentMethodId:
      type: string
      maxLength: 255
      description: >
        Stripe PaymentMethod / client secret reference for the payment step. The wallet behind
        it (card, Apple Pay, Google Pay) is a client-side/Stripe concern and does not change the
        domain: every method yields a standard Stripe PaymentMethod and the same saga.
    expectedTotal:
      $ref: 'entities.yaml#/Money'
      nullable: true
      description: >
        OPTIONAL confirmation of the total the client displayed at checkout. NEVER used to price
        anything — the server recomputes the total from the live catalog (the only price authority)
        and rejects with errors.yaml#/PriceMismatch when the two diverge, so a customer is never
        charged an amount other than the one they were shown.
  required: [orderId, restaurantId, cartId, customerContact, serviceType, paymentMethodId]

# =====================================================================
# 7. Fulfil  (persona: restaurant)  — story-map activity 7
# =====================================================================

AcceptOrder:
  description: "Restaurant accepts an order and commits to preparing it."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    estimatedReadyAt:
      type: string
      format: date-time
      nullable: true
  required: [orderId, restaurantId]

RejectOrder:
  description: "Restaurant rejects a placed order; the captured payment is refunded."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
  required: [orderId, restaurantId, reason]

StartPreparation:
  description: "Restaurant starts preparing an accepted order (moves to PREPARING)."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
  required: [orderId, restaurantId]

# =====================================================================
# 8. Deliver / hand over  (persona: restaurant / courier)  — story-map activity 8
# =====================================================================

MarkOrderReady:
  description: "Restaurant marks an order as ready for pickup/delivery."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
  required: [orderId, restaurantId]

MarkOrderDelivered:
  description: "Restaurant/courier records that the order has been delivered or handed over."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
  required: [orderId, restaurantId]

# =====================================================================
# 9. Track & complete  (persona: customer / restaurant)  — story-map activity 9
# =====================================================================

CancelOrderByCustomer:
  description: "Customer cancels their order before the restaurant has accepted it; payment is refunded."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [orderId, restaurantId]

CancelOrderByRestaurant:
  description: "Restaurant cancels an order it had already accepted; payment is refunded."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
  required: [orderId, restaurantId, reason]

# =====================================================================
# 10. Rate the order  (persona: customer)  — story-map activity 9
# =====================================================================

# Three independent post-delivery feedback actions, all on the Order aggregate (no separate aggregate):
# rate the delivery (rider thumb), rate the restaurant (stars + comment), tip the rider.

RateOrder:
  description: "Customer rates the delivery of a completed order with a rider thumbs up/down."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    riderThumb:
      $ref: 'scalars.yaml#/ThumbRating'
  required: [orderId, restaurantId, riderThumb]

RateRestaurant:
  description: "Customer rates the restaurant of a completed order (0–5 stars + optional comment)."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    stars:
      $ref: 'scalars.yaml#/StarRating'
    comment:
      $ref: 'scalars.yaml#/RatingComment'
      nullable: true
  required: [orderId, restaurantId, stars]

TipOrder:
  description: >
    Customer tips one or more of the rider / restaurant / Captain on an order (ADR-012). Optional and
    SEPARATE from the price — Captain keeps 0% (100% passes through). Additive: may be sent at checkout or
    post-delivery; multiple tips accumulate.
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    tips:
      type: array
      minItems: 1
      items:
        $ref: 'entities.yaml#/Tip'
  required: [orderId, restaurantId, tips]

RequestRefund:
  description: "Customer requests a refund for an order; the RefundProcess decides and drives Stripe."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [orderId, restaurantId]

# --- Delivery (bounded context: delivery) — ADR-0031 -----------------------
# Independent-rider commands on the DeliveryJob (the partner path is inbound events instead).

AcceptDelivery:
  description: "An independent Captain rider accepts a pending delivery job."
  type: object
  properties:
    deliveryJobId:
      $ref: 'scalars.yaml#/DeliveryJobId'
    riderId:
      $ref: 'scalars.yaml#/RiderId'
  required: [deliveryJobId, riderId]

ConfirmPickup:
  description: "The assigned rider confirms they collected the order from the restaurant."
  type: object
  properties:
    deliveryJobId:
      $ref: 'scalars.yaml#/DeliveryJobId'
    riderId:
      $ref: 'scalars.yaml#/RiderId'
  required: [deliveryJobId, riderId]



CancelDelivery:
  description: "Restaurant/admin cancels a delivery job before it completes."
  type: object
  properties:
    deliveryJobId:
      $ref: 'scalars.yaml#/DeliveryJobId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [deliveryJobId]

EscalateDelivery:
  description: >
    Restaurant/admin asks to skip the delivery channel currently offered and advance the ranked walk now
    (#60). The DeliveryJob emits DeliveryEscalationRequested; DeliveryDispatchProcess offers the next
    ranked channel, or fails the dispatch closed when the walk is exhausted. Self-dispatch and exhaustion
    are handled by the saga (a benign skip / a terminal fact), not rejected as command errors.
  type: object
  properties:
    deliveryJobId:
      $ref: 'scalars.yaml#/DeliveryJobId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [deliveryJobId]


BindCartToCustomer:
  description: >
    Bind a cart to a customer (after phone verification). The cart is then owned by the customer and can be retrieved across sessions. This is a one-time operation per cart.
  type: object
  properties:
    cartId:
      $ref: 'scalars.yaml#/CartId'
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
  required: [cartId, customerId]

# =====================================================================
# Delivery — operational commands (DeliveryJob aggregate)
# =====================================================================

CompleteDelivery:
  description: "The assigned rider marks the delivery complete (handed to the customer)."
  type: object
  properties:
    deliveryJobId: { $ref: 'scalars.yaml#/DeliveryJobId' }
    riderId: { $ref: 'scalars.yaml#/RiderId' }
  required: [deliveryJobId, riderId]

DeclineDelivery:
  description: "An independent rider declines a pending delivery job (it stays PENDING, re-offerable)."
  type: object
  properties:
    deliveryJobId: { $ref: 'scalars.yaml#/DeliveryJobId' }
    riderId: { $ref: 'scalars.yaml#/RiderId' }
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [deliveryJobId, riderId]

ReportDeliveryIssue:
  description: "Report an issue on a delivery job (rider/partner/support)."
  type: object
  properties:
    deliveryJobId: { $ref: 'scalars.yaml#/DeliveryJobId' }
    riderId:
      $ref: 'scalars.yaml#/RiderId'
      nullable: true
    issue:
      type: string
      maxLength: 1000
  required: [deliveryJobId, issue]

ResolveDeliveryIssue:
  description: "Resolve a previously reported delivery issue."
  type: object
  properties:
    deliveryJobId: { $ref: 'scalars.yaml#/DeliveryJobId' }
    resolution:
      type: string
      maxLength: 1000
  required: [deliveryJobId, resolution]

UpdateDeliveryStatus:
  description: "Drive a delivery job's status (independent-rider path / admin correction)."
  type: object
  properties:
    deliveryJobId: { $ref: 'scalars.yaml#/DeliveryJobId' }
    status: { $ref: 'scalars.yaml#/DeliveryStatus' }
  required: [deliveryJobId, status]

AssignDeliveryToPartner:
  description: "Assign a pending delivery job to a delivery partner for fulfilment."
  type: object
  properties:
    deliveryJobId: { $ref: 'scalars.yaml#/DeliveryJobId' }
    partnerRef: { $ref: 'scalars.yaml#/ExternalReference' }
  required: [deliveryJobId, partnerRef]

UnassignDeliveryFromPartner:
  description: "Unassign a delivery job from its partner (to re-offer it)."
  type: object
  properties:
    deliveryJobId: { $ref: 'scalars.yaml#/DeliveryJobId' }
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [deliveryJobId]

UpdateDeliveryPartnerStatus:
  description: "Apply a partner-reported status change to the delivery job (from the avelo37-acl inbound report)."
  type: object
  properties:
    deliveryJobId: { $ref: 'scalars.yaml#/DeliveryJobId' }
    partnerRef:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
    status: { $ref: 'scalars.yaml#/DeliveryStatus' }
  required: [deliveryJobId, status]

# =====================================================================
# Rider (independent Captain courier)
# =====================================================================

RegisterRider:
  description: "Register as an independent Captain rider (linked to the auth provider user)."
  type: object
  properties:
    riderId: { $ref: 'scalars.yaml#/RiderId' }
    authRef: { $ref: 'scalars.yaml#/ExternalReference' }
    displayName:
      type: string
      maxLength: 200
    phone: { $ref: 'scalars.yaml#/PhoneNumber' }
  required: [riderId, authRef, displayName, phone]

UpdateRiderInfo:
  description: "Update editable rider profile fields."
  type: object
  properties:
    riderId: { $ref: 'scalars.yaml#/RiderId' }
    displayName:
      type: string
      maxLength: 200
      nullable: true
    phone:
      $ref: 'scalars.yaml#/PhoneNumber'
      nullable: true
  required: [riderId]

ChangeRiderStatus:
  description: "Change a rider's availability/lifecycle status."
  type: object
  properties:
    riderId: { $ref: 'scalars.yaml#/RiderId' }
    status: { $ref: 'scalars.yaml#/RiderStatus' }
  required: [riderId, status]

# =====================================================================
# Refund (restaurant- or admin-approved — RefundProcess state PM)
# =====================================================================

ApproveRefund:
  description: "The RESTAURANT (its own orders) or an ADMIN approves a pending refund (optionally partial); the RefundProcess then drives Stripe."
  type: object
  properties:
    orderId: { $ref: 'scalars.yaml#/OrderId' }
    amount:
      $ref: 'entities.yaml#/Money'
      description: "Approved refund amount (may be partial)."
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [orderId, amount]

DenyRefund:
  description: "The RESTAURANT (its own orders) or an ADMIN denies a pending refund request."
  type: object
  properties:
    orderId: { $ref: 'scalars.yaml#/OrderId' }
    reason:
      type: string
      maxLength: 500
  required: [orderId, reason]

# =====================================================================
# Where the rest lives
# =====================================================================
# - Which events each command emits / the saga reacts to:  actors.yaml (`receives` → `emits`).
# - Which errors each command may raise on rejection:      errors.yaml, mapped in actors.yaml `throws`.
# - Who may send each command, and its use case / slice:   story-map.md + api.yaml `@auth`.
