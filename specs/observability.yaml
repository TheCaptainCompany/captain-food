version: 2
description: >
  Observability CONTRACTS for critical workflows — a first-class part of the Captain.Food DSL, not an
  afterthought. Each contract declares, for one workflow, the REQUIRED spans, identifiers, attributes,
  metrics, success/error semantics and SLOs that production telemetry must satisfy, so a workflow can be
  asserted to be not only implemented but DIAGNOSABLE. Contracts bind to the domain via `$ref`s into
  actors.yaml / commands.yaml / events.yaml / scalars.yaml, so the codegen proves they never drift from
  the model (a span that claims to publish `OrderPlaced` must reference a real event).

  Implementation rule (see docs/claude/observability.md): OpenTelemetry stays in framework boundaries
  (command bus, event store, publisher, consumers, projections, GraphQL gateway, BAM projector,
  middleware) — NEVER in aggregates or pure domain handlers. The `business.*` attributes below are set
  by those decorators, not scattered through the domain.

  Convention per contract:
    - feature / criticality : workflow identity and importance.
    - workflow              : $ref bindings to the saga/aggregate, command, emitted + inbound events —
                              OR a dispatch `surface` (`graphql`) for a PIPELINE contract that binds a
                              whole dispatch surface instead of a single command/saga/aggregate
                              (mutually exclusive with the $ref bindings; validator §8).
    - run_identity          : ids every run must carry; `correlation_id` and `trace_id` are mandatory
                              (correlation_id is business-facing and survives the whole causality chain;
                              trace_id is technical and may rotate across async boundaries).
    - spans                 : required spans, each with an OTel `kind`
                              (SERVER|CLIENT|INTERNAL|PRODUCER|CONSUMER) and required attributes.
    - metrics/business_metrics : technical vs business signals (kept separate — see BAM).
    - status_rules          : how spans/attributes map to success | technical_error | business_rejected;
                              `success.required_spans` must be a subset of the declared `spans`.
    - latency_budget / error_budget : workflow SLOs.

# =====================================================================
# command-acceptance — the acceptance-first GraphQL dispatch pipeline (ADR-20260720-015500)
# mutation (metadata?) -> sync validate/journal (command_journal: RECEIVED | duplicate | Conflict)
#   -> MutationAcceptance echoed -> async dispatch to the pure handler -> terminal journal status
#   (SUCCEEDED | REJECTED | FAILED) -> operationStatus/operationStatusChanged.
# Binds the WHOLE dispatch surface (`surface: graphql`), not one command — every mutation flows
# through it. Per-workflow contracts (place-order, ...) remain the deep-dive complement.
# =====================================================================
command-acceptance:
  feature: command-acceptance
  criticality: high
  workflow:
    surface: graphql   # dispatch-surface binding — no single command/saga/aggregate (validator §8)

  run_identity:
    - { name: correlation_id, source: "command.correlation_id", required: true }
    - { name: trace_id, source: "otel.trace_id", required: true }
    - { name: message_id, source: "command.message_id", required: true }   # command_journal pk (ADR-20260720-015300)
    - { name: command_type, source: "command.type", required: true }
    - { name: channel, source: "journal.channel", required: true }   # scalars CommandChannel: GRAPHQL | WORKER | INTERNAL (#15)

  spans:
    - name: "command.receive"
      kind: SERVER
      required: true
      attributes:
        - { key: "business.command_type", type: string, required: true }
        - { key: "business.actor", type: string, required: true }
        - { key: "business.channel", type: string, required: true }
    - name: "command.journal"
      kind: INTERNAL
      required: true
      attributes:
        - { key: "business.message_id", type: string, required: true }
        - { key: "business.journal_status", type: string, required: true }   # RECEIVED | duplicate | conflict (messageId reuse w/ different payload → sync Conflict)
    - name: "command.dispatch"
      kind: INTERNAL
      required: true
      attributes:
        - { key: "business.message_id", type: string, required: true }
        - { key: "business.dispatch_outcome", type: string, required: true }   # spawned | duplicate_skipped

  metrics:
    - { name: "commands_accepted_total", type: counter, attributes: ["channel"] }
    - { name: "command_duplicates_total", type: counter, attributes: ["channel"] }   # duplicate: true acceptances — client retry correctness (#17)
    - { name: "command_sync_conflicts_total", type: counter, attributes: ["command_type"] }   # sync Conflict rate: messageId reuse with a different payload (ADR-20260720-015500 §2)
    - { name: "command_completion_ms", type: histogram, attributes: ["status"] }   # journal insert → terminal status; status = SUCCEEDED | REJECTED | FAILED (REJECTED/FAILED split)

  status_rules:
    success:
      required_spans: ["command.receive", "command.journal", "command.dispatch"]
      conditions: ["command.journal.business.journal_status != 'conflict'"]   # a duplicate IS a successful acceptance (duplicate: true echoed)
    business_rejected:
      conditions: ["journal terminal status == 'REJECTED'"]   # post-acceptance rejection — surfaces as Operation.errorCode, never a GraphQL error
    technical_error:
      any_span_errors: true

  # Budgets bind the SYNCHRONOUS acceptance path (receive → journal → MutationAcceptance) — the
  # async handler completion is watched via command_completion_ms{status}, not this latency budget.
  latency_budget: { max_p95_ms: 150, max_p99_ms: 400 }
  error_budget: { max_error_rate_pct: 0.5 }

# =====================================================================
# place-order — the V0 checkout saga (highest risk: external Stripe call)
# Cart (OPEN) -> PlaceOrder -> PaymentIntentCreated -> [Stripe] -> PaymentCaptured
#   -> OrderPlaced + CartCheckedOut   (or PaymentFailed -> abort, cart stays OPEN)
# =====================================================================
place-order:
  feature: place-order
  criticality: high
  workflow:
    saga: { $ref: 'processmanager.yaml#/PlaceOrderProcess' }
    command: { $ref: 'commands.yaml#/PlaceOrder' }
    emits:
      - { $ref: 'events.yaml#/PaymentIntentCreated' }
      - { $ref: 'events.yaml#/OrderPlaced' }
      - { $ref: 'events.yaml#/CartCheckedOut' }
    inbound:
      - { $ref: 'events.yaml#/PaymentCaptured' }
      - { $ref: 'events.yaml#/PaymentFailed' }

  run_identity:
    - { name: correlation_id, source: "command.correlation_id", required: true }
    - { name: trace_id, source: "otel.trace_id", required: true }
    - { name: message_id, source: "command.message_id", required: true }   # command_journal pk (ADR-20260720-015300)
    - { name: order_id, source: "domain.aggregate_id", businessKey: { $ref: 'scalars.yaml#/OrderId' }, required: true }
    - { name: command_type, source: "command.type", required: true }

  spans:
    - name: "command.receive"
      kind: SERVER
      required: true
      attributes:
        - { key: "business.command_type", type: string, required: true }
        - { key: "business.actor", type: string, required: true }
    - name: "command.journal"
      kind: INTERNAL
      required: true
      attributes:
        - { key: "business.message_id", type: string, required: true }
        - { key: "business.journal_status", type: string, required: true }   # RECEIVED | duplicate
    - name: "command.validate"
      kind: INTERNAL
      required: true
      attributes:
        - { key: "business.validation_status", type: string, required: true }
    - name: "cart.read"
      kind: INTERNAL
      required: true
      attributes:
        - { key: "business.aggregate_id", type: string, required: true }
    - name: "pricing.compute"
      kind: INTERNAL
      required: true
      attributes:
        - { key: "business.service_fee", type: int, required: true }
        - { key: "business.split_ok", type: string, required: true }
    - name: "payment.intent.create"
      kind: CLIENT
      required: true
      attributes:
        - { key: "messaging.system", type: string, required: true }
        - { key: "business.result", type: string, required: true }
    - name: "event.store.append"
      kind: INTERNAL
      required: true
      attributes:
        - { key: "business.event_type", type: string, required: true }
        - { key: "business.stream_id", type: string, required: true }
    - name: "event.publish"
      kind: PRODUCER
      required: true
      attributes:
        - { key: "messaging.system", type: string, required: true }
        - { key: "business.event_type", type: string, required: true }
    - name: "event.consume.projection"
      kind: CONSUMER
      required: true
      multiplicity: ">= 1"
      attributes:
        - { key: "business.projection_name", type: string, required: true }

  metrics:
    - { name: "place_order_duration_ms", type: histogram, attributes: ["result"] }
  business_metrics:
    - { name: "orders_placed_total", type: counter, attributes: ["status"] }
    - { name: "checkout_payment_failures_total", type: counter, attributes: ["reason"] }

  status_rules:
    success:
      required_spans: ["command.receive", "command.journal", "pricing.compute", "payment.intent.create", "event.store.append", "event.publish", "event.consume.projection"]
      conditions: ["payment.intent.create.business.result == 'captured'"]
    technical_error:
      any_span_errors: true
    business_rejected:
      conditions: ["command.validate.business.validation_status == 'rejected'"]

  latency_budget: { max_p95_ms: 800, max_p99_ms: 1500 }
  error_budget: { max_error_rate_pct: 1.0 }

# =====================================================================
# refund — the compensation saga (Stripe refund driven by RefundProcess)
# OrderRejected/Cancelled* or RefundRequested -> [Stripe refund] -> PaymentRefunded (recorded)
# =====================================================================
refund:
  feature: refund
  criticality: high
  workflow:
    saga: { $ref: 'processmanager.yaml#/RefundProcess' }
    inbound:
      - { $ref: 'events.yaml#/OrderRejectedByRestaurant' }
      - { $ref: 'events.yaml#/OrderCancelledByCustomer' }
      - { $ref: 'events.yaml#/OrderCancelledByRestaurant' }
      - { $ref: 'events.yaml#/RefundRequested' }
      - { $ref: 'events.yaml#/PaymentRefunded' }

  run_identity:
    - { name: correlation_id, source: "event.correlation_id", required: true }
    - { name: trace_id, source: "otel.trace_id", required: true }
    - { name: order_id, source: "domain.aggregate_id", businessKey: { $ref: 'scalars.yaml#/OrderId' }, required: true }

  spans:
    - name: "event.consume.trigger"
      kind: CONSUMER
      required: true
      attributes:
        - { key: "business.event_type", type: string, required: true }
        - { key: "business.correlation_id", type: string, required: true }
    - name: "refund.request"
      kind: CLIENT
      required: true
      attributes:
        - { key: "messaging.system", type: string, required: true }
        - { key: "business.result", type: string, required: true }
    - name: "event.store.append"
      kind: INTERNAL
      required: true
      attributes:
        - { key: "business.event_type", type: string, required: true }

  metrics:
    - { name: "refund_duration_ms", type: histogram, attributes: ["result"] }
  business_metrics:
    - { name: "refunds_settled_total", type: counter, attributes: ["trigger"] }
    - { name: "saga_compensation_total", type: counter, attributes: ["workflow"] }

  status_rules:
    success:
      required_spans: ["refund.request", "event.store.append"]
      conditions: ["refund.request.business.result == 'refunded'"]
    technical_error:
      any_span_errors: true

  latency_budget: { max_p95_ms: 1000, max_p99_ms: 3000 }
  error_budget: { max_error_rate_pct: 2.0 }

# =====================================================================
# customer-identification — phone-OTP sign-in wrapping Supabase Auth (ADR-0015)
# RequestPhoneVerification (send SMS) -> VerifyPhone (verify OTP synchronously) -> CustomerRegistered
#   (new) | CustomerIdentified (returning). The Supabase call is synchronous, through the supabase-acl.
# =====================================================================
customer-identification:
  feature: customer-identification
  criticality: high
  workflow:
    aggregate: { $ref: 'actors.yaml#/Customer' }
    command: { $ref: 'commands.yaml#/VerifyPhone' }
    emits:
      - { $ref: 'events.yaml#/CustomerRegistered' }
      - { $ref: 'events.yaml#/CustomerIdentified' }

  run_identity:
    - { name: correlation_id, source: "command.correlation_id", required: true }
    - { name: trace_id, source: "otel.trace_id", required: true }
    - { name: customer_id, source: "domain.aggregate_id", businessKey: { $ref: 'scalars.yaml#/CustomerId' }, required: true }

  spans:
    - name: "command.receive"
      kind: SERVER
      required: true
      attributes:
        - { key: "business.command_type", type: string, required: true }
    - name: "otp.verify"
      kind: CLIENT
      required: true
      attributes:
        - { key: "messaging.system", type: string, required: true }
        - { key: "business.result", type: string, required: true }
    - name: "event.store.append"
      kind: INTERNAL
      required: true
      attributes:
        - { key: "business.event_type", type: string, required: true }
    - name: "event.publish"
      kind: PRODUCER
      required: true
      attributes:
        - { key: "business.event_type", type: string, required: true }

  metrics:
    - { name: "customer_identification_duration_ms", type: histogram, attributes: ["result"] }
  business_metrics:
    - { name: "customer_signins_total", type: counter, attributes: ["outcome"] }
    - { name: "otp_verifications_failed_total", type: counter, attributes: ["reason"] }

  status_rules:
    success:
      required_spans: ["command.receive", "otp.verify", "event.store.append", "event.publish"]
      conditions: ["otp.verify.business.result == 'verified'"]
    business_rejected:
      conditions: ["otp.verify.business.result == 'invalid_code'"]
    technical_error:
      any_span_errors: true

  latency_budget: { max_p95_ms: 600, max_p99_ms: 1200 }
  error_budget: { max_error_rate_pct: 2.0 }

# =====================================================================
# prospection — B2B outreach to NON_PARTNER listings (ADR-0020)
# The prospection-acl worker reads the COMPUTED score from ProspectionPipeline, applies the
# schedule + anti-spam, fires HubSpot/Resend/Slack, then issues RecordProspectContact to record the fact.
# The score is a read-model projection — never an input or an emitted event.
# =====================================================================
prospection:
  feature: prospection
  criticality: medium
  workflow:
    aggregate: { $ref: 'actors.yaml#/Prospect' }
    command: { $ref: 'commands.yaml#/RecordProspectContact' }
    emits:
      - { $ref: 'events.yaml#/ProspectContacted' }

  run_identity:
    - { name: correlation_id, source: "command.correlation_id", required: true }
    - { name: trace_id, source: "otel.trace_id", required: true }
    - { name: restaurant_id, source: "domain.aggregate_id", businessKey: { $ref: 'scalars.yaml#/RestaurantId' }, required: true }

  spans:
    - name: "pipeline.read"
      kind: INTERNAL
      required: true
      attributes:
        - { key: "business.score", type: int, required: true }
    - name: "outreach.dispatch"
      kind: CLIENT
      required: true
      attributes:
        - { key: "messaging.system", type: string, required: true }
        - { key: "business.channel", type: string, required: true }
        - { key: "business.sequence_step", type: int, required: true }
    - name: "command.receive"
      kind: SERVER
      required: true
      attributes:
        - { key: "business.command_type", type: string, required: true }
    - name: "event.store.append"
      kind: INTERNAL
      required: true
      attributes:
        - { key: "business.event_type", type: string, required: true }
    - name: "event.publish"
      kind: PRODUCER
      required: true
      attributes:
        - { key: "business.event_type", type: string, required: true }

  metrics:
    - { name: "prospect_contact_duration_ms", type: histogram, attributes: ["channel"] }
  business_metrics:
    - { name: "prospect_contacts_sent_total", type: counter, attributes: ["channel", "sequence_step"] }
    - { name: "prospects_converted_total", type: counter, attributes: ["source"] }
    - { name: "prospects_cold_total", type: counter, attributes: ["reason"] }

  status_rules:
    success:
      required_spans: ["pipeline.read", "outreach.dispatch", "event.store.append", "event.publish"]
    business_rejected:
      conditions: ["command.receive.business.command_type == 'RecordProspectContact' && error.type == 'ProspectContactLimitReached'"]
    technical_error:
      any_span_errors: true

  latency_budget: { max_p95_ms: 2000, max_p99_ms: 5000 }
  error_budget: { max_error_rate_pct: 5.0 }

# =====================================================================
# stripe-webhook-ingestion — inbound event sourcing at the Stripe seam (ADR-20260720-015400)
# webhook -> verify signature -> external_stripe_events UPSERT -> ACL translate
#   -> inbound_events (RECEIVED) -> drain -> Repository append (Payment stream) -> DELIVERED
# =====================================================================
stripe-webhook-ingestion:
  feature: stripe-webhook-ingestion
  criticality: high
  workflow:
    aggregate: { $ref: 'actors.yaml#/Payment' }
    inbound:
      - { $ref: 'events.yaml#/PaymentCaptured' }
      - { $ref: 'events.yaml#/PaymentFailed' }
      - { $ref: 'events.yaml#/PaymentRefunded' }

  run_identity:
    - { name: correlation_id, source: "inbound.correlation_id", required: true }   # UUIDv5(stripe event id)
    - { name: trace_id, source: "otel.trace_id", required: true }
    - { name: inbound_event_id, source: "inbound.inbound_event_id", required: true }   # inbound_events pk → domain_events.cause_id
    - { name: external_event_id, source: "stripe.event_id", required: true }

  spans:
    - name: "webhook.verify"
      kind: SERVER
      required: true
      attributes:
        - { key: "business.source", type: string, required: true }          # 'stripe'
        - { key: "business.signature_status", type: string, required: true } # verified | rejected
    - name: "external.persist"
      kind: INTERNAL
      required: true
      attributes:
        - { key: "business.external_event_id", type: string, required: true }
        - { key: "business.dedupe", type: string, required: true }           # new | duplicate
    - name: "acl.translate"
      kind: INTERNAL
      required: true
      attributes:
        - { key: "business.event_type", type: string, required: true }
    - name: "inbound.persist"
      kind: INTERNAL
      required: true
      attributes:
        - { key: "business.inbound_event_id", type: string, required: true }
    - name: "inbound.drain.deliver"
      kind: CONSUMER
      required: true
      attributes:
        - { key: "business.inbound_event_id", type: string, required: true }
        - { key: "business.delivery_outcome", type: string, required: true } # recorded | already_recorded | failed
    - name: "event.store.append"
      kind: INTERNAL
      required: true
      attributes:
        - { key: "business.event_type", type: string, required: true }
        - { key: "business.stream_id", type: string, required: true }

  metrics:
    - { name: "stripe_webhook_ingest_duration_ms", type: histogram, attributes: ["result"] }
    - { name: "inbound_drain_lag_ms", type: histogram, attributes: ["source"] }
  business_metrics:
    - { name: "inbound_events_staged_total", type: counter, attributes: ["source", "event_type"] }
    - { name: "inbound_events_delivered_total", type: counter, attributes: ["source", "outcome"] }
    - { name: "webhook_duplicates_total", type: counter, attributes: ["source"] }

  status_rules:
    success:
      required_spans: ["webhook.verify", "external.persist", "acl.translate", "inbound.persist", "inbound.drain.deliver", "event.store.append"]
      conditions: ["inbound.drain.deliver.business.delivery_outcome != 'failed'"]
    technical_error:
      any_span_errors: true
    business_rejected:
      conditions: ["webhook.verify.business.signature_status == 'rejected'"]

  latency_budget: { max_p95_ms: 1000, max_p99_ms: 3000 }
  error_budget: { max_error_rate_pct: 1.0 }

# =====================================================================
# avelo37-webhook-ingestion — inbound event sourcing at the delivery-partner seam
# (ADR-20260720-015400 follow-up, issue #28)
# webhook -> verify signature -> external_avelo37_events UPSERT -> ACL translate
#   -> inbound_events (RECEIVED) -> drain -> Repository append (DeliveryJob stream) -> DELIVERED
