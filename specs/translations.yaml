version: 1
description: >
  Captain.Food UI translation catalog (ADR-0033) — the non-error counterpart of errors.yaml. Every
  user-visible string in the SDUI screens (screens/*.yaml, e.g. restaurant_frontoffice.yaml) is a KEY here, referenced by
  `$ref: 'translations.yaml#/<key>'`, never hardcoded. Generated to a single translations.generated.json
  ({ "<key>": { en, fr } }).

  Convention (mirrors errors.yaml):
    - key      : dotted, namespaced stable id (home.*, cart.*, common.*, auth.*…). One string = one key.
    - params   : OPTIONAL map of placeholder-name → description, for contextualized messages (e.g. a total,
                 a restaurant name, a count). {} / omitted when the string is static.
    - messages : default user-facing text; `en` and `fr` BOTH required. They may contain `{param}` tokens
                 that reference a `params` name; the client interpolates them. The validator checks that the
                 placeholders in en/fr match the declared params exactly.

