version: 1
description: >
  Captain.Food SHARED UI translation catalog (ADR-0033; sidecars per ADR-20260722-101500) — the
  non-error counterpart of errors.yaml. Holds strings shared ACROSS surfaces (common.*) and, later,
  backend/server-rendered text (SMS/email/push templates). SURFACE-SPECIFIC strings live in a co-located
  sidecar next to each screens file: `screens/<surface>.translations.yaml` (e.g.
  restaurant_frontoffice.translations.yaml). Every string is a KEY, referenced from screens by
  `$ref: '<file>.yaml#/<key>'`, never hardcoded. The codegen MERGES this file + every
  `screens/*.translations.yaml` into a single `translations.generated.json` ({ "<key>": { en, fr } });
  keys are globally namespaced and must be unique across all files.

  Convention (mirrors errors.yaml):
    - key      : dotted, namespaced stable id (common.*, home.*, cart.*, auth.*…). One string = one key.
    - params   : OPTIONAL map of placeholder-name → description, for contextualized messages (e.g. a total,
                 a restaurant name, a count). {} / omitted when the string is static.
    - messages : default user-facing text; `en` and `fr` BOTH required. They may contain `{param}` tokens
                 that reference a `params` name; the client interpolates them. The validator checks that the
                 placeholders in en/fr match the declared params exactly.

# ── common (shared across surfaces) ──────────────────────────────────────────
common.nav.home:      { messages: { en: "Home",     fr: "Accueil" } }
common.nav.search:    { messages: { en: "Search",   fr: "Recherche" } }
common.nav.orders:    { messages: { en: "Orders",   fr: "Commandes" } }
common.nav.account:   { messages: { en: "Account",  fr: "Compte" } }
common.cart.view:     { messages: { en: "View cart", fr: "Voir le panier" } }
common.action.change: { messages: { en: "Change",   fr: "Modifier" } }
common.action.apply:  { messages: { en: "Apply",    fr: "Appliquer" } }
common.action.submit: { messages: { en: "Submit",   fr: "Envoyer" } }
common.action.see_all: { messages: { en: "See all",  fr: "Tout voir" } }
common.filter.sort:   { messages: { en: "Sort",     fr: "Trier" } }
common.delivery.free: { messages: { en: "Free delivery", fr: "Livraison gratuite" } }
common.mode.delivery: { messages: { en: "Delivery", fr: "Livraison" } }
common.mode.pickup:   { messages: { en: "Pickup",   fr: "À emporter" } }
