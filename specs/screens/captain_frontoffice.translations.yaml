version: 1
description: >
  Captain Front-Office (marketplace) UI strings (ADR-0033; sidecar convention ADR-20260722-101500) — the
  surface-specific translation catalog for `captain_frontoffice.yaml` (cross-restaurant discovery + search
  + partner marketing @ live.captain.food → captain.food). Extracted from
  `restaurant_frontoffice.translations.yaml` by the marketplace content-split (ADR-20260722-091500). SHARED
  strings (common.*) live in `translations.yaml`; the shared customer chrome (location picker + auth/OTP
  sheets) keeps its location.*/auth.* keys in `restaurant_frontoffice.translations.yaml`. The codegen merges
  every file into a single `translations.generated.json`; keys are globally namespaced and unique across all
  files. Same convention as translations.yaml (dotted key · optional params · en+fr messages with matching
  {param} tokens).

# ── home (marketplace discovery) ───────────────────────────────────────────────
home.search_placeholder: { messages: { en: "Search restaurants or dishes…", fr: "Rechercher un restaurant ou un plat…" } }
home.craving:            { messages: { en: "What are you craving?", fr: "Une envie particulière ?" } }
