home.sort.recommended:   { messages: { en: "Recommended", fr: "Recommandés" } }
home.sort.delivery_time: { messages: { en: "Fastest delivery", fr: "Livraison la plus rapide" } }
home.sort.rating:        { messages: { en: "Top rated", fr: "Les mieux notés" } }
home.sort.price:         { messages: { en: "Price: low to high", fr: "Prix : croissant" } }
home.filter.category:    { messages: { en: "Category", fr: "Catégorie" } }
home.filter.delivery_mode: { messages: { en: "Delivery / Pickup", fr: "Livraison / À emporter" } }
