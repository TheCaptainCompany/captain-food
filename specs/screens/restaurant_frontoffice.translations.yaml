version: 1
description: >
  Restaurant Front-Office UI strings (ADR-0033; sidecar convention ADR-20260722-101500) — the
  surface-specific translation catalog for `restaurant_frontoffice.yaml`. SHARED strings (common.*) live
  in `translations.yaml`; this file holds only strings unique to this surface. The codegen merges both
  into a single `translations.generated.json`; keys are globally namespaced and unique across all files.
  Same convention as translations.yaml (dotted key · optional params · en+fr messages with matching
  {param} tokens). NOTE: the marketplace discovery strings (home.*, search.*, partner.*) were split out to
  `captain_frontoffice.translations.yaml` (ADR-20260722-091500). The shared customer chrome (location
  picker + auth/OTP sheets) is duplicated on the marketplace, which cross-refs the location.*/auth.* keys
  kept here (keys stay globally unique).

# ── location picker ──────────────────────────────────────────────────────────
location.title:            { messages: { en: "Delivery address", fr: "Adresse de livraison" } }
location.search_placeholder: { messages: { en: "Search for an address…", fr: "Rechercher une adresse…" } }
location.recent:           { messages: { en: "Recent", fr: "Récentes" } }
location.saved:            { messages: { en: "Saved",  fr: "Enregistrées" } }
location.use_current:      { messages: { en: "Use current location", fr: "Utiliser ma position" } }

# ── auth / OTP ───────────────────────────────────────────────────────────────
auth.title:    { messages: { en: "Sign in or create account", fr: "Se connecter ou créer un compte" } }
auth.body:     { messages: { en: "Enter your phone number to continue. No password needed.", fr: "Entrez votre numéro de téléphone pour continuer. Aucun mot de passe requis." } }
auth.phone_label: { messages: { en: "Phone number", fr: "Numéro de téléphone" } }
auth.continue: { messages: { en: "Continue", fr: "Continuer" } }
auth.or:       { messages: { en: "or", fr: "ou" } }
auth.passkey:  { messages: { en: "Continue with passkey", fr: "Continuer avec une clé d'accès" } }
auth.otp_title: { messages: { en: "Verify your number", fr: "Vérifiez votre numéro" } }
auth.otp_body:
  params: { phone: "the masked phone number the code was sent to" }
  messages: { en: "We sent a code to {phone}. Enter it below.", fr: "Nous avons envoyé un code au {phone}. Saisissez-le ci-dessous." }
auth.resend:   { messages: { en: "Resend code", fr: "Renvoyer le code" } }
auth.resend_in:
  params: { seconds: "seconds until resend is available" }
  messages: { en: "Resend in {seconds}s", fr: "Renvoyer dans {seconds}s" }

