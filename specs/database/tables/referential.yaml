version: 2
description: >
  Reference / configuration tables (ADR-0037) — seeded once by a repo script, NOT projected from
  domain_events. Plain tables (no `View_` prefix — they are authoritative seeded data, not projections),
  each marked `reference: true` so the validator accepts them as query `reads` targets alongside the
  event-fed projection views. The codegen emits their structure (CREATE TABLE + indexes); the seed rows
  are applied by a separate migration/seed script. Column `type` is a scalars.yaml `$ref` or an inline SQL
  primitive, like tables/eventstore.yaml.

PhoneCountry:
  reference: true
  description: "Phone-country reference for the dialing-code picker. Serves the phoneCountries query; the picker emits dialing_code ('+33')."
  columns:
    country:        { type: { $ref: 'scalars.yaml#/CountryCode' }, pk: true }
    dialing_code:   { type: { $ref: 'scalars.yaml#/DialingCode' }, index: true }
    name:           { type: text }
    default_locale: { type: { $ref: 'scalars.yaml#/Locale' } }

PricingPolicy:
  reference: true
  description: >
    Calibratable Captain service-fee policy (ADR-0016/0017); one active row per currency. Seeded with the
    ADR-0017 indicative values: fee_rate 5.0, buyer_share 60.0, margin_low 55.0, margin_high 70.0.
  columns:
    currency:       { type: { $ref: 'scalars.yaml#/CurrencyCode' }, pk: true }
    fee_rate:       { type: numeric }
    buyer_share:    { type: numeric }
    margin_low:     { type: numeric }
    margin_high:    { type: numeric }
    effective_from: { type: timestamptz }

UberEstimationPolicy:
  reference: true
  description: >
    Per-cuisine Uber Eats price mark-up coefficient (ADR-0024); one row per CuisineCategory. Seeded:
    FAST_FOOD 1.30, PIZZA 1.35, TRADITIONAL 1.40, BISTRONOMIC 1.45, FOOD_TRUCK 1.35.
  columns:
    cuisine_category:  { type: { $ref: 'scalars.yaml#/CuisineCategory' }, pk: true }
    price_coefficient: { type: numeric }
    effective_from:    { type: timestamptz }

UberSplitPolicy:
  reference: true
  description: >
    Calibratable Uber Eats split/fee assumptions for the estimated comparison (ADR-0024/0025); one row per
    currency. Seeded: uber_commission_pct 30.0, rider_base_cents 285, rider_per_km_cents 80,
    avg_delivery_fee_cents 399, platform_fee_pct 10.0.
  columns:
    currency:               { type: { $ref: 'scalars.yaml#/CurrencyCode' }, pk: true }
    uber_commission_pct:    { type: numeric }
    rider_base_cents:       { type: integer }
    rider_per_km_cents:     { type: integer }
    avg_delivery_fee_cents: { type: integer }
    platform_fee_pct:       { type: numeric }
    effective_from:         { type: timestamptz }

# --- Delivery dispatch strategy (#60) ---
# The channel CATALOG (partners + spec-level defaults) plus the runtime USAGE config resolved per city /
# restaurant. Spec declares the catalog + mechanism; these config rows carry the "which/where/for whom"
# the spec cannot anticipate (they are seeded/managed, and later API-writable via partner self-registration
# #61). See docs/proposals/delivery-dispatch-strategy-foundation.md.

City:
  reference: true
  description: >
    A city Captain operates in (#60). The routing scope: CityDeliveryRanking is keyed by city_id and a
    restaurant's dispatch config names its city. Seeded (V0: Tours).
  columns:
    city_id: { type: { $ref: 'scalars.yaml#/CityId' }, pk: true }
    name:    { type: { $ref: 'scalars.yaml#/CityName' } }
    country: { type: { $ref: 'scalars.yaml#/CountryCode' } }

DeliveryChannelCatalog:
  reference: true
  description: >
    Catalog of known delivery channels/partners with their SPEC-LEVEL defaults (#60). One row per channel.
    Per-scope USAGE (ranking, TTL overrides) is runtime config (CityDeliveryRanking), not here. Every
    PARTNER-kind channel must have a wired services.yaml delivery implementation. Seeded: independent (POOL),
    avelo37 / uber_direct / coopcycle (PARTNER).
  columns:
    channel:                   { type: { $ref: 'scalars.yaml#/DeliveryChannelKey' }, pk: true }
    kind:                      { type: { $ref: 'scalars.yaml#/DeliveryChannelKind' } }
    default_offer_ttl_seconds: { type: integer, note: "Spec-level default offer timeout for this channel; a city row may override it, and the global env max TTL caps it (#60)." }
    enabled:                   { type: boolean, note: "A channel can be globally disabled without removing its catalog row." }
    effective_from:            { type: timestamptz }

CityDeliveryRanking:
  reference: true
  description: >
    Per-city ORDERED channel list Captain walks when it dispatches (#60) — the runtime 'content' the spec
    cannot anticipate. Resolution: the latest effective_from set for a city, ordered by rank; a row with a
    null city_id is the platform default. Tours seed (today): (tours, 1, independent), (tours, 2, uber_direct).
  columns:
    id:                   { type: text, pk: true, note: "Surrogate key (e.g. 'tours-1'); the natural key is (city_id, effective_from, rank)." }
    city_id:              { type: { $ref: 'scalars.yaml#/CityId' }, nullable: true, index: true, note: "The city this ranking applies to; NULL = platform default fallback." }
    rank:                 { type: integer, note: "1-based position in the walk order." }
    channel:              { type: { $ref: 'scalars.yaml#/DeliveryChannelKey' } }
    ttl_override_seconds: { type: integer, nullable: true, note: "Per-city offer TTL for this channel (INDEPENDENT's TTL lives here); null = the catalog default. Capped by the global env max (#60)." }
    effective_from:       { type: timestamptz }

RestaurantDispatchConfig:
  reference: true
  description: >
    Per-restaurant dispatch config (#60): the restaurant's city (routing scope), whether Captain or the
    restaurant dispatches, and — for self-dispatch — the restaurant's own delay threshold driving the
    customer 'late' tracking signal (not an escalation). Seeded/managed per restaurant; default mode CAPTAIN.
  columns:
    restaurant_id:             { type: { $ref: 'scalars.yaml#/RestaurantId' }, pk: true }
    city_id:                   { type: { $ref: 'scalars.yaml#/CityId' }, index: true }
    mode:                      { type: { $ref: 'scalars.yaml#/RestaurantDispatchMode' } }
    self_dispatch_ttl_seconds: { type: integer, nullable: true, note: "The restaurant's promised delivery-time threshold when mode=RESTAURANT; on breach the customer's tracking shows 'late' and feeds the satisfaction check (#62). Not a routing escalation." }
    effective_from:            { type: timestamptz }
