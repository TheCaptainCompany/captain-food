version: 1
description: >
  Raw-integration STAGING tables (ADR-0045) — a third table category alongside the event store
  (eventstore.yaml), the event-fed projections (projection_tables.yaml / projection_views.yaml) and the
  seeded reference/config tables (referential.yaml). A staging table is the landing zone for RAW external
  records ingested by a thin CI job; it is NOT projected from `domain_events` and NOT a GraphQL `reads`
  target (no `reference: true`) — an on-app worker reads it and translates rows into ordinary domain
  commands (SIRENE ACL → RegisterRestaurant / MarkRestaurantClosed). The codegen emits its CREATE TABLE +
  indexes generically like any other `database/tables/*.yaml` table; `staging: true` documents the category.

external_sirene_restaurants:
  staging: true
  description: >
    Raw INSEE Sirene établissement mirror (ADR-0045). The scheduled CI ingestion job UPSERTs one row per
    SIRET with the verbatim INSEE payload; the on-app `sync_sirene_worker` drains rows past its checkpoint,
    runs the SIRENE Anti-Corruption Layer and registers/closes restaurants via the normal write path.
    Detect-by-absence deletion uses `last_seen_at` + the explicit `etat` (etatAdministratifEtablissement).
    Scope: all active food-service NAF (56.10A/B/C + 56.30Z) across France; the ingestion partitions its
    INSEE queries by `department` when the deep-pagination cap bites.
  columns:
    siret:         { type: text, pk: true }                 # 14-digit SIRET — the idempotent external key
    payload:       { type: jsonb }                          # raw INSEE établissement record, verbatim
    etat:          { type: text, index: true }              # etatAdministratifEtablissement (A=active / F=closed)
    naf:           { type: text, index: true }              # activitePrincipale (56.10A/B/C, 56.30Z)
    department:    { type: text, index: true }              # code département — partitioned sweeps + worker batching
    first_seen_at: { type: timestamptz }                    # when this SIRET first appeared in a sync
    last_seen_at:  { type: timestamptz, index: true }       # latest sync that saw it — drives detect-by-absence
    sync_run_id:   { type: uuid }                           # correlates all rows touched by one ingestion run
    processed_at:  { type: timestamptz, nullable: true }    # worker high-water mark: NULL / < last_seen_at ⇒ pending
