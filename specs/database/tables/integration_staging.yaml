version: 4
description: >
  Raw-integration STAGING tables (ADR-0045, generalized by ADR-20260720-015400) — a third table
  category alongside the event store (eventstore.yaml), the event-fed projections
  (projection_tables.yaml / projection_views.yaml) and the seeded reference/config tables
  (referential.yaml). A staging table is ADAPTER-OWNED: the landing zone for RAW external records
  (CI-ingested mirrors like SIRENE, or verified webhook payloads like Stripe/HubRise) kept for the
  exclusive needs of adaptation — dedupe, verification provenance, replay/backfill. It is NOT
  projected from `domain_events` and NOT a GraphQL `reads` target (no `reference: true`) — an
  on-app worker/ACL translates rows into ordinary domain commands (SIRENE → RegisterRestaurant,
  HubRise → ImportCatalog) or adapted business events staged in `journals.yaml#/inbound_events`
  (Stripe). The codegen emits its CREATE TABLE + indexes generically like any other
  `database/tables/*.yaml` table; `staging: true` documents the category.

external_sirene_restaurants:
  staging: true
  description: >
    Raw INSEE Sirene établissement mirror (ADR-0045). The scheduled CI ingestion job UPSERTs one row per
    SIRET with the verbatim INSEE payload; the on-app `sync_sirene_worker` drains rows past its checkpoint,
    runs the SIRENE Anti-Corruption Layer and registers/closes restaurants via the normal write path.
    Detect-by-absence deletion uses `last_seen_at` + the explicit `etat` (etatAdministratifEtablissement).
    Scope: all active food-service NAF (56.10A/B/C + 56.30Z) across France; the ingestion partitions its
    INSEE queries by `department` when the deep-pagination cap bites.
    NO RETENTION (ADR-20260721-025159): this is a full mirror — detect-by-absence needs the complete
    row set, and it holds company (not consumer) data; sweep_retention() never touches it.
  columns:
    siret:         { type: text, pk: true }                 # 14-digit SIRET — the idempotent external key
    payload:       { type: jsonb }                          # raw INSEE établissement record, verbatim
    etat:          { type: text, index: true }              # etatAdministratifEtablissement (A=active / F=closed)
    naf:           { type: text, index: true }              # activitePrincipale (56.10A/B/C, 56.30Z)
    department:    { type: text, index: true }              # code département — partitioned sweeps + worker batching
    first_seen_at: { type: timestamptz }                    # when this SIRET first appeared in a sync
    last_seen_at:  { type: timestamptz, index: true }       # latest sync that saw it — drives detect-by-absence
    sync_run_id:   { type: uuid }                           # correlates all rows touched by one ingestion run
    processed_at:  { type: timestamptz, nullable: true }    # worker high-water mark: NULL / < last_seen_at ⇒ pending

external_stripe_events:
  staging: true
  description: >
    Raw VERIFIED Stripe webhook mirror (ADR-20260720-015400). The webhook endpoint UPSERTs one row
    per Stripe event id AFTER raw-body signature verification (ADR-20260718-145856), then the ACL
    translates it into an adapted business event staged in journals.yaml#/inbound_events.
    Redelivery dedupes on the pk and ACKs immediately; processed_at is the translation high-water
    mark, enabling replay/backfill without asking Stripe to resend.
  retention:   # documentary — the executable policy is functions/sweep_retention.sql (ADR-20260721-025159)
    max_age: '90 days'
    applies_to: >
      Processed rows only (processed_at set), aged from processed_at — the replay/backfill horizon,
      and the PII cap on verbatim Stripe payloads. Unprocessed rows are never swept.
  columns:
    stripe_event_id: { type: text, pk: true }                 # Stripe 'evt_…' — the idempotent external key
    event_type:      { type: text, index: true }              # Stripe type, e.g. 'payment_intent.succeeded'
    payload:         { type: jsonb }                          # raw verified Stripe event, verbatim
    received_at:     { type: timestamptz, index: true }
    processed_at:    { type: timestamptz, nullable: true, index: true }   # NULL ⇒ not yet translated into inbound_events

external_avelo37_events:
  staging: true
  description: >
    Raw VERIFIED Avelo37 delivery-partner webhook mirror (ADR-20260720-015400 follow-up, issue #28).
    The webhook endpoint UPSERTs one row per partner event id AFTER raw-body signature verification
    (Stripe-style timestamped HMAC, fail-closed), then the avelo37-acl translates it into an adapted
    business event (DeliveryAcceptedByPartner / DeliveryRejectedByPartner / DeliveryStatusUpdated)
    staged in journals.yaml#/inbound_events. Redelivery dedupes on the pk and ACKs immediately;
    processed_at is the translation high-water mark, enabling replay/backfill without asking the
    partner to resend.
  retention:   # documentary — the executable policy is functions/sweep_retention.sql (ADR-20260721-025159)
    max_age: '90 days'
    applies_to: >
      Processed rows only (processed_at set), aged from processed_at — the replay/backfill horizon,
      and the PII cap on verbatim partner payloads (courier names/phones). Unprocessed rows are
      never swept.
  columns:
    avelo37_event_id: { type: text, pk: true }                # partner event id — the idempotent external key
    event_type:       { type: text, index: true }             # partner type, e.g. 'delivery.accepted'
    payload:          { type: jsonb }                         # raw verified partner event, verbatim
    received_at:      { type: timestamptz, index: true }
    processed_at:     { type: timestamptz, nullable: true, index: true }   # NULL ⇒ not yet translated into inbound_events

external_coopcycle_events:
  staging: true
  description: >
    Raw VERIFIED CoopCycle delivery-partner webhook mirror (ADR-20260721-122910, issue #58) — the
    third DeliveryProvider=PARTNER seam after Avelo37, adopting the same two-layer inbox pattern
    (ADR-20260720-015400). The FEDERATION twist: CoopCycle is many self-hosted co-op instances (one
    per city/co-op), not a single central API — so every row records its originating `instance_id`
    (the co-op instance key from the adapter's registry) and the webhook is verified with THAT
    instance's per-instance secret. The endpoint UPSERTs one row per event AFTER raw-body signature
    verification (Stripe-style timestamped HMAC, fail-closed), then the coopcycle-acl translates it
    into an adapted business event (DeliveryAcceptedByPartner / DeliveryRejectedByPartner /
    DeliveryStatusUpdated) staged in journals.yaml#/inbound_events. Redelivery dedupes on the pk and
    ACKs immediately; processed_at is the translation high-water mark, enabling replay/backfill
    without asking the instance to resend.
  retention:   # documentary — the executable policy is functions/sweep_retention.sql (ADR-20260721-025159)
    max_age: '90 days'
    applies_to: >
      Processed rows only (processed_at set), aged from processed_at — the replay/backfill horizon,
      and the PII cap on verbatim partner payloads (courier names/phones). Unprocessed rows are
      never swept.
  columns:
    coopcycle_event_id: { type: text, pk: true }               # idempotent external key = "{instance_id}:{provider event id}" (federation makes provider ids unique only per instance, so the ACL namespaces it)
    instance_id:        { type: text, index: true }            # originating co-op instance (registry key) — the federation dimension
    event_type:         { type: text, index: true }            # partner type, e.g. 'task.accepted' / 'delivery.status_updated'
    payload:            { type: jsonb }                         # raw verified partner event, verbatim
    received_at:        { type: timestamptz, index: true }
    processed_at:       { type: timestamptz, nullable: true, index: true }   # NULL ⇒ not yet translated into inbound_events

external_uber_direct_events:
  staging: true
  description: >
    Raw VERIFIED Uber Direct delivery-partner webhook mirror (ADR-20260721-172500, issue #57) — a
    DeliveryProvider=PARTNER seam via the Uber DIRECT delivery API (not the Uber Eats marketplace),
    adopting the same two-layer inbox pattern as Avelo37/CoopCycle (ADR-20260720-015400). Uber Direct
    is ONE central API (no CoopCycle-style federation), so there is no instance dimension; the delta
    from the other partners is the signature scheme — Uber signs with a plain X-Uber-Signature =
    hex(HMAC-SHA256(webhook_secret, raw_body)), no timestamp. The endpoint UPSERTs one row per event
    AFTER raw-body signature verification (fail-closed), then the uber_direct-acl translates it into an
    adapted business event (DeliveryAcceptedByPartner / DeliveryRejectedByPartner /
    DeliveryStatusUpdated) staged in journals.yaml#/inbound_events. Redelivery dedupes on the pk and
    ACKs immediately; processed_at is the translation high-water mark, enabling replay/backfill without
    asking Uber to resend.
  retention:   # documentary — the executable policy is functions/sweep_retention.sql (ADR-20260721-025159)
    max_age: '90 days'
    applies_to: >
      Processed rows only (processed_at set), aged from processed_at — the replay/backfill horizon,
      and the PII cap on verbatim partner payloads (courier names/phones). Unprocessed rows are
      never swept.
  columns:
    uber_event_id: { type: text, pk: true }               # idempotent external key = the Uber event id (globally unique on Uber's side)
    event_type:    { type: text, index: true }            # Uber webhook kind, e.g. 'event.delivery_status' / 'event.courier_update'
    payload:       { type: jsonb }                         # raw verified partner event, verbatim
    received_at:   { type: timestamptz, index: true }
    processed_at:  { type: timestamptz, nullable: true, index: true }   # NULL ⇒ not yet translated into inbound_events

external_hubrise_callbacks:
  staging: true
  description: >
    Raw VERIFIED HubRise callback mirror (ADR-20260720-015400). pk is the provider event id when
    present, else a UUIDv5 of the raw body. HubRise callbacks carry no state, so the enrichment leg
    (OAuth pull → ACL → ImportCatalog / stock COMMANDS, journaled with channel WORKER) marks
    processed_at — HubRise yields commands, not inbound_events rows (request/report split).
  retention:   # documentary — the executable policy is functions/sweep_retention.sql (ADR-20260721-025159)
    max_age: '90 days'
    applies_to: >
      Processed rows only (processed_at set), aged from processed_at — the replay/backfill horizon.
      Unprocessed rows (enrichment not yet run) are never swept.
  columns:
    callback_id:   { type: text, pk: true }                   # provider event id, else UUIDv5(raw body)
    resource_type: { type: text, index: true }                # HubRise resource: 'catalog' / 'inventory' / …
    event_type:    { type: text }                             # HubRise event: 'update' / 'create' / …
    location_id:   { type: text, nullable: true, index: true }  # HubRise location — maps to the restaurant/catalog
    payload:       { type: jsonb }                            # raw verified callback body, verbatim
    received_at:   { type: timestamptz, index: true }
    processed_at:  { type: timestamptz, nullable: true, index: true }   # NULL ⇒ enrichment not yet run
