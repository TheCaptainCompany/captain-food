version: 4
description: >
  PROCESS-MANAGER STATE TABLES (ADR pending — process managers as state-table orchestrators).
  One row = one saga run; the pk is the correlation identity of the run. Column `type` is either a SQL
  primitive or a `$ref` into scalars.yaml (mapped to its Postgres type), exactly like every other table
  file. These tables are PRIVATE to their process manager (processmanager.yaml `state_table` $ref):
  no projection reads them and no query serves them — except the narrowly-scoped initiator reads a
  saga explicitly declares (paymentStatus over payment_process_manager, ADR-20260720-015500). They
  exist so a PM run can (a) be idempotent (dedup re-delivered triggers), (b) enforce single-flight via
  optimistic concurrency on the row, and (c) resume after a crash. `last_update_utc` is maintained by
  the runtime envelope, never by a step.

payment_process_manager:
  description: >
    One PlaceOrderProcess checkout run per cart. Created when PlaceOrder creates the Stripe
    PaymentIntent; resolved by the PaymentCaptured / PaymentFailed outcome. The unique
    payment_intent_id correlates the inbound Stripe facts back to the run, and
    last_processed_stripe_event_id dedups Stripe webhook re-delivery. The customer_id/session_id/
    client_secret columns back the initiator-scoped `paymentStatus` read (ADR-20260720-015500):
    a client secret is a revocable Stripe credential, never an event-log fact.
  columns:
    cart_id:                        { type: { $ref: 'scalars.yaml#/CartId' }, pk: true, note: "The cart being checked out — one live run per cart prevents concurrent checkouts." }
    order_id:                       { type: { $ref: 'scalars.yaml#/OrderId' }, note: "Client-generated id of the order the run will materialize on capture." }
    payment_intent_id:              { type: { $ref: 'scalars.yaml#/PaymentIntentId' }, unique: true, note: "Stripe PaymentIntent id; correlates PaymentCaptured/PaymentFailed back to this run." }
    process_status:                 { type: { $ref: 'scalars.yaml#/PaymentProcessStatus' } }
    payment_status:                 { type: { $ref: 'scalars.yaml#/PaymentStatus' } }
    customer_id:                    { type: { $ref: 'scalars.yaml#/CustomerId' }, nullable: true, note: "Checkout owner (null for anonymous) — paymentStatus ownership scope." }
    session_id:                     { type: { $ref: 'scalars.yaml#/SessionId' }, nullable: true, note: "Initiating session (X-SESSION-ID) — anonymous paymentStatus ownership scope." }
    client_secret:                  { type: text, nullable: true, note: "Stripe PaymentIntent client secret served to the initiator by queries/paymentStatus while AWAITING_PAYMENT_RESULT; NULLed when the run resolves. Never event-sourced (credential, not a business fact)." }
    last_processed_stripe_event_id: { type: { $ref: 'scalars.yaml#/ExternalReference' }, nullable: true, note: "Dedup key for Stripe webhook re-delivery." }
    last_update_utc:                { type: timestamptz, note: "Maintained by the runtime envelope." }

refund_process_manager:
  description: >
    One RefundProcess run per order. Opened as PENDING_APPROVAL by a refundable fact
    (rejection / cancellation / customer request); resolved by the restaurant/admin decision
    (ApproveRefund / DenyRefund) and, on approval, by the settled PaymentRefunded fact.
  columns:
    order_id:              { type: { $ref: 'scalars.yaml#/OrderId' }, pk: true, note: "The order being refunded — one live run per order." }
    payment_intent_id:     { type: { $ref: 'scalars.yaml#/PaymentIntentId' }, nullable: true, note: "The captured payment to refund (from the order's payment facts)." }
    refund_id:             { type: { $ref: 'scalars.yaml#/RefundId' }, nullable: true, note: "Stripe refund id, set when PaymentRefunded settles the run." }
    process_status:        { type: { $ref: 'scalars.yaml#/RefundProcessStatus' } }
    approved_amount_cents: { type: { $ref: 'scalars.yaml#/MoneyCents' }, nullable: true, note: "Approved amount (restaurant or admin; may be partial); null until approved." }
    reason:                { type: text, nullable: true, note: "Reason carried by the opening fact / the decision." }
    last_update_utc:       { type: timestamptz, note: "Maintained by the runtime envelope." }

cart_binding_process_manager:
  description: >
    One CartBindingProcess run per identified session: records that the visitor's OPEN carts for
    sessionId were bound to customerId, so a re-delivered CustomerIdentified is a no-op.
  columns:
    session_id:      { type: { $ref: 'scalars.yaml#/SessionId' }, pk: true }
    customer_id:     { type: { $ref: 'scalars.yaml#/CustomerId' }, note: "The customer the session's open carts were bound to." }
    last_update_utc: { type: timestamptz, note: "Maintained by the runtime envelope." }

delivery_dispatch_process_manager:
  description: >
    One DeliveryDispatchProcess run per DELIVERY order. Created on OrderMarkedReady (COLLECTION
    orders never create a row); resolves a dispatch strategy, then walks the city's ranked delivery
    channel list, and closes the order on delivery (#60). A RESTAURANT-dispatch order short-circuits
    to SELF_DISPATCHED (Captain tracks only); a CAPTAIN-dispatch order offers channels in rank order,
    advancing on a decline/timeout/escalate until the list is exhausted, then fails closed.
  columns:
    order_id:        { type: { $ref: 'scalars.yaml#/OrderId' }, pk: true }
    restaurant_id:   { type: { $ref: 'scalars.yaml#/RestaurantId' }, note: "Kept so the close-order leg can send MarkOrderDelivered without re-reading." }
    delivery_job_id: { type: { $ref: 'scalars.yaml#/DeliveryJobId' }, unique: true, note: "Deterministic UUIDv5 from the order id — the idempotency key of the dispatch." }
    process_status:  { type: { $ref: 'scalars.yaml#/DeliveryDispatchProcessStatus' } }
    offer_attempts:  { type: integer, note: "TOTAL offers made across the ranked channel walk (the birth offer = 1). The bound is the ranked list length — each channel is offered once, in rank order; when the walk is exhausted the run closes FAILED (rules.yaml#/DispatchExhaustionFailsClosed, #60 supersedes the ADR-20260720-004556 numeric cap-3)." }
    current_rank:    { type: integer, nullable: true, note: "1-based position in the city's ranked channel walk currently offered; null before the first offer and for a SELF_DISPATCHED run (#60)." }
    current_channel: { type: { $ref: 'scalars.yaml#/DeliveryChannelKey' }, nullable: true, note: "The delivery channel currently offered (the DeliveryChannelCatalog key at current_rank); null before the first offer and for a SELF_DISPATCHED run (#60)." }
    last_update_utc: { type: timestamptz, note: "Maintained by the runtime envelope. Indexed with process_status for the offer-timeout sweep (finds stale OFFERED rows, #60)." }
