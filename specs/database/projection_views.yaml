version: 2
description: >
  Captain.Food GENERATED read-model VIEWS — the `View_*` state-folds the codegen emits as
  `CREATE OR REPLACE VIEW` over domain_events (ADR-0039). Every read model here is a pure fold; the ones
  whose columns are COMPUTED (pricing/tree/score/…) live as materialized tables in
  tables/projection_tables.yaml instead. Naming convention: `View_*` = a SQL VIEW (this file); an
  unprefixed name = a materialized TABLE (projection_tables.yaml). Queries never read `domain_events`;
  they read these read models — a query inherits its return type's binding (api.yaml `types` → `reads`),
  cross-validated against this file. This file is the SOURCE OF TRUTH for each view: source aggregate
  (actors.yaml), feeding events (`$ref` into events.yaml), business filters/rules, and columns.

  Conventions:
    - name      : the view name (the top-level key), prefixed `View_` (a generated SQL VIEW).
    - aggregate : primary source aggregate; a projection may fold extra sources (see `note`).
    - slice     : V0 | V1 (release slice).
    - tombstone : `$ref` to the event whose presence drops the row (soft delete).
    - fedBy     : events consumed by the projection (`$ref` into events.yaml).
    - filters / rules : business filters scoping the rows / derivation rules.
    - columns   : a MAP keyed by column name → { type, pk?, unique?, index?, nullable?, fk?, note? }.
                  `type` is ALWAYS a `$ref` into scalars.yaml for a domain scalar/enum
                  (e.g. `{ $ref: 'scalars.yaml#/RestaurantId' }`) — never a bare name string — and an
                  inline SQL primitive ONLY for raw storage types with no domain scalar
                  (text | jsonb | integer | bigint | boolean | timestamptz | numeric).
                  Money = `*_cents` (`{ $ref: 'scalars.yaml#/MoneyCents' }`) + a currency column.
    - fk        : a `$ref` binding to the target column — `{ $ref: '#/View_Name/columns/column' }` —
                  declaring the read-navigation graph (FK → GraphQL relation field). Never a bare string.
    - indexes   : secondary indexes (beyond the PK), each a list of column names.
    Fold column modes (strategy: fold) — how the generator sources each column, inferred from `from`
    unless a mode is declared:
    - scalar-latest (default): the newest event (by position) that carries the column's property, scoped
                  to the declared carrying event types. Set-once fields (property only on the creation
                  event) fall out automatically — no latest-wins hazard.
    - occurrence : a `timestamptz` column whose `from` are whole events (no `/properties/`) →
                  `max(occurred_at)` over them.
    - occurredWhen : conditional occurrence — a list of `{ event, whenPayload?: { key: value } }`;
                  `max(occurred_at)` over events matching any clause (e.g. delivered_at only when
                  DeliveryStatusUpdated=DELIVERED).
    - derive    : status-from-event-type — a map `{ event_type: VALUE | { from: payloadProp } }`; the
                  latest matching lifecycle event decides the value (literal or payload-extracted).

View_RestaurantAccount:
  aggregate: RestaurantAccount
  slice: V0
  internal: true   # admin/back-office + consulted by the RegisterRestaurant handler (account must exist); no public query
  note: "Account read model (HubRise restaurant). Holds account-level facts shared by its locations; locations denormalize default_currency from here."
  # strategy: fold (default) — the codegen GENERATES the CREATE VIEW from the per-column `from` lineage
  # (ADR-0035 #2). Set-once fields (ref, default_currency — Registered only) fall out of the per-column
  # "latest carrying event" rule automatically; updatable fields (legal_name, timezone) take their latest
  # carrying event; updated_at = max(occurred_at). A Deleted event drops the row (tombstone below). This is
  # the exemplar of correct-by-construction folds — the #TODO set-once hazard is now impossible by design.
  tombstone: { $ref: 'events.yaml#/RestaurantAccountDeleted' }
  fedBy:
    - { $ref: 'events.yaml#/RestaurantAccountRegistered' }
    - { $ref: 'events.yaml#/RestaurantAccountUpdated' }
    - { $ref: 'events.yaml#/RestaurantAccountDeleted' }
  columns:
    restaurant_account_id:
      from: [{ $ref: 'events.yaml#/RestaurantAccountRegistered/properties/restaurantAccountId' }]
      pk: true
    ref:
      from: [{ $ref: 'events.yaml#/RestaurantAccountRegistered/properties/ref' }]
      nullable: true
    legal_name:
      from:
        - { $ref: 'events.yaml#/RestaurantAccountRegistered/properties/legalName' }
        - { $ref: 'events.yaml#/RestaurantAccountUpdated/properties/legalName' }
    default_currency:
      from: [{ $ref: 'events.yaml#/RestaurantAccountRegistered/properties/defaultCurrency' }]
    timezone:
      from:
        - { $ref: 'events.yaml#/RestaurantAccountRegistered/properties/timezone' }
        - { $ref: 'events.yaml#/RestaurantAccountUpdated/properties/timezone' }
      nullable: true
# Events deliberately NOT projected into any View_* — transient / saga-internal facts whose data is
# returned synchronously via the mutation payload, never read through a projection.
nonProjectedEvents:
  - { $ref: 'events.yaml#/PaymentIntentCreated' }   # in-flight checkout; clientSecret returned in PlaceOrderPayload, order materializes on capture
  - { $ref: 'events.yaml#/RefundRequested' }        # saga trigger consumed by RefundProcess; the settled PaymentRefunded fact is what gets projected
  - { $ref: 'events.yaml#/DeliveryEscalationRequested' }   # internal dispatch mechanics (#60); advances the ranked walk, feeds no View_*
  - { $ref: 'events.yaml#/DeliveryOfferTimedOut' }         # internal dispatch mechanics (#60); advances the ranked walk, feeds no View_*

# NOTE: OrdersByRestaurant and OrdersByCustomer were folded into the single canonical Order read model
# (OrderTracking, now tables/projection_tables.yaml) — queried by id / customer / restaurant+status via its
# indexes, rather than maintaining per-persona projections (see api.yaml `orders` query + Order binding).

# Delivery operational board (bounded context: delivery) — ADR-0031. One row per DeliveryJob, feeding the
# rider's job list, the restaurant's delivery tracking and admin. status is derived from the lifecycle events.
View_DeliveryJob:
  aggregate: DeliveryJob
  slice: V0
  fedBy:
    - { $ref: 'events.yaml#/DeliveryRequested' }
    - { $ref: 'events.yaml#/DeliveryAcceptedByPartner' }
    - { $ref: 'events.yaml#/DeliveryRejectedByPartner' }
    - { $ref: 'events.yaml#/DeliveryStatusUpdated' }
    - { $ref: 'events.yaml#/DeliveryAcceptedByRider' }
    - { $ref: 'events.yaml#/DeliveryPickedUp' }
    - { $ref: 'events.yaml#/DeliveryCompleted' }
    - { $ref: 'events.yaml#/DeliveryCancelled' }
    - { $ref: 'events.yaml#/DeliveryDispatchFailed' }
  rules:
    - "`status` is derived from the lifecycle events: PENDING on DeliveryRequested → ASSIGNED on DeliveryAcceptedByRider/DeliveryAcceptedByPartner → PICKED_UP on DeliveryPickedUp → then partner DeliveryStatusUpdated (OUT_FOR_DELIVERY/DELIVERED/FAILED) or DeliveryCompleted (DELIVERED) / DeliveryCancelled (CANCELLED) / DeliveryDispatchFailed (FAILED — offer cap exhausted, ADR-20260720-004556)."
    - "`provider` is INDEPENDENT once a rider accepts, PARTNER once a partner accepts."
  indexes:
    - [restaurant_id, status]   # restaurant delivery board
    - [rider_id, status]        # rider's assigned/available jobs
  columns:
    delivery_job_id:
      from: [{ $ref: 'events.yaml#/DeliveryRequested/properties/deliveryJobId' }]
      pk: true
    order_id:
      from: [{ $ref: 'events.yaml#/DeliveryRequested/properties/orderId' }]
      index: true
      fk: { $ref: 'database/tables/projection_tables.yaml#/OrderTracking/columns/order_id' }
    restaurant_id:
      from: [{ $ref: 'events.yaml#/DeliveryRequested/properties/restaurantId' }]
      fk: { $ref: 'database/tables/projection_tables.yaml#/Restaurant/columns/restaurant_id' }
    status:
      type: { $ref: 'scalars.yaml#/DeliveryStatus' }
      # status-from-event-type: the latest lifecycle event decides the status. DeliveryStatusUpdated carries
      # the concrete status in its payload; the others map by type.
      derive:
        DeliveryRequested: PENDING
        DeliveryAcceptedByRider: ASSIGNED
        DeliveryAcceptedByPartner: ASSIGNED
        DeliveryPickedUp: PICKED_UP
        DeliveryStatusUpdated: { from: status }
        DeliveryCompleted: DELIVERED
        DeliveryCancelled: CANCELLED
        DeliveryDispatchFailed: FAILED
      from:
        - { $ref: 'events.yaml#/DeliveryRequested' }
        - { $ref: 'events.yaml#/DeliveryAcceptedByRider' }
        - { $ref: 'events.yaml#/DeliveryAcceptedByPartner' }
        - { $ref: 'events.yaml#/DeliveryPickedUp' }
        - { $ref: 'events.yaml#/DeliveryStatusUpdated' }
        - { $ref: 'events.yaml#/DeliveryCompleted' }
        - { $ref: 'events.yaml#/DeliveryCancelled' }
        - { $ref: 'events.yaml#/DeliveryDispatchFailed' }
      note: "Derived from the lifecycle event type / DeliveryStatusUpdated.status (DeliveryDispatchFailed → FAILED, the offer-cap exhaustion)."
    provider:
      type: { $ref: 'scalars.yaml#/DeliveryProvider' }
      derive:
        DeliveryAcceptedByRider: INDEPENDENT
        DeliveryAcceptedByPartner: PARTNER
      from:
        - { $ref: 'events.yaml#/DeliveryAcceptedByRider' }
        - { $ref: 'events.yaml#/DeliveryAcceptedByPartner' }
      nullable: true
      note: "INDEPENDENT (rider accepted) or PARTNER (partner accepted); null while PENDING."
    rider_id:
      type: { $ref: 'scalars.yaml#/RiderId' }
      from:
        - { $ref: 'events.yaml#/DeliveryAcceptedByRider/properties/riderId' }
      nullable: true
      note: "Set for an independent-rider delivery; null for a partner delivery."
    courier:
      type: jsonb
      from:
        - { $ref: 'events.yaml#/DeliveryAcceptedByPartner/properties/courier' }
      nullable: true
      note: "Courier { displayName, phone?, riderId? }; from the partner on acceptance (independent rider is in rider_id)."
    partner_ref:
      type: { $ref: 'scalars.yaml#/ExternalReference' }
      from: [{ $ref: 'events.yaml#/DeliveryAcceptedByPartner/properties/partnerRef' }]
      nullable: true
      note: "Partner-side delivery id; idempotent key for inbound updates."
    pickup_address:
      type: jsonb
      from: [{ $ref: 'events.yaml#/DeliveryRequested/properties/pickup' }]
    dropoff_address:
      type: jsonb
      from: [{ $ref: 'events.yaml#/DeliveryRequested/properties/dropoff' }]
    estimated_pickup_at:
      type: timestamptz
      from: [{ $ref: 'events.yaml#/DeliveryAcceptedByPartner/properties/estimatedPickupAt' }]
      nullable: true
    estimated_dropoff_at:
      type: timestamptz
      from: [{ $ref: 'events.yaml#/DeliveryAcceptedByPartner/properties/estimatedDropoffAt' }]
      nullable: true
    requested_at:
      type: timestamptz
      from: [{ $ref: 'events.yaml#/DeliveryRequested' }]
      note: "DeliveryRequested occurrence time."
    picked_up_at:
      type: timestamptz
      from: [{ $ref: 'events.yaml#/DeliveryPickedUp' }]
      nullable: true
    delivered_at:
      type: timestamptz
      occurredWhen:
        - { event: DeliveryCompleted }
        - { event: DeliveryStatusUpdated, whenPayload: { status: DELIVERED } }
      from:
        - { $ref: 'events.yaml#/DeliveryCompleted' }
        - { $ref: 'events.yaml#/DeliveryStatusUpdated' }
      nullable: true
      note: "Set on DeliveryCompleted or DeliveryStatusUpdated=DELIVERED (conditional occurrence)."
    last_partner_rejection:
      type: text
      from: [{ $ref: 'events.yaml#/DeliveryRejectedByPartner/properties/reason' }]
      nullable: true
      note: "Reason of the latest partner decline (the job stays PENDING and is re-offered, up to the 3-offer cap — ADR-20260720-004556); null if never rejected."
# Delivery-delay satisfaction (#62) — one row per SURVEYED order, folding the customer's timeliness
# verdict (DeliverySatisfactionRecorded on the Order stream). Feeds the restaurant-facing timeliness
# insight (restaurantDeliverySatisfaction): the subjective signal behind "is self-dispatch still worth
# it?" A row exists only once the customer answers; restaurant_id/timeliness come straight off the fact.
View_DeliverySatisfaction:
  aggregate: Order
  slice: V1
  fedBy:
    - { $ref: 'events.yaml#/DeliverySatisfactionRecorded' }
  rules:
    - "One row per order, present only once the customer has answered the survey (DeliverySatisfactionRecorded); record-once, so the fold never sees a second answer."
    - "`timeliness` is the customer's verdict (ON_TIME / ACCEPTABLE_DELAY / TOO_LATE); the restaurant reads it, filtered by restaurant_id, to weigh self-dispatch vs Captain routing."
  indexes:
    - [restaurant_id, timeliness]   # the restaurant's timeliness breakdown
  columns:
    order_id:
      from: [{ $ref: 'events.yaml#/DeliverySatisfactionRecorded/properties/orderId' }]
      pk: true
    restaurant_id:
      from: [{ $ref: 'events.yaml#/DeliverySatisfactionRecorded/properties/restaurantId' }]
      index: true
    timeliness:
      type: { $ref: 'scalars.yaml#/DeliveryTimeliness' }
      from: [{ $ref: 'events.yaml#/DeliverySatisfactionRecorded/properties/timeliness' }]
    reason:
      type: { $ref: 'scalars.yaml#/DeliveryDissatisfactionReason' }
      from: [{ $ref: 'events.yaml#/DeliverySatisfactionRecorded/properties/reason' }]
      nullable: true
    recorded_at:
      type: timestamptz
      from: [{ $ref: 'events.yaml#/DeliverySatisfactionRecorded' }]
      note: "DeliverySatisfactionRecorded occurrence time."

# Delivery partner self-registration (#61) — one row per DeliveryPartnerRegistration: a partner's declared
# availability to serve a city on a catalog channel, with its review status. Feeds the EXTERNAL/admin
# `deliveryPartnerAvailabilities` query; the APPROVED subset is what the #60 city dispatch ranking will
# consume (that wiring is a follow-up).
View_DeliveryPartnerAvailability:
  aggregate: DeliveryPartnerRegistration
  slice: V1
  fedBy:
    - { $ref: 'events.yaml#/DeliveryPartnerAvailabilityRequested' }
    - { $ref: 'events.yaml#/DeliveryPartnerAvailabilityApproved' }
    - { $ref: 'events.yaml#/DeliveryPartnerAvailabilityRevoked' }
  rules:
    - "`status` is derived from the latest lifecycle event type: PENDING on Requested → APPROVED on Approved → REVOKED on Revoked."
    - "Set-once identity fields (channel, city_id, partner_name, contact_email) are carried only by the Requested birth fact."
  indexes:
    - [city_id, status]   # the city's approved partners; the dispatch-ranking follow-up filters status = APPROVED
    - [channel]
  columns:
    registration_id:
      from: [{ $ref: 'events.yaml#/DeliveryPartnerAvailabilityRequested/properties/registrationId' }]
      pk: true
    channel:
      from: [{ $ref: 'events.yaml#/DeliveryPartnerAvailabilityRequested/properties/channel' }]
    city_id:
      from: [{ $ref: 'events.yaml#/DeliveryPartnerAvailabilityRequested/properties/cityId' }]
      index: true
    partner_name:
      from: [{ $ref: 'events.yaml#/DeliveryPartnerAvailabilityRequested/properties/partnerName' }]
    contact_email:
      from: [{ $ref: 'events.yaml#/DeliveryPartnerAvailabilityRequested/properties/contactEmail' }]
    status:
      type: { $ref: 'scalars.yaml#/CityAvailabilityStatus' }
      derive:
        DeliveryPartnerAvailabilityRequested: PENDING
        DeliveryPartnerAvailabilityApproved: APPROVED
        DeliveryPartnerAvailabilityRevoked: REVOKED
      from:
        - { $ref: 'events.yaml#/DeliveryPartnerAvailabilityRequested' }
        - { $ref: 'events.yaml#/DeliveryPartnerAvailabilityApproved' }
        - { $ref: 'events.yaml#/DeliveryPartnerAvailabilityRevoked' }
      note: "Derived from the latest lifecycle event type."
    requested_at:
      type: timestamptz
      from: [{ $ref: 'events.yaml#/DeliveryPartnerAvailabilityRequested' }]
      note: "occurrence: max(occurred_at) of the birth fact."
    decided_at:
      type: timestamptz
      nullable: true
      from:
        - { $ref: 'events.yaml#/DeliveryPartnerAvailabilityApproved' }
        - { $ref: 'events.yaml#/DeliveryPartnerAvailabilityRevoked' }
      note: "occurrence: max(occurred_at) of the latest decision (approve/revoke); null while PENDING."
# Refund queue (RefundProcess) — the pendingRefunds read model. One row per refund opened on a captured
# payment (RefundOpened, delivered by RefundProcess to the Payment aggregate), folded with the decision
# and settlement facts recorded on the same Payment stream. The full lifecycle stays in the view
# (REQUESTED → APPROVED/DENIED → REFUNDED); a "pending" consumer filters status = REQUESTED.
View_PendingRefunds:
  aggregate: Payment
  slice: V0
  fedBy:
    - { $ref: 'events.yaml#/RefundOpened' }
    - { $ref: 'events.yaml#/RefundApproved' }
    - { $ref: 'events.yaml#/RefundDenied' }
    - { $ref: 'events.yaml#/PaymentRefunded' }
  rules:
    - "A row exists only for a refund actually opened for decision: RefundOpened is delivered by RefundProcess ONLY when the order's payment is CAPTURED (the guard lives in the saga, so the fold needs no payment-status filter)."
    - "`status` is derived from the lifecycle events: REQUESTED on RefundOpened → APPROVED on RefundApproved (Stripe refund requested) or DENIED on RefundDenied → REFUNDED on PaymentRefunded (Stripe settled)."
    - "`amount_cents` is the captured order total eligible for refund; `approved_amount_cents` is the (possibly partial) approved amount, null until approved."
  indexes:
    - [restaurant_id, status]   # the restaurant's refund queue (pendingRefunds, status = REQUESTED)
  columns:
    order_id:
      from: [{ $ref: 'events.yaml#/RefundOpened/properties/orderId' }]
      pk: true
      fk: { $ref: 'database/tables/projection_tables.yaml#/OrderTracking/columns/order_id' }
    restaurant_id:
      from: [{ $ref: 'events.yaml#/RefundOpened/properties/restaurantId' }]
      index: true
      fk: { $ref: 'database/tables/projection_tables.yaml#/Restaurant/columns/restaurant_id' }
    status:
      type: { $ref: 'scalars.yaml#/RefundStatus' }
      derive:
        RefundOpened: REQUESTED
        RefundApproved: APPROVED
        RefundDenied: DENIED
        PaymentRefunded: REFUNDED
      from:
        - { $ref: 'events.yaml#/RefundOpened' }
        - { $ref: 'events.yaml#/RefundApproved' }
        - { $ref: 'events.yaml#/RefundDenied' }
        - { $ref: 'events.yaml#/PaymentRefunded' }
      note: "Derived from the latest lifecycle event type."
    amount_cents:
      type: { $ref: 'scalars.yaml#/MoneyCents' }
      from: [{ $ref: 'events.yaml#/RefundOpened/properties/amount' }]
      note: "amountCents of RefundOpened.amount (Money) — the captured total eligible for refund."
    currency:
      type: { $ref: 'scalars.yaml#/CurrencyCode' }
      from: [{ $ref: 'events.yaml#/RefundOpened/properties/amount' }]
      note: "currency of RefundOpened.amount (Money)."
    approved_amount_cents:
      type: { $ref: 'scalars.yaml#/MoneyCents' }
      from: [{ $ref: 'events.yaml#/RefundApproved/properties/amount' }]
      nullable: true
      note: "amountCents of RefundApproved.amount (Money — may be partial); null until approved."
    reason:
      type: text
      from:
        - { $ref: 'events.yaml#/RefundOpened/properties/reason' }
        - { $ref: 'events.yaml#/RefundApproved/properties/reason' }
        - { $ref: 'events.yaml#/RefundDenied/properties/reason' }
      nullable: true
      note: "The latest recorded reason: the opening fact's, then the decision's."
    refund_id:
      type: { $ref: 'scalars.yaml#/RefundId' }
      from: [{ $ref: 'events.yaml#/PaymentRefunded/properties/refundId' }]
      nullable: true
      note: "The Stripe Refund id once settled; null before PaymentRefunded."
    requested_at:
      type: timestamptz
      from: [{ $ref: 'events.yaml#/RefundOpened' }]
      note: "RefundOpened occurrence time."
    decided_at:
      type: timestamptz
      from:
        - { $ref: 'events.yaml#/RefundApproved' }
        - { $ref: 'events.yaml#/RefundDenied' }
      nullable: true
      note: "The decision's occurrence time (approval or denial); null while REQUESTED."
