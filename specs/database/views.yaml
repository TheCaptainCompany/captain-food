version: 1
description: >
  Captain.Food READ MODELS — the `View_*` projection (read) tables. Queries never read
  `domain_events`; they read these denormalized, query-shaped tables, rebuilt from the event log by
  projections. This file is the SOURCE OF TRUTH for each view: its primary source aggregate
  (actors.yaml), the events that feed it (`$ref` into events.yaml), its business filters/rules, and
  its columns. The query → view mapping is NOT here — a query inherits its return type's binding
  (api.yaml `types` → `reads`), cross-validated against this file.

  Conventions:
    - name      : the table name (the top-level key), prefixed `View_` (denormalized/rebuildable,
                  never a normalized table).
    - aggregate : primary source aggregate; a projection may fold extra sources (see `note`).
    - slice     : V0 | V1 (release slice).
    - fedBy     : events consumed by the projection (`$ref` into events.yaml).
    - filters / rules : business filters scoping the rows / derivation rules.
    - columns   : a MAP keyed by column name → { type, pk?, unique?, index?, nullable?, fk?, note? }.
                  `type` is ALWAYS a `$ref` into scalars.yaml for a domain scalar/enum
                  (e.g. `{ $ref: 'scalars.yaml#/RestaurantId' }`) — never a bare name string — and an
                  inline SQL primitive ONLY for raw storage types with no domain scalar
                  (text | jsonb | integer | bigint | boolean | timestamptz | numeric).
                  Money = `*_cents` (`{ $ref: 'scalars.yaml#/MoneyCents' }`) + a currency column.
    - fk        : a `$ref` binding to the target column — `{ $ref: '#/View_Name/columns/column' }` —
                  declaring the read-navigation graph (FK → GraphQL relation field). Never a bare string.
    - indexes   : secondary indexes (beyond the PK), each a list of column names.

View_RestaurantAccount:
  aggregate: RestaurantAccount
  slice: V0
  internal: true   # admin/back-office + consulted by the RegisterRestaurant handler (account must exist); no public query
  note: "Account read model (HubRise restaurant). Holds account-level facts shared by its locations; locations denormalize default_currency from here."
  # SQL VIEW over the log (ADR-0035 #2). Each column is sourced from ITS declared `from` events (below):
  # set-once fields (ref, default_currency — Registered only) come from the Registered event even if a
  # later Updated exists; updatable fields (legal_name, timezone) take the latest event that carries them.
  # A Deleted event drops the row. (See #TODO lesson: never assume latest-event-wins for set-once fields.)
  definition: |
    SELECT
      (reg.payload->>'restaurantAccountId')::uuid AS restaurant_account_id,
      reg.payload->>'ref'                         AS ref,               -- set once at registration
      reg.payload->>'defaultCurrency'             AS default_currency,  -- set once at registration
      (SELECT u.payload->>'legalName' FROM domain_events u
         WHERE u.stream_name = reg.stream_name AND u.payload ? 'legalName'
         ORDER BY u.position DESC LIMIT 1)         AS legal_name,        -- latest carrying event
      (SELECT u.payload->>'timezone' FROM domain_events u
         WHERE u.stream_name = reg.stream_name AND u.payload ? 'timezone'
         ORDER BY u.position DESC LIMIT 1)         AS timezone,
      (SELECT max(w.occurred_at) FROM domain_events w WHERE w.stream_name = reg.stream_name) AS updated_at
    FROM domain_events reg
    WHERE reg.event_type = 'RestaurantAccountRegistered'
      AND NOT EXISTS (SELECT 1 FROM domain_events d
                      WHERE d.stream_name = reg.stream_name AND d.event_type = 'RestaurantAccountDeleted')
  fedBy:
    - { $ref: 'events.yaml#/RestaurantAccountRegistered' }
    - { $ref: 'events.yaml#/RestaurantAccountUpdated' }
    - { $ref: 'events.yaml#/RestaurantAccountDeleted' }
  columns:
    restaurant_account_id:
      from: [{ $ref: 'events.yaml#/RestaurantAccountRegistered/properties/restaurantAccountId' }]
      pk: true
    ref:
      from: [{ $ref: 'events.yaml#/RestaurantAccountRegistered/properties/ref' }]
      nullable: true
    legal_name:
      from:
        - { $ref: 'events.yaml#/RestaurantAccountRegistered/properties/legalName' }
        - { $ref: 'events.yaml#/RestaurantAccountUpdated/properties/legalName' }
    default_currency:
      from: [{ $ref: 'events.yaml#/RestaurantAccountRegistered/properties/defaultCurrency' }]
    timezone:
      from:
        - { $ref: 'events.yaml#/RestaurantAccountRegistered/properties/timezone' }
        - { $ref: 'events.yaml#/RestaurantAccountUpdated/properties/timezone' }
      nullable: true
    updated_at:
      type: timestamptz
      from:
        - { $ref: 'events.yaml#/RestaurantAccountRegistered' }
        - { $ref: 'events.yaml#/RestaurantAccountUpdated' }
      note: "Row write time, stamped on each event."

View_Restaurant:
  aggregate: Restaurant
  slice: V0
  fedBy:
    - { $ref: 'events.yaml#/RestaurantRegistered' }
    - { $ref: 'events.yaml#/RestaurantUpdated' }
    - { $ref: 'events.yaml#/RestaurantActivated' }
    - { $ref: 'events.yaml#/RestaurantDeactivated' }
    - { $ref: 'events.yaml#/RestaurantAcceptanceModeChanged' }
    - { $ref: 'events.yaml#/RestaurantRemoved' }
    - { $ref: 'events.yaml#/RestaurantGoogleBusinessProfileUpdated' }
    - { $ref: 'events.yaml#/RestaurantListingClaimed' }
    - { $ref: 'events.yaml#/RestaurantListingOptedOut' }
    - { $ref: 'events.yaml#/RestaurantMarkedClosed' }
    - { $ref: 'events.yaml#/RestaurantListingStatusChanged' }
    - { $ref: 'events.yaml#/RestaurantGoogleBusinessProfileOrderLinkConfigured' }
    - { $ref: 'events.yaml#/RestaurantGoogleBusinessProfileOrderLinkVerified' }
    - { $ref: 'events.yaml#/RestaurantAccountRegistered' }   # folds the account's default_currency onto its locations
  columns:
    restaurant_id:
      from: [{ $ref: 'events.yaml#/RestaurantRegistered/properties/restaurantId' }]
      pk: true
    restaurant_account_id:
      from:
        - { $ref: 'events.yaml#/RestaurantRegistered/properties/accountId' }
        - { $ref: 'events.yaml#/RestaurantListingClaimed/properties/accountId' }
      index: true
      nullable: true
      fk: { $ref: '#/View_RestaurantAccount/columns/restaurant_account_id' }
      note: "NULL for a non-partner public listing; set on claim/conversion."
    listing_status:
      type: { $ref: 'scalars.yaml#/RestaurantListingStatus' }
      from:
        - { $ref: 'events.yaml#/RestaurantRegistered/properties/listingStatus' }
        - { $ref: 'events.yaml#/RestaurantListingStatusChanged/properties/listingStatus' }
      index: true
    external_identifiers:
      type: jsonb
      from: [{ $ref: 'events.yaml#/RestaurantRegistered/properties/externalIdentifiers' }]
      nullable: true
      note: "Source-agnostic [{key,value}] (siret/naf/google_place_id…); not unique."
    google_place_id:
      from:
        - { $ref: 'events.yaml#/RestaurantGoogleBusinessProfileUpdated/properties/googlePlaceId' }
      type: { $ref: 'scalars.yaml#/GooglePlaceId' }
      nullable: true
    slug:
      from: [{ $ref: 'events.yaml#/RestaurantRegistered/properties/slug' }]
      unique: true
    display_name:
      from:
        - { $ref: 'events.yaml#/RestaurantRegistered/properties/displayName' }
        - { $ref: 'events.yaml#/RestaurantUpdated/properties/displayName' }
    description:
      type: text
      nullable: true
      note: "⚠️ HOLE: no event carries a restaurant description — nothing populates this column yet."
    tags:
      type: jsonb
      from:
        - { $ref: 'events.yaml#/RestaurantRegistered/properties/tags' }
        - { $ref: 'events.yaml#/RestaurantUpdated/properties/tags' }
      nullable: true
      note: "Cuisine/attribute tags — general restaurant info (source-agnostic), not from the GBP event."
    margin_rate:
      type: { $ref: 'scalars.yaml#/MarginPercent' }
      from:
        - { $ref: 'events.yaml#/RestaurantRegistered/properties/marginRate' }
        - { $ref: 'events.yaml#/RestaurantUpdated/properties/marginRate' }
      nullable: true
      note: "Food margin %, input to the Captain service-fee split (ADR-0017); back-office only."
    cuisine_category:
      type: { $ref: 'scalars.yaml#/CuisineCategory' }
      from:
        - { $ref: 'events.yaml#/RestaurantRegistered/properties/cuisineCategory' }
        - { $ref: 'events.yaml#/RestaurantUpdated/properties/cuisineCategory' }
      nullable: true
      note: "Selects the Uber Eats price-estimate coefficient in View_UberEstimationPolicy (ADR-0024)."
    uber_prices_opt_in:
      type: boolean
      from:
        - { $ref: 'events.yaml#/RestaurantRegistered/properties/uberPricesOptIn' }
        - { $ref: 'events.yaml#/RestaurantUpdated/properties/uberPricesOptIn' }
      nullable: true
      note: "Restaurant authorized showing its real Uber prices via HubRise (ADR-0023). Gates REAL vs ESTIMATED basis."
    website:
      type: { $ref: 'scalars.yaml#/WebUrl' }
      from:
        - { $ref: 'events.yaml#/RestaurantRegistered/properties/website' }
        - { $ref: 'events.yaml#/RestaurantUpdated/properties/website' }
      nullable: true
    rating:
      type: { $ref: 'scalars.yaml#/GoogleRating' }
      from: [{ $ref: 'events.yaml#/RestaurantGoogleBusinessProfileUpdated/properties/rating' }]
      nullable: true
      note: "GBP-specific metric (Google listing), independent of the restaurant's own info."
    reviews_count:
      type: integer
      from: [{ $ref: 'events.yaml#/RestaurantGoogleBusinessProfileUpdated/properties/reviewsCount' }]
      nullable: true
    gbp_order_url:
      type: { $ref: 'scalars.yaml#/WebUrl' }
      from: [{ $ref: 'events.yaml#/RestaurantGoogleBusinessProfileOrderLinkConfigured/properties/gbpOrderUrl' }]
      nullable: true
    gbp_link_status:
      type: { $ref: 'scalars.yaml#/GbpLinkStatus' }
      from: [{ $ref: 'events.yaml#/RestaurantGoogleBusinessProfileOrderLinkVerified/properties/status' }]
      nullable: true
    address:
      from:
        - { $ref: 'events.yaml#/RestaurantRegistered/properties/address' }
        - { $ref: 'events.yaml#/RestaurantUpdated/properties/address' }
    location:
      from:
        - { $ref: 'events.yaml#/RestaurantRegistered/properties/location' }
        - { $ref: 'events.yaml#/RestaurantUpdated/properties/location' }
      nullable: true
      note: "Geo coordinates {latitude, longitude}; typically from the Google Maps sync."
    opening_hours:
      from:
        - { $ref: 'events.yaml#/RestaurantRegistered/properties/openingHours' }
        - { $ref: 'events.yaml#/RestaurantUpdated/properties/openingHours' }
    status:
      type: { $ref: 'scalars.yaml#/RestaurantStatus' }
      from:
        - { $ref: 'events.yaml#/RestaurantRegistered' }
        - { $ref: 'events.yaml#/RestaurantActivated' }
        - { $ref: 'events.yaml#/RestaurantDeactivated' }
        - { $ref: 'events.yaml#/RestaurantRemoved' }
        - { $ref: 'events.yaml#/RestaurantMarkedClosed' }
      note: "Derived from the lifecycle event type: DRAFT on register, ACTIVE/INACTIVE on (de)activation, INACTIVE on closure."
    order_acceptance:
      from: [{ $ref: 'events.yaml#/RestaurantAcceptanceModeChanged/properties/mode' }]
    default_currency:
      from: [{ $ref: 'events.yaml#/RestaurantAccountRegistered/properties/defaultCurrency' }]
    timezone:
      from:
        - { $ref: 'events.yaml#/RestaurantRegistered/properties/timezone' }
        - { $ref: 'events.yaml#/RestaurantUpdated/properties/timezone' }
      nullable: true
      note: "Location timezone; falls back to the account's when null."
    preparation_time_minutes:
      from:
        - { $ref: 'events.yaml#/RestaurantRegistered/properties/preparationTimeMinutes' }
        - { $ref: 'events.yaml#/RestaurantUpdated/properties/preparationTimeMinutes' }
      nullable: true
    updated_at:
      type: timestamptz
      from:
        - { $ref: 'events.yaml#/RestaurantRegistered' }
        - { $ref: 'events.yaml#/RestaurantUpdated' }
        - { $ref: 'events.yaml#/RestaurantActivated' }
        - { $ref: 'events.yaml#/RestaurantDeactivated' }
        - { $ref: 'events.yaml#/RestaurantAcceptanceModeChanged' }
        - { $ref: 'events.yaml#/RestaurantGoogleBusinessProfileUpdated' }
        - { $ref: 'events.yaml#/RestaurantListingClaimed' }
        - { $ref: 'events.yaml#/RestaurantListingOptedOut' }
        - { $ref: 'events.yaml#/RestaurantMarkedClosed' }
        - { $ref: 'events.yaml#/RestaurantListingStatusChanged' }
        - { $ref: 'events.yaml#/RestaurantGoogleBusinessProfileOrderLinkConfigured' }
        - { $ref: 'events.yaml#/RestaurantGoogleBusinessProfileOrderLinkVerified' }
      note: "Row write time, stamped on each event."

View_ProspectionPipeline:
  aggregate: Prospect
  slice: V1
  note: "B2B prospection pipeline (ADR-0020): one row per worked listing, with the COMPUTED score and outreach state. Read by the admin prospectionPipeline query."
  fedBy:
    - { $ref: 'events.yaml#/RestaurantRegistered' }
    - { $ref: 'events.yaml#/RestaurantGoogleBusinessProfileUpdated' }
    - { $ref: 'events.yaml#/RestaurantListingStatusChanged' }
    - { $ref: 'events.yaml#/ProspectContacted' }
    - { $ref: 'events.yaml#/ProspectMarkedCold' }
    - { $ref: 'events.yaml#/ProspectReplied' }
  filters:
    - "Rows for NON_PARTNER / PASSIVE_PARTNER listings (active prospects); CONVERTED once ACTIVE_PARTNER."
  rules:
    - "`score` (0–10) is COMPUTED by the projection from listing facts, NEVER stored in an event: food-truck NAF 56.10C +3, Google rating ≥4.0 +2, reviews <20 +2, created <12mo +2, no website +1, already on Uber/Deliveroo −2, national franchise −3; clamped to 0–10."
    - "Inputs not yet captured as fields (Sirene creation date, on-aggregator, national franchise) are best-effort/V1; the formula degrades gracefully to the available signals."
    - "`pipeline_status` is derived: NEW (no contact) → CONTACTED → COLD (ProspectMarkedCold) / REPLIED (ProspectReplied); CONVERTED when RestaurantListingStatusChanged reaches ACTIVE_PARTNER."
  columns:
    restaurant_id:
      from: [{ $ref: 'events.yaml#/RestaurantRegistered/properties/restaurantId' }]
      pk: true
      fk: { $ref: '#/View_Restaurant/columns/restaurant_id' }
    score:
      type: { $ref: 'scalars.yaml#/ProspectionScore' }
      from:
        - { $ref: 'events.yaml#/RestaurantRegistered/properties/externalIdentifiers' }
        - { $ref: 'events.yaml#/RestaurantRegistered/properties/website' }
        - { $ref: 'events.yaml#/RestaurantGoogleBusinessProfileUpdated/properties/rating' }
        - { $ref: 'events.yaml#/RestaurantGoogleBusinessProfileUpdated/properties/reviewsCount' }
      index: true
      note: "Derived (see rules); not an event field."
    pipeline_status:
      type: { $ref: 'scalars.yaml#/ProspectPipelineStatus' }
      from:
        - { $ref: 'events.yaml#/ProspectContacted' }
        - { $ref: 'events.yaml#/ProspectMarkedCold' }
        - { $ref: 'events.yaml#/ProspectReplied' }
        - { $ref: 'events.yaml#/RestaurantListingStatusChanged' }
      index: true
      note: "Derived from the prospect events + listingStatus (see rules)."
    contacts_count:
      type: integer
      from: [{ $ref: 'events.yaml#/ProspectContacted' }]
      note: "Count of ProspectContacted; drives the anti-spam ≤3 rule."
    last_contacted_at:
      type: timestamptz
      from: [{ $ref: 'events.yaml#/ProspectContacted' }]
      nullable: true
    replied_at:
      type: timestamptz
      from: [{ $ref: 'events.yaml#/ProspectReplied' }]
      nullable: true

# Events deliberately NOT projected into any View_* — transient / saga-internal facts whose data is
# returned synchronously via the mutation payload, never read through a projection.
nonProjectedEvents:
  - { $ref: 'events.yaml#/PaymentIntentCreated' }   # in-flight checkout; clientSecret returned in PlaceOrderPayload, order materializes on capture
  - { $ref: 'events.yaml#/RefundRequested' }        # saga trigger consumed by RefundProcess; the settled PaymentRefunded fact is what gets projected

View_Customer:
  aggregate: Customer
  slice: V0
  note: "Identity/lookup read model: resolves a returning phone (or auth_ref) to an existing Customer, backs VerifyPhone idempotency + auth resolution, and serves the `me` query (CustomerProfile). Also bound when CustomerIdentified stamps carts. The stored `locale` localizes authenticated SMS/email sends."
  fedBy:
    - { $ref: 'events.yaml#/CustomerRegistered' }
    - { $ref: 'events.yaml#/RestaurantRated' }
    - { $ref: 'events.yaml#/RestaurantFavorited' }
    - { $ref: 'events.yaml#/RestaurantUnfavorited' }
    - { $ref: 'events.yaml#/CustomerInfoUpdated' }
    - { $ref: 'events.yaml#/CustomerEmailVerified' }
    - { $ref: 'events.yaml#/CustomerPhoneChanged' }
    - { $ref: 'events.yaml#/CustomerLanguageChanged' }
    - { $ref: 'events.yaml#/CustomerPreferencesSet' }
    - { $ref: 'events.yaml#/CustomerAddressSet' }
    - { $ref: 'events.yaml#/CustomerAddressRemoved' }
    - { $ref: 'events.yaml#/CustomerPaymentMethodSet' }
  rules:
    - "`ratings` accumulates the customer's own restaurant ratings (from RestaurantRated) so they can see how they rated each restaurant."
    - "`favorite_restaurant_ids` is maintained from RestaurantFavorited/RestaurantUnfavorited; the favoriteRestaurants query joins it to View_Restaurant."
  columns:
    customer_id:
      from: [{ $ref: 'events.yaml#/CustomerRegistered/properties/customerId' }]
      pk: true
    phone:
      from:
        - { $ref: 'events.yaml#/CustomerRegistered/properties/phone' }
        - { $ref: 'events.yaml#/CustomerPhoneChanged/properties/phone' }
      unique: true
    auth_ref:
      from: [{ $ref: 'events.yaml#/CustomerRegistered/properties/authRef' }]
      index: true
      nullable: true
      note: "Auth provider user id (Supabase Auth) → Customer."
    display_name:
      from:
        - { $ref: 'events.yaml#/CustomerRegistered/properties/displayName' }
        - { $ref: 'events.yaml#/CustomerInfoUpdated/properties/displayName' }
      nullable: true
    email:
      from:
        - { $ref: 'events.yaml#/CustomerRegistered/properties/email' }
        - { $ref: 'events.yaml#/CustomerEmailVerified/properties/email' }
      nullable: true
    email_verified:
      type: boolean
      from: [{ $ref: 'events.yaml#/CustomerEmailVerified' }]
      note: "True once an email magic link has been confirmed (CustomerEmailVerified)."
    locale:
      from:
        - { $ref: 'events.yaml#/CustomerRegistered/properties/locale' }
        - { $ref: 'events.yaml#/CustomerLanguageChanged/properties/locale' }
      nullable: true
      note: "i18n culture; set at registration or via ChangeLanguage. Localizes authenticated SMS/email sends."
    timezone:
      from:
        - { $ref: 'events.yaml#/CustomerRegistered/properties/timezone' }
        - { $ref: 'events.yaml#/CustomerPreferencesSet/properties/timezone' }
      nullable: true
    ratings:
      type: jsonb
      from: [{ $ref: 'events.yaml#/RestaurantRated' }]
      note: "The customer's own submitted ratings (assembled from RestaurantRated): [{ order_id, restaurant_id, stars, comment, rated_at }]."
    favorite_restaurant_ids:
      type: jsonb
      from:
        - { $ref: 'events.yaml#/RestaurantFavorited' }
        - { $ref: 'events.yaml#/RestaurantUnfavorited' }
      note: "[restaurant_id] the customer favorited."
    preferences:
      type: jsonb
      from: [{ $ref: 'events.yaml#/CustomerPreferencesSet' }]
      nullable: true
      note: "{ dietary_tags: [...], favorite_cuisines: [...] } from CustomerPreferencesSet."
    addresses:
      type: jsonb
      from:
        - { $ref: 'events.yaml#/CustomerAddressSet' }
        - { $ref: 'events.yaml#/CustomerAddressRemoved' }
      note: "Saved address book: [{ address_id, label, address }] from CustomerAddressSet/Removed."
    payment_method_id:
      from: [{ $ref: 'events.yaml#/CustomerPaymentMethodSet/properties/paymentMethodId' }]
      nullable: true
    updated_at:
      type: timestamptz
      from:
        - { $ref: 'events.yaml#/CustomerRegistered' }
        - { $ref: 'events.yaml#/CustomerInfoUpdated' }
      note: "Row write time, stamped on each event."

# Static REFERENCE read model (not event-fed): seeded at deploy time. `source: reference` exempts it from
# the event-lineage checks and lets it back a query's `reads`. Serves the `phoneCountries` picker query.
View_PhoneCountry:
  source: reference
  slice: V0
  note: "Phone-country reference for the dialing-code picker. The picker emits the `dialing_code` ('+33')."
  columns:
    country:
      type: { $ref: 'scalars.yaml#/CountryCode' }
      pk: true
    dialing_code:
      type: { $ref: 'scalars.yaml#/DialingCode' }
      index: true
    name:
      type: text
    default_locale:
      type: { $ref: 'scalars.yaml#/Locale' }

View_PricingPolicy:
  source: reference
  slice: V0
  note: "Calibratable Captain service-fee policy (ADR-0016/0017). Seeded config the pricing projection reads to compute cart/order breakdowns; transparent + tunable without code. Single active row per currency."
  rules:
    - "Seeded with ADR-0017 indicative values: fee_rate 5.0, buyer_share 60.0, margin_low 55.0, margin_high 70.0. Calibrate by simulation before launch."
  columns:
    currency:
      type: { $ref: 'scalars.yaml#/CurrencyCode' }
      pk: true
    fee_rate:
      type: numeric
      note: "Service fee F as a % of food TTC (e.g. 5.0)."
    buyer_share:
      type: numeric
      note: "Share of F charged to the buyer (e.g. 60.0); the rest is the restaurant's margin-scaled contribution."
    margin_low:
      type: numeric
      note: "Lower bound of the margin band for score_margin (e.g. 55.0)."
    margin_high:
      type: numeric
      note: "Upper bound of the margin band for score_margin (e.g. 70.0)."
    effective_from:
      type: timestamptz
      note: "When this policy row took effect (audit / calibration history)."

# Calibratable Uber Eats mark-up coefficients (ADR-0024), keyed by cuisine. The catalog/cart/order
# projections read this (plus the restaurant's cuisine_category) to compute the ESTIMATED comparison
# when no real HubRise price is available. Reference data — tunable without code.
View_UberEstimationPolicy:
  source: reference
  slice: V0
  note: "Per-cuisine Uber Eats price mark-up coefficient (ADR-0024). One row per CuisineCategory."
  rules:
    - "Seeded with ADR-0024 indicative coefficients: FAST_FOOD 1.30, PIZZA 1.35, TRADITIONAL 1.40, BISTRONOMIC 1.45, FOOD_TRUCK 1.35. Estimates are always labelled; calibrate before launch."
  columns:
    cuisine_category:
      type: { $ref: 'scalars.yaml#/CuisineCategory' }
      pk: true
    price_coefficient:
      type: numeric
      note: "Multiplier applied to Captain food prices to estimate the Uber Eats food price (e.g. 1.35)."
    effective_from:
      type: timestamptz
      note: "When this coefficient row took effect (calibration history)."

# Global (per-currency) Uber Eats split + fee params (ADR-0024/0025) for the estimated who-gets-what and
# the estimated all-in total. Reference data — tunable without code.
View_UberSplitPolicy:
  source: reference
  slice: V0
  note: "Calibratable Uber Eats split/fee assumptions for the estimated comparison (ADR-0024/0025). Single active row per currency."
  rules:
    - "Seeded with ADR-0024/0025 indicative values: uber_commission_pct 30.0, rider_base_cents 285, rider_per_km_cents 80, avg_delivery_fee_cents 399, platform_fee_pct 10.0. Estimated figures are always labelled."
    - "Estimated split (per ADR-0025): uberFood = coefficient·articles; restaurantShare = uberFood·(1 − uber_commission_pct/100); riderShare ≈ rider_base_cents (per-km term omitted — distance not modelled in V0); total = uberFood + avg_delivery_fee_cents + platform fee; platformShare = total − restaurantShare − riderShare."
  columns:
    currency:
      type: { $ref: 'scalars.yaml#/CurrencyCode' }
      pk: true
    uber_commission_pct:
      type: numeric
      note: "Uber Eats restaurant commission % (e.g. 30.0); restaurantShare = uberFood·(1 − this/100)."
    rider_base_cents:
      type: integer
      note: "Assumed courier base per trip in cents (e.g. 285 = €2.85)."
    rider_per_km_cents:
      type: integer
      note: "Assumed courier per-km rate in cents (e.g. 80). Not applied in V0 (distance not modelled)."
    avg_delivery_fee_cents:
      type: integer
      note: "Assumed buyer-facing Uber delivery fee in cents (e.g. 399 = €3.99 urban)."
    platform_fee_pct:
      type: numeric
      note: "Assumed extra platform/service fee % added to the buyer total (e.g. 10.0)."
    effective_from:
      type: timestamptz
      note: "When this policy row took effect (calibration history)."

View_Catalog:
  aggregate: Catalog
  slice: V0
  fedBy:
    - { $ref: 'events.yaml#/CatalogCreated' }
    - { $ref: 'events.yaml#/CatalogCategoryAdded' }
    - { $ref: 'events.yaml#/CatalogCategoryUpdated' }
    - { $ref: 'events.yaml#/CatalogCategoryRemoved' }
    - { $ref: 'events.yaml#/ProductAdded' }
    - { $ref: 'events.yaml#/ProductUpdated' }
    - { $ref: 'events.yaml#/ProductRemoved' }
    - { $ref: 'events.yaml#/OptionListAdded' }
    - { $ref: 'events.yaml#/OptionListUpdated' }
    - { $ref: 'events.yaml#/OptionListRemoved' }
    - { $ref: 'events.yaml#/OfferStockUpdated' }
    - { $ref: 'events.yaml#/CatalogImported' }
  rules:
    - "`stock_status` is derived (quantity vs lowStockThreshold); orderable = AVAILABLE and stock > 0."
    - "Could be normalized (one row per offer) if per-item querying is needed later."
    - "Each offer carries a derived `uberPrice` { amountCents, currency } + `uberPriceBasis` for the product-level comparison (ADR-0022): ESTIMATED = View_UberEstimationPolicy[restaurant.cuisine_category].price_coefficient × offer price (null when the restaurant has no cuisine_category); REAL = the restaurant's own Uber price when uber_prices_opt_in and a HubRise Uber menu is present (ingestion deferred — runtime). Always labelled."
  columns:
    catalog_id:
      from: [{ $ref: 'events.yaml#/CatalogCreated/properties/catalogId' }]
      pk: true
    restaurant_id:
      from: [{ $ref: 'events.yaml#/CatalogCreated/properties/restaurantId' }]
      index: true
      fk: { $ref: '#/View_Restaurant/columns/restaurant_id' }
    slug:
      type: { $ref: 'scalars.yaml#/Slug' }
      note: "⚠️ HOLE: CatalogCreated carries no slug — nothing populates this column (drop it or add slug to the event)."
    name:
      from: [{ $ref: 'events.yaml#/CatalogCreated/properties/name' }]
    catalog:
      type: jsonb
      from:
        - { $ref: 'events.yaml#/CatalogCategoryAdded' }
        - { $ref: 'events.yaml#/CatalogCategoryUpdated' }
        - { $ref: 'events.yaml#/CatalogCategoryRemoved' }
        - { $ref: 'events.yaml#/ProductAdded' }
        - { $ref: 'events.yaml#/ProductUpdated' }
        - { $ref: 'events.yaml#/ProductRemoved' }
        - { $ref: 'events.yaml#/OptionListAdded' }
        - { $ref: 'events.yaml#/OptionListUpdated' }
        - { $ref: 'events.yaml#/OptionListRemoved' }
        - { $ref: 'events.yaml#/OfferStockUpdated' }
        - { $ref: 'events.yaml#/CatalogImported' }
      note: "Assembled tree: categories -> products -> offers { price_cents, currency, availability, stock_status, uberPrice?, uberPriceBasis? } + option lists. See rules for how uberPrice is derived (ADR-0022/0024)."
    updated_at:
      type: timestamptz
      from:
        - { $ref: 'events.yaml#/CatalogCreated' }
        - { $ref: 'events.yaml#/CatalogImported' }
      note: "Row write time, stamped on each event."

View_Cart:
  aggregate: Cart
  slice: V0
  note: "Joined with the catalog for pricing (secondary source)."
  fedBy:
    - { $ref: 'events.yaml#/CartStarted' }
    - { $ref: 'events.yaml#/CartLineAdded' }
    - { $ref: 'events.yaml#/CartLineQuantityChanged' }
    - { $ref: 'events.yaml#/CartLineRemoved' }
    - { $ref: 'events.yaml#/CartCheckedOut' }
    - { $ref: 'events.yaml#/CustomerIdentified' }
  rules:
    - "Prices are computed by the projection from the current catalog, never trusted from the client."
    - "`customer_id` is NULL while the cart is owned by a guest; bound when CustomerIdentified resolves authRef → customerId, or at checkout."
    - "`estimated_breakdown` applies View_PricingPolicy (fee_rate/buyer_share/margin band) + the restaurant's margin_rate to the food total: serviceFee_buyer = buyer_share·fee_rate·articles; restaurantContribution = (1−buyer_share)·clamp((margin−margin_low)/(margin_high−margin_low),0,1)·fee_rate·articles; total = articles + delivery + serviceFee_buyer. Recomputed authoritatively on OrderPlaced.breakdown."
    - "`uber_comparison` is the UberComparison (ADR-0022/0025), COMPUTED by the projection from the cart food total + View_UberEstimationPolicy[restaurant.cuisine_category] + View_UberSplitPolicy. Null when the restaurant has no cuisine_category. Basis ESTIMATED in V0 (REAL when opted-in + HubRise Uber prices — deferred)."
  columns:
    cart_id:
      from: [{ $ref: 'events.yaml#/CartStarted/properties/cartId' }]
      pk: true
    restaurant_id:
      from: [{ $ref: 'events.yaml#/CartStarted/properties/restaurantId' }]
      fk: { $ref: '#/View_Restaurant/columns/restaurant_id' }
    customer_id:
      from:
        - { $ref: 'events.yaml#/CartStarted/properties/customerId' }
        - { $ref: 'events.yaml#/CustomerIdentified/properties/customerId' }
      nullable: true
      fk: { $ref: '#/View_Customer/columns/customer_id' }
      note: "NULL while guest; bound by CustomerIdentified or at checkout."
    status:
      type: { $ref: 'scalars.yaml#/CartStatus' }
      from:
        - { $ref: 'events.yaml#/CartStarted' }
        - { $ref: 'events.yaml#/CartCheckedOut' }
      note: "Derived from event type: OPEN on CartStarted, CHECKED_OUT on CartCheckedOut."
    lines:
      type: jsonb
      from:
        - { $ref: 'events.yaml#/CartLineAdded' }
        - { $ref: 'events.yaml#/CartLineQuantityChanged' }
        - { $ref: 'events.yaml#/CartLineRemoved' }
      note: "Priced by the projection from the live catalog: [{ cart_line_id, offer_id, product_id, name, offer_name, quantity, unit_price_cents, selected_options, line_total_cents }]."
    total_amount_cents:
      type: { $ref: 'scalars.yaml#/MoneyCents' }
      from:
        - { $ref: 'events.yaml#/CartLineAdded' }
        - { $ref: 'events.yaml#/CartLineQuantityChanged' }
        - { $ref: 'events.yaml#/CartLineRemoved' }
      note: "COMPUTED by the projection from the live catalog (never trusted from the client)."
    currency:
      type: { $ref: 'scalars.yaml#/CurrencyCode' }
      from: [{ $ref: 'events.yaml#/CartLineAdded' }]
      note: "From the catalog currency at pricing time (the restaurant's default_currency)."
    estimated_breakdown:
      type: jsonb
      from:
        - { $ref: 'events.yaml#/CartLineAdded' }
        - { $ref: 'events.yaml#/CartLineQuantityChanged' }
        - { $ref: 'events.yaml#/CartLineRemoved' }
      nullable: true
      note: "ESTIMATED PaymentBreakdown for the checkout display (ADR-0018), COMPUTED by the projection from the cart food total + View_PricingPolicy + the restaurant margin_rate. Same shape as OrderPlaced.breakdown; recomputed on the final order."
    uber_comparison:
      type: jsonb
      from:
        - { $ref: 'events.yaml#/CartLineAdded' }
        - { $ref: 'events.yaml#/CartLineQuantityChanged' }
        - { $ref: 'events.yaml#/CartLineRemoved' }
      nullable: true
      note: "UberComparison for the cart-level comparison (ADR-0022/0025), COMPUTED by the projection (see rules). Null when the restaurant has no cuisine_category."
    updated_at:
      type: timestamptz
      from:
        - { $ref: 'events.yaml#/CartStarted' }
        - { $ref: 'events.yaml#/CartLineAdded' }
        - { $ref: 'events.yaml#/CartLineQuantityChanged' }
        - { $ref: 'events.yaml#/CartLineRemoved' }
        - { $ref: 'events.yaml#/CartCheckedOut' }
      note: "Row write time, stamped on each event."

View_OrderTracking:
  aggregate: Order
  slice: V0
  note: >
    The single canonical Order read model. Folds the Order lifecycle + Stripe payment facts (secondary
    source). Serves every order query — by id (`order`), by customer (history) and by restaurant+status
    (back-office queue) — via the indexes below; there is no separate per-persona order projection.
  fedBy:
    - { $ref: 'events.yaml#/OrderPlaced' }
    - { $ref: 'events.yaml#/OrderAcceptedByRestaurant' }
    - { $ref: 'events.yaml#/OrderPreparationStarted' }
    - { $ref: 'events.yaml#/OrderMarkedReady' }
    - { $ref: 'events.yaml#/OrderDelivered' }
    - { $ref: 'events.yaml#/OrderRejectedByRestaurant' }
    - { $ref: 'events.yaml#/OrderCancelledByCustomer' }
    - { $ref: 'events.yaml#/OrderCancelledByRestaurant' }
    - { $ref: 'events.yaml#/PaymentCaptured' }
    - { $ref: 'events.yaml#/PaymentRefunded' }
    - { $ref: 'events.yaml#/OrderRated' }
    - { $ref: 'events.yaml#/RestaurantRated' }
    - { $ref: 'events.yaml#/OrderTipped' }
    - { $ref: 'events.yaml#/DeliveryAcceptedByPartner' }
    - { $ref: 'events.yaml#/DeliveryAcceptedByRider' }
    - { $ref: 'events.yaml#/DeliveryStatusUpdated' }
    - { $ref: 'events.yaml#/DeliveryCompleted' }
  rules:
    - "`payment_status` is folded from the Stripe payment facts."
    - "`delivery_status`/`courier`/`estimated_dropoff_at` mirror the order's DeliveryJob (correlated by order_id) so the customer's order view shows live delivery progress (ADR-0031); the full operational board is View_DeliveryJob."
    - "Rating columns are populated from OrderRated (rider_thumb), RestaurantRated (restaurant_stars + comment); null until the customer acts. The restaurant reads restaurant_stars/comment to see its rating."
    - "`*_tip_cents` sum OrderTipped.tips by recipient (customer AND restaurant tippers combined; ADR-012); separate from the core split, Captain 0% skim; feed per-recipient Open-Collective totals."
    - "`uber_*` columns are the estimated Uber Eats comparison for the pedagogical receipt (ADR-0025), COMPUTED by the projection from breakdown.articles + the restaurant's cuisine_category → View_UberEstimationPolicy.price_coefficient + View_UberSplitPolicy. uber_total = coefficient·articles + avg_delivery_fee + platform fee; uber_restaurant = coefficient·articles·(1−uber_commission_pct/100); uber_rider ≈ rider_base_cents (per-km omitted, distance not modelled); uber_platform = uber_total − uber_restaurant − uber_rider. All null when the restaurant has no cuisine_category. uber_basis is ESTIMATED in V0 (REAL when opted-in + HubRise Uber prices — deferred). Contrast against the exact Captain split (restaurant_payout/rider_payout/captain_net)."
  indexes:
    - [restaurant_id, status, placed_at]   # back-office queue: orders(restaurantId, status)
  columns:
    order_id:
      from: [{ $ref: 'events.yaml#/OrderPlaced/properties/orderId' }]
      pk: true
    ref:
      from: [{ $ref: 'events.yaml#/OrderPlaced/properties/ref' }]
    restaurant_id:
      from: [{ $ref: 'events.yaml#/OrderPlaced/properties/restaurantId' }]
      fk: { $ref: '#/View_Restaurant/columns/restaurant_id' }
    customer_id:
      from: [{ $ref: 'events.yaml#/OrderPlaced/properties/customerId' }]
      nullable: true
      index: true
      fk: { $ref: '#/View_Customer/columns/customer_id' }
    status:
      type: { $ref: 'scalars.yaml#/OrderStatus' }
      from:
        - { $ref: 'events.yaml#/OrderPlaced' }
        - { $ref: 'events.yaml#/OrderAcceptedByRestaurant' }
        - { $ref: 'events.yaml#/OrderPreparationStarted' }
        - { $ref: 'events.yaml#/OrderMarkedReady' }
        - { $ref: 'events.yaml#/OrderDelivered' }
        - { $ref: 'events.yaml#/OrderRejectedByRestaurant' }
        - { $ref: 'events.yaml#/OrderCancelledByCustomer' }
        - { $ref: 'events.yaml#/OrderCancelledByRestaurant' }
      note: "Derived from the lifecycle event type."
    service_type:
      from: [{ $ref: 'events.yaml#/OrderPlaced/properties/serviceType' }]
    items:
      from: [{ $ref: 'events.yaml#/OrderPlaced/properties/items' }]
    total_amount_cents:
      type: { $ref: 'scalars.yaml#/MoneyCents' }
      from: [{ $ref: 'events.yaml#/OrderPlaced/properties/totalAmount' }]
      note: "amountCents of OrderPlaced.totalAmount (Money)."
    currency:
      type: { $ref: 'scalars.yaml#/CurrencyCode' }
      from: [{ $ref: 'events.yaml#/OrderPlaced/properties/totalAmount' }]
      note: "currency of OrderPlaced.totalAmount (Money)."
    articles_cents:
      type: { $ref: 'scalars.yaml#/MoneyCents' }
      from: [{ $ref: 'events.yaml#/OrderPlaced/properties/breakdown' }]
      note: "breakdown.articles.amountCents (food TTC; ADR-0016/0018)."
    delivery_cents:
      type: { $ref: 'scalars.yaml#/MoneyCents' }
      from: [{ $ref: 'events.yaml#/OrderPlaced/properties/breakdown' }]
      note: "breakdown.delivery.amountCents (→ rider; 0 for collection)."
    service_fee_cents:
      type: { $ref: 'scalars.yaml#/MoneyCents' }
      from: [{ $ref: 'events.yaml#/OrderPlaced/properties/breakdown' }]
      note: "breakdown.serviceFee.amountCents (Captain buyer service fee)."
    restaurant_payout_cents:
      type: { $ref: 'scalars.yaml#/MoneyCents' }
      from: [{ $ref: 'events.yaml#/OrderPlaced/properties/breakdown' }]
      note: "breakdown.restaurantPayout.amountCents (3-way split → restaurant)."
    rider_payout_cents:
      type: { $ref: 'scalars.yaml#/MoneyCents' }
      from: [{ $ref: 'events.yaml#/OrderPlaced/properties/breakdown' }]
      note: "breakdown.riderPayout.amountCents (3-way split → rider)."
    captain_net_cents:
      type: { $ref: 'scalars.yaml#/MoneyCents' }
      from: [{ $ref: 'events.yaml#/OrderPlaced/properties/breakdown' }]
      note: "breakdown.captainNet.amountCents (kept by Captain; feeds Open-Collective totals)."
    uber_total_cents:
      type: { $ref: 'scalars.yaml#/MoneyCents' }
      from: [{ $ref: 'events.yaml#/OrderPlaced/properties/breakdown' }]
      nullable: true
      note: "DERIVED estimated Uber Eats all-in total for the same order (ADR-0025; see rules). Null if no cuisine_category."
    uber_restaurant_cents:
      type: { $ref: 'scalars.yaml#/MoneyCents' }
      from: [{ $ref: 'events.yaml#/OrderPlaced/properties/breakdown' }]
      nullable: true
      note: "DERIVED estimated Uber restaurant net (after ~30% commission; see rules)."
    uber_rider_cents:
      type: { $ref: 'scalars.yaml#/MoneyCents' }
      from: [{ $ref: 'events.yaml#/OrderPlaced/properties/breakdown' }]
      nullable: true
      note: "DERIVED estimated Uber courier earning (base; per-km not modelled in V0; see rules)."
    uber_platform_cents:
      type: { $ref: 'scalars.yaml#/MoneyCents' }
      from: [{ $ref: 'events.yaml#/OrderPlaced/properties/breakdown' }]
      nullable: true
      note: "DERIVED estimated Uber platform take = uber_total − uber_restaurant − uber_rider."
    uber_basis:
      type: { $ref: 'scalars.yaml#/ComparisonBasis' }
      from: [{ $ref: 'events.yaml#/OrderPlaced/properties/breakdown' }]
      nullable: true
      note: "ESTIMATED (V0) or REAL (opted-in + HubRise Uber prices; deferred). Null if no comparison."
    delivery_address:
      from: [{ $ref: 'events.yaml#/OrderPlaced/properties/deliveryAddress' }]
      nullable: true
    estimated_ready_at:
      from: [{ $ref: 'events.yaml#/OrderAcceptedByRestaurant/properties/estimatedReadyAt' }]
      nullable: true
    placed_at:
      type: timestamptz
      from: [{ $ref: 'events.yaml#/OrderPlaced' }]
      note: "OrderPlaced occurrence time."
    status_changed_at:
      type: timestamptz
      from:
        - { $ref: 'events.yaml#/OrderAcceptedByRestaurant' }
        - { $ref: 'events.yaml#/OrderPreparationStarted' }
        - { $ref: 'events.yaml#/OrderMarkedReady' }
        - { $ref: 'events.yaml#/OrderDelivered' }
        - { $ref: 'events.yaml#/OrderRejectedByRestaurant' }
        - { $ref: 'events.yaml#/OrderCancelledByCustomer' }
        - { $ref: 'events.yaml#/OrderCancelledByRestaurant' }
      note: "Occurrence time of the latest status-changing event."
    payment_status:
      type: text
      from:
        - { $ref: 'events.yaml#/PaymentCaptured' }
        - { $ref: 'events.yaml#/PaymentRefunded' }
      note: "Folded from Stripe facts; candidate for a PaymentStatus enum."
    restaurant_stars:
      from: [{ $ref: 'events.yaml#/RestaurantRated/properties/stars' }]
      nullable: true
      note: "Customer's 0–5 rating of the restaurant; null until rated."
    rating_comment:
      from: [{ $ref: 'events.yaml#/RestaurantRated/properties/comment' }]
      nullable: true
    rider_thumb:
      from: [{ $ref: 'events.yaml#/OrderRated/properties/riderThumb' }]
      nullable: true
    rider_tip_cents:
      type: { $ref: 'scalars.yaml#/MoneyCents' }
      from: [{ $ref: 'events.yaml#/OrderTipped/properties/tips' }]
      nullable: true
      note: "Σ OrderTipped.tips[recipient==RIDER].amount (all tippers); null if none."
    restaurant_tip_cents:
      type: { $ref: 'scalars.yaml#/MoneyCents' }
      from: [{ $ref: 'events.yaml#/OrderTipped/properties/tips' }]
      nullable: true
      note: "Σ OrderTipped.tips[recipient==RESTAURANT].amount; null if none."
    captain_tip_cents:
      type: { $ref: 'scalars.yaml#/MoneyCents' }
      from: [{ $ref: 'events.yaml#/OrderTipped/properties/tips' }]
      nullable: true
      note: "Σ OrderTipped.tips[recipient==CAPTAIN].amount; null if none."
    rated_at:
      type: timestamptz
      from:
        - { $ref: 'events.yaml#/OrderRated' }
        - { $ref: 'events.yaml#/RestaurantRated' }
        - { $ref: 'events.yaml#/OrderTipped' }
      nullable: true
      note: "Occurrence time of the latest rating/tip event."
    delivery_status:
      type: { $ref: 'scalars.yaml#/DeliveryStatus' }
      from:
        - { $ref: 'events.yaml#/DeliveryAcceptedByPartner' }
        - { $ref: 'events.yaml#/DeliveryAcceptedByRider' }
        - { $ref: 'events.yaml#/DeliveryStatusUpdated' }
        - { $ref: 'events.yaml#/DeliveryCompleted' }
      nullable: true
      note: "Mirror of the order's DeliveryJob status (correlated by order_id); null for COLLECTION / before dispatch."
    courier:
      type: jsonb
      from:
        - { $ref: 'events.yaml#/DeliveryAcceptedByPartner' }
        - { $ref: 'events.yaml#/DeliveryAcceptedByRider' }
      nullable: true
      note: "Assigned Courier { displayName, phone?, riderId? } once accepted; null before."
    estimated_dropoff_at:
      type: timestamptz
      from: [{ $ref: 'events.yaml#/DeliveryAcceptedByPartner/properties/estimatedDropoffAt' }]
      nullable: true
      note: "Partner-reported ETA to the customer; null when unknown."

# NOTE: View_OrdersByRestaurant and View_OrdersByCustomer were folded into View_OrderTracking — the
# single canonical Order read model is now queried by id / customer / restaurant+status via its indexes,
# rather than maintaining per-persona projections (see api.yaml `orders` query + the Order type binding).

# Delivery operational board (bounded context: delivery) — ADR-0031. One row per DeliveryJob, feeding the
# rider's job list, the restaurant's delivery tracking and admin. status is derived from the lifecycle events.
View_DeliveryJob:
  aggregate: DeliveryJob
  slice: V0
  fedBy:
    - { $ref: 'events.yaml#/DeliveryRequested' }
    - { $ref: 'events.yaml#/DeliveryAcceptedByPartner' }
    - { $ref: 'events.yaml#/DeliveryRejectedByPartner' }
    - { $ref: 'events.yaml#/DeliveryStatusUpdated' }
    - { $ref: 'events.yaml#/DeliveryAcceptedByRider' }
    - { $ref: 'events.yaml#/DeliveryPickedUp' }
    - { $ref: 'events.yaml#/DeliveryCompleted' }
    - { $ref: 'events.yaml#/DeliveryCancelled' }
  rules:
    - "`status` is derived from the lifecycle events: PENDING on DeliveryRequested → ASSIGNED on DeliveryAcceptedByRider/DeliveryAcceptedByPartner → PICKED_UP on DeliveryPickedUp → then partner DeliveryStatusUpdated (OUT_FOR_DELIVERY/DELIVERED/FAILED) or DeliveryCompleted (DELIVERED) / DeliveryCancelled (CANCELLED)."
    - "`provider` is INDEPENDENT once a rider accepts, PARTNER once a partner accepts."
  indexes:
    - [restaurant_id, status]   # restaurant delivery board
    - [rider_id, status]        # rider's assigned/available jobs
  columns:
    delivery_job_id:
      from: [{ $ref: 'events.yaml#/DeliveryRequested/properties/deliveryJobId' }]
      pk: true
    order_id:
      from: [{ $ref: 'events.yaml#/DeliveryRequested/properties/orderId' }]
      index: true
      fk: { $ref: '#/View_OrderTracking/columns/order_id' }
    restaurant_id:
      from: [{ $ref: 'events.yaml#/DeliveryRequested/properties/restaurantId' }]
      fk: { $ref: '#/View_Restaurant/columns/restaurant_id' }
    status:
      type: { $ref: 'scalars.yaml#/DeliveryStatus' }
      from:
        - { $ref: 'events.yaml#/DeliveryRequested' }
        - { $ref: 'events.yaml#/DeliveryAcceptedByRider' }
        - { $ref: 'events.yaml#/DeliveryAcceptedByPartner' }
        - { $ref: 'events.yaml#/DeliveryPickedUp' }
        - { $ref: 'events.yaml#/DeliveryStatusUpdated' }
        - { $ref: 'events.yaml#/DeliveryCompleted' }
        - { $ref: 'events.yaml#/DeliveryCancelled' }
      note: "Derived from the lifecycle event type / DeliveryStatusUpdated.status."
    provider:
      type: { $ref: 'scalars.yaml#/DeliveryProvider' }
      from:
        - { $ref: 'events.yaml#/DeliveryAcceptedByRider' }
        - { $ref: 'events.yaml#/DeliveryAcceptedByPartner' }
      nullable: true
      note: "INDEPENDENT (rider accepted) or PARTNER (partner accepted); null while PENDING."
    rider_id:
      type: { $ref: 'scalars.yaml#/RiderId' }
      from:
        - { $ref: 'events.yaml#/DeliveryAcceptedByRider/properties/riderId' }
      nullable: true
      note: "Set for an independent-rider delivery; null for a partner delivery."
    courier:
      type: jsonb
      from:
        - { $ref: 'events.yaml#/DeliveryAcceptedByPartner/properties/courier' }
      nullable: true
      note: "Courier { displayName, phone?, riderId? }; from the partner on acceptance (independent rider is in rider_id)."
    partner_ref:
      type: { $ref: 'scalars.yaml#/ExternalReference' }
      from: [{ $ref: 'events.yaml#/DeliveryAcceptedByPartner/properties/partnerRef' }]
      nullable: true
      note: "Partner-side delivery id; idempotent key for inbound updates."
    pickup_address:
      type: jsonb
      from: [{ $ref: 'events.yaml#/DeliveryRequested/properties/pickup' }]
    dropoff_address:
      type: jsonb
      from: [{ $ref: 'events.yaml#/DeliveryRequested/properties/dropoff' }]
    estimated_pickup_at:
      type: timestamptz
      from: [{ $ref: 'events.yaml#/DeliveryAcceptedByPartner/properties/estimatedPickupAt' }]
      nullable: true
    estimated_dropoff_at:
      type: timestamptz
      from: [{ $ref: 'events.yaml#/DeliveryAcceptedByPartner/properties/estimatedDropoffAt' }]
      nullable: true
    requested_at:
      type: timestamptz
      from: [{ $ref: 'events.yaml#/DeliveryRequested' }]
      note: "DeliveryRequested occurrence time."
    picked_up_at:
      type: timestamptz
      from: [{ $ref: 'events.yaml#/DeliveryPickedUp' }]
      nullable: true
    delivered_at:
      type: timestamptz
      from:
        - { $ref: 'events.yaml#/DeliveryCompleted' }
        - { $ref: 'events.yaml#/DeliveryStatusUpdated' }
      nullable: true
      note: "Set on DeliveryCompleted or DeliveryStatusUpdated=DELIVERED."
    last_partner_rejection:
      type: text
      from: [{ $ref: 'events.yaml#/DeliveryRejectedByPartner/properties/reason' }]
      nullable: true
      note: "Reason of the latest partner decline (the job stays PENDING and is re-offered); null if never rejected."
    updated_at:
      type: timestamptz
      from:
        - { $ref: 'events.yaml#/DeliveryRequested' }
        - { $ref: 'events.yaml#/DeliveryAcceptedByRider' }
        - { $ref: 'events.yaml#/DeliveryAcceptedByPartner' }
        - { $ref: 'events.yaml#/DeliveryRejectedByPartner' }
        - { $ref: 'events.yaml#/DeliveryPickedUp' }
        - { $ref: 'events.yaml#/DeliveryStatusUpdated' }
        - { $ref: 'events.yaml#/DeliveryCompleted' }
        - { $ref: 'events.yaml#/DeliveryCancelled' }
      note: "Row write time, stamped on each event."
