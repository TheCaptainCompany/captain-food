version: 1
description: >
  C4 Level 3 (Components) for the `api` container of Captain.Food — SOURCE-managed DSL. Components are
  the internal modules of the CQRS-light + event-log backend. Command handlers bind to their aggregate
  via `$ref` into actors.yaml; projection updaters bind to their read model via `$ref` into views.yaml,
  so the codegen proves every runtime component maps to a declared part of the model (no phantom
  components, no unmapped aggregates/views). Instrumentation lives in the framework components below
  (command bus, event store adapter, publisher, consumers, projections, gateway, middleware), NEVER in
  the aggregates — see docs/claude/observability.md.

container: api

components:
  graphql-gateway:
    description: "Per-role GraphQL endpoint (/{role}/graphql); applies the @auth/@public ACL; entry span (SERVER)."
    instrumented: true
  observability-middleware:
    description: "Attaches business.* attributes + correlation/cause ids to spans; structured JSON logging; the only place domain context meets OTel."
    instrumented: true
  command-bus:
    description: "Dispatches commands to handlers; span 'command.receive'/'command.validate'/'command.handle'."
    instrumented: true
  command-handlers:
    description: "One handler per aggregate; validates invariants then appends events. Pure domain — NOT instrumented."
    instrumented: false
    handles:
      - { $ref: 'actors.yaml#/RestaurantAccount' }
      - { $ref: 'actors.yaml#/Restaurant' }
      - { $ref: 'actors.yaml#/Prospect' }
      - { $ref: 'actors.yaml#/Catalog' }
      - { $ref: 'actors.yaml#/Cart' }
      - { $ref: 'actors.yaml#/Order' }
      - { $ref: 'actors.yaml#/Customer' }
      - { $ref: 'actors.yaml#/DeliveryJob' }
  process-managers:
    description: "Sagas coordinating aggregates + externals (checkout, refund, cart binding, delivery dispatch)."
    instrumented: true
    handles:
      - { $ref: 'processmanager.yaml#/PlaceOrderProcess' }
      - { $ref: 'processmanager.yaml#/RefundProcess' }
      - { $ref: 'processmanager.yaml#/CartBindingProcess' }
      - { $ref: 'processmanager.yaml#/DeliveryDispatchProcess' }
  event-store-adapter:
    description: "Appends to domain_events; span 'event.store.append' with business.event_type/stream_id."
    instrumented: true
  event-publisher:
    description: "Publishes appended events to the bus; span 'event.publish' (PRODUCER)."
    instrumented: true
  message-consumers:
    description: "Consume domain + inbound integration events; span 'event.consume.*' (CONSUMER)."
    instrumented: true
  projection-updaters:
    description: "Update the View_* read models from events; span 'event.consume.projection'."
    instrumented: true
    updates:
      - { $ref: 'database/projection_views.yaml#/View_RestaurantAccount' }
      - { $ref: 'database/tables/projection_tables.yaml#/Restaurant' }
      - { $ref: 'database/tables/projection_tables.yaml#/Customer' }
      - { $ref: 'database/tables/projection_tables.yaml#/Catalog' }
      - { $ref: 'database/tables/projection_tables.yaml#/Cart' }
      - { $ref: 'database/tables/projection_tables.yaml#/OrderTracking' }
      - { $ref: 'database/tables/projection_tables.yaml#/ProspectionPipeline' }
      - { $ref: 'database/projection_views.yaml#/View_DeliveryJob' }
  bam-projector:
    description: "Business Activity Monitoring projection (runs in the bam container); business_metrics only."
    instrumented: true
  hubrise-acl:
    description: "Anti-Corruption Layer translating HubRise payloads (SKU/option_list/'9.80 EUR') into the domain."
    instrumented: true
  stripe-adapter:
    description: "Stripe Connect (Separate Charges & Transfers, transfer_group=ORDER_{id}; Captain = merchant of record): creates the PaymentIntent for the buyer total, then after capture transfers restaurantPayout/riderPayout to the connected accounts (3-way split, ADR-0017), keeping captainNet on the platform; refunds reverse the transfers. Records inbound webhook facts (PaymentCaptured/Failed/Refunded)."
    instrumented: true
  supabase-acl:
    description: "Anti-Corruption Layer wrapping Supabase Auth (ADR-0015): sends/verifies phone OTP (Twilio; mock in dev) and email magic links SYNCHRONOUSLY, validates tokens server-side, and translates the Supabase user (id/phone/email) into the domain (authRef). Keeps the Supabase SDK out of the aggregates."
    instrumented: true
  sirene-google-acl:
    description: "Anti-Corruption Layer translating INSEE Sirene + Google Maps data into Restaurant commands (RegisterRestaurant / UpdateRestaurantGoogleBusinessProfile / MarkRestaurantClosed) as the owner, and validating Google Business Profile ownership proofs for claim/opt-out (ADR-0019/0021). Keeps Sirene/Google SDKs out of the aggregate."
    instrumented: true
  prospection-acl:
    description: "B2B prospection worker (ADR-0020): reads the COMPUTED score from ProspectionPipeline, applies the J+0/J+7/J+21 schedule + anti-spam, fires HubSpot/Resend/Slack, then issues RecordProspectContact / MarkProspectCold to record the facts. The score is never an input it stores back."
    instrumented: true
  avelo37-acl:
    description: "Anti-Corruption Layer for the delivery partner (Avelo37; ADR-0031): on DeliveryRequested, dispatches the job to the partner API; translates the partner's webhooks into the inbound facts DeliveryAcceptedByPartner / DeliveryRejectedByPartner / DeliveryStatusUpdated (idempotent on partnerRef). Keeps the partner SDK out of the domain; mirrors stripe-adapter."
    instrumented: true
  coopcycle-acl:
    description: "Anti-Corruption Layer for the CoopCycle delivery federation (issue #58, ADR-20260721-122910): the third PARTNER seam, mirroring avelo37-acl. FEDERATION — CoopCycle is many self-hosted co-op instances, so the outbound offer_job resolves a job to an instance (per-instance base URL + OAuth2 client-credentials, env-gated) and each instance's verified webhook (per-instance secret) is translated into the same inbound facts DeliveryAcceptedByPartner / DeliveryRejectedByPartner / DeliveryStatusUpdated (idempotent on partnerRef). Keeps the partner SDK out of the domain."
    instrumented: true
  uber_direct-acl:
    description: "Anti-Corruption Layer for the Uber Direct delivery partner (issue #57, ADR-20260721-172500): a PARTNER seam via the Uber DIRECT delivery API (not the Uber Eats marketplace), mirroring avelo37-acl. ONE central API (no federation): the outbound offer_job fetches an OAuth2 client-credentials token (env-gated by UBER_DIRECT_*) and POSTs a Create Delivery; Uber's verified webhook (X-Uber-Signature raw-body HMAC) is translated into the same inbound facts DeliveryAcceptedByPartner / DeliveryRejectedByPartner / DeliveryStatusUpdated (idempotent on partnerRef). Keeps the partner SDK out of the domain."
    instrumented: true
