version: 1
description: >
  C4 Level 2 (Containers) + the domain's bounded contexts for Captain.Food — a SOURCE-managed DSL
  artifact (not generated). Structurizr DSL is the GENERATED target (see docs/claude/c4.md). Bounded
  contexts bind to their aggregates via `$ref` into actors.yaml, so the codegen proves no phantom
  context references a missing aggregate and every aggregate has a home. L2 containers map to
  deployable runtime units; bounded contexts map to consistency boundaries within them.

system:
  name: Captain.Food
  description: "Local-first food ordering & delivery for independent restaurants and food trucks (V0: Tours)."

# --- Bounded contexts (domain decomposition; consistency boundaries) ---
# A context binds its AGGREGATES / process managers (domain ownership). This is the SINGLE, explicit
# declaration of which context an actor — and therefore every command it handles — belongs to.
# Operation→context in the generated docs is DERIVED from it, deterministically (no guessing):
#   • a MUTATION  → the context of the aggregate/process-manager that HANDLES its command. So
#     customer-performed writes like placeOrder / rateOrder / addCartLine live in `order` (handled by
#     Order / PlaceOrderProcess / Cart), NOT in `customer`; acceptOrder shares `order` for the same reason.
#   • a QUERY / SUBSCRIPTION → the context of the PERFORMER `roles` below (reads/discovery are caller-
#     facing: browsing restaurants is a `customer` activity even though it reads restaurant data),
#     falling back to the read model's context when the roles span several contexts (e.g. `orders`).
# The optional `roles` lists the UserType(s) that perform a context's read/discovery use-cases. Each
# UserType maps to at most one context; ADMIN / EXTERNAL / RIDER are neutral (no home → cross-cutting).
boundedContexts:
  restaurant:
    description: "Restaurant provider domain: accounts, locations, lifecycle, order-acceptance mode (incl. catalog & order-fulfilment operations performed by restaurant staff)."
    roles: [RESTAURANT, RESTAURANT_ACCOUNT]
    aggregates:
      - { $ref: 'actors.yaml#/RestaurantAccount' }
      - { $ref: 'actors.yaml#/Restaurant' }
      - { $ref: 'actors.yaml#/Prospect' }
  catalog:
    description: "Catalog tree, products, offers (SKUs), option lists, per-offer stock; HubRise import."
    aggregates:
      - { $ref: 'actors.yaml#/Catalog' }
  order:
    description: "Cart selection → checkout → order lifecycle, incl. the checkout & refund sagas (the V0 risk point: external Stripe)."
    aggregates:
      - { $ref: 'actors.yaml#/Cart' }
      - { $ref: 'actors.yaml#/Order' }
    processManagers:
      - { $ref: 'actors.yaml#/PlaceOrderProcess' }
      - { $ref: 'actors.yaml#/RefundProcess' }
  customer:
    description: "Customer-facing consumer domain: discovery/browse, identity (phone-keyed), favorites, profile, address book, cart & ordering use-cases; cart binding."
    roles: [CUSTOMER, PUBLIC]
    aggregates:
      - { $ref: 'actors.yaml#/Customer' }
    processManagers:
      - { $ref: 'actors.yaml#/CartBindingProcess' }

# --- Containers (deployable / runtime units) ---
containers:
  web-client:
    technology: "Next.js (App Router), React, TypeScript, Tailwind"
    description: "Customer mobile-first web client; multi-tenant via {restaurantSlug}.captain.food."
  web-restaurant:
    technology: "Next.js, React, TypeScript"
    description: "Restaurant web app/dashboard: onboarding (incl. Google Business Profile 'Order online' setup — ADR-019), catalog, order queue, payouts (/restaurant-account/graphql, /restaurant/graphql)."
  web-admin:
    technology: "Next.js, React, TypeScript"
    description: "Platform back-office for Captain.Food staff (/admin/graphql): restaurant approvals, pre-registration pipeline, ops."
  mobile-customer:
    technology: "React Native / Expo (iOS + Android)"
    description: "Customer mobile app (post-V0); same GraphQL API as web-client (/customer/graphql, /public/graphql)."
  mobile-restaurant:
    technology: "React Native / Expo"
    description: "Restaurant-staff mobile app (post-V0): order queue, accept/ready (/restaurant/graphql)."
  mobile-rider:
    technology: "React Native / Expo"
    description: "Delivery-rider mobile app (post-V0): assigned deliveries + status updates (/rider/graphql)."
  api:
    technology: "Node + TypeScript (Hono or NestJS), GraphQL"
    description: "CQRS-light write+read API. Hosts command handlers, projections, GraphQL gateway. Role = path (/{role}/graphql)."
    realizes:
      - { $ref: 'actors.yaml#/RestaurantAccount' }
      - { $ref: 'actors.yaml#/Restaurant' }
      - { $ref: 'actors.yaml#/Prospect' }
      - { $ref: 'actors.yaml#/Catalog' }
      - { $ref: 'actors.yaml#/Cart' }
      - { $ref: 'actors.yaml#/Order' }
      - { $ref: 'actors.yaml#/Customer' }
      - { $ref: 'actors.yaml#/PlaceOrderProcess' }
      - { $ref: 'actors.yaml#/RefundProcess' }
      - { $ref: 'actors.yaml#/CartBindingProcess' }
  event-store:
    technology: "Managed PostgreSQL (e.g. Supabase)"
    description: "Append-only domain_events table (the write model / source of truth at runtime)."
  read-models:
    technology: "Managed PostgreSQL"
    description: "Denormalized View_* projection tables fed from the event log; queries read here, never domain_events."
  sync-worker:
    technology: "Scheduled worker (GitHub Actions cron + Node)"
    description: "Restaurant listing sync (ADR-0020): polls INSEE Sirene + Google Maps and, via the ACL, calls the api's RegisterRestaurant / UpdateRestaurantGoogleBusinessProfile / MarkRestaurantClosed as the owner. Prospection scoring/outreach is a later step."
  bam:
    technology: "Projection worker"
    description: "Business Activity Monitoring projector — consumes the same event stream to answer business questions."
  otel-collector:
    technology: "OpenTelemetry Collector"
    description: "Receives traces/metrics/logs from the api and bam containers; exports to the backend(s)."

# --- External systems ---
externalSystems:
  stripe: { description: "Payments (PaymentIntent capture, refunds); later Stripe Connect." }
  hubrise: { description: "Existing restaurant catalog/orders systems; import via the Anti-Corruption Layer." }
  delivery-partner: { description: "Delivery partner (e.g. Avelo37); post-V0." }
  supabase-auth: { description: "Passwordless OTP identity for customers (not a domain concern)." }
  sirene: { description: "INSEE Sirene / Recherche d'Entreprises (Etalab open data): SIRET, name, address, NAF, active/closed. Seeds listings via the ACL." }
  google-maps: { description: "Google Maps Places / Business Profile: rating, reviews, hours, phone, website, place id, and the 'Order online' link (ADR-0021). Enrichment + ownership proof." }
  hubspot: { description: "CRM for B2B prospection leads (ADR-0020); post-V0." }
  resend: { description: "Transactional email for prospection outreach sequences (ADR-0020); post-V0." }
  slack: { description: "Ops/prospection alerts (active-partner closures, sequence events); post-V0." }

# --- Key relationships (integrations that MUST appear in the views) ---
relationships:
  - { from: web-client, to: api, description: "GraphQL over HTTPS (/customer/graphql, /public/graphql)" }
  - { from: web-restaurant, to: api, description: "GraphQL (/restaurant-account/graphql, /restaurant/graphql)" }
  - { from: web-admin, to: api, description: "GraphQL (/admin/graphql)" }
  - { from: mobile-customer, to: api, description: "GraphQL (/customer/graphql, /public/graphql) — post-V0" }
  - { from: mobile-restaurant, to: api, description: "GraphQL (/restaurant/graphql) — post-V0" }
  - { from: mobile-rider, to: api, description: "GraphQL (/rider/graphql) — post-V0" }
  - { from: api, to: event-store, description: "Append domain events (command side)" }
  - { from: api, to: read-models, description: "Read projections (query side) + projection updates" }
  - { from: api, to: stripe, description: "Create PaymentIntents, request refunds; receive webhooks (inbound facts)" }
  - { from: api, to: hubrise, description: "Import catalog / sync inventory via ACL (inbound facts)" }
  - { from: api, to: supabase-auth, description: "OTP verify / session (out of domain)" }
  - { from: api, to: delivery-partner, description: "Dispatch + status (post-V0; inbound facts)" }
  - { from: sync-worker, to: sirene, description: "Poll establishments (SIRET/NAF/address/closures)" }
  - { from: sync-worker, to: google-maps, description: "Fetch Business Profile data (rating/reviews/hours/website)" }
  - { from: sync-worker, to: api, description: "Register/enrich/close listings + record prospect contacts via the ACL (/external/graphql)" }
  - { from: api, to: google-maps, description: "Verify restaurant ownership (GBP) for claim/opt-out" }
  - { from: sync-worker, to: hubspot, description: "Create/update prospection leads (ADR-0020)" }
  - { from: sync-worker, to: resend, description: "Send prospection outreach emails (ADR-0020)" }
  - { from: sync-worker, to: slack, description: "Prospection / ops alerts (ADR-0020)" }
  - { from: bam, to: event-store, description: "Consume the event stream for business metrics" }
  - { from: api, to: otel-collector, description: "Export traces/metrics/logs (OTLP)" }
  - { from: bam, to: otel-collector, description: "Export traces/metrics/logs (OTLP)" }
