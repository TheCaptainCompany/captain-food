CartBindingProcess:
  type: process-manager
  description: >
    Binds a returning visitor's OPEN guest carts to their Customer. Reacts to the inbound
    CustomerIdentified fact (authRef → customerId, reported when the visitor signs in) so the
    Cart projection stamps the customerId onto their carts — enabling cross-device carts to
    converge and be merged at checkout.
  receives:
    - message: { $ref: 'events.yaml#/CustomerIdentified' }
      steps:
        lockProcessManager: "Lock the CartBindingProcess (optimistic concurrency) to prevent concurrent cart-binding attempts."
        readOpenCart: "Read the visitor's OPEN carts (Cart projection) by sessionId"
        bindCustomerId: "Bind the customerId onto the visitor's OPEN carts (Cart projection) based on the sessionId."
        unlockProcessManager: "Unlock the CartBindingProcess (optimistic concurrency) to allow other cart-binding attempts."
      effect: "Bind customerId onto the visitor's OPEN carts (Cart projection) based on the sessionId."

DeliveryDispatchProcess:
  type: process-manager
  description: >
    Dispatches and tracks deliveries (bounded context: delivery). When a DELIVERY order is ready, creates
    the delivery job and offers it (dispatch to a partner via the avelo37-acl and/or make it available to
    independent riders). Reacts to partner-reported facts and to the rider completion to close the order.
    ADR-0031.
  receives:
    - message: { $ref: 'events.yaml#/OrderMarkedReady' }
      steps:
        lockProcessManager: "Lock the DeliveryDispatchProcess (optimistic concurrency) to prevent concurrent delivery dispatch attempts."
        createDeliveryJob: "Create the delivery job (PENDING) and offer it to a partner and/or independent riders."
        unlockProcessManager: "Unlock the DeliveryDispatchProcess (optimistic concurrency) to allow other delivery dispatch attempts."
      effect: "For a DELIVERY order, create the delivery job (PENDING) and offer it to a partner and/or independent riders. No-op for COLLECTION."
    - message: { $ref: 'events.yaml#/DeliveryRejectedByPartner' }
      steps:
        lockProcessManager: "Lock the DeliveryDispatchProcess (optimistic concurrency) to prevent concurrent delivery dispatch attempts."
        createNewDeliveryJob: "Create a new delivery job (PENDING) and offer it to another partner and/or independent riders."
        unlockProcessManager: "Unlock the DeliveryDispatchProcess (optimistic concurrency) to allow other delivery dispatch attempts."
      effect: "Partner declined (reported inbound); re-offer to another partner/independent riders or flag for manual handling."
