version: 3
description: >
  Captain.Food PROCESS MANAGER catalog — a CODE-GENERATION SOURCE (like actors.yaml for aggregates).
  A process manager is a STATE-TABLE ORCHESTRATOR, not an event-sourced actor: it reacts to a message
  (a command it handles, or an event already recorded in the log), runs an ORDERED list of TYPED STEPS
  (read a read model, guard, call an outbound port, deliver an event / send a command to an aggregate,
  read/update its own state row), and keeps its private state in a declared table. AGGREGATES OWN THE
  FACTS — a process manager never appends to domain_events itself; it delivers events for the owning
  aggregate to record, or sends commands the aggregate may reject.

  Every semantic field is a $ref or a declared name — free text lives only in description/note. From
  this file a generator scaffolds the orchestrator (steps → code) and the sequence diagrams (each step
  kind maps to exactly one participant/layer), and the validator proves the wiring.

  Fields:
    - <PM>.type        : always process-manager.
    - <PM>.state_table : $ref to the PM's private state table (database/tables/process_managers.yaml).
                         Required when any leg has a `state` step.
    - <PM>.ports       : outbound ports — each a `$ref` into the SERVICE CATALOG
                         (services.yaml, ADR-20260719-214500): `payment: { $ref: 'services.yaml#/payment' }`.
                         The port name is the service name; `call`/`from_port` reference
                         `<service>.<operation>` against the catalog's declared operations.
    - <PM>.receives    : the inbox. Each entry { message, description?, steps }:
        * message : $ref to the command (commands.yaml) or event (events.yaml) received.
                    COMMAND legs reject with the thrown error. EVENT legs never reject the FACT —
                    but an error condition still `throws` (run aborts, error surfaced); only benign
                    alternatives `skip`.
        * steps   : ordered list; each step is one of:
            - read    : { model, as, where?, note? } — read a read model. `model` is a $ref to a
                        projection table (database/tables/projection_tables.yaml) or view
                        (database/projection_views.yaml); `as` names the result for later steps;
                        `where` maps its columns to values.
            - guard   : { that?, throws | skip: true, note? } — a precondition, exactly one outcome:
                        * throws ($ref errors.yaml) — the condition is an ERROR. On a COMMAND leg the
                          command is REJECTED with the typed error. On an EVENT leg the recorded fact
                          stands (facts are never rejected) but the run ABORTS and SURFACES the typed
                          error (poison/ops flag, retry or manual attention) — never a silent skip.
                        * skip: true — the condition is a BENIGN expected alternative (idempotent
                          re-delivery, COLLECTION no-op): the run ends as a no-op. Never use skip for
                          an error condition.
                        A COMMAND leg may only `throws` (a command has no benign-skip path).
                        `that` (optional, when structurally expressible) maps a subject
                        (`message`, `state`, or a read alias) → field → { const: <ENUM> }.
            - call    : { port, operation, note? } — invoke a declared outbound port operation
                        (external system; not a domain message).
            - deliver : { event, to, with?, for_each?, note? } — hand a fact to the aggregate that
                        records it (births / facts the PM is authoritative for). `event` is a $ref to
                        events.yaml; `to` a $ref to an actors.yaml aggregate whose inbox receives it.
            - send    : { command, to, with?, for_each?, note? } — dispatch a command; the target
                        aggregate validates and may reject (on an EVENT leg a rejection is logged and
                        skipped, never re-thrown).
            - state   : { by?, expect?, set?, note? } — the PM's own state row (state_table).
                        `by` selects the row, `expect` asserts columns (on an EVENT leg a failed
                        expect = skip), `set` writes columns explicitly.
        * values (in where/with/by/expect/set) are one of:
            - { const: <ENUM_MEMBER> }                        — literal of the field's enum scalar
            - { from: { $ref: '<file>#/<Msg>/properties/<p>' } } — a message/event property (lineage
                                                                  style, like projection `from`)
            - { from_state: <column> }                        — the PM's own state row
            - { from_read: <alias>.<column> }                 — a prior read step's result
            - { from_port: <port>.<operation> }               — a prior call step's result
            - { from_envelope: event_id | correlation_id | occurred_at } — the trigger's envelope
                                                                  (ADR-0041; infrastructure metadata)

  RUNTIME ENVELOPE (declared once, never repeated as steps — like the event envelope, ADR-0041):
  single-flight per state row via optimistic concurrency (the old lock/unlock steps), trigger
  checkpointing, correlation_id propagation + cause_id = trigger event id on everything delivered,
  poison-message skip, and `last_update_utc` maintenance are the runner's contract, not business steps.

# --- Process managers (state-table orchestrators) ---

PlaceOrderProcess:
  type: process-manager
  description: >
    The checkout saga. On PlaceOrder: reads the OPEN cart, re-validates and prices it server-side
    against the live catalog, creates the Stripe PaymentIntent, and freezes the full priced checkout
    onto PaymentIntentCreated (ADR-20260719-014434) — the state row (one live run per cart) is what
    prevents concurrent checkouts of the same cart. On PaymentCaptured: materializes the Order and
    closes the cart from the frozen snapshot alone. On PaymentFailed: resolves the run; the cart
    stays OPEN.
  state_table: { $ref: 'database/tables/process_managers.yaml#/payment_process_manager' }
  ports:
    payment: { $ref: 'services.yaml#/payment' }
  receives:
    - message: { $ref: 'commands.yaml#/PlaceOrder' }
      description: >
        Validate the checkout, price the cart server-side (never trusting client amounts), create the
        Stripe PaymentIntent, and open the run AWAITING_PAYMENT_RESULT.
      steps:
        - read:
            model: { $ref: 'database/tables/projection_tables.yaml#/Cart' }
            as: cart
            where: { cart_id: { from: { $ref: 'commands.yaml#/PlaceOrder/properties/cartId' } } }
            note: "The cart to check out, with its projection-priced lines."
        - guard: { throws: { $ref: 'errors.yaml#/CartNotFound' }, note: "The cart exists." }
        - guard:
            that: { cart: { status: { const: OPEN } } }
            throws: { $ref: 'errors.yaml#/CartNotOpen' }
        - guard: { throws: { $ref: 'errors.yaml#/CartEmpty' }, note: "The cart has at least one line." }
        - read:
            model: { $ref: 'database/tables/projection_tables.yaml#/Restaurant' }
            as: restaurant
            where: { restaurant_id: { from: { $ref: 'commands.yaml#/PlaceOrder/properties/restaurantId' } } }
        - guard: { throws: { $ref: 'errors.yaml#/RestaurantPaused' }, note: "restaurant.order_acceptance is not PAUSED." }
        - guard: { throws: { $ref: 'errors.yaml#/CannotOrderTestRestaurant' }, note: "A LIVE order never targets a TEST restaurant (ADR-0038)." }
        - guard: { throws: { $ref: 'errors.yaml#/DeliveryAddressRequired' }, note: "serviceType DELIVERY requires deliveryAddress." }
        - guard: { throws: { $ref: 'errors.yaml#/OutsideDeliveryArea' }, note: "The delivery address is inside the restaurant's delivery area." }
        - guard: { throws: { $ref: 'errors.yaml#/PriceUnresolvable' }, note: "Fail-closed pricing: every cart line's price resolves from the live catalog; otherwise reject — never fall back to a client amount." }
        - guard: { throws: { $ref: 'errors.yaml#/PriceMismatch' }, note: "If the client sent expectedTotal (confirmation only), it must equal the server-recomputed total — the server is the only price authority." }
        - call:
            port: payment
            operation: request
            note: "Server-side pricing feeds the intent amount; the priced checkout is frozen for the snapshot."
        - guard: { throws: { $ref: 'errors.yaml#/PaymentDeclined' }, note: "The gateway accepted the intent creation." }
        - deliver:
            event: { $ref: 'events.yaml#/PaymentIntentCreated' }
            to: { $ref: 'actors.yaml#/Payment' }
            with:
              paymentIntentId: { from_port: payment.request }
            note: "Birth of the Payment; carries the frozen checkout snapshot (ADR-20260719-014434)."
        - state:
            set:
              cart_id: { from: { $ref: 'commands.yaml#/PlaceOrder/properties/cartId' } }
              order_id: { from: { $ref: 'commands.yaml#/PlaceOrder/properties/orderId' } }
              payment_intent_id: { from_port: payment.request }
              process_status: { const: AWAITING_PAYMENT_RESULT }
              payment_status: { const: PENDING }

    - message: { $ref: 'events.yaml#/PaymentCaptured' }
      description: >
        The Stripe outcome (recorded by the Payment aggregate): materialize the Order and close the
        cart from the checkout snapshot frozen on PaymentIntentCreated.
      steps:
        - state:
            by: { payment_intent_id: { from: { $ref: 'events.yaml#/PaymentCaptured/properties/paymentIntentId' } } }
            note: "Load the checkout run this capture belongs to."
        - guard:
            throws: { $ref: 'errors.yaml#/PaymentEventOrphaned' }
            note: "ERROR — a capture matching no run means money was taken with no order to materialize; abort and surface (the fact stays recorded on the Payment)."
        - state:
            expect: { process_status: { const: AWAITING_PAYMENT_RESULT } }
            note: "Already-resolved run → skip (benign Stripe re-delivery)."
        - deliver:
            event: { $ref: 'events.yaml#/OrderPlaced' }
            to: { $ref: 'actors.yaml#/Order' }
            with:
              orderId: { from_state: order_id }
            note: "Birth of the Order, materialized from the frozen checkout snapshot; the Order records it idempotently."
        - deliver:
            event: { $ref: 'events.yaml#/CartCheckedOut' }
            to: { $ref: 'actors.yaml#/Cart' }
            with:
              cartId: { from_state: cart_id }
              orderId: { from_state: order_id }
        - state:
            set:
              payment_status: { const: CAPTURED }
              process_status: { const: ORDER_PLACED }
              last_processed_stripe_event_id: { from_envelope: event_id }

    - message: { $ref: 'events.yaml#/PaymentFailed' }
      description: "Payment failed: resolve the run; no order is placed and the cart stays OPEN."
      steps:
        - state:
            by: { payment_intent_id: { from: { $ref: 'events.yaml#/PaymentFailed/properties/paymentIntentId' } } }
            note: "Load the checkout run this failure belongs to."
        - guard:
            throws: { $ref: 'errors.yaml#/PaymentEventOrphaned' }
            note: "ERROR — a failure matching no run is the same anomaly class as an orphan capture; abort and surface."
        - state:
            expect: { process_status: { const: AWAITING_PAYMENT_RESULT } }
            note: "Already-resolved run → skip (benign Stripe re-delivery)."
        - state:
            set:
              payment_status: { const: FAILED }
              process_status: { const: FAILED }
              last_processed_stripe_event_id: { from_envelope: event_id }
            note: "No domain event — the cart stays OPEN for the customer to retry."

RefundProcess:
  type: process-manager
  description: >
    Approved refunds. A refundable fact (rejection, cancellation, customer request) OPENS a
    pending refund: RefundOpened is delivered to the Payment aggregate (so the refund queue,
    View_PendingRefunds, folds from the log) and the state row goes PENDING_APPROVAL; the RESTAURANT
    (its own orders) or an ADMIN decides with ApproveRefund / DenyRefund (authz = api.yaml roles); on
    approval the outbound Stripe refund is requested and the run settles when Stripe reports
    PaymentRefunded (the fact itself is recorded by the Payment aggregate). The refund-eligibility
    window is a config value enforced at approval, not a domain rule.
  state_table: { $ref: 'database/tables/process_managers.yaml#/refund_process_manager' }
  ports:
    payment: { $ref: 'services.yaml#/payment' }
  receives:
    - message: { $ref: 'events.yaml#/OrderRejectedByRestaurant' }
      description: "The restaurant rejected a paid order — open a pending refund for a restaurant/admin decision."
      steps:
        - read:
            model: { $ref: 'database/tables/projection_tables.yaml#/OrderTracking' }
            as: order
            where: { order_id: { from: { $ref: 'events.yaml#/OrderRejectedByRestaurant/properties/orderId' } } }
        - guard:
            that: { order: { payment_status: { const: CAPTURED } } }
            skip: true
            note: "Nothing captured → nothing to refund."
        - deliver:
            event: { $ref: 'events.yaml#/RefundOpened' }
            to: { $ref: 'actors.yaml#/Payment' }
            with:
              orderId: { from: { $ref: 'events.yaml#/OrderRejectedByRestaurant/properties/orderId' } }
              restaurantId: { from: { $ref: 'events.yaml#/OrderRejectedByRestaurant/properties/restaurantId' } }
              amount: { from_read: order.total_amount_cents }
              reason: { from: { $ref: 'events.yaml#/OrderRejectedByRestaurant/properties/reason' } }
            note: "The refund queue fact (View_PendingRefunds); the Payment records it idempotently."
        - state:
            set:
              order_id: { from: { $ref: 'events.yaml#/OrderRejectedByRestaurant/properties/orderId' } }
              payment_intent_id: { from_read: order.payment_intent_id }
              process_status: { const: PENDING_APPROVAL }
              reason: { from: { $ref: 'events.yaml#/OrderRejectedByRestaurant/properties/reason' } }
    - message: { $ref: 'events.yaml#/OrderCancelledByCustomer' }
      description: "The customer cancelled a paid order — open a pending refund for a restaurant/admin decision."
      steps:
        - read:
            model: { $ref: 'database/tables/projection_tables.yaml#/OrderTracking' }
            as: order
            where: { order_id: { from: { $ref: 'events.yaml#/OrderCancelledByCustomer/properties/orderId' } } }
        - guard:
            that: { order: { payment_status: { const: CAPTURED } } }
            skip: true
            note: "Nothing captured → nothing to refund."
        - deliver:
            event: { $ref: 'events.yaml#/RefundOpened' }
            to: { $ref: 'actors.yaml#/Payment' }
            with:
              orderId: { from: { $ref: 'events.yaml#/OrderCancelledByCustomer/properties/orderId' } }
              restaurantId: { from: { $ref: 'events.yaml#/OrderCancelledByCustomer/properties/restaurantId' } }
              amount: { from_read: order.total_amount_cents }
              reason: { from: { $ref: 'events.yaml#/OrderCancelledByCustomer/properties/reason' } }
            note: "The refund queue fact (View_PendingRefunds); the Payment records it idempotently."
        - state:
            set:
              order_id: { from: { $ref: 'events.yaml#/OrderCancelledByCustomer/properties/orderId' } }
              payment_intent_id: { from_read: order.payment_intent_id }
              process_status: { const: PENDING_APPROVAL }
              reason: { from: { $ref: 'events.yaml#/OrderCancelledByCustomer/properties/reason' } }
    - message: { $ref: 'events.yaml#/OrderCancelledByRestaurant' }
      description: "The restaurant cancelled a paid order — open a pending refund for a restaurant/admin decision."
      steps:
        - read:
            model: { $ref: 'database/tables/projection_tables.yaml#/OrderTracking' }
            as: order
            where: { order_id: { from: { $ref: 'events.yaml#/OrderCancelledByRestaurant/properties/orderId' } } }
        - guard:
            that: { order: { payment_status: { const: CAPTURED } } }
            skip: true
            note: "Nothing captured → nothing to refund."
        - deliver:
            event: { $ref: 'events.yaml#/RefundOpened' }
            to: { $ref: 'actors.yaml#/Payment' }
            with:
              orderId: { from: { $ref: 'events.yaml#/OrderCancelledByRestaurant/properties/orderId' } }
              restaurantId: { from: { $ref: 'events.yaml#/OrderCancelledByRestaurant/properties/restaurantId' } }
              amount: { from_read: order.total_amount_cents }
              reason: { from: { $ref: 'events.yaml#/OrderCancelledByRestaurant/properties/reason' } }
            note: "The refund queue fact (View_PendingRefunds); the Payment records it idempotently."
        - state:
            set:
              order_id: { from: { $ref: 'events.yaml#/OrderCancelledByRestaurant/properties/orderId' } }
              payment_intent_id: { from_read: order.payment_intent_id }
              process_status: { const: PENDING_APPROVAL }
              reason: { from: { $ref: 'events.yaml#/OrderCancelledByRestaurant/properties/reason' } }
    - message: { $ref: 'events.yaml#/RefundRequested' }
      description: >
        The customer asked for a refund (the Order aggregate already validated RequestRefund) — open a
        pending refund for a restaurant/admin decision.
      steps:
        - read:
            model: { $ref: 'database/tables/projection_tables.yaml#/OrderTracking' }
            as: order
            where: { order_id: { from: { $ref: 'events.yaml#/RefundRequested/properties/orderId' } } }
        - guard:
            that: { order: { payment_status: { const: CAPTURED } } }
            skip: true
            note: "Nothing captured → nothing to refund."
        - deliver:
            event: { $ref: 'events.yaml#/RefundOpened' }
            to: { $ref: 'actors.yaml#/Payment' }
            with:
              orderId: { from: { $ref: 'events.yaml#/RefundRequested/properties/orderId' } }
              restaurantId: { from: { $ref: 'events.yaml#/RefundRequested/properties/restaurantId' } }
              amount: { from_read: order.total_amount_cents }
              reason: { from: { $ref: 'events.yaml#/RefundRequested/properties/reason' } }
            note: "The refund queue fact (View_PendingRefunds); the Payment records it idempotently."
        - state:
            set:
              order_id: { from: { $ref: 'events.yaml#/RefundRequested/properties/orderId' } }
              payment_intent_id: { from_read: order.payment_intent_id }
              process_status: { const: PENDING_APPROVAL }
              reason: { from: { $ref: 'events.yaml#/RefundRequested/properties/reason' } }

    - message: { $ref: 'commands.yaml#/ApproveRefund' }
      description: >
        The restaurant or an admin approves the pending refund (possibly partial): request the Stripe
        refund and record the decision on the Payment.
      steps:
        - state:
            by: { order_id: { from: { $ref: 'commands.yaml#/ApproveRefund/properties/orderId' } } }
        - guard:
            that: { state: { process_status: { const: PENDING_APPROVAL } } }
            throws: { $ref: 'errors.yaml#/RefundNotPending' }
            note: "Also thrown when no run exists for the order."
        - call:
            port: payment
            operation: refund
            note: "Outbound Stripe refund for the approved amount; PaymentRefunded will settle the run."
        - deliver:
            event: { $ref: 'events.yaml#/RefundApproved' }
            to: { $ref: 'actors.yaml#/Payment' }
            with:
              orderId: { from: { $ref: 'commands.yaml#/ApproveRefund/properties/orderId' } }
              amount: { from: { $ref: 'commands.yaml#/ApproveRefund/properties/amount' } }
              reason: { from: { $ref: 'commands.yaml#/ApproveRefund/properties/reason' } }
        - state:
            set:
              process_status: { const: APPROVED_AWAITING_SETTLEMENT }
              approved_amount_cents: { from: { $ref: 'commands.yaml#/ApproveRefund/properties/amount' } }
              reason: { from: { $ref: 'commands.yaml#/ApproveRefund/properties/reason' } }

    - message: { $ref: 'commands.yaml#/DenyRefund' }
      description: "The restaurant or an admin denies the pending refund: record the decision on the Payment and close the run."
      steps:
        - state:
            by: { order_id: { from: { $ref: 'commands.yaml#/DenyRefund/properties/orderId' } } }
        - guard:
            that: { state: { process_status: { const: PENDING_APPROVAL } } }
            throws: { $ref: 'errors.yaml#/RefundNotPending' }
        - deliver:
            event: { $ref: 'events.yaml#/RefundDenied' }
            to: { $ref: 'actors.yaml#/Payment' }
            with:
              orderId: { from: { $ref: 'commands.yaml#/DenyRefund/properties/orderId' } }
              reason: { from: { $ref: 'commands.yaml#/DenyRefund/properties/reason' } }
        - state:
            set:
              process_status: { const: DENIED }
              reason: { from: { $ref: 'commands.yaml#/DenyRefund/properties/reason' } }

    - message: { $ref: 'events.yaml#/PaymentRefunded' }
      description: >
        Stripe reported the settled refund (recorded by the Payment aggregate) — close the run. The
        fact is already in the log; nothing to emit.
      steps:
        - state:
            by: { order_id: { from: { $ref: 'events.yaml#/PaymentRefunded/properties/orderId' } } }
            expect: { process_status: { const: APPROVED_AWAITING_SETTLEMENT } }
            note: "Unknown or already-settled run → skip (idempotent under Stripe re-delivery)."
        - state:
            set:
              refund_id: { from: { $ref: 'events.yaml#/PaymentRefunded/properties/refundId' } }
              process_status: { const: REFUNDED }

CartBindingProcess:
  type: process-manager
  description: >
    Binds a returning visitor's OPEN guest carts to their Customer. Reacts to CustomerIdentified
    (authRef → customerId) by sending BindCartToCustomer for each OPEN cart of the session — the Cart
    aggregate owns the bind fact (CartBoundToCustomer); the state row makes a re-delivered
    CustomerIdentified a no-op.
  state_table: { $ref: 'database/tables/process_managers.yaml#/cart_binding_process_manager' }
  receives:
    - message: { $ref: 'events.yaml#/CustomerIdentified' }
      description: "Bind every OPEN cart of the identified session to the customer."
      steps:
        - read:
            model: { $ref: 'database/tables/projection_tables.yaml#/Cart' }
            as: open_carts
            where:
              session_id: { from: { $ref: 'events.yaml#/CustomerIdentified/properties/sessionId' } }
              status: { const: OPEN }
        - send:
            command: { $ref: 'commands.yaml#/BindCartToCustomer' }
            to: { $ref: 'actors.yaml#/Cart' }
            for_each: open_carts
            with:
              cartId: { from_read: open_carts.cart_id }
              customerId: { from: { $ref: 'events.yaml#/CustomerIdentified/properties/customerId' } }
            note: "One command per open cart; the Cart validates (one-time bind) and emits CartBoundToCustomer."
        - state:
            set:
              session_id: { from: { $ref: 'events.yaml#/CustomerIdentified/properties/sessionId' } }
              customer_id: { from: { $ref: 'events.yaml#/CustomerIdentified/properties/customerId' } }

DeliveryDispatchProcess:
  type: process-manager
  description: >
    Dispatches and tracks deliveries (bounded context: delivery, ADR-0031; resolve→walk strategy, #60).
    When a DELIVERY order is marked ready, delivers the DeliveryRequested birth to the DeliveryJob
    (deterministic UUIDv5 job id from the order id = idempotency key), then RESOLVES a dispatch strategy:
    a RESTAURANT-dispatch order short-circuits to SELF_DISPATCHED (Captain offers no channel and only
    tracks — the restaurant drives progress and the customer still gets tracking); a CAPTAIN-dispatch
    order WALKS the city's ranked channel list (CityDeliveryRanking), offering the rank-1 channel. Three
    triggers advance the walk to the next ranked channel — a partner decline (DeliveryRejectedByPartner),
    an offer timeout (DeliveryOfferTimedOut) and a manual operator escalate (DeliveryEscalationRequested)
    — until the list is exhausted, then fails closed with DeliveryDispatchFailed (fail-closed,
    rules.yaml#/DispatchExhaustionFailsClosed — #60 supersedes the ADR-20260720-004556 numeric cap-3).
    Channel selection and "channels remain?" are RUNTIME HOOKS (the CityDeliveryRanking read/selection the
    value forms cannot carry), so each leg carries its branches linearly with notes. Closes the order on
    delivery by sending MarkOrderDelivered — the Order validates the transition, so a terminal
    cancelled/rejected order is never resurrected.
  state_table: { $ref: 'database/tables/process_managers.yaml#/delivery_dispatch_process_manager' }
  ports:
    delivery: { $ref: 'services.yaml#/delivery' }
  receives:
    - message: { $ref: 'events.yaml#/OrderMarkedReady' }
      description: >
        For a DELIVERY order: create the delivery job (birth) and offer it. COLLECTION orders need no
        dispatch.
      steps:
        - read:
            model: { $ref: 'database/tables/projection_tables.yaml#/OrderTracking' }
            as: order
            where: { order_id: { from: { $ref: 'events.yaml#/OrderMarkedReady/properties/orderId' } } }
        - guard:
            that: { order: { service_type: { const: DELIVERY } } }
            skip: true
            note: "COLLECTION orders need no dispatch."
        - read:
            model: { $ref: 'database/tables/projection_tables.yaml#/Restaurant' }
            as: restaurant
            where: { restaurant_id: { from: { $ref: 'events.yaml#/OrderMarkedReady/properties/restaurantId' } } }
            note: "The pickup address."
        - deliver:
            event: { $ref: 'events.yaml#/DeliveryRequested' }
            to: { $ref: 'actors.yaml#/DeliveryJob' }
            with:
              orderId: { from: { $ref: 'events.yaml#/OrderMarkedReady/properties/orderId' } }
              restaurantId: { from: { $ref: 'events.yaml#/OrderMarkedReady/properties/restaurantId' } }
              pickup: { from_read: restaurant.address }
              dropoff: { from_read: order.delivery_address }
            note: "Birth of the DeliveryJob; deliveryJobId = deterministic UUIDv5 of the order id (idempotent re-dispatch)."
        - call:
            port: delivery
            operation: offer_job
            note: "Offer the job on the strategy-resolved rank-1 channel (CityDeliveryRanking). The offer_job INPUT is a runtime hook: it resolves the restaurant's dispatch strategy and returns the target channel for a CAPTAIN-dispatch order, or SKIPS the call for a RESTAURANT-dispatch order (self-dispatch short-circuit — Captain offers no channel and only tracks). The ranking read/selection cannot be carried by the value forms (#60)."
        - state:
            set:
              order_id: { from: { $ref: 'events.yaml#/OrderMarkedReady/properties/orderId' } }
              restaurant_id: { from: { $ref: 'events.yaml#/OrderMarkedReady/properties/restaurantId' } }
              delivery_job_id: { from: { $ref: 'events.yaml#/DeliveryRequested/properties/deliveryJobId' } }
              process_status: { from_hook: open_process_status }
              offer_attempts: { const: 1 }
              current_rank: { from_hook: open_current_rank }
              current_channel: { from_hook: open_current_channel }
            note: "Open the run under the resolved strategy (#60). A CAPTAIN-dispatch order opens OFFERED at rank 1 with current_rank/current_channel set to the rank-1 channel offer_job was invoked against; a RESTAURANT-dispatch order opens SELF_DISPATCHED with current_rank/current_channel null (Captain offers no channel and only tracks — the restaurant drives progress and the customer still gets tracking). process_status/current_rank/current_channel are resolved by runtime strategy hooks (from_hook) reading RestaurantDispatchConfig + CityDeliveryRanking; offer_attempts = 1 counts the birth offer."

    - message: { $ref: 'events.yaml#/DeliveryAcceptedByPartner' }
      description: >
        The partner accepted (inbound, recorded by the DeliveryJob aggregate — the courier lives on the
        job): just advance the run.
      steps:
        - state:
            by: { delivery_job_id: { from: { $ref: 'events.yaml#/DeliveryAcceptedByPartner/properties/deliveryJobId' } } }
            note: "Load the dispatch run for this job."
        - guard:
            throws: { $ref: 'errors.yaml#/DeliveryJobNotFound' }
            note: "ERROR — an acceptance for an unknown dispatch run; abort and surface."
        - state:
            set: { process_status: { const: ACCEPTED } }

    - message: { $ref: 'events.yaml#/DeliveryRejectedByPartner' }
      description: >
        The partner declined (inbound): ADVANCE the ranked channel walk (#60). If a next ranked channel
        remains, offer it and stay OFFERED; when the walk is exhausted, fail the dispatch closed with
        DeliveryDispatchFailed. "Channels remain?" and next-channel selection are runtime hooks (the
        CityDeliveryRanking walk the value forms cannot carry), so the linear step list carries the two
        branches with notes.
      steps:
        - state:
            by: { delivery_job_id: { from: { $ref: 'events.yaml#/DeliveryRejectedByPartner/properties/deliveryJobId' } } }
            note: "Load the dispatch run for this job."
        - guard:
            throws: { $ref: 'errors.yaml#/DeliveryJobNotFound' }
            note: "ERROR — a rejection for an unknown dispatch run; abort and surface."
        - state:
            expect: { process_status: { const: OFFERED } }
            note: "Only an outstanding offer can be declined — a decline on a SELF_DISPATCHED / resolved / terminal run skips (benign re-delivery)."
        - call:
            port: delivery
            operation: offer_job
            note: "ADVANCE branch (channels remain — skipped on the exhausted walk): the strategy hook selects the NEXT ranked channel and offer_job offers the job on it (#60)."
        - state:
            set:
              offer_attempts: { from_state: offer_attempts }
              current_rank: { from_hook: advance_current_rank }
              current_channel: { from_hook: advance_current_channel }
              process_status: { const: OFFERED }
            note: "ADVANCE branch: offer_attempts += 1 and current_rank/current_channel advance to the next ranked channel (the orchestrator computes the walk step — arithmetic/selection the value forms cannot carry); the run stays OFFERED awaiting the answer."
        - guard:
            skip: true
            note: "A next channel remained → the job was re-offered; the run ends here. Otherwise (walk exhausted) fall through to the terminal failure."
        - deliver:
            event: { $ref: 'events.yaml#/DeliveryDispatchFailed' }
            to: { $ref: 'actors.yaml#/DeliveryJob' }
            with:
              deliveryJobId: { from: { $ref: 'events.yaml#/DeliveryRejectedByPartner/properties/deliveryJobId' } }
              orderId: { from_state: order_id }
              restaurantId: { from_state: restaurant_id }
              attempts: { from_state: offer_attempts }
              lastReason: { from: { $ref: 'events.yaml#/DeliveryRejectedByPartner/properties/reason' } }
            note: "EXHAUSTED branch: the terminal dispatch-failure fact — View_DeliveryJob/OrderTracking surface it to the restaurant for manual handling."
        - state:
            set: { process_status: { const: FAILED } }
            note: "The run closes FAILED — fail-closed after walking every ranked channel (rules.yaml#/DispatchExhaustionFailsClosed)."

    - message: { $ref: 'events.yaml#/DeliveryEscalationRequested' }
      description: >
        A manual operator escalate (EscalateDelivery → DeliveryEscalationRequested, #60): SKIP the channel
        currently offered and ADVANCE the ranked walk now — identical advance behaviour to a partner
        decline. If a next ranked channel remains, offer it and stay OFFERED; when the walk is exhausted,
        fail the dispatch closed.
      steps:
        - state:
            by: { delivery_job_id: { from: { $ref: 'events.yaml#/DeliveryEscalationRequested/properties/deliveryJobId' } } }
            note: "Load the dispatch run for this job."
        - guard:
            throws: { $ref: 'errors.yaml#/DeliveryJobNotFound' }
            note: "ERROR — an escalate for an unknown dispatch run; abort and surface."
        - state:
            expect: { process_status: { const: OFFERED } }
            note: "Only an outstanding offer can be escalated — an escalate on a SELF_DISPATCHED / resolved / terminal run skips (benign)."
        - call:
            port: delivery
            operation: offer_job
            note: "ADVANCE branch (channels remain — skipped on the exhausted walk): the strategy hook selects the NEXT ranked channel and offer_job offers the job on it (#60)."
        - state:
            set:
              offer_attempts: { from_state: offer_attempts }
              current_rank: { from_hook: advance_current_rank }
              current_channel: { from_hook: advance_current_channel }
              process_status: { const: OFFERED }
            note: "ADVANCE branch: offer_attempts += 1 and current_rank/current_channel advance to the next ranked channel (the orchestrator computes the walk step); the run stays OFFERED."
        - guard:
            skip: true
            note: "A next channel remained → the job was re-offered; the run ends here. Otherwise (walk exhausted) fall through to the terminal failure."
        - deliver:
            event: { $ref: 'events.yaml#/DeliveryDispatchFailed' }
            to: { $ref: 'actors.yaml#/DeliveryJob' }
            with:
              deliveryJobId: { from: { $ref: 'events.yaml#/DeliveryEscalationRequested/properties/deliveryJobId' } }
              orderId: { from_state: order_id }
              restaurantId: { from_state: restaurant_id }
              attempts: { from_state: offer_attempts }
              lastReason: { from: { $ref: 'events.yaml#/DeliveryEscalationRequested/properties/reason' } }
            note: "EXHAUSTED branch: the operator escalated past the last ranked channel — the terminal dispatch-failure fact."
        - state:
            set: { process_status: { const: FAILED } }
            note: "The run closes FAILED — fail-closed after walking every ranked channel (rules.yaml#/DispatchExhaustionFailsClosed)."

    - message: { $ref: 'events.yaml#/DeliveryOfferTimedOut' }
      description: >
        An outstanding offer expired (DeliveryOfferTimeoutWorker → DeliveryOfferTimedOut, #60): ADVANCE the
        ranked walk to the next channel — identical advance behaviour to a partner decline. If a next
        ranked channel remains, offer it and stay OFFERED; when the walk is exhausted, fail the dispatch
        closed.
      steps:
        - state:
            by: { delivery_job_id: { from: { $ref: 'events.yaml#/DeliveryOfferTimedOut/properties/deliveryJobId' } } }
            note: "Load the dispatch run for this job."
        - guard:
            throws: { $ref: 'errors.yaml#/DeliveryJobNotFound' }
            note: "ERROR — a timeout for an unknown dispatch run; abort and surface."
        - state:
            expect: { process_status: { const: OFFERED } }
            note: "Only an outstanding offer can time out — a timeout on a SELF_DISPATCHED / resolved / terminal run skips (benign; the worker races the answer)."
        - call:
            port: delivery
            operation: offer_job
            note: "ADVANCE branch (channels remain — skipped on the exhausted walk): the strategy hook selects the NEXT ranked channel and offer_job offers the job on it (#60)."
        - state:
            set:
              offer_attempts: { from_state: offer_attempts }
              current_rank: { from_hook: advance_current_rank }
              current_channel: { from_hook: advance_current_channel }
              process_status: { const: OFFERED }
            note: "ADVANCE branch: offer_attempts += 1 and current_rank/current_channel advance to the next ranked channel (the orchestrator computes the walk step); the run stays OFFERED."
        - guard:
            skip: true
            note: "A next channel remained → the job was re-offered; the run ends here. Otherwise (walk exhausted) fall through to the terminal failure."
        - deliver:
            event: { $ref: 'events.yaml#/DeliveryDispatchFailed' }
            to: { $ref: 'actors.yaml#/DeliveryJob' }
            with:
              deliveryJobId: { from: { $ref: 'events.yaml#/DeliveryOfferTimedOut/properties/deliveryJobId' } }
              orderId: { from_state: order_id }
              restaurantId: { from_state: restaurant_id }
              attempts: { from_state: offer_attempts }
              lastReason: { from: { $ref: 'events.yaml#/DeliveryOfferTimedOut/properties/reason' } }
            note: "EXHAUSTED branch: the last ranked channel's offer timed out — the terminal dispatch-failure fact."
        - state:
            set: { process_status: { const: FAILED } }
            note: "The run closes FAILED — fail-closed after walking every ranked channel (rules.yaml#/DispatchExhaustionFailsClosed)."

    - message: { $ref: 'events.yaml#/DeliveryStatusUpdated' }
      description: "Partner-reported progress: only the terminal DELIVERED report closes the order."
      steps:
        - guard:
            that: { message: { status: { const: DELIVERED } } }
            skip: true
        - state:
            by: { delivery_job_id: { from: { $ref: 'events.yaml#/DeliveryStatusUpdated/properties/deliveryJobId' } } }
            note: "Load the dispatch run for this job."
        - guard:
            throws: { $ref: 'errors.yaml#/DeliveryJobNotFound' }
            note: "ERROR — a DELIVERED report for an unknown dispatch run; abort and surface."
        - send:
            command: { $ref: 'commands.yaml#/MarkOrderDelivered' }
            to: { $ref: 'actors.yaml#/Order' }
            with:
              orderId: { from_state: order_id }
              restaurantId: { from_state: restaurant_id }
            note: "The Order validates the transition — a terminal cancelled/rejected order is never resurrected (rejection → skip)."
        - state:
            set: { process_status: { const: COMPLETED } }

    - message: { $ref: 'events.yaml#/DeliveryCompleted' }
      description: "An independent rider completed the delivery: close the order."
      steps:
        - state:
            by: { delivery_job_id: { from: { $ref: 'events.yaml#/DeliveryCompleted/properties/deliveryJobId' } } }
            note: "Load the dispatch run for this job."
        - guard:
            throws: { $ref: 'errors.yaml#/DeliveryJobNotFound' }
            note: "ERROR — a completion for an unknown dispatch run; abort and surface."
        - send:
            command: { $ref: 'commands.yaml#/MarkOrderDelivered' }
            to: { $ref: 'actors.yaml#/Order' }
            with:
              orderId: { from_state: order_id }
              restaurantId: { from_state: restaurant_id }
            note: "The Order validates the transition — a terminal cancelled/rejected order is never resurrected (rejection → skip)."
        - state:
            set: { process_status: { const: COMPLETED } }
