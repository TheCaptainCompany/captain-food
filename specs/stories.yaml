version: 1
description: >
  Captain.Food STORY MAP — personas → activities → steps. Each step `$ref`s the api.yaml query/mutation
  that realizes it (codegen validates the ref resolves). `personaRole` maps the persona to its
  scalars.yaml#/UserType; the codegen checks every step's operation is callable by that role
  (the op is @public, or the role is in the op's `roles`). This file is product knowledge — it does not
  define new operations, only wires personas to the existing api surface.

# Two restaurant-side roles (see UserType): the OWNER manages the account — locations + catalog
# (HubRise restaurant); the MANAGER runs a single location — order operations (HubRise location).

public_user:
  description: A visitor browsing Captain.Food without being logged in.
  personaRole: PUBLIC
  locale: fr-FR   # expected language (V0 launches in Tours, France)
  goals:
    - Explore available restaurants and dishes.
    - Build a cart before deciding to sign up.
  frustrations:
    - Limited features without an account.
    - Cannot save favorites without registering.
  activities:
    BrowseForFood:
      description: As a visitor, I browse restaurants and build a cart without logging in.
      steps:
        SearchRestaurants: { $ref: 'api.yaml#/queries/restaurants' }
        SelectRestaurant: { $ref: 'api.yaml#/queries/restaurant' }
        BrowseCatalog: { $ref: 'api.yaml#/queries/catalog' }
        AddToCartLine: { $ref: 'api.yaml#/mutations/addCartLine' }
        RemoveFromCart: { $ref: 'api.yaml#/mutations/removeCartLine' }
        ChangeCartLineQuantity: { $ref: 'api.yaml#/mutations/changeCartLineQuantity' }
        EnterPhone: { $ref: 'api.yaml#/queries/phoneCountries' }
        RequestPhoneOtp: { $ref: 'api.yaml#/mutations/requestPhoneVerification' }
        VerifyPhone: { $ref: 'api.yaml#/mutations/verifyPhone' }

customer:
  description: An authenticated person who orders food via Captain.Food.
  personaRole: CUSTOMER
  locale: fr-FR   # expected language (V0 launches in Tours, France)
  goals:
    - Order food from favorite restaurants.
    - Track order status and delivery.
  frustrations:
    - Long delivery times.
    - Difficulty finding specific dishes.
  activities:
    OrderFood:
      description: As a customer, I order food and follow it through to rating.
      steps:
        SearchRestaurants: { $ref: 'api.yaml#/queries/restaurants' }
        SelectRestaurant: { $ref: 'api.yaml#/queries/restaurant' }
        BrowseCatalog: { $ref: 'api.yaml#/queries/catalog' }
        AddToCartLine: { $ref: 'api.yaml#/mutations/addCartLine' }
        RemoveFromCart: { $ref: 'api.yaml#/mutations/removeCartLine' }
        ChangeCartLineQuantity: { $ref: 'api.yaml#/mutations/changeCartLineQuantity' }
        SeeCheckoutBreakdown: { $ref: 'api.yaml#/queries/cart' }   # transparent fee breakdown before paying (ADR-0018)
        CompareWithUberEats: { $ref: 'api.yaml#/queries/cart' }   # labelled Uber Eats price + who-gets-what comparison (ADR-0022/0025); also on catalog offers + the order receipt
        ViewMyCarts: { $ref: 'api.yaml#/queries/carts' }   # one OPEN cart per restaurant
        BrowseCategories: { $ref: 'api.yaml#/queries/categories' }   # category tree for filtering/discovery
        PlaceOrder: { $ref: 'api.yaml#/mutations/placeOrder' }
        PollOperationStatus: { $ref: 'api.yaml#/queries/operation' }   # pull counterpart of the operationStatusChanged subscription
        TrackOrderStatus: { $ref: 'api.yaml#/queries/order' }
        TrackDelivery: { $ref: 'api.yaml#/queries/delivery' }   # live courier/delivery progress (ADR-0031)
        CancelOrder: { $ref: 'api.yaml#/mutations/cancelOrderByCustomer' }
        RateOrder: { $ref: 'api.yaml#/mutations/rateOrder' }
        RateRestaurant: { $ref: 'api.yaml#/mutations/rateRestaurant' }
        TipRiderRestaurantOrCaptain: { $ref: 'api.yaml#/mutations/tipOrder' }
        RequestRefund: { $ref: 'api.yaml#/mutations/requestRefund' }
    FavoriteRestaurant:
      description: As a customer, I keep a list of favorite restaurants.
      steps:
        MarkAsFavorite: { $ref: 'api.yaml#/mutations/markRestaurantAsFavorite' }
        UnmarkAsFavorite: { $ref: 'api.yaml#/mutations/unmarkRestaurantAsFavorite' }
        ViewFavorites: { $ref: 'api.yaml#/queries/favoriteRestaurants' }
    ConfigureProfile:
      description: As a customer, I manage my profile, preferences, addresses and payment method.
      steps:
        ViewProfile: { $ref: 'api.yaml#/queries/me' }
        UpdatePersonalInfo: { $ref: 'api.yaml#/mutations/updateCustomerInfo' }
        ChangeLanguage: { $ref: 'api.yaml#/mutations/changeLanguage' }
        VerifyEmail: { $ref: 'api.yaml#/mutations/requestEmailVerification' }
        ConfirmEmail: { $ref: 'api.yaml#/mutations/confirmEmailVerification' }
        ChangePhone: { $ref: 'api.yaml#/mutations/requestPhoneChange' }
        ConfirmPhoneChange: { $ref: 'api.yaml#/mutations/confirmPhoneChange' }
        SetPreferences: { $ref: 'api.yaml#/mutations/setCustomerPreferences' }
        SetAddress: { $ref: 'api.yaml#/mutations/setCustomerAddress' }
        RemoveAddress: { $ref: 'api.yaml#/mutations/removeCustomerAddress' }
        SetPaymentMethod: { $ref: 'api.yaml#/mutations/setCustomerPaymentMethod' }

restaurant_owner:
  description: >
    Owns a restaurant ACCOUNT (HubRise restaurant). Manages the account, its locations, and the catalog.
    May also act as a manager, but that is a separate role.
  personaRole: RESTAURANT_ACCOUNT
  locale: fr-FR   # expected language (V0 launches in Tours, France)
  goals:
    - Run multiple locations under one account.
    - Keep the catalog accurate across locations.
  frustrations:
    - Commission fees across locations.
    - Maintaining consistency between locations.
  activities:
    ManageAccount:
      description: As an owner, I manage my restaurant account.
      steps:
        RegisterAccount: { $ref: 'api.yaml#/mutations/registerRestaurantAccount' }
        UpdateAccount: { $ref: 'api.yaml#/mutations/updateRestaurantAccount' }
        DeleteAccount: { $ref: 'api.yaml#/mutations/deleteRestaurantAccount' }
    ManageLocations:
      description: As an owner, I add and maintain the locations under my account.
      steps:
        AddLocation: { $ref: 'api.yaml#/mutations/registerRestaurant' }
        ActivateLocation: { $ref: 'api.yaml#/mutations/activateRestaurant' }
        DeactivateLocation: { $ref: 'api.yaml#/mutations/deactivateRestaurant' }
        UpdateLocationProfile: { $ref: 'api.yaml#/mutations/updateRestaurant' }
        RemoveLocation: { $ref: 'api.yaml#/mutations/removeRestaurant' }
        ViewAllLocations: { $ref: 'api.yaml#/queries/restaurantLocationsByAccount' }
    ClaimListing:
      description: As an owner, I claim my pre-listed restaurant (proven via Google Business Profile) and point Google's "Order online" button at my page.
      steps:
        FindMyListing: { $ref: 'api.yaml#/queries/restaurant' }
        ClaimIt: { $ref: 'api.yaml#/mutations/claimRestaurantListing' }
        OptOut: { $ref: 'api.yaml#/mutations/optOutRestaurantListing' }
        ConfigureGoogleOrderButton: { $ref: 'api.yaml#/mutations/configureGbpOrderLink' }
        VerifyGoogleOrderButton: { $ref: 'api.yaml#/mutations/verifyGbpOrderLink' }
    ManageCatalog:
      description: As an owner, I build and maintain the catalog.
      steps:
        ViewCatalog: { $ref: 'api.yaml#/queries/catalog' }
        CreateCatalog: { $ref: 'api.yaml#/mutations/createCatalog' }
        AddProduct: { $ref: 'api.yaml#/mutations/addProduct' }
        UpdateProduct: { $ref: 'api.yaml#/mutations/updateProduct' }
        RemoveProduct: { $ref: 'api.yaml#/mutations/removeProduct' }
        AddCategory: { $ref: 'api.yaml#/mutations/addCatalogCategory' }
        UpdateCategory: { $ref: 'api.yaml#/mutations/updateCatalogCategory' }
        RemoveCategory: { $ref: 'api.yaml#/mutations/removeCatalogCategory' }
        AddOptionList: { $ref: 'api.yaml#/mutations/addOptionList' }
        UpdateOptionList: { $ref: 'api.yaml#/mutations/updateOptionList' }
        RemoveOptionList: { $ref: 'api.yaml#/mutations/removeOptionList' }
        UpdateStock: { $ref: 'api.yaml#/mutations/updateOfferStock' }
        ImportCatalog: { $ref: 'api.yaml#/mutations/importCatalog' }

restaurant_manager:
  description: >
    Runs a SINGLE location (HubRise location): handles the live order queue. Assigned by the owner; can
    only manage the location they are assigned to.
  personaRole: RESTAURANT
  locale: fr-FR   # expected language (V0 launches in Tours, France)
  goals:
    - Process incoming orders quickly and accurately.
    - Keep the kitchen's acceptance mode in sync with capacity.
  frustrations:
    - Inaccurate order details.
    - Managing peak order times.
  activities:
    ManageOrders:
      description: As a manager, I work the incoming order queue for my location.
      steps:
        ViewIncomingOrders: { $ref: 'api.yaml#/queries/orders' }
        AcceptOrder: { $ref: 'api.yaml#/mutations/acceptOrder' }
        RejectOrder: { $ref: 'api.yaml#/mutations/rejectOrder' }
        StartPreparation: { $ref: 'api.yaml#/mutations/startPreparation' }
        MarkOrderReady: { $ref: 'api.yaml#/mutations/markOrderReady' }
        MarkCollected: { $ref: 'api.yaml#/mutations/markOrderDelivered' }   # COLLECTION hand-over at pickup
        SetAcceptanceMode: { $ref: 'api.yaml#/mutations/changeOrderAcceptanceMode' }
        CancelOrder: { $ref: 'api.yaml#/mutations/cancelOrderByRestaurant' }
        ThankRiderOrCaptain: { $ref: 'api.yaml#/mutations/tipOrder' }   # restaurant tips the courier / Captain (ADR-012)
        ApproveRefund: { $ref: 'api.yaml#/mutations/approveRefund' }   # decide a pending refund on my own orders (RefundProcess)
        DenyRefund: { $ref: 'api.yaml#/mutations/denyRefund' }
    TrackDeliveries:
      description: As a manager, I track the couriers delivering my ready orders (ADR-0031).
      steps:
        ViewDeliveries: { $ref: 'api.yaml#/queries/restaurantDeliveries' }
        CancelDelivery: { $ref: 'api.yaml#/mutations/cancelDelivery' }

rider:
  description: A courier who delivers orders from restaurants to customers.
  personaRole: RIDER
  locale: fr-FR   # expected language (V0 launches in Tours, France)
  goals:
    - Deliver orders promptly.
    - Maintain a good rating.
  frustrations:
    - Traffic and navigation.
    - Unclear delivery addresses.
  activities:
    Deliver:
      description: As an independent rider, I pick up assigned deliveries and record hand-over (ADR-0031).
      steps:
        ViewMyDeliveries: { $ref: 'api.yaml#/queries/myDeliveries' }
        AcceptDelivery: { $ref: 'api.yaml#/mutations/acceptDelivery' }
        ConfirmPickup: { $ref: 'api.yaml#/mutations/confirmPickup' }
        CompleteDelivery: { $ref: 'api.yaml#/mutations/completeDelivery' }
        TrackDelivery: { $ref: 'api.yaml#/queries/delivery' }

admin:
  description: A platform operator who onboards accounts and oversees the platform.
  personaRole: ADMIN
  locale: fr-FR   # expected language (V0 launches in Tours, France)
  goals:
    - Onboard restaurant accounts.
    - Keep the platform healthy.
  frustrations:
    - Handling outages and support escalations.
  activities:
    OnboardRestaurants:
      description: As an admin, I onboard accounts and activate restaurants.
      steps:
        RegisterAccount: { $ref: 'api.yaml#/mutations/registerRestaurantAccount' }
        AddLocation: { $ref: 'api.yaml#/mutations/registerRestaurant' }
        ActivateRestaurant: { $ref: 'api.yaml#/mutations/activateRestaurant' }
        ImportCatalog: { $ref: 'api.yaml#/mutations/importCatalog' }
    ManageListings:
      description: As an admin, I curate the restaurant listings and partnership funnel.
      steps:
        BrowseListings: { $ref: 'api.yaml#/queries/restaurants' }
        ChangeListingStatus: { $ref: 'api.yaml#/mutations/changeRestaurantListingStatus' }
        MarkClosed: { $ref: 'api.yaml#/mutations/markRestaurantClosed' }
    Prospection:
      description: As an admin, I work the B2B prospection pipeline (scored leads, log replies).
      steps:
        ReviewPipeline: { $ref: 'api.yaml#/queries/prospectionPipeline' }
        LogReply: { $ref: 'api.yaml#/mutations/recordProspectReply' }
    ArbitrateRefunds:
      description: As an admin, I arbitrate pending refund requests when the restaurant does not decide (RefundProcess).
      steps:
        ApproveRefund: { $ref: 'api.yaml#/mutations/approveRefund' }
        DenyRefund: { $ref: 'api.yaml#/mutations/denyRefund' }
    Pricing:
      description: As an admin, I review the service-fee policy and set each restaurant's margin (ADR-0016/0017).
      steps:
        ReviewPolicy: { $ref: 'api.yaml#/queries/pricingPolicy' }
        SetRestaurantMargin: { $ref: 'api.yaml#/mutations/updateRestaurant' }
        ReviewUberEstimationPolicy: { $ref: 'api.yaml#/queries/uberEstimationPolicy' }   # Uber comparison calibration (ADR-0024/0030)
        ReviewUberSplitPolicy: { $ref: 'api.yaml#/queries/uberSplitPolicy' }

restaurant_sync:
  description: >
    The Sirene/Google sync ACL (a scheduled worker) acting as an EXTERNAL caller. It seeds and refreshes
    public listings on the restaurants' behalf — no human; it issues the same commands an owner would.
  personaRole: EXTERNAL
  locale: fr-FR
  goals:
    - Seed Touraine restaurant listings from open data before any agreement.
    - Keep listings fresh (enrichment + closures).
  frustrations:
    - Source data gaps (SIRET shared by dark kitchens; Sirene closure lag).
  activities:
    SyncListings:
      description: As the sync ACL, I register, enrich and close listings via the API.
      steps:
        SeedListing: { $ref: 'api.yaml#/mutations/registerRestaurant' }
        EnrichGoogleProfile: { $ref: 'api.yaml#/mutations/updateRestaurantGoogleBusinessProfile' }
        MarkClosed: { $ref: 'api.yaml#/mutations/markRestaurantClosed' }
    Prospection:
      description: As the prospection worker, I contact scored prospects and mark them cold per the schedule.
      steps:
        ContactProspect: { $ref: 'api.yaml#/mutations/recordProspectContact' }
        MarkCold: { $ref: 'api.yaml#/mutations/markProspectCold' }
