version: 3
description: >
  Captain.Food domain model and business events spec.
  Technical envelope fields (eventId, aggregateType, aggregateId, occurredAt, the ACTING USER
  (user_id/user_type), metadata...) are added by infrastructure and MUST NOT be mixed with these payloads.
  NOTE:
  - These are BUSINESS event payloads only.
  - No aggregateType, eventId, occurredAt or metadata here — and NO actor/user id (createdBy/updatedBy/
    changedBy/…): WHO performed the event is envelope metadata, recorded on domain_events.user_id (ADR-0041),
    never duplicated into every payload. (A business ROLE that changes semantics — e.g. Tipper — stays.)
  - Each event MUST be strictly typed and reference scalars/entities above.
  - Catalog is aligned with HubRise (Product/Offer/OptionList). "Updated" events
    carry the FULL updated entity (replace semantics), not a partial diff.

# =====================================================================
# Restaurant
# =====================================================================

RestaurantAccountRegistered:
  description: "A restaurant account (HubRise: restaurant) was created; it owns one or more locations."
  type: object
  properties:
    restaurantAccountId:
      $ref: 'scalars.yaml#/RestaurantAccountId'
    ref:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
    legalName:
      $ref: 'scalars.yaml#/RestaurantLegalName'
    contact:
      $ref: 'entities.yaml#/RestaurantContact'
      nullable: true
    defaultCurrency:
      $ref: 'scalars.yaml#/CurrencyCode'
    defaultTaxRate:
      $ref: 'entities.yaml#/TaxRate'
    timezone:
      $ref: 'scalars.yaml#/TimeZone'
      nullable: true
  required:
    - restaurantAccountId
    - legalName
    - defaultCurrency
    - defaultTaxRate

RestaurantAccountUpdated:
  description: "One or more account-level fields changed (legal name, contact, default tax, timezone)."
  type: object
  properties:
    restaurantAccountId:
      $ref: 'scalars.yaml#/RestaurantAccountId'
    legalName:
      $ref: 'scalars.yaml#/RestaurantLegalName'
      nullable: true
    contact:
      $ref: 'entities.yaml#/RestaurantContact'
      nullable: true
    defaultTaxRate:
      $ref: 'entities.yaml#/TaxRate'
      nullable: true
    timezone:
      $ref: 'scalars.yaml#/TimeZone'
      nullable: true
  required:
    - restaurantAccountId

RestaurantAccountDeleted:
  description: "A restaurant account was closed/deleted."
  type: object
  properties:
    restaurantAccountId:
      $ref: 'scalars.yaml#/RestaurantAccountId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required:
    - restaurantAccountId

RestaurantRegistered:
  description: >
    A restaurant location has been registered. Covers every path: an owner/admin onboarding a partner
    location (with accountId), or the Sirene/Google sync ACL seeding a public NON_PARTNER listing
    (no accountId). The listingStatus and externalIdentifiers distinguish them.
  type: object
  properties:
    mode: { $ref: 'scalars.yaml#/Mode' }   # test mode (ADR-0038); optional, absent = LIVE
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    accountId:
      $ref: 'scalars.yaml#/RestaurantAccountId'
      nullable: true
    listingStatus:
      $ref: 'scalars.yaml#/RestaurantListingStatus'
    ref:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
    externalIdentifiers:
      type: array
      items:
        $ref: 'entities.yaml#/ExternalIdentifier'
    slug:
      $ref: 'scalars.yaml#/Slug'
    displayName:
      $ref: 'scalars.yaml#/RestaurantDisplayName'
    contact:
      $ref: 'entities.yaml#/RestaurantContact'
      nullable: true
    website:
      $ref: 'scalars.yaml#/WebUrl'
      nullable: true
    tags:
      type: array
      items:
        $ref: 'scalars.yaml#/Tag'
    marginRate:
      $ref: 'scalars.yaml#/MarginPercent'
      nullable: true
    cuisineCategory:
      $ref: 'scalars.yaml#/CuisineCategory'
      nullable: true
    uberPricesOptIn:
      type: boolean
      nullable: true
    address:
      $ref: 'entities.yaml#/Address'
    location:
      $ref: 'entities.yaml#/GeoPoint'
      nullable: true
    timezone:
      $ref: 'scalars.yaml#/TimeZone'
      nullable: true
    preparationTimeMinutes:
      type: integer
      minimum: 0
      nullable: true
    openingHours:
      type: array
      items:
        $ref: 'entities.yaml#/OpeningHoursSlot'
  required:
    - restaurantId
    - listingStatus
    - slug
    - displayName
    - address

RestaurantUpdated:
  description: "One or more editable LOCATION fields of a restaurant have changed."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    displayName:
      $ref: 'scalars.yaml#/RestaurantDisplayName'
      nullable: true
    contact:
      $ref: 'entities.yaml#/RestaurantContact'
      nullable: true
    website:
      $ref: 'scalars.yaml#/WebUrl'
      nullable: true
    tags:
      type: array
      items:
        $ref: 'scalars.yaml#/Tag'
      nullable: true
    marginRate:
      $ref: 'scalars.yaml#/MarginPercent'
      nullable: true
    cuisineCategory:
      $ref: 'scalars.yaml#/CuisineCategory'
      nullable: true
    uberPricesOptIn:
      type: boolean
      nullable: true
    address:
      $ref: 'entities.yaml#/Address'
      nullable: true
    location:
      $ref: 'entities.yaml#/GeoPoint'
      nullable: true
    timezone:
      $ref: 'scalars.yaml#/TimeZone'
      nullable: true
    preparationTimeMinutes:
      type: integer
      minimum: 0
      nullable: true
    openingHours:
      type: array
      items:
        $ref: 'entities.yaml#/OpeningHoursSlot'
      nullable: true
  required:
    - restaurantId

RestaurantActivated:
  description: "Restaurant is now visible and orderable by customers."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required:
    - restaurantId

RestaurantDeactivated:
  description: "Restaurant can no longer receive orders."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required:
    - restaurantId

RestaurantAcceptanceModeChanged:
  description: "Restaurant toggled its order acceptance mode (e.g. busy, paused)."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    mode:
      $ref: 'scalars.yaml#/OrderAcceptanceMode'
  required:
    - restaurantId
    - mode

RestaurantRemoved:
  description: "A location was removed (delisted) from its account."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    accountId:
      $ref: 'scalars.yaml#/RestaurantAccountId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required:
    - restaurantId
    - accountId

RestaurantGoogleBusinessProfileUpdated:
  description: >
    GBP-SPECIFIC metrics for the restaurant's Google Business Profile (place id + Google's rating/reviews)
    were observed/refreshed. Carries ONLY data intrinsic to the Google listing — never general restaurant
    info (name/address/hours/phone/website/tags), which flows through Register/UpdateRestaurant. This keeps
    Sirene and Google feeding the same restaurant side-by-side with no cross-source dependency.
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    googlePlaceId:
      $ref: 'scalars.yaml#/GooglePlaceId'
      nullable: true
    rating:
      $ref: 'scalars.yaml#/GoogleRating'
      nullable: true
    reviewsCount:
      type: integer
      minimum: 0
      nullable: true
  required:
    - restaurantId

RestaurantListingClaimed:
  description: "An owner proved ownership of the listing (Google Business Profile verification) and claimed it."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    accountId:
      $ref: 'scalars.yaml#/RestaurantAccountId'
      nullable: true
    proof:
      type: string
      maxLength: 255
      description: "Reference to the accepted Google ownership proof (audit; the token itself is not stored)."
  required:
    - restaurantId

RestaurantListingOptedOut:
  description: "An owner asked to edit/remove their public listing (opt-out), proven via GBP ownership."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required:
    - restaurantId

RestaurantMarkedClosed:
  description: "The establishment was reported closed (e.g. Sirene closure); recorded via the sync ACL."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required:
    - restaurantId

RestaurantListingStatusChanged:
  description: "The partnership funnel status changed (NON_PARTNER → PASSIVE_PARTNER → ACTIVE_PARTNER)."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    listingStatus:
      $ref: 'scalars.yaml#/RestaurantListingStatus'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required:
    - restaurantId
    - listingStatus

RestaurantGoogleBusinessProfileOrderLinkConfigured:
  description: "The restaurant's GBP 'Order online' link was set to its {slug}.captain.food page (ADR-0021; V1)."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    gbpOrderUrl:
      $ref: 'scalars.yaml#/WebUrl'
  required:
    - restaurantId
    - gbpOrderUrl

RestaurantGoogleBusinessProfileOrderLinkVerified:
  description: "The configured GBP 'Order online' link was pinged and its live status recorded (ADR-0021; V1)."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    status:
      $ref: 'scalars.yaml#/GbpLinkStatus'
  required:
    - restaurantId
    - status

# --- Prospection (ADR-0020). Facts only — the score is a read-model projection, never an event. ---

ProspectContacted:
  description: "A B2B outreach contact was made to a prospect (NON_PARTNER listing) in the sequence."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    channel:
      $ref: 'scalars.yaml#/OutreachChannel'
    sequenceStep:
      type: integer
      minimum: 0
      description: "Day-offset step in the sequence (e.g. 0 = J+0, 7 = J+7 relance, 21 = J+21)."
  required:
    - restaurantId
    - channel
    - sequenceStep

ProspectMarkedCold:
  description: "A prospect was marked cold (e.g. no reply by J+21); the outreach sequence stops."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required:
    - restaurantId

ProspectReplied:
  description: "A prospect replied to outreach; the sequence stops pending human follow-up."
  type: object
  properties:
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    note:
      type: string
      maxLength: 500
      nullable: true
  required:
    - restaurantId

# =====================================================================
# Catalog (Catalog / CatalogCategory / Product / Offer / OptionList)
# =====================================================================

CatalogCreated:
  description: "A new catalog has been created for a restaurant."
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    ref:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    name:
      $ref: 'scalars.yaml#/CatalogName'
  required:
    - catalogId
    - restaurantId
    - name

CatalogCategoryAdded:
  description: "A category has been added to a catalog."
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    category:
      $ref: 'entities.yaml#/CatalogCategory'
  required:
    - catalogId
    - restaurantId
    - category

CatalogCategoryUpdated:
  description: "An existing category has been updated (full replace)."
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    category:
      $ref: 'entities.yaml#/CatalogCategory'
  required:
    - catalogId
    - restaurantId
    - category

CatalogCategoryRemoved:
  description: "A category has been removed from a catalog."
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    productCategoryId:
      $ref: 'scalars.yaml#/ProductCategoryId'
  required:
    - catalogId
    - restaurantId
    - productCategoryId

ProductAdded:
  description: "A new product (with its offers) has been added to a catalog."
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    product:
      $ref: 'entities.yaml#/Product'
  required:
    - catalogId
    - restaurantId
    - product

ProductUpdated:
  description: "An existing product has been updated (full replace, including offers)."
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    product:
      $ref: 'entities.yaml#/Product'
  required:
    - catalogId
    - restaurantId
    - product

ProductRemoved:
  description: "A product has been removed from a catalog."
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    productId:
      $ref: 'scalars.yaml#/ProductId'
  required:
    - catalogId
    - restaurantId
    - productId

OptionListAdded:
  description: "An option list (modifier group) has been added to a catalog."
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    optionList:
      $ref: 'entities.yaml#/OptionList'
  required:
    - catalogId
    - restaurantId
    - optionList

OptionListUpdated:
  description: "An existing option list has been updated (full replace)."
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    optionList:
      $ref: 'entities.yaml#/OptionList'
  required:
    - catalogId
    - restaurantId
    - optionList

OptionListRemoved:
  description: "An option list has been removed from a catalog."
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    optionListId:
      $ref: 'scalars.yaml#/OptionListId'
  required:
    - catalogId
    - restaurantId
    - optionListId

OfferStockUpdated:
  description: "Inventory level of a offer changed (e.g. HubRise inventory sync)."
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    offerId:
      $ref: 'scalars.yaml#/OfferId'
    stock:
      $ref: 'entities.yaml#/Stock'
  required:
    - catalogId
    - restaurantId
    - offerId
    - stock

CatalogImported:
  description: >
    A full catalog was imported/synced from an external source (e.g. HubRise),
    replacing the current catalog content for the restaurant.
  type: object
  properties:
    catalogId:
      $ref: 'scalars.yaml#/CatalogId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    source:
      type: string
      enum: [HUBRISE, MANUAL]
    categories:
      type: array
      items:
        $ref: 'entities.yaml#/CatalogCategory'
    products:
      type: array
      items:
        $ref: 'entities.yaml#/Product'
    optionLists:
      type: array
      items:
        $ref: 'entities.yaml#/OptionList'
  required:
    - catalogId
    - restaurantId
    - source
    - categories
    - products
    - optionLists

# =====================================================================
# Customer
# =====================================================================
# Identity/credentials are managed by the auth provider (Supabase Auth).
# Only the creation of the domain Customer is an event. Sign-in, password
# reset, token refresh and sessions are NOT domain events.

CustomerRegistered:
  description: >
    A customer account was created on first phone verification (passwordless OTP,
    identity managed by the auth provider). Phone number is the primary identifier.
  type: object
  properties:
    mode: { $ref: 'scalars.yaml#/Mode' }   # test mode (ADR-0038); optional, absent = LIVE
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    authRef:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
      description: "Auth provider user id (e.g. Supabase Auth), linking identity to this Customer."
    phone:
      $ref: 'scalars.yaml#/PhoneNumber'
    displayName:
      $ref: 'scalars.yaml#/CustomerDisplayName'
      nullable: true
    email:
      $ref: 'scalars.yaml#/EmailAddress'
      nullable: true
      description: "Optional, e.g. captured later for receipts."
    locale:
      $ref: 'scalars.yaml#/Locale'
      nullable: true
      description: "Preferred culture (language + date/time/number display)."
    timezone:
      $ref: 'scalars.yaml#/TimeZone'
      nullable: true
  required:
    - customerId
    - phone

CustomerIdentified:
  description: >
    A returning visitor signed in and was resolved to an existing Customer (authRef → customerId).
    NOT an auth event (OTP/session live in the auth provider): this records the DOMAIN fact so the
    visitor's OPEN guest carts can be bound to the customerId — letting carts started on different
    devices converge under one customer and be merged at checkout.
    Thanks to the sessionId, the existing open cart(s) can be bound to the customerId and merged at checkout. This is a domain event, not an auth event.
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    authRef:
      $ref: 'scalars.yaml#/ExternalReference'
      description: "Auth provider user id that was matched to this Customer (via Customer.auth_ref)."
    sessionId:
      $ref: 'scalars.yaml#/SessionId'
      description: "Session id (ADR-0041) for the sign-in event; not required for cart binding."
  required:
    - customerId
    - authRef
    - sessionId

CartBoundToCustomer:
  description: >
    A cart that was started by a guest visitor (no customerId) was bound to a Customer after sign-in.
    This is a domain event, not an auth event. The cartId is the same as the original guest cart; the
    cart's customerId is now set to the signed-in customer.
  type: object
  properties:
    cartId:
      $ref: 'scalars.yaml#/CartId'
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
  required:
    - cartId
    - customerId

RestaurantFavorited:
  description: "Customer marked a restaurant as a favorite."
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
  required: [customerId, restaurantId]

RestaurantUnfavorited:
  description: "Customer removed a restaurant from their favorites."
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
  required: [customerId, restaurantId]

CustomerInfoUpdated:
  description: "Customer updated their display name. (Email is verified-only — see CustomerEmailVerified.)"
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    displayName:
      $ref: 'scalars.yaml#/CustomerDisplayName'
      nullable: true
  required: [customerId]

CustomerEmailVerified:
  description: "An email was verified (Supabase magic link) and linked to the Customer — initial set OR a later change."
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    email:
      $ref: 'scalars.yaml#/EmailAddress'
  required: [customerId, email]

CustomerPhoneChanged:
  description: "The Customer's phone was changed after re-verification (canonical E.164)."
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    phone:
      $ref: 'scalars.yaml#/PhoneNumber'
  required: [customerId, phone]

CustomerLanguageChanged:
  description: "The Customer's preferred language (locale) was set/changed; localizes later SMS/email sends."
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    locale:
      $ref: 'scalars.yaml#/Locale'
  required: [customerId, locale]

CustomerPreferencesSet:
  description: "Customer set their discovery + i18n preferences (timezone, dietary restrictions, favorite cuisines). Language is CustomerLanguageChanged."
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    timezone:
      $ref: 'scalars.yaml#/TimeZone'
      nullable: true
    dietaryTags:
      type: array
      items:
        $ref: 'scalars.yaml#/Tag'
    favoriteCuisines:
      type: array
      items:
        $ref: 'scalars.yaml#/Tag'
  required: [customerId]

CustomerAddressSet:
  description: "Customer added or updated a saved delivery address."
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    addressId:
      $ref: 'scalars.yaml#/AddressId'
    label:
      type: string
      maxLength: 80
      nullable: true
    address:
      $ref: 'entities.yaml#/Address'
  required: [customerId, addressId, address]

CustomerAddressRemoved:
  description: "Customer removed a saved address."
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    addressId:
      $ref: 'scalars.yaml#/AddressId'
  required: [customerId, addressId]

CustomerPaymentMethodSet:
  description: "Customer set or updated their preferred Stripe payment method."
  type: object
  properties:
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
    paymentMethodId:
      $ref: 'scalars.yaml#/PaymentMethodId'
  required: [customerId, paymentMethodId]



# =====================================================================
# Cart
# =====================================================================
# Pre-checkout selection. High-churn and often abandoned, so payloads stay minimal (ids +
# quantity); display prices are derived by the read projection, not carried here.

CartStarted:
  description: "A new cart was created for a restaurant (emitted with the first line added)."
  type: object
  properties:
    cartId:
      $ref: 'scalars.yaml#/CartId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    sessionId:
      $ref: 'scalars.yaml#/SessionId'
      description: "The visitor session that started the cart — the key CartBindingProcess uses to bind guest carts on CustomerIdentified."
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
      nullable: true
      description: "Null while the visitor is a guest; bound at checkout."
  required:
    - cartId
    - restaurantId
    - sessionId

CartLineAdded:
  description: "A line was added to a cart."
  type: object
  properties:
    cartId:
      $ref: 'scalars.yaml#/CartId'
    line:
      $ref: 'entities.yaml#/CartLineItem'
  required:
    - cartId
    - line

CartLineQuantityChanged:
  description: "The quantity of an existing cart line changed."
  type: object
  properties:
    cartId:
      $ref: 'scalars.yaml#/CartId'
    cartLineId:
      $ref: 'scalars.yaml#/CartLineId'
    quantity:
      type: integer
      minimum: 1
  required:
    - cartId
    - cartLineId
    - quantity

CartLineRemoved:
  description: "A line was removed from a cart."
  type: object
  properties:
    cartId:
      $ref: 'scalars.yaml#/CartId'
    cartLineId:
      $ref: 'scalars.yaml#/CartLineId'
  required:
    - cartId
    - cartLineId

CartCheckedOut:
  description: "The cart was converted to an order at checkout and is now closed."
  type: object
  properties:
    cartId:
      $ref: 'scalars.yaml#/CartId'
    orderId:
      $ref: 'scalars.yaml#/OrderId'
  required:
    - cartId
    - orderId

# =====================================================================
# Orders
# =====================================================================

OrderPlaced:
  description: "A customer has placed an order and payment was successfully authorized/captured."
  type: object
  properties:
    mode: { $ref: 'scalars.yaml#/Mode' }   # test mode (ADR-0038); optional, absent = LIVE
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    ref:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
      nullable: true
    customerContact:
      $ref: 'entities.yaml#/CustomerContact'
    serviceType:
      $ref: 'scalars.yaml#/ServiceType'
    deliveryAddress:
      $ref: 'entities.yaml#/Address'
      nullable: true
    items:
      type: array
      items:
        $ref: 'entities.yaml#/OrderLineItem'
      minItems: 1
    totalAmount:
      $ref: 'entities.yaml#/Money'
    breakdown:
      $ref: 'entities.yaml#/PaymentBreakdown'
      description: "Server-computed fee/split breakdown (ADR-0016/0017); breakdown.total == totalAmount."
    note:
      $ref: 'scalars.yaml#/OrderNote'
      nullable: true
    paymentIntentId:
      $ref: 'scalars.yaml#/PaymentIntentId'
  required:
    - orderId
    - restaurantId
    - customerContact
    - serviceType
    - items
    - totalAmount
    - breakdown
    - paymentIntentId

OrderAcceptedByRestaurant:
  description: "Restaurant has accepted to prepare the order."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    estimatedReadyAt:
      type: string
      format: date-time
      nullable: true
  required:
    - orderId
    - restaurantId

OrderPreparationStarted:
  description: "Restaurant has started preparing an accepted order (status PREPARING)."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
  required:
    - orderId
    - restaurantId

OrderRejectedByRestaurant:
  description: "Restaurant has rejected the order."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
  required:
    - orderId
    - restaurantId
    - reason

OrderMarkedReady:
  description: "Restaurant has marked the order as ready for pickup/delivery."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
  required:
    - orderId
    - restaurantId

OrderDelivered:
  description: "The order has been delivered to the customer."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
  required:
    - orderId
    - restaurantId

OrderCancelledByCustomer:
  description: "The customer cancelled the order."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required:
    - orderId
    - restaurantId

OrderCancelledByRestaurant:
  description: "The restaurant cancelled the order after initial acceptance."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
  required:
    - orderId
    - restaurantId
    - reason

OrderRated:
  description: "The customer rated the delivery of a completed order (rider thumbs up/down)."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
      nullable: true
    riderThumb:
      $ref: 'scalars.yaml#/ThumbRating'
  required:
    - orderId
    - restaurantId
    - riderThumb

RestaurantRated:
  description: "The customer rated the restaurant of a completed order (0–5 stars + optional comment)."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
      nullable: true
    stars:
      $ref: 'scalars.yaml#/StarRating'
    comment:
      $ref: 'scalars.yaml#/RatingComment'
      nullable: true
  required:
    - orderId
    - restaurantId
    - stars

OrderTipped:
  description: >
    A tipper (customer or restaurant) added one or more tips (rider / restaurant / Captain) on an order
    (ADR-012). Separate from the price; Captain keeps 0%. Additive — multiple OrderTipped accumulate.
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    tippedBy:
      $ref: 'scalars.yaml#/Tipper'
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
      nullable: true
    tips:
      type: array
      minItems: 1
      items:
        $ref: 'entities.yaml#/Tip'
  required:
    - orderId
    - restaurantId
    - tippedBy
    - tips

RefundRequested:
  description: "The customer requested a refund for an order; the RefundProcess will drive Stripe."
  type: object
  properties:
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
      nullable: true
    reason:
      type: string
      maxLength: 500
      nullable: true
  required:
    - orderId
    - restaurantId

# =====================================================================
# Payments (Stripe)
# =====================================================================
# Money stays strongly typed internally (Money value object). The Stripe-side
# ids (paymentIntentId, refundId) are provider references kept as scalars.
# These are the payment branch of the PlaceOrder saga and the refund path of
# RejectOrder / CancelOrder* (see commands.yaml).
# NOTE: PaymentCaptured / PaymentFailed / PaymentRefunded are INBOUND integration
# events — reported by Stripe (webhooks) and recorded as facts, NOT emitted by a
# command. Only PaymentIntentCreated is command-initiated. See CLAUDE.md "Commands
# vs inbound (integration) events".

PaymentIntentCreated:
  description: >
    A payment intent was created at checkout for a pending order. Carries the full priced checkout frozen
    at intent creation (`checkout`), so PlaceOrderProcess can rebuild OrderPlaced + CartCheckedOut from the
    event log alone when PaymentCaptured arrives (no out-of-log store). `checkout.restaurantId`/`customerId`
    duplicate the top-level fields and `checkout.totalAmount == amount == checkout.breakdown.total`.
  type: object
  properties:
    paymentIntentId:
      $ref: 'scalars.yaml#/PaymentIntentId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    customerId:
      $ref: 'scalars.yaml#/CustomerId'
      nullable: true
    amount:
      $ref: 'entities.yaml#/Money'
    checkout:
      $ref: 'entities.yaml#/CheckoutSnapshot'
      description: "The full priced checkout frozen at intent creation (rebuilds OrderPlaced/CartCheckedOut on capture)."
  required:
    - paymentIntentId
    - restaurantId
    - amount
    - checkout

PaymentCaptured:
  description: "Payment was successfully authorized/captured for an order."
  type: object
  properties:
    paymentIntentId:
      $ref: 'scalars.yaml#/PaymentIntentId'
    orderId:
      $ref: 'scalars.yaml#/OrderId'
      nullable: true
      description: "Null when captured before the Order aggregate is created in the saga."
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    amount:
      $ref: 'entities.yaml#/Money'
  required:
    - paymentIntentId
    - restaurantId
    - amount

PaymentFailed:
  description: "Payment authorization/capture failed; no order is placed."
  type: object
  properties:
    paymentIntentId:
      $ref: 'scalars.yaml#/PaymentIntentId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    reason:
      type: string
      maxLength: 500
  required:
    - paymentIntentId
    - restaurantId
    - reason

PaymentRefunded:
  description: "A captured payment was refunded (e.g. after rejection or cancellation)."
  type: object
  properties:
    refundId:
      $ref: 'scalars.yaml#/RefundId'
    paymentIntentId:
      $ref: 'scalars.yaml#/PaymentIntentId'
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    amount:
      $ref: 'entities.yaml#/Money'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required:
    - refundId
    - paymentIntentId
    - orderId
    - restaurantId
    - amount

# ============================================================================
# Delivery (bounded context: delivery) — ADR-0031
# Command-driven facts (DeliveryRequested is emitted by DeliveryDispatchProcess,
# mirroring PlaceOrderProcess→OrderPlaced; the rest come from independent-rider commands).
# ============================================================================

DeliveryRequested:
  description: >
    A delivery job has been created for a ready DELIVERY order and offered for fulfilment (dispatched to a
    partner and/or made available to independent riders). Emitted by DeliveryDispatchProcess.
  type: object
  properties:
    mode: { $ref: 'scalars.yaml#/Mode' }   # test mode (ADR-0038); optional, absent = LIVE
    deliveryJobId:
      $ref: 'scalars.yaml#/DeliveryJobId'
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    pickup:
      $ref: 'entities.yaml#/Address'
      description: "Restaurant pickup address."
    dropoff:
      $ref: 'entities.yaml#/Address'
      description: "Customer delivery address."
    provider:
      $ref: 'scalars.yaml#/DeliveryProvider'
      nullable: true
      description: "Intended channel when known at request time; resolved for certain on acceptance."
  required: [deliveryJobId, orderId, restaurantId, pickup, dropoff]

DeliveryAcceptedByRider:
  description: "An independent Captain rider accepted the delivery job."
  type: object
  properties:
    deliveryJobId:
      $ref: 'scalars.yaml#/DeliveryJobId'
    riderId:
      $ref: 'scalars.yaml#/RiderId'
  required: [deliveryJobId, riderId]

DeliveryPickedUp:
  description: "The rider collected the order from the restaurant."
  type: object
  properties:
    deliveryJobId:
      $ref: 'scalars.yaml#/DeliveryJobId'
    riderId:
      $ref: 'scalars.yaml#/RiderId'
    at:
      type: string
      format: date-time
  required: [deliveryJobId, riderId]

DeliveryCompleted:
  description: "The rider handed the order over to the customer (independent-rider delivery success)."
  type: object
  properties:
    deliveryJobId:
      $ref: 'scalars.yaml#/DeliveryJobId'
    at:
      type: string
      format: date-time
  required: [deliveryJobId]

DeliveryCancelled:
  description: "A delivery job was cancelled before delivery (e.g. by the restaurant or admin)."
  type: object
  properties:
    deliveryJobId:
      $ref: 'scalars.yaml#/DeliveryJobId'
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [deliveryJobId]

DeliveryDispatchFailed:
  description: >
    Dispatch failed terminally: the delivery partner declined the job at every offer attempt (cap of 3
    total offers, ADR-20260720-004556). Emitted by DeliveryDispatchProcess (like DeliveryRequested) so
    read models surface the failed job to the restaurant for manual handling; no automatic retry follows.
  type: object
  properties:
    deliveryJobId:
      $ref: 'scalars.yaml#/DeliveryJobId'
    orderId:
      $ref: 'scalars.yaml#/OrderId'
    restaurantId:
      $ref: 'scalars.yaml#/RestaurantId'
    attempts:
      type: integer
      description: "Total offer attempts made before giving up (the cap; the birth offer counts as 1)."
    lastReason:
      type: string
      maxLength: 500
      nullable: true
      description: "Reason carried by the final partner decline, when the partner gave one."
  required: [deliveryJobId, orderId, restaurantId, attempts]

DeliveryEscalationRequested:
  description: >
    An operator (restaurant/admin) asked to skip the delivery channel currently offered and advance the
    ranked walk now (#60). Emitted by the DeliveryJob aggregate handling the EscalateDelivery command;
    consumed by DeliveryDispatchProcess, which offers the next ranked channel (or fails closed when the
    walk is exhausted). Internal dispatch mechanics — feeds no View_*.
  type: object
  properties:
    deliveryJobId:
      $ref: 'scalars.yaml#/DeliveryJobId'
    reason:
      type: string
      maxLength: 500
      nullable: true
      description: "Why the operator escalated (optional free text)."
  required: [deliveryJobId]

DeliveryOfferTimedOut:
  description: >
    An outstanding delivery offer expired before the channel answered (#60): the DeliveryOfferTimeoutWorker
    found an OFFERED run older than the resolved TTL and records this fact (authored like
    DeliveryDispatchFailed). Recorded by the DeliveryJob aggregate and consumed by DeliveryDispatchProcess,
    which advances the ranked walk to the next channel (or fails closed when exhausted). Internal dispatch
    mechanics — feeds no View_*.
  type: object
  properties:
    deliveryJobId:
      $ref: 'scalars.yaml#/DeliveryJobId'
    channel:
      $ref: 'scalars.yaml#/DeliveryChannelKey'
      description: "The channel whose offer timed out."
    rank:
      type: integer
      description: "1-based rank of the timed-out channel in the city's ranked walk."
    reason:
      type: string
      maxLength: 500
      nullable: true
      description: "Optional detail (e.g. the resolved TTL that elapsed)."
  required: [deliveryJobId, channel, rank]

# NOTE: DeliveryAcceptedByPartner / DeliveryRejectedByPartner / DeliveryStatusUpdated are INBOUND
# integration events — reported by the delivery partner (e.g. Avelo37) through the avelo37-acl and
# recorded as facts, NOT emitted by a command (nothing to validate/reject). Idempotent on partnerRef.
# See CLAUDE.md "Commands vs inbound (integration) events".

DeliveryAcceptedByPartner:
  description: "The delivery partner (e.g. Avelo37) accepted the job and assigned one of its couriers (inbound)."
  type: object
  properties:
    deliveryJobId:
      $ref: 'scalars.yaml#/DeliveryJobId'
    partnerRef:
      $ref: 'scalars.yaml#/ExternalReference'
      description: "Partner-side delivery id; idempotent key for inbound updates."
    courier:
      $ref: 'entities.yaml#/Courier'
    estimatedPickupAt:
      type: string
      format: date-time
      nullable: true
    estimatedDropoffAt:
      type: string
      format: date-time
      nullable: true
  required: [deliveryJobId, partnerRef, courier]

DeliveryRejectedByPartner:
  description: "The delivery partner declined the job (inbound); the dispatcher must re-offer or fall back to manual."
  type: object
  properties:
    deliveryJobId:
      $ref: 'scalars.yaml#/DeliveryJobId'
    partnerRef:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [deliveryJobId]

DeliveryStatusUpdated:
  description: "The delivery partner reported a status change for the job (inbound): PICKED_UP, OUT_FOR_DELIVERY, DELIVERED, FAILED…"
  type: object
  properties:
    deliveryJobId:
      $ref: 'scalars.yaml#/DeliveryJobId'
    partnerRef:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
    status:
      $ref: 'scalars.yaml#/DeliveryStatus'
    occurredAt:
      type: string
      format: date-time
    note:
      type: string
      maxLength: 500
      nullable: true
  required: [deliveryJobId, status]

# =====================================================================
# Delivery — operational facts (DeliveryJob aggregate)
# =====================================================================

DeliveryAssignedToPartner:
  description: "A delivery job was assigned to a delivery partner (e.g. Avelo37) for fulfilment."
  type: object
  properties:
    deliveryJobId: { $ref: 'scalars.yaml#/DeliveryJobId' }
    partnerRef:
      $ref: 'scalars.yaml#/ExternalReference'
      description: "Partner-side delivery id; idempotent key for inbound updates."
  required: [deliveryJobId, partnerRef]

DeliveryUnassignedFromPartner:
  description: "A delivery job was unassigned from its partner (e.g. to re-offer it elsewhere)."
  type: object
  properties:
    deliveryJobId: { $ref: 'scalars.yaml#/DeliveryJobId' }
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [deliveryJobId]

DeliveryPartnerStatusUpdated:
  description: "A partner-driven status change applied to the job by the DeliveryJob aggregate (from the inbound partner report)."
  type: object
  properties:
    deliveryJobId: { $ref: 'scalars.yaml#/DeliveryJobId' }
    partnerRef:
      $ref: 'scalars.yaml#/ExternalReference'
      nullable: true
    status: { $ref: 'scalars.yaml#/DeliveryStatus' }
    occurredAt:
      type: string
      format: date-time
  required: [deliveryJobId, status]

DeliveryDeclinedByRider:
  description: "An independent rider declined a pending delivery job (stays PENDING, re-offerable)."
  type: object
  properties:
    deliveryJobId: { $ref: 'scalars.yaml#/DeliveryJobId' }
    riderId: { $ref: 'scalars.yaml#/RiderId' }
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [deliveryJobId, riderId]

DeliveryIssueReported:
  description: "An issue was reported on a delivery job (by the rider, partner, or support)."
  type: object
  properties:
    deliveryJobId: { $ref: 'scalars.yaml#/DeliveryJobId' }
    riderId:
      $ref: 'scalars.yaml#/RiderId'
      nullable: true
    issue:
      type: string
      maxLength: 1000
    reportedAt:
      type: string
      format: date-time
  required: [deliveryJobId, issue]

DeliveryIssueResolved:
  description: "A previously reported delivery issue was resolved."
  type: object
  properties:
    deliveryJobId: { $ref: 'scalars.yaml#/DeliveryJobId' }
    resolution:
      type: string
      maxLength: 1000
    resolvedAt:
      type: string
      format: date-time
  required: [deliveryJobId, resolution]

# =====================================================================
# Rider (independent Captain courier)
# =====================================================================

RiderRegistered:
  description: "An independent Captain rider registered (linked to the auth provider user)."
  type: object
  properties:
    riderId: { $ref: 'scalars.yaml#/RiderId' }
    authRef:
      $ref: 'scalars.yaml#/ExternalReference'
      description: "Auth-provider user reference (Supabase), like the Customer's authRef."
    displayName:
      type: string
      maxLength: 200
    phone: { $ref: 'scalars.yaml#/PhoneNumber' }
    status: { $ref: 'scalars.yaml#/RiderStatus' }
  required: [riderId, authRef, displayName, phone, status]

RiderInfoUpdated:
  description: "One or more editable rider profile fields changed."
  type: object
  properties:
    riderId: { $ref: 'scalars.yaml#/RiderId' }
    displayName:
      type: string
      maxLength: 200
      nullable: true
    phone:
      $ref: 'scalars.yaml#/PhoneNumber'
      nullable: true
  required: [riderId]

RiderStatusChanged:
  description: "A rider's availability/lifecycle status changed."
  type: object
  properties:
    riderId: { $ref: 'scalars.yaml#/RiderId' }
    status: { $ref: 'scalars.yaml#/RiderStatus' }
  required: [riderId, status]

# =====================================================================
# Refund (restaurant- or admin-approved; RefundProcess state PM)
# =====================================================================

RefundOpened:
  description: >
    A refundable fact on a paid order (rejection, cancellation, customer request) opened a refund for a
    restaurant/admin decision. Delivered by RefundProcess to the Payment aggregate ONLY when the payment
    is CAPTURED, so the refund queue (View_PendingRefunds) folds from the log, not from PM state.
    `amount` is the captured order total eligible for refund (an approval may still be partial).
  type: object
  properties:
    orderId: { $ref: 'scalars.yaml#/OrderId' }
    restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
    amount:
      $ref: 'entities.yaml#/Money'
      description: "The captured order total eligible for refund (the decision may approve less)."
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [orderId, restaurantId, amount]

RefundApproved:
  description: "The restaurant or an admin approved a refund; the RefundProcess will drive the Stripe refund for this amount."
  type: object
  properties:
    orderId: { $ref: 'scalars.yaml#/OrderId' }
    amount:
      $ref: 'entities.yaml#/Money'
      description: "Approved refund amount (may be partial)."
    reason:
      type: string
      maxLength: 500
      nullable: true
  required: [orderId, amount]

RefundDenied:
  description: "The restaurant or an admin denied a pending refund request."
  type: object
  properties:
    orderId: { $ref: 'scalars.yaml#/OrderId' }
    reason:
      type: string
      maxLength: 500
  required: [orderId, reason]
