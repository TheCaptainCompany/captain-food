version: 7
description: >
  Captain.Food ACTOR catalog (actor-model). Its goal is to be a CODE-GENERATION SOURCE: from it a
  generator can scaffold the in-domain message handlers — aggregates with command handlers that emit
  events, and process managers that react to events. It does not redefine names: every message,
  event and error is a `$ref` into commands.yaml / events.yaml / errors.yaml, so a validator (or
  codegen) can confirm the referenced type EXISTS, exactly as scalars/entities are referenced.

  ACTOR (actor model) — an in-domain entity that RECEIVES MESSAGES, holds private state, and EMITS
  events in response. Two types:
    - aggregate        : a consistency boundary that handles commands and emits events
                         (Restaurant, Catalog, Customer, Cart, Order).
    - process-manager  : a saga that reacts to events and coordinates aggregates/externals
                         (PlaceOrderProcess, RefundProcess).

  Example: the Restaurant aggregate RECEIVES commands.yaml#/RegisterRestaurant, EMITS
  events.yaml#/RestaurantRegistered, and may THROW errors.yaml#/SlugAlreadyTaken.

  WHAT IS DELIBERATELY NOT HERE:
    - PERSONAS (story-mapping senders): who may send a command is an authorization concern in the
      GraphQL layer (api.yaml `@auth` path-role) + story-map.md + traceability.md.
    - KIND (command vs event) and SLICE: kind is explicit in the $ref target (commands.yaml = command,
      events.yaml = event); slice lives in story-map.md.

  NAME-COLLISION WARNING: the actor `Restaurant`/`Customer` (PascalCase aggregates, matching
  entities.yaml) are NOT the personas `restaurant`/`customer` (the staff/end-user who send commands).

  Field meaning:
    - <Actor>.type       : aggregate | process-manager (selects the generated base class).
    - <Actor>.lifecycle  : OPTIONAL declared status machine (ADR-20260720-004419). The aggregate's
      status lifecycle as explicit, validated data — generated into
      crates/domain/src/generated/lifecycles.rs (fold + handlers consult the table) and a mermaid
      state diagram in the generated documentation. Shape:
        * status      : $ref to the scalars.yaml ENUM the machine runs over (e.g. OrderStatus).
        * initial     : list of { event, to } — the birth event(s) and the state each enters.
        * transitions : list of { from: [states], event, to } — the legal moves, keyed by the EVENT
                        that effects them (events, not commands: inbound facts have no command, and
                        command→event wiring already lives in `receives`). Every event must be
                        emitted by THIS aggregate. Events not listed do not touch the status.
        * terminal    : states with no outgoing transitions.
      Validated by the lc-* rules; an aggregate with a <Name>Status scalar but no lifecycle warns
      (lc-missing) so adoption is incremental.
    - <Actor>.receives   : the actor's inbox. Each entry { message, emits[, throws][, effect] }:
        * message : $ref to the command (commands.yaml) or event (events.yaml) received.
        * emits   : list of $refs to events (events.yaml) appended in response (may be empty).
        * throws  : list of $refs to errors (errors.yaml) this command may raise on rejection
                    (these are the old command `invariants`). DOMAIN-specific only — cross-cutting
                    errors (Unauthorized/Forbidden/ValidationError/Conflict/RateLimited/Internal)
                    apply to every command and are not repeated. Received EVENTS are facts and are
                    NOT rejected, so they carry no `throws`.
        * effect  : optional note when emits is empty or the reaction is non-obvious.

# --- Aggregates (consistency boundaries) ---

RestaurantAccount:
  type: aggregate
  description: "A restaurant account (HubRise: restaurant) that owns one or more Restaurant locations."
  receives:
    - message: { $ref: 'commands.yaml#/RegisterRestaurantAccount' }
      emits: [{ $ref: 'events.yaml#/RestaurantAccountRegistered' }]
      throws:
        - { $ref: 'errors.yaml#/RefAlreadyUsed' }
        - { $ref: 'errors.yaml#/InvalidCurrency' }
    - message: { $ref: 'commands.yaml#/UpdateRestaurantAccount' }
      emits: [{ $ref: 'events.yaml#/RestaurantAccountUpdated' }]
      throws:
        - { $ref: 'errors.yaml#/RestaurantAccountNotFound' }
        - { $ref: 'errors.yaml#/NoEditableFieldProvided' }
    - message: { $ref: 'commands.yaml#/DeleteRestaurantAccount' }
      emits: [{ $ref: 'events.yaml#/RestaurantAccountDeleted' }]
      throws:
        - { $ref: 'errors.yaml#/RestaurantAccountNotFound' }

Restaurant:
  type: aggregate
  description: >
    A single restaurant location: profile, operational status (DRAFT/ACTIVE/INACTIVE), live acceptance
    mode, and the partnership LISTING funnel (NON_PARTNER → PASSIVE_PARTNER → ACTIVE_PARTNER). The
    Sirene/Google sync is an EXTERNAL ACL that calls RegisterRestaurant /
    UpdateRestaurantGoogleBusinessProfile / MarkRestaurantClosed here AS THE OWNER — there is no dedicated
    pre-registration command; an account-less registration with listingStatus NON_PARTNER is a seeded listing.
  # Operational machine only (DRAFT → ACTIVE ⇄ INACTIVE): the LISTING funnel
  # (RestaurantListingStatus) is an orthogonal dimension, not part of this machine. No terminal
  # state — an INACTIVE restaurant can be re-activated. Activate/Deactivate are ensure-commands
  # (already-there → idempotent no-op, no event), so the machine declares only the actual moves.
  lifecycle:
    status: { $ref: 'scalars.yaml#/RestaurantStatus' }
    initial:
      - event: { $ref: 'events.yaml#/RestaurantRegistered' }
        to: DRAFT
    transitions:
      - { from: [DRAFT, INACTIVE], event: { $ref: 'events.yaml#/RestaurantActivated' }, to: ACTIVE }
      - { from: [DRAFT, ACTIVE], event: { $ref: 'events.yaml#/RestaurantDeactivated' }, to: INACTIVE }
      # Removal / reported closure (e.g. Sirene) force INACTIVE from anywhere — recording the fact
      # on an already-INACTIVE restaurant is legal, the fact still lands.
      - { from: [DRAFT, ACTIVE, INACTIVE], event: { $ref: 'events.yaml#/RestaurantRemoved' }, to: INACTIVE }
      - { from: [DRAFT, ACTIVE, INACTIVE], event: { $ref: 'events.yaml#/RestaurantMarkedClosed' }, to: INACTIVE }
    terminal: []
  receives:
    - message: { $ref: 'commands.yaml#/RegisterRestaurant' }
      emits: [{ $ref: 'events.yaml#/RestaurantRegistered' }]
      throws:
        - { $ref: 'errors.yaml#/RestaurantAccountNotFound' }
        - { $ref: 'errors.yaml#/SlugAlreadyTaken' }
        - { $ref: 'errors.yaml#/RefAlreadyUsed' }
    - message: { $ref: 'commands.yaml#/ActivateRestaurant' }
      emits: [{ $ref: 'events.yaml#/RestaurantActivated' }]
      # Idempotent: activating an already-ACTIVE restaurant is a no-op (no event, no error) — the command
      # ensures the ACTIVE state, it is not a toggle.
      throws:
        - { $ref: 'errors.yaml#/RestaurantNotFound' }
        - { $ref: 'errors.yaml#/RestaurantNotReadyForActivation' }
    - message: { $ref: 'commands.yaml#/UpdateRestaurant' }
      emits: [{ $ref: 'events.yaml#/RestaurantUpdated' }]
      throws:
        - { $ref: 'errors.yaml#/RestaurantNotFound' }
        - { $ref: 'errors.yaml#/NoEditableFieldProvided' }
    - message: { $ref: 'commands.yaml#/DeactivateRestaurant' }
      emits: [{ $ref: 'events.yaml#/RestaurantDeactivated' }]
      # Idempotent: deactivating an already-INACTIVE restaurant is a no-op (no event, no error) — the
      # command ensures the INACTIVE state, it is not a toggle.
      throws:
        - { $ref: 'errors.yaml#/RestaurantNotFound' }
    - message: { $ref: 'commands.yaml#/ChangeOrderAcceptanceMode' }
      emits: [{ $ref: 'events.yaml#/RestaurantAcceptanceModeChanged' }]
      throws:
        - { $ref: 'errors.yaml#/RestaurantNotFound' }
        - { $ref: 'errors.yaml#/RestaurantNotActive' }
        - { $ref: 'errors.yaml#/AcceptanceModeUnchanged' }
    - message: { $ref: 'commands.yaml#/RemoveRestaurant' }
      emits: [{ $ref: 'events.yaml#/RestaurantRemoved' }]
      throws:
        - { $ref: 'errors.yaml#/RestaurantNotFound' }
    - message: { $ref: 'commands.yaml#/UpdateRestaurantGoogleBusinessProfile' }
      emits: [{ $ref: 'events.yaml#/RestaurantGoogleBusinessProfileUpdated' }]
      throws:
        - { $ref: 'errors.yaml#/RestaurantNotFound' }
    - message: { $ref: 'commands.yaml#/MarkRestaurantClosed' }
      emits: [{ $ref: 'events.yaml#/RestaurantMarkedClosed' }]
      throws:
        - { $ref: 'errors.yaml#/RestaurantNotFound' }
    - message: { $ref: 'commands.yaml#/ClaimRestaurantListing' }
      emits: [{ $ref: 'events.yaml#/RestaurantListingClaimed' }]
      throws:
        - { $ref: 'errors.yaml#/RestaurantNotFound' }
        - { $ref: 'errors.yaml#/ListingOwnershipNotVerified' }
        - { $ref: 'errors.yaml#/ListingAlreadyClaimed' }
    - message: { $ref: 'commands.yaml#/OptOutRestaurantListing' }
      emits: [{ $ref: 'events.yaml#/RestaurantListingOptedOut' }]
      throws:
        - { $ref: 'errors.yaml#/RestaurantNotFound' }
        - { $ref: 'errors.yaml#/ListingOwnershipNotVerified' }
    - message: { $ref: 'commands.yaml#/ChangeRestaurantListingStatus' }
      emits: [{ $ref: 'events.yaml#/RestaurantListingStatusChanged' }]
      throws:
        - { $ref: 'errors.yaml#/RestaurantNotFound' }
    - message: { $ref: 'commands.yaml#/ConfigureGoogleBusinessProfileOrderLink' }
      emits: [{ $ref: 'events.yaml#/RestaurantGoogleBusinessProfileOrderLinkConfigured' }]
      throws:
        - { $ref: 'errors.yaml#/RestaurantNotFound' }
    - message: { $ref: 'commands.yaml#/VerifyGoogleBusinessProfileOrderLink' }
      emits: [{ $ref: 'events.yaml#/RestaurantGoogleBusinessProfileOrderLinkVerified' }]
      throws:
        - { $ref: 'errors.yaml#/RestaurantNotFound' }
        - { $ref: 'errors.yaml#/GbpOrderLinkNotConfigured' }

Prospect:
  type: aggregate
  description: >
    Sales/CRM state of a NON_PARTNER restaurant listing worked as a B2B prospect (ADR-0020); id = restaurantId.
    The `prospection-acl` worker (EXTERNAL) reads the COMPUTED score from ProspectionPipeline + the
    schedule, fires HubSpot/Resend/Slack, then records the contact fact here. The score is never an input or
    an emitted event. First RecordProspectContact is the prospect's birth; anti-spam invariants guard contacts.
  receives:
    - message: { $ref: 'commands.yaml#/RecordProspectContact' }
      emits: [{ $ref: 'events.yaml#/ProspectContacted' }]
      throws:
        - { $ref: 'errors.yaml#/ProspectContactLimitReached' }
        - { $ref: 'errors.yaml#/ProspectContactedTooRecently' }
    - message: { $ref: 'commands.yaml#/MarkProspectCold' }
      emits: [{ $ref: 'events.yaml#/ProspectMarkedCold' }]
      throws:
        - { $ref: 'errors.yaml#/ProspectNotFound' }
    - message: { $ref: 'commands.yaml#/RecordProspectReply' }
      emits: [{ $ref: 'events.yaml#/ProspectReplied' }]
      throws:
        - { $ref: 'errors.yaml#/ProspectNotFound' }

Catalog:
  type: aggregate
  description: "A restaurant catalog: catalog, category tree, products, offers (SKUs), option lists and per-offer stock."
  receives:
    - message: { $ref: 'commands.yaml#/CreateCatalog' }
      emits: [{ $ref: 'events.yaml#/CatalogCreated' }]
      throws:
        - { $ref: 'errors.yaml#/RestaurantNotFound' }
        - { $ref: 'errors.yaml#/RefNotUnique' }
    - message: { $ref: 'commands.yaml#/AddProduct' }
      emits: [{ $ref: 'events.yaml#/ProductAdded' }]
      throws:
        - { $ref: 'errors.yaml#/CatalogNotFound' }
        - { $ref: 'errors.yaml#/CurrencyMismatch' }
        - { $ref: 'errors.yaml#/CatalogCategoryRefNotFound' }
        - { $ref: 'errors.yaml#/RefNotUnique' }
    - message: { $ref: 'commands.yaml#/UpdateProduct' }
      emits: [{ $ref: 'events.yaml#/ProductUpdated' }]
      throws:
        - { $ref: 'errors.yaml#/ProductNotFound' }
        - { $ref: 'errors.yaml#/ProductMustHaveOffer' }
        - { $ref: 'errors.yaml#/CurrencyMismatch' }
    - message: { $ref: 'commands.yaml#/RemoveProduct' }
      emits: [{ $ref: 'events.yaml#/ProductRemoved' }]
      throws:
        - { $ref: 'errors.yaml#/ProductNotFound' }
    - message: { $ref: 'commands.yaml#/AddCatalogCategory' }
      emits: [{ $ref: 'events.yaml#/CatalogCategoryAdded' }]
      throws:
        - { $ref: 'errors.yaml#/CatalogNotFound' }
        - { $ref: 'errors.yaml#/ParentCatalogCategoryNotFound' }
        - { $ref: 'errors.yaml#/RefNotUnique' }
    - message: { $ref: 'commands.yaml#/UpdateCatalogCategory' }
      emits: [{ $ref: 'events.yaml#/CatalogCategoryUpdated' }]
      throws:
        - { $ref: 'errors.yaml#/CatalogCategoryNotFound' }
        - { $ref: 'errors.yaml#/CatalogCategoryCycle' }
    - message: { $ref: 'commands.yaml#/RemoveCatalogCategory' }
      emits: [{ $ref: 'events.yaml#/CatalogCategoryRemoved' }]
      throws:
        - { $ref: 'errors.yaml#/CatalogCategoryNotFound' }
        - { $ref: 'errors.yaml#/CatalogCategoryNotEmpty' }
    - message: { $ref: 'commands.yaml#/AddOptionList' }
      emits: [{ $ref: 'events.yaml#/OptionListAdded' }]
      throws:
        - { $ref: 'errors.yaml#/CatalogNotFound' }
        - { $ref: 'errors.yaml#/OptionListMustHaveOption' }
        - { $ref: 'errors.yaml#/InvalidSelectionBounds' }
    - message: { $ref: 'commands.yaml#/UpdateOptionList' }
      emits: [{ $ref: 'events.yaml#/OptionListUpdated' }]
      throws:
        - { $ref: 'errors.yaml#/OptionListNotFound' }
        - { $ref: 'errors.yaml#/OptionListMustHaveOption' }
    - message: { $ref: 'commands.yaml#/RemoveOptionList' }
      emits: [{ $ref: 'events.yaml#/OptionListRemoved' }]
      throws:
        - { $ref: 'errors.yaml#/OptionListNotFound' }
        - { $ref: 'errors.yaml#/OptionListInUse' }
    - message: { $ref: 'commands.yaml#/UpdateOfferStock' }
      emits: [{ $ref: 'events.yaml#/OfferStockUpdated' }]
      throws:
        - { $ref: 'errors.yaml#/OfferNotFound' }
        - { $ref: 'errors.yaml#/OfferNotStockTracked' }
    - message: { $ref: 'commands.yaml#/ImportCatalog' }
      emits: [{ $ref: 'events.yaml#/CatalogImported' }]
      throws:
        - { $ref: 'errors.yaml#/CatalogNotFound' }
        - { $ref: 'errors.yaml#/CatalogTranslationFailed' }
        - { $ref: 'errors.yaml#/MissingRef' }
    - message: { $ref: 'events.yaml#/OfferStockUpdated' }
      emits: [{ $ref: 'events.yaml#/OfferStockUpdated' }]
      effect: "Inbound HubRise inventory sync recorded via the ACL (no command, no rejection)."

Customer:
  type: aggregate
  description: "A customer identity, keyed by phone number and linked to the auth provider user (authRef)."
  receives:
    # Identity via phone OTP / email magic link — WRAPPED Supabase Auth (ADR-0015). The handler calls
    # Supabase SYNCHRONOUSLY through the supabase-acl adapter; request/* emit nothing, verify/confirm
    # emit the verified FACT. The aggregate stays free of the Supabase SDK (the ACL boundary does the call).
    - message: { $ref: 'commands.yaml#/RequestPhoneVerification' }
      emits: []
      throws: []
      effect: "Delegate to Supabase Auth: send an SMS OTP (Twilio; mock in dev). No event."
    - message: { $ref: 'commands.yaml#/VerifyPhone' }
      emits:
        - { $ref: 'events.yaml#/CustomerRegistered' }
        - { $ref: 'events.yaml#/CustomerIdentified' }
      throws:
        - { $ref: 'errors.yaml#/InvalidVerificationCode' }
        - { $ref: 'errors.yaml#/VerificationCodeExpired' }
      effect: "Verify the OTP with Supabase, then register (first phone → CustomerRegistered) or identify (returning → CustomerIdentified); CartBindingProcess then binds the visitor's open carts."
    - message: { $ref: 'commands.yaml#/RequestEmailVerification' }
      emits: []
      throws:
        - { $ref: 'errors.yaml#/EmailAlreadyInUse' }
      effect: "Delegate to Supabase Auth: send an email magic link (localized via the stored locale). No event."
    - message: { $ref: 'commands.yaml#/ConfirmEmailVerification' }
      emits: [{ $ref: 'events.yaml#/CustomerEmailVerified' }]
      throws:
        - { $ref: 'errors.yaml#/InvalidVerificationToken' }
        - { $ref: 'errors.yaml#/VerificationCodeExpired' }
      effect: "Verify the magic-link token server-side with Supabase, then link the email."
    - message: { $ref: 'commands.yaml#/RequestPhoneChange' }
      emits: []
      throws:
        - { $ref: 'errors.yaml#/PhoneAlreadyInUse' }
      effect: "Delegate to Supabase Auth: send an SMS OTP to the new phone. No event."
    - message: { $ref: 'commands.yaml#/ConfirmPhoneChange' }
      emits: [{ $ref: 'events.yaml#/CustomerPhoneChanged' }]
      throws:
        - { $ref: 'errors.yaml#/InvalidVerificationCode' }
        - { $ref: 'errors.yaml#/VerificationCodeExpired' }
        - { $ref: 'errors.yaml#/PhoneAlreadyInUse' }
      effect: "Verify the OTP on the new phone, then change the phone (canonical E.164)."
    - message: { $ref: 'commands.yaml#/ChangeLanguage' }
      emits: [{ $ref: 'events.yaml#/CustomerLanguageChanged' }]
      throws: []
      effect: "Persist the preferred locale; later authenticated SMS/email sends use it."
    - message: { $ref: 'commands.yaml#/MarkRestaurantAsFavorite' }
      emits: [{ $ref: 'events.yaml#/RestaurantFavorited' }]
      throws:
        - { $ref: 'errors.yaml#/RestaurantNotFound' }
    - message: { $ref: 'commands.yaml#/UnmarkRestaurantAsFavorite' }
      emits: [{ $ref: 'events.yaml#/RestaurantUnfavorited' }]
      throws: []
      effect: "Idempotent: unfavoriting a non-favorite is a no-op."
    - message: { $ref: 'commands.yaml#/UpdateCustomerInfo' }
      emits: [{ $ref: 'events.yaml#/CustomerInfoUpdated' }]
      throws:
        - { $ref: 'errors.yaml#/NoEditableFieldProvided' }
    - message: { $ref: 'commands.yaml#/SetCustomerPreferences' }
      emits: [{ $ref: 'events.yaml#/CustomerPreferencesSet' }]
      throws: []
    - message: { $ref: 'commands.yaml#/SetCustomerAddress' }
      emits: [{ $ref: 'events.yaml#/CustomerAddressSet' }]
      throws: []
    - message: { $ref: 'commands.yaml#/RemoveCustomerAddress' }
      emits: [{ $ref: 'events.yaml#/CustomerAddressRemoved' }]
      throws: []
      effect: "Idempotent: removing an unknown address is a no-op."
    - message: { $ref: 'commands.yaml#/SetCustomerPaymentMethod' }
      emits: [{ $ref: 'events.yaml#/CustomerPaymentMethodSet' }]
      throws: []

Cart:
  type: aggregate
  description: "A visitor's in-progress selection for one restaurant, built (possibly as a guest) before checkout. Validated incrementally; converted to an Order by PlaceOrderProcess."
  # Line edits and the customer bind do not touch the status — only checkout closes the cart
  # (carts never expire, so there is no abandonment state).
  lifecycle:
    status: { $ref: 'scalars.yaml#/CartStatus' }
    initial:
      - event: { $ref: 'events.yaml#/CartStarted' }
        to: OPEN
    transitions:
      - { from: [OPEN], event: { $ref: 'events.yaml#/CartCheckedOut' }, to: CHECKED_OUT }
    terminal: [CHECKED_OUT]
  receives:
    - message: { $ref: 'commands.yaml#/AddCartLine' }
      emits: [{ $ref: 'events.yaml#/CartStarted' }, { $ref: 'events.yaml#/CartLineAdded' }]
      throws:
        - { $ref: 'errors.yaml#/CartNotFound' }
        - { $ref: 'errors.yaml#/CartNotOpen' }
        - { $ref: 'errors.yaml#/CartRestaurantMismatch' }
        - { $ref: 'errors.yaml#/OfferNotFound' }
        - { $ref: 'errors.yaml#/OfferUnavailable' }
        - { $ref: 'errors.yaml#/InsufficientStock' }
        - { $ref: 'errors.yaml#/InvalidOptionSelection' }
        - { $ref: 'errors.yaml#/QuantityExceedsLimit' }
      effect: "CartStarted only when the cart is created (first line)."
    - message: { $ref: 'commands.yaml#/RemoveCartLine' }
      emits: [{ $ref: 'events.yaml#/CartLineRemoved' }]
      throws:
        - { $ref: 'errors.yaml#/CartNotFound' }
        - { $ref: 'errors.yaml#/CartNotOpen' }
        - { $ref: 'errors.yaml#/CartLineNotFound' }
    - message: { $ref: 'commands.yaml#/ChangeCartLineQuantity' }
      emits: [{ $ref: 'events.yaml#/CartLineQuantityChanged' }]
      throws:
        - { $ref: 'errors.yaml#/CartNotFound' }
        - { $ref: 'errors.yaml#/CartNotOpen' }
        - { $ref: 'errors.yaml#/CartLineNotFound' }
        - { $ref: 'errors.yaml#/InsufficientStock' }
        - { $ref: 'errors.yaml#/QuantityExceedsLimit' }
    - message:
          $ref: 'commands.yaml#/BindCartToCustomer'
      emits:
      - $ref: 'events.yaml#/CartBoundToCustomer'
      throws:
        - { $ref: 'errors.yaml#/CartNotFound' }
    - message: { $ref: 'events.yaml#/CartCheckedOut' }
      emits: [{ $ref: 'events.yaml#/CartCheckedOut' }]
      effect: "PlaceOrderProcess delivers the checkout fact on payment capture; the Cart records it and closes (idempotent)."

Order:
  type: aggregate
  description: "A single order through its lifecycle. Born from OrderPlaced (delivered by PlaceOrderProcess and recorded here), then driven to a terminal state."
  # OUT_FOR_DELIVERY is deliberately absent: no Order event enters it — it is a read-side
  # presentation status derived by the OrderTracking projection from delivery facts (ADR-20260720-004419).
  lifecycle:
    status: { $ref: 'scalars.yaml#/OrderStatus' }
    initial:
      - event: { $ref: 'events.yaml#/OrderPlaced' }
        to: PLACED
    transitions:
      - { from: [PLACED], event: { $ref: 'events.yaml#/OrderAcceptedByRestaurant' }, to: ACCEPTED }
      - { from: [ACCEPTED], event: { $ref: 'events.yaml#/OrderPreparationStarted' }, to: PREPARING }
      # A restaurant may skip the explicit preparation step (ready straight from ACCEPTED).
      - { from: [ACCEPTED, PREPARING], event: { $ref: 'events.yaml#/OrderMarkedReady' }, to: READY }
      - { from: [READY], event: { $ref: 'events.yaml#/OrderDelivered' }, to: DELIVERED }
      - { from: [PLACED], event: { $ref: 'events.yaml#/OrderRejectedByRestaurant' }, to: REJECTED }
      - { from: [PLACED], event: { $ref: 'events.yaml#/OrderCancelledByCustomer' }, to: CANCELLED_BY_CUSTOMER }
      - { from: [ACCEPTED, PREPARING, READY], event: { $ref: 'events.yaml#/OrderCancelledByRestaurant' }, to: CANCELLED_BY_RESTAURANT }
    terminal: [DELIVERED, REJECTED, CANCELLED_BY_CUSTOMER, CANCELLED_BY_RESTAURANT]
  receives:
    - message: { $ref: 'events.yaml#/OrderPlaced' }
      emits: [{ $ref: 'events.yaml#/OrderPlaced' }]
      effect: "Birth: PlaceOrderProcess delivers OrderPlaced; the Order records it (idempotent)."
    - message: { $ref: 'commands.yaml#/AcceptOrder' }
      emits: [{ $ref: 'events.yaml#/OrderAcceptedByRestaurant' }]
      throws:
        - { $ref: 'errors.yaml#/OrderNotFound' }
        - { $ref: 'errors.yaml#/InvalidOrderStatus' }
    - message: { $ref: 'commands.yaml#/StartPreparation' }
      emits: [{ $ref: 'events.yaml#/OrderPreparationStarted' }]
      throws:
        - { $ref: 'errors.yaml#/OrderNotFound' }
        - { $ref: 'errors.yaml#/InvalidOrderStatus' }
    - message: { $ref: 'commands.yaml#/MarkOrderReady' }
      emits: [{ $ref: 'events.yaml#/OrderMarkedReady' }]
      throws:
        - { $ref: 'errors.yaml#/OrderNotFound' }
        - { $ref: 'errors.yaml#/InvalidOrderStatus' }
    - message: { $ref: 'commands.yaml#/MarkOrderDelivered' }
      emits: [{ $ref: 'events.yaml#/OrderDelivered' }]
      throws:
        - { $ref: 'errors.yaml#/OrderNotFound' }
        - { $ref: 'errors.yaml#/InvalidOrderStatus' }
    - message: { $ref: 'commands.yaml#/RejectOrder' }
      emits: [{ $ref: 'events.yaml#/OrderRejectedByRestaurant' }]
      throws:
        - { $ref: 'errors.yaml#/OrderNotFound' }
        - { $ref: 'errors.yaml#/InvalidOrderStatus' }
    - message: { $ref: 'commands.yaml#/CancelOrderByCustomer' }
      emits: [{ $ref: 'events.yaml#/OrderCancelledByCustomer' }]
      throws:
        - { $ref: 'errors.yaml#/OrderNotFound' }
        - { $ref: 'errors.yaml#/InvalidOrderStatus' }
    - message: { $ref: 'commands.yaml#/CancelOrderByRestaurant' }
      emits: [{ $ref: 'events.yaml#/OrderCancelledByRestaurant' }]
      throws:
        - { $ref: 'errors.yaml#/OrderNotFound' }
        - { $ref: 'errors.yaml#/InvalidOrderStatus' }
    - message: { $ref: 'commands.yaml#/RateOrder' }
      emits: [{ $ref: 'events.yaml#/OrderRated' }]
      throws:
        - { $ref: 'errors.yaml#/OrderNotFound' }
        - { $ref: 'errors.yaml#/InvalidOrderStatus' }   # only a DELIVERED order can be rated
        - { $ref: 'errors.yaml#/OrderAlreadyRated' }
    - message: { $ref: 'commands.yaml#/RateRestaurant' }
      emits: [{ $ref: 'events.yaml#/RestaurantRated' }]
      throws:
        - { $ref: 'errors.yaml#/OrderNotFound' }
        - { $ref: 'errors.yaml#/InvalidOrderStatus' }
        - { $ref: 'errors.yaml#/RestaurantAlreadyRated' }
    - message: { $ref: 'commands.yaml#/TipOrder' }
      emits: [{ $ref: 'events.yaml#/OrderTipped' }]
      throws:
        - { $ref: 'errors.yaml#/OrderNotFound' }
        - { $ref: 'errors.yaml#/InvalidOrderStatus' }
        - { $ref: 'errors.yaml#/InvalidTipRecipient' }
    - message: { $ref: 'commands.yaml#/RequestRefund' }
      emits: [{ $ref: 'events.yaml#/RefundRequested' }]
      throws:
        - { $ref: 'errors.yaml#/OrderNotFound' }
        - { $ref: 'errors.yaml#/InvalidOrderStatus' }

Payment:
  type: aggregate
  description: "A payment for an order, driven to a terminal state. Born from PaymentIntentCreated (emitted by PlaceOrderProcess), then driven to a terminal state."
  # The refund decision facts (RefundOpened/Approved/Denied) do not move the payment status —
  # only the settled Stripe fact (PaymentRefunded) does.
  lifecycle:
    status: { $ref: 'scalars.yaml#/PaymentStatus' }
    initial:
      - event: { $ref: 'events.yaml#/PaymentIntentCreated' }
        to: PENDING
    transitions:
      - { from: [PENDING], event: { $ref: 'events.yaml#/PaymentCaptured' }, to: CAPTURED }
      - { from: [PENDING], event: { $ref: 'events.yaml#/PaymentFailed' }, to: FAILED }
      - { from: [CAPTURED], event: { $ref: 'events.yaml#/PaymentRefunded' }, to: REFUNDED }
    terminal: [FAILED, REFUNDED]
  receives:
    - message: 
        $ref: 'events.yaml#/PaymentIntentCreated'
      emits: [{ $ref: 'events.yaml#/PaymentIntentCreated' }]
    - message: { $ref: 'events.yaml#/PaymentCaptured' }
      emits: [{ $ref: 'events.yaml#/PaymentCaptured' }]
    - message: { $ref: 'events.yaml#/PaymentFailed' }
      emits: [{ $ref: 'events.yaml#/PaymentFailed' }]
    - message:
        $ref: 'events.yaml#/PaymentRefunded'
      emits: [{ $ref: 'events.yaml#/PaymentRefunded' }]
    - message: { $ref: 'events.yaml#/RefundOpened' }
      emits: [{ $ref: 'events.yaml#/RefundOpened' }]
      effect: "RefundProcess opened a refund on this captured payment for a restaurant/admin decision; the Payment records it (idempotent) so View_PendingRefunds folds the queue from the log."
    - message: { $ref: 'events.yaml#/RefundApproved' }
      emits: [{ $ref: 'events.yaml#/RefundApproved' }]
      effect: "RefundProcess delivers the approval decision (restaurant or admin); the Payment records it (idempotent)."
    - message: { $ref: 'events.yaml#/RefundDenied' }
      emits: [{ $ref: 'events.yaml#/RefundDenied' }]
      effect: "RefundProcess delivers the denial decision (restaurant or admin); the Payment records it (idempotent)."


DeliveryJob:
  type: aggregate
  description: >
    One delivery of an order (bounded context: delivery). Born from DeliveryRequested (emitted by
    DeliveryDispatchProcess), then fulfilled by EITHER an independent Captain rider (these commands) OR a
    delivery partner (inbound DeliveryAcceptedByPartner/RejectedByPartner/StatusUpdated, recorded via the
    avelo37-acl — no command). ADR-0031.
  # PENDING → ASSIGNED → PICKED_UP → OUT_FOR_DELIVERY → DELIVERED, with the PICKED_UP → DELIVERED
  # hand-over shortcut; CANCELLED/FAILED close the job early. DeliveryStatusUpdated (rider/admin
  # correction) and DeliveryPartnerStatusUpdated (partner report) carry their target state in the
  # payload — the DSL's dynamic-target form (`via: status`, ADR-20260721-093027): one event, one
  # declared edge per target. FAILED is NOT terminal: a failed dispatch can still be manually
  # cancelled (rules.yaml#/DeliveryCancellableBeforeCompletion), but no status report leaves it.
  lifecycle:
    status: { $ref: 'scalars.yaml#/DeliveryStatus' }
    initial:
      - event: { $ref: 'events.yaml#/DeliveryRequested' }
        to: PENDING
    transitions:
      - { from: [PENDING], event: { $ref: 'events.yaml#/DeliveryAcceptedByRider' }, to: ASSIGNED }
      - { from: [PENDING], event: { $ref: 'events.yaml#/DeliveryAcceptedByPartner' }, to: ASSIGNED }
      - { from: [PENDING], event: { $ref: 'events.yaml#/DeliveryAssignedToPartner' }, to: ASSIGNED }
      - { from: [ASSIGNED], event: { $ref: 'events.yaml#/DeliveryUnassignedFromPartner' }, to: PENDING }
      - { from: [ASSIGNED], event: { $ref: 'events.yaml#/DeliveryPickedUp' }, to: PICKED_UP }
      - { from: [PICKED_UP, OUT_FOR_DELIVERY], event: { $ref: 'events.yaml#/DeliveryCompleted' }, to: DELIVERED }
      - { from: [PENDING, ASSIGNED, PICKED_UP, OUT_FOR_DELIVERY, FAILED], event: { $ref: 'events.yaml#/DeliveryCancelled' }, to: CANCELLED }
      - { from: [PENDING], event: { $ref: 'events.yaml#/DeliveryDispatchFailed' }, to: FAILED }
      # Dynamic targets — the reported status IS the target state (event payload `status`).
      - { from: [PENDING], event: { $ref: 'events.yaml#/DeliveryStatusUpdated' }, to: ASSIGNED, via: status }
      - { from: [ASSIGNED], event: { $ref: 'events.yaml#/DeliveryStatusUpdated' }, to: PICKED_UP, via: status }
      - { from: [PICKED_UP], event: { $ref: 'events.yaml#/DeliveryStatusUpdated' }, to: OUT_FOR_DELIVERY, via: status }
      - { from: [PICKED_UP, OUT_FOR_DELIVERY], event: { $ref: 'events.yaml#/DeliveryStatusUpdated' }, to: DELIVERED, via: status }
      - { from: [PENDING, ASSIGNED, PICKED_UP, OUT_FOR_DELIVERY], event: { $ref: 'events.yaml#/DeliveryStatusUpdated' }, to: CANCELLED, via: status }
      - { from: [PENDING, ASSIGNED, PICKED_UP, OUT_FOR_DELIVERY], event: { $ref: 'events.yaml#/DeliveryStatusUpdated' }, to: FAILED, via: status }
      - { from: [PENDING], event: { $ref: 'events.yaml#/DeliveryPartnerStatusUpdated' }, to: ASSIGNED, via: status }
      - { from: [ASSIGNED], event: { $ref: 'events.yaml#/DeliveryPartnerStatusUpdated' }, to: PICKED_UP, via: status }
      - { from: [PICKED_UP], event: { $ref: 'events.yaml#/DeliveryPartnerStatusUpdated' }, to: OUT_FOR_DELIVERY, via: status }
      - { from: [PICKED_UP, OUT_FOR_DELIVERY], event: { $ref: 'events.yaml#/DeliveryPartnerStatusUpdated' }, to: DELIVERED, via: status }
      - { from: [PENDING, ASSIGNED, PICKED_UP, OUT_FOR_DELIVERY], event: { $ref: 'events.yaml#/DeliveryPartnerStatusUpdated' }, to: CANCELLED, via: status }
      - { from: [PENDING, ASSIGNED, PICKED_UP, OUT_FOR_DELIVERY], event: { $ref: 'events.yaml#/DeliveryPartnerStatusUpdated' }, to: FAILED, via: status }
    terminal: [DELIVERED, CANCELLED]
  receives:
    - message: { $ref: 'events.yaml#/DeliveryRequested' }
      emits: [{ $ref: 'events.yaml#/DeliveryRequested' }]
      effect: "Birth: DeliveryDispatchProcess delivers DeliveryRequested; the DeliveryJob records it (idempotent)."
    - message: { $ref: 'events.yaml#/DeliveryAcceptedByPartner' }
      emits: [{ $ref: 'events.yaml#/DeliveryAcceptedByPartner' }]
      effect: "Inbound partner acceptance (via the avelo37 ACL use case): the DeliveryJob records the assigned courier (idempotent by partnerRef)."
    - message: { $ref: 'events.yaml#/DeliveryRejectedByPartner' }
      emits: [{ $ref: 'events.yaml#/DeliveryRejectedByPartner' }]
      effect: "Inbound partner rejection (via the avelo37 ACL use case): the DeliveryJob records it; DeliveryDispatchProcess advances the ranked channel walk (#60)."
    - message: { $ref: 'events.yaml#/DeliveryOfferTimedOut' }
      emits: [{ $ref: 'events.yaml#/DeliveryOfferTimedOut' }]
      effect: "The DeliveryOfferTimeoutWorker's fact that an outstanding offer expired (#60): the DeliveryJob records it (mirrors the inbound rejection); DeliveryDispatchProcess advances the ranked channel walk."
    - message: { $ref: 'events.yaml#/DeliveryStatusUpdated' }
      emits: [{ $ref: 'events.yaml#/DeliveryStatusUpdated' }]
      effect: "Inbound partner progress report (via the avelo37 ACL, two-layer inbox — the same event the UpdateDeliveryStatus command emits on the rider/admin path): the DeliveryJob records the reported transition (idempotent; lifecycle-guarded at append), and DeliveryDispatchProcess closes the order on DELIVERED."
    - message: { $ref: 'events.yaml#/DeliveryDispatchFailed' }
      emits: [{ $ref: 'events.yaml#/DeliveryDispatchFailed' }]
      effect: "DeliveryDispatchProcess delivers the terminal dispatch failure (the ranked channel walk is exhausted — fail closed, #60): the DeliveryJob records it (status → FAILED) so the restaurant board surfaces it for manual handling (idempotent)."
    - message: { $ref: 'commands.yaml#/AcceptDelivery' }
      emits: [{ $ref: 'events.yaml#/DeliveryAcceptedByRider' }]
      throws:
        - { $ref: 'errors.yaml#/DeliveryJobNotFound' }
        - { $ref: 'errors.yaml#/InvalidDeliveryStatus' }   # only a PENDING job can be accepted
        - { $ref: 'errors.yaml#/DeliveryAlreadyAssigned' }
    - message: { $ref: 'commands.yaml#/ConfirmPickup' }
      emits: [{ $ref: 'events.yaml#/DeliveryPickedUp' }]
      throws:
        - { $ref: 'errors.yaml#/DeliveryJobNotFound' }
        - { $ref: 'errors.yaml#/InvalidDeliveryStatus' }   # must be ASSIGNED to this rider
    - message: { $ref: 'commands.yaml#/CompleteDelivery' }
      emits: [{ $ref: 'events.yaml#/DeliveryCompleted' }]
      throws:
        - { $ref: 'errors.yaml#/DeliveryJobNotFound' }
        - { $ref: 'errors.yaml#/InvalidDeliveryStatus' }
    - message: { $ref: 'commands.yaml#/CancelDelivery' }
      emits: [{ $ref: 'events.yaml#/DeliveryCancelled' }]
      throws:
        - { $ref: 'errors.yaml#/DeliveryJobNotFound' }
        - { $ref: 'errors.yaml#/InvalidDeliveryStatus' }   # a DELIVERED job cannot be cancelled
    - message: { $ref: 'commands.yaml#/EscalateDelivery' }
      emits: [{ $ref: 'events.yaml#/DeliveryEscalationRequested' }]
      throws:
        - { $ref: 'errors.yaml#/DeliveryJobNotFound' }   # only a known job can be escalated; self-dispatch/exhaustion are the saga's concern, not thrown here (#60)
    - message: { $ref: 'commands.yaml#/ReportDeliveryIssue' }
      emits: [{ $ref: 'events.yaml#/DeliveryIssueReported' }]
      throws:
        - { $ref: 'errors.yaml#/DeliveryJobNotFound' }
        - { $ref: 'errors.yaml#/InvalidDeliveryStatus' }   # a DELIVERED job cannot report an issue
    - message: { $ref: 'commands.yaml#/ResolveDeliveryIssue' }
      emits: [{ $ref: 'events.yaml#/DeliveryIssueResolved' }]
      throws:
        - { $ref: 'errors.yaml#/DeliveryJobNotFound' }
        - { $ref: 'errors.yaml#/InvalidDeliveryStatus' }   # a DELIVERED job cannot resolve an issue

    - message: { $ref: 'commands.yaml#/UpdateDeliveryStatus' }
      emits: [{ $ref: 'events.yaml#/DeliveryStatusUpdated' }]
      throws:
        - { $ref: 'errors.yaml#/DeliveryJobNotFound' }
        - { $ref: 'errors.yaml#/InvalidDeliveryStatus' }   # must be a valid status transition

    - message: { $ref: 'commands.yaml#/AssignDeliveryToPartner' }
      emits: [{ $ref: 'events.yaml#/DeliveryAssignedToPartner' }]
      throws:
        - { $ref: 'errors.yaml#/DeliveryJobNotFound' }
        - { $ref: 'errors.yaml#/InvalidDeliveryStatus' }   # must be a PENDING job
        - { $ref: 'errors.yaml#/DeliveryAlreadyAssigned' }
    - message: { $ref: 'commands.yaml#/UnassignDeliveryFromPartner' }
      emits: [{ $ref: 'events.yaml#/DeliveryUnassignedFromPartner' }]
      throws:
        - { $ref: 'errors.yaml#/DeliveryJobNotFound' }
        - { $ref: 'errors.yaml#/InvalidDeliveryStatus' }   # must be an ASSIGNED job

    - message: { $ref: 'commands.yaml#/UpdateDeliveryPartnerStatus' }
      emits: [{ $ref: 'events.yaml#/DeliveryPartnerStatusUpdated' }]
      throws:
        - { $ref: 'errors.yaml#/DeliveryJobNotFound' }
        - { $ref: 'errors.yaml#/InvalidDeliveryStatus' }   # must be a valid status transition
    - message: { $ref: 'commands.yaml#/DeclineDelivery' }
      emits: [{ $ref: 'events.yaml#/DeliveryDeclinedByRider' }]
      throws:
        - { $ref: 'errors.yaml#/DeliveryJobNotFound' }
        - { $ref: 'errors.yaml#/InvalidDeliveryStatus' }   # only a PENDING job can be declined
        - { $ref: 'errors.yaml#/DeliveryAlreadyAssigned' }
    
Rider:
  type: aggregate
  description: "A rider identity, linked to the auth provider user (authRef)."
  # Availability machine. RiderRegistered carries the birth status in its payload (`via: status`,
  # ADR-20260721-093027) — canonically OFFLINE (rules.yaml#/RiderLifecycle); RiderStatusChanged
  # carries its target state the same way. SUSPENDED is admin-imposed from anywhere (idempotently
  # re-suspendable — the self-loop is deliberate); reinstatement goes through OFFLINE only. No
  # terminal state.
  lifecycle:
    status: { $ref: 'scalars.yaml#/RiderStatus' }
    initial:
      - event: { $ref: 'events.yaml#/RiderRegistered' }
        to: OFFLINE
        via: status
    transitions:
      - { from: [OFFLINE, ON_DELIVERY], event: { $ref: 'events.yaml#/RiderStatusChanged' }, to: AVAILABLE, via: status }
      - { from: [AVAILABLE, SUSPENDED], event: { $ref: 'events.yaml#/RiderStatusChanged' }, to: OFFLINE, via: status }
      - { from: [AVAILABLE], event: { $ref: 'events.yaml#/RiderStatusChanged' }, to: ON_DELIVERY, via: status }
      - { from: [OFFLINE, AVAILABLE, ON_DELIVERY, SUSPENDED], event: { $ref: 'events.yaml#/RiderStatusChanged' }, to: SUSPENDED, via: status }
    terminal: []
  receives:
    - message: { $ref: 'commands.yaml#/RegisterRider' }
      emits: [{ $ref: 'events.yaml#/RiderRegistered' }]
      throws:
        - { $ref: 'errors.yaml#/RiderAlreadyRegistered' }
    - message: { $ref: 'commands.yaml#/UpdateRiderInfo' }
      emits: [{ $ref: 'events.yaml#/RiderInfoUpdated' }]
      throws:
        - { $ref: 'errors.yaml#/RiderNotFound' }
        - { $ref: 'errors.yaml#/NoEditableFieldProvided' }
    - message: { $ref: 'commands.yaml#/ChangeRiderStatus' }
      emits: [{ $ref: 'events.yaml#/RiderStatusChanged' }]
      throws:
        - { $ref: 'errors.yaml#/RiderNotFound' }
        - { $ref: 'errors.yaml#/InvalidRiderStatusTransition' }