    slice: V0


subscriptions:

  operationStatusChanged:
    description: >
      Live status of one journaled command, keyed by its messageId acceptance handle (the push
      counterpart of queries/operationStatus, ADR-20260720-015500). Yields the current journal state
      first (no subscribe/complete race), then every transition. Open to every role path (roles
      omitted) but ownership-scoped like
      the query (JWT subject / X-SESSION-ID via the WS connection_init payload / ADMIN).
    args:
      messageId: { $ref: 'scalars.yaml#/MessageId', required: true }
    returns: { $ref: '#/types/Operation' }
    slice: V0
  paymentStatusChanged:
    description: >
      Checkout payment-state changes for one order (the push counterpart of queries/paymentStatus,
      ADR-20260720-015500): re-resolves the PlaceOrderProcess run row on Payment-stream events, so
      the checkout page receives the clientSecret and the terminal CAPTURED/FAILED without polling.
      Literal roles like the query (#31), ownership-scoped at stream setup (customer / session /
      ADMIN) —
      strangers get an empty stream.
    args:
      orderId: { $ref: 'scalars.yaml#/OrderId', required: true }
    returns: { $ref: '#/types/PaymentIntent' }
    roles: [PUBLIC, CUSTOMER, ADMIN]
    slice: V0
  orderStatusChanged:
    description: >
      Order status change events for ONE order, tracked by orderId — what the confirmation screen
      has in hand (#14, ADR-20260720-220000; replaces the pre-acceptance-first correlationId key).
      Ownership is resolver-side per row: a CUSTOMER caller must BE the order's customer; ADMIN sees
      any order; RESTAURANT/RESTAURANT_ACCOUNT paths are trusted like the `orders` query until a
      caller↔restaurant binding exists (recorded gap). No guest session scope on Order reads
      (ADR-20260720-213000 §3 — guests follow paymentStatusChanged until they verify a phone).
    args:
      orderId: { $ref: 'scalars.yaml#/OrderId', required: true }
    returns: { $ref: '#/types/Order' }
    roles: [CUSTOMER, RESTAURANT, RESTAURANT_ACCOUNT, ADMIN]
    slice: V0