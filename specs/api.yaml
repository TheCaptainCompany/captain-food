version: 3
description: >
  Captain.Food API surface (GraphQL ports) — SOURCE OF TRUTH for operations, payloads and the ACL.
  Reuses scalars.yaml (scalars/enums), entities.yaml (output-type shapes), commands.yaml (mutation
  inputs, derived from the dispatched command) and views.yaml (read models + FK navigation).
  The GraphQL SDL is GENERATED from this file to specs/generated/schema.generated.graphql
  (the hand-written schema.graphql has been removed) — do not hand-edit the SDL.

  Conventions:
    - vocabulary : JSON-Schema standard — a type lists its `properties`; a field is `array: true`
                   (not `list`), `required: true` (non-null arg) or `nullable: true` (optional field).
                   Cross-references ALWAYS use `$ref`, never a bare name string.
    - types      : the GraphQL OUTPUT-TYPE REGISTRY. Each entry is a resolver:
                     · shape : declared INLINE via `properties` — the read/API shape, DECOUPLED from
                               entities.yaml (the write/domain shape, which may differ); the bound view
                               is its source of truth. Fields reference scalars/value-objects by `$ref`;
                               shared value objects with no API divergence are emitted from entities.yaml
                               and referenced, not re-declared.
                     · reads : `reads: [{ $ref: 'database/projection_views.yaml#/View_* }]` is the view(s) that populate the
                               type (→ @reads). Omitted for boundary types returned via a mutation
                               payload. FK navigation (e.g. Restaurant.catalogs) is derived from views.yaml.
    - queries    : `returns` is `{ $ref: '#/types/<Type>' }`. The query's `@reads` is INHERITED from the
                   return type's binding — reads are declared on the TYPE, never on the query.
    - mutations  : `command` is `{ $ref: 'commands.yaml#/<Command>' }` (→ @command, must be handled by an
                   actor). The input type is GENERATED from that command's payload (`<Command>Input`);
                   only the GraphQL-specific bits live here (roles, slice). Mutations are
                   ACCEPTANCE-FIRST (ADR-20260720-015500): every mutation takes an optional
                   `metadata: MetadataInput` argument (#/inputs/MetadataInput) and returns the ONE
                   shared `#/types/MutationAcceptance` (the effective technical envelope +
                   operationStatus) — a mutation declares NO per-operation payload; business
                   outcomes are served by queries/subscriptions (results ARE reads).
    - inputs     : the few GENERATOR-INJECTED input types that are not command payloads
                   (MetadataInput today). Command inputs stay generated from commands.yaml.
    - roles      : LITERAL list of scalars.yaml#/UserType values (ADR-20260720-191500). OMITTED →
                   open to every role path (@public). Present → exactly those role paths
                   (@auth(requires: [...])); PUBLIC in the list is just the anonymous path
                   (/public/graphql), e.g. [PUBLIC, CUSTOMER] = anonymous-or-customer only.
    - navRoles   : OPTIONAL per-type map `edgeField: [roles]` for FK-DERIVED navigation edges (#22,
                   ADR-20260720-230000). Same LITERAL semantics as `roles`: an edge absent from the
                   map is OPEN (inherits the parent type's reachability); a listed edge is traversable
                   only on those role paths (same @auth + generated guard/visible pair as operations —
                   the field is hidden from other roles' introspection and FORBIDDEN on execution).
    - slice      : V0 | V1.

# --- Output-type registry (GraphQL types → INLINE shape + backing read model) ---------------------
# Each entry is a resolver. Its shape is declared INLINE via `properties` — the READ/API shape, which
# the bound View_* is the source of truth for — DECOUPLED from entities.yaml (the write/domain shape,
# which may differ: the read shape adds presentation fields like images and derived status, and drops
# write-only internals). Catalog domain types (CatalogCategory/Product/Offer/OptionList/Option) are dedicated
# API types here, NOT entities.yaml refs. Only true value objects with no read/write divergence
# (Address, Money, TaxRate, OpeningHoursSlot, OrderLineItem, SelectedOption) are emitted from
# entities.yaml and referenced by `$ref`. FK navigation (e.g. Restaurant.catalogs) is derived from views.yaml.
types:

  Restaurant:
    description: "A restaurant (public discovery + single-restaurant header). Navigates to its catalogs."
    reads: [{ $ref: 'database/tables/projection_tables.yaml#/Restaurant' }]
    navRoles:   # #22: reverse-FK edges off the PUBLIC-reachable Restaurant carry customer PII / ops data
      carts: [ADMIN]                                        # every cart of a restaurant — support only
      orders: [RESTAURANT, RESTAURANT_ACCOUNT, ADMIN]       # the restaurant's own order board + support
      deliveryJobs: [RESTAURANT, RESTAURANT_ACCOUNT, RIDER, ADMIN]   # dispatch board, not public
    properties:
      id: { $ref: 'scalars.yaml#/RestaurantId' }
      accountId: { $ref: 'scalars.yaml#/RestaurantAccountId', nullable: true }   # null for a non-partner listing
      listingStatus: { $ref: 'scalars.yaml#/RestaurantListingStatus' }
      orderable: { type: boolean }   # derived: ACTIVE_PARTNER + status ACTIVE + acceptance ≠ PAUSED
      externalIdentifiers: { $ref: 'entities.yaml#/ExternalIdentifier', array: true }
      slug: { $ref: 'scalars.yaml#/Slug' }
      displayName: { $ref: 'scalars.yaml#/RestaurantDisplayName' }
      description: { type: string, nullable: true }   # free text — no domain scalar (matches the view column)
      tags: { $ref: 'scalars.yaml#/Tag', array: true }
      cuisineCategory: { $ref: 'scalars.yaml#/CuisineCategory', nullable: true }   # single primary cuisine (Uber estimate coefficient); multi-cuisine discovery is `tags`
      rating: { $ref: 'scalars.yaml#/GoogleRating', nullable: true }
      reviewsCount: { type: integer, nullable: true }
      website: { $ref: 'scalars.yaml#/WebUrl', nullable: true }
      gbpOrderUrl: { $ref: 'scalars.yaml#/WebUrl', nullable: true }
      gbpLinkStatus: { $ref: 'scalars.yaml#/GbpLinkStatus', nullable: true }
      address: { $ref: 'entities.yaml#/Address' }
      location: { $ref: 'entities.yaml#/GeoPoint', nullable: true }
      openingHours: { $ref: 'entities.yaml#/OpeningHoursSlot', array: true }
      status: { $ref: 'scalars.yaml#/RestaurantStatus' }
      orderAcceptance: { $ref: 'scalars.yaml#/OrderAcceptanceMode' }
      defaultCurrency: { $ref: 'scalars.yaml#/CurrencyCode' }
      timezone: { $ref: 'scalars.yaml#/TimeZone', nullable: true }
      preparationTimeMinutes: { type: integer, nullable: true }
      updatedAt: { type: string, format: date-time }
  Catalog:
    description: "A restaurant's catalog (categories → products → offers + option lists)."
    reads: [{ $ref: 'database/tables/projection_tables.yaml#/Catalog' }]
    properties:
      id: { $ref: 'scalars.yaml#/CatalogId' }
      restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
      slug: { $ref: 'scalars.yaml#/Slug' }
      name: { $ref: 'scalars.yaml#/CatalogName' }
      categories: { $ref: '#/types/CatalogCategory', array: true }   # assembled from Catalog.tree
      products: { $ref: '#/types/Product', array: true }
      optionLists: { $ref: '#/types/OptionList', array: true }
      updatedAt: { type: string, format: date-time }
  Cart:
    description: "A customer's in-progress selection for a single restaurant (priced by the projection)."
    reads: [{ $ref: 'database/tables/projection_tables.yaml#/Cart' }]
    properties:
      id: { $ref: 'scalars.yaml#/CartId' }
      restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
      customerId: { $ref: 'scalars.yaml#/CustomerId', nullable: true }
      status: { $ref: 'scalars.yaml#/CartStatus' }
      lines: { $ref: 'entities.yaml#/OrderLineItem', array: true }   # read lines are priced (same shape as order lines)
      totalAmount: { $ref: 'entities.yaml#/Money' }   # food sub-total (the cart's items)
      breakdown: { $ref: 'entities.yaml#/PaymentBreakdown', nullable: true }   # estimated checkout fee breakdown (ADR-0018)
      uberComparison: { $ref: 'entities.yaml#/UberComparison', nullable: true }   # estimated Uber Eats price/split for this cart (ADR-0022/0025); null if no cuisine
      updatedAt: { type: string, format: date-time }
  Order:
    description: "An order with its tracking status and payment state."
    reads: [{ $ref: 'database/tables/projection_tables.yaml#/OrderTracking' }]
    navRoles:   # #22: the order's delivery legs are ops data (customer tracking uses Order.deliveryStatus/courier)
      deliveryJobs: [RESTAURANT, RESTAURANT_ACCOUNT, RIDER, ADMIN]
    properties:
      id: { $ref: 'scalars.yaml#/OrderId' }
      ref: { $ref: 'scalars.yaml#/ExternalReference' }
      restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
      customerId: { $ref: 'scalars.yaml#/CustomerId', nullable: true }
      status: { $ref: 'scalars.yaml#/OrderStatus' }
      serviceType: { $ref: 'scalars.yaml#/ServiceType' }
      items: { $ref: 'entities.yaml#/OrderLineItem', array: true }
      totalAmount: { $ref: 'entities.yaml#/Money' }   # buyer total (== breakdown.total)
      breakdown: { $ref: 'entities.yaml#/PaymentBreakdown' }   # fee/split breakdown (ADR-0016/0017/0018)
      deliveryAddress: { $ref: 'entities.yaml#/Address', nullable: true }
      estimatedReadyAt: { type: string, format: date-time, nullable: true }
      placedAt: { type: string, format: date-time }
      statusChangedAt: { type: string, format: date-time }
      paymentStatus: { $ref: 'scalars.yaml#/PaymentStatus' }   # folded from Stripe facts
      restaurantStars: { $ref: 'scalars.yaml#/StarRating', nullable: true }   # null until rated
      ratingComment: { $ref: 'scalars.yaml#/RatingComment', nullable: true }
      riderThumb: { $ref: 'scalars.yaml#/ThumbRating', nullable: true }
      riderTip: { $ref: 'entities.yaml#/Money', nullable: true }        # Σ tips to the rider (any tipper)
      restaurantTip: { $ref: 'entities.yaml#/Money', nullable: true }   # Σ tips to the restaurant
      captainTip: { $ref: 'entities.yaml#/Money', nullable: true }      # Σ tips to Captain
      uberComparison: { $ref: 'entities.yaml#/UberComparison', nullable: true }   # Uber side of the receipt (ADR-0025); Captain side is `breakdown`. Null if no cuisine
      deliveryStatus: { $ref: 'scalars.yaml#/DeliveryStatus', nullable: true }   # live delivery progress (ADR-0031); null for COLLECTION / before dispatch
      courier: { $ref: 'entities.yaml#/Courier', nullable: true }                # assigned courier once accepted
      estimatedDropoffAt: { type: string, format: date-time, nullable: true }    # partner-reported ETA
      ratedAt: { type: string, format: date-time, nullable: true }

  # Catalog sub-types — the read/API shape, assembled within Catalog.tree. Dedicated API
  # types (NOT entities.yaml refs): the read shape carries presentation fields (images) and a DERIVED
  # stockStatus, whereas the write entity carries raw Stock and write-only internals.
  CatalogCategory:
    description: "A catalog category (tree via parentRef)."
    reads: [{ $ref: 'database/tables/projection_tables.yaml#/Catalog' }]   # category tree is assembled from the catalog projection
    properties:
      id: { $ref: 'scalars.yaml#/ProductCategoryId' }
      parentRef: { $ref: 'scalars.yaml#/ExternalReference', nullable: true }
      name: { $ref: 'scalars.yaml#/CatalogCategoryName' }
      description: { $ref: 'scalars.yaml#/ProductDescription', nullable: true }
      tags: { $ref: 'scalars.yaml#/Tag', array: true }
      imageIds: { $ref: 'scalars.yaml#/ImageId', array: true }
  Product:
    description: "A catalog product grouping one or more purchasable offers."
    properties:
      id: { $ref: 'scalars.yaml#/ProductId' }
      categoryRef: { $ref: 'scalars.yaml#/ExternalReference', nullable: true }
      name: { $ref: 'scalars.yaml#/ProductName' }
      description: { $ref: 'scalars.yaml#/ProductDescription', nullable: true }
      tags: { $ref: 'scalars.yaml#/Tag', array: true }
      imageIds: { $ref: 'scalars.yaml#/ImageId', array: true }
      taxRate: { $ref: 'entities.yaml#/TaxRate' }
      offers: { $ref: '#/types/Offer', array: true }
  Offer:
    description: "A purchasable offer (SKU) of a product, with its price and derived availability."
    properties:
      id: { $ref: 'scalars.yaml#/OfferId' }
      name: { $ref: 'scalars.yaml#/OfferName' }
      price: { $ref: 'entities.yaml#/Money' }
      uberPrice: { $ref: 'entities.yaml#/Money', nullable: true }   # product-level Uber comparison (ADR-0022): estimated (coefficient×price) or real; null if no cuisine
      uberPriceBasis: { $ref: 'scalars.yaml#/ComparisonBasis', nullable: true }   # ESTIMATED (V0) or REAL (opt-in + HubRise)
      availability: { $ref: 'scalars.yaml#/CatalogItemAvailability' }
      stockStatus: { $ref: 'scalars.yaml#/StockStatus' }   # DERIVED (quantity vs lowStockThreshold)
      optionListIds: { $ref: 'scalars.yaml#/OptionListId', array: true }
  OptionList:
    description: "A modifier group (HubRise option list)."
    properties:
      id: { $ref: 'scalars.yaml#/OptionListId' }
      name: { $ref: 'scalars.yaml#/OptionListName' }
      minSelections: { type: integer }
      maxSelections: { type: integer, nullable: true }
      multipleSelection: { type: boolean }
      options: { $ref: '#/types/Option', array: true }
  Option:
    description: "A selectable option within an option list."
    properties:
      id: { $ref: 'scalars.yaml#/OptionId' }
      name: { $ref: 'scalars.yaml#/OptionName' }
      price: { $ref: 'entities.yaml#/Money' }
      default: { type: boolean }
      availability: { $ref: 'scalars.yaml#/CatalogItemAvailability' }
      stockStatus: { $ref: 'scalars.yaml#/StockStatus', nullable: true }   # DERIVED; null when not stock-tracked

  # Boundary / projection types with no dedicated entity OR view (shape is fully inline).
  CustomerProfile:
    description: >
      A customer's own profile (display name + contact). Backed by the identity read model; surfaced
      to the customer only (profile management is V1 — no V0 query yet).
    reads: [{ $ref: 'database/tables/projection_tables.yaml#/Customer' }]
    properties:
      customerId: { $ref: 'scalars.yaml#/CustomerId' }
      displayName: { $ref: 'scalars.yaml#/CustomerDisplayName', nullable: true }
      email: { $ref: 'scalars.yaml#/EmailAddress', nullable: true }
      emailVerified: { type: boolean }
      phone: { $ref: 'scalars.yaml#/PhoneNumber' }
      locale: { $ref: 'scalars.yaml#/Locale', nullable: true }
      timezone: { $ref: 'scalars.yaml#/TimeZone', nullable: true }
  PhoneCountry:
    description: "A selectable phone country for the dialing-code picker (static reference data)."
    reads: [{ $ref: 'database/tables/referential.yaml#/PhoneCountry' }]
    properties:
      country: { $ref: 'scalars.yaml#/CountryCode' }
      dialingCode: { $ref: 'scalars.yaml#/DialingCode' }
      name: { type: string }
      defaultLocale: { $ref: 'scalars.yaml#/Locale' }
  PaymentIntent:
    description: >
      Checkout payment state for one order (ADR-20260720-015500): the read-side home of the values
      placeOrder used to return, served from the PlaceOrderProcess run row by `paymentStatus` /
      `paymentStatusChanged`. `clientSecret` is present only while the run is in flight (NULLed when
      it resolves — a revocable Stripe credential, never event-sourced). NON-PROJECTED (transient):
      resolver-served from the saga state row, never a View_* — hence no `reads`.
    properties:
      paymentIntentId: { $ref: 'scalars.yaml#/PaymentIntentId' }
      clientSecret: { type: string, nullable: true }
      status: { $ref: 'scalars.yaml#/PaymentStatus' }
  MutationAcceptance:
    description: >
      The uniform acceptance EVERY mutation returns (acceptance-first writes, ADR-20260720-015500):
      the EFFECTIVE technical envelope echoed back (server-computed where the client supplied
      nothing) plus the journaled operation status. Business outcomes are never here — read them via
      queries/subscriptions (`operationStatus`, `paymentStatus`, the read models). NON-PROJECTED
      (transient) — built from the command_journal acceptance, no `reads`.
    properties:
      messageId: { $ref: 'scalars.yaml#/MessageId' }
      correlationId: { $ref: 'scalars.yaml#/CorrelationId' }
      causeId: { $ref: 'scalars.yaml#/CauseId', nullable: true }
      sessionId: { $ref: 'scalars.yaml#/SessionId', nullable: true }   # echo of X-SESSION-ID; null when the header is absent
      traceId: { $ref: 'scalars.yaml#/TraceId', nullable: true }       # traceparent-derived; null until tracing lands on the request
      operationStatus: { $ref: 'scalars.yaml#/OperationStatus' }       # PENDING on first acceptance; the original's status on a duplicate
      duplicate: { type: boolean }                                     # true when this messageId was already journaled (idempotent replay)
  Operation:
    description: >
      Live status of a journaled command (ADR-20260720-015300), keyed by its `messageId` acceptance
      handle: polled by `operationStatus`, streamed by `operationStatusChanged`. `errorCode` is the
      stable errors.yaml code when the operation REJECTED/FAILED after acceptance (the async home of
      the P-10 rejection contract — sync validation failures still use GraphQL errors). Ownership-
      scoped in the resolver: the journaling actor (JWT), the journaling session (X-SESSION-ID), or
      ADMIN. NON-PROJECTED (transient) — served from the command_journal, no backing View_*.
    properties:
      messageId: { $ref: 'scalars.yaml#/MessageId' }
      correlationId: { $ref: 'scalars.yaml#/CorrelationId' }
      status: { $ref: 'scalars.yaml#/OperationStatus' }
      errorCode: { type: string, nullable: true }
      message: { type: string, nullable: true }
      occurredAt: { type: string, format: date-time }
  DeliveryJob:
    description: "One delivery of an order (ADR-0031): status, courier, addresses and ETAs. Serves the rider job list, the restaurant delivery board and admin."
    reads: [{ $ref: 'database/projection_views.yaml#/View_DeliveryJob' }]
    properties:
      id: { $ref: 'scalars.yaml#/DeliveryJobId' }
      orderId: { $ref: 'scalars.yaml#/OrderId' }
      restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
      status: { $ref: 'scalars.yaml#/DeliveryStatus' }
      provider: { $ref: 'scalars.yaml#/DeliveryProvider', nullable: true }
      courier: { $ref: 'entities.yaml#/Courier', nullable: true }
      pickupAddress: { $ref: 'entities.yaml#/Address' }
      dropoffAddress: { $ref: 'entities.yaml#/Address' }
      estimatedPickupAt: { type: string, format: date-time, nullable: true }
      estimatedDropoffAt: { type: string, format: date-time, nullable: true }
      requestedAt: { type: string, format: date-time }
      pickedUpAt: { type: string, format: date-time, nullable: true }
      deliveredAt: { type: string, format: date-time, nullable: true }
  Refund:
    description: >
      A refund opened for decision on a paid order (RefundProcess): REQUESTED until the restaurant/admin
      decides, then APPROVED (Stripe refund requested) or DENIED, and REFUNDED once Stripe settles.
      Serves the restaurant's and admin's refund queue (filter status = REQUESTED for pending ones).
    reads: [{ $ref: 'database/projection_views.yaml#/View_PendingRefunds' }]
    properties:
      orderId: { $ref: 'scalars.yaml#/OrderId' }
      restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
      status: { $ref: 'scalars.yaml#/RefundStatus' }
      amount: { $ref: 'entities.yaml#/Money' }   # the captured total eligible for refund
      approvedAmount: { $ref: 'entities.yaml#/Money', nullable: true }   # the (possibly partial) approved amount
      reason: { type: string, nullable: true }   # free text — the opening fact's reason, then the decision's
      refundId: { $ref: 'scalars.yaml#/RefundId', nullable: true }   # Stripe Refund id once settled
      requestedAt: { type: string, format: date-time }
      decidedAt: { type: string, format: date-time, nullable: true }
  Prospect:
    description: "A B2B prospect (NON_PARTNER listing) with its computed score and outreach state (admin pipeline)."
    reads: [{ $ref: 'database/tables/projection_tables.yaml#/ProspectionPipeline' }]
    properties:
      restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
      score: { $ref: 'scalars.yaml#/ProspectionScore' }
      pipelineStatus: { $ref: 'scalars.yaml#/ProspectPipelineStatus' }
      contactsCount: { type: integer }
      lastContactedAt: { type: string, format: date-time, nullable: true }
      repliedAt: { type: string, format: date-time, nullable: true }
  PricingPolicy:
    description: "The calibratable Captain service-fee policy (ADR-0016/0017); admin/transparency."
    reads: [{ $ref: 'database/tables/referential.yaml#/PricingPolicy' }]
    properties:
      currency: { $ref: 'scalars.yaml#/CurrencyCode' }
      feeRate: { type: number }
      buyerShare: { type: number }
      marginLow: { type: number }
      marginHigh: { type: number }
      effectiveFrom: { type: string, format: date-time }
  UberEstimationPolicy:
    description: "Calibratable per-cuisine Uber Eats mark-up coefficient (ADR-0024/0030); admin/transparency."
    reads: [{ $ref: 'database/tables/referential.yaml#/UberEstimationPolicy' }]
    properties:
      cuisineCategory: { $ref: 'scalars.yaml#/CuisineCategory' }
      priceCoefficient: { type: number }
      effectiveFrom: { type: string, format: date-time }
  UberSplitPolicy:
    description: "Calibratable Uber Eats split/fee assumptions for the estimated comparison (ADR-0024/0025/0030); admin/transparency."
    reads: [{ $ref: 'database/tables/referential.yaml#/UberSplitPolicy' }]
    properties:
      currency: { $ref: 'scalars.yaml#/CurrencyCode' }
      uberCommissionPct: { type: number }
      riderBaseCents: { type: integer }
      riderPerKmCents: { type: integer }
      avgDeliveryFeeCents: { type: integer }
      platformFeePct: { type: number }
      effectiveFrom: { type: string, format: date-time }

# --- Generator-injected inputs (not command payloads) ---------------------------------------------
inputs:

  MetadataInput:
    description: >
      Optional client-suppliable technical envelope for ANY mutation (ADR-0041: envelope, never
      payload; ADR-20260720-015500). The server computes anything missing (UUIDv7), validates what
      is provided (ValidationError on shape; reusing a messageId with a DIFFERENT payload is a
      Conflict), and echoes the effective values in MutationAcceptance. `sessionId` travels as the
      X-SESSION-ID header and `traceId` derives from `traceparent` — neither is accepted here.
    properties:
      messageId: { $ref: 'scalars.yaml#/MessageId', nullable: true }
      correlationId: { $ref: 'scalars.yaml#/CorrelationId', nullable: true }
      causeId: { $ref: 'scalars.yaml#/CauseId', nullable: true }

# --- Reads (queries) ------------------------------------------------------------------------------
# A query declares only its args, return type (`$ref` into `#/types`), roles and slice. `@reads` is
# INHERITED from the return type's binding above (reads live on the type, not the query).
# --- Reads (queries) ------------------------------------------------------------------------------
# CONVENTION: a query that takes arguments is generated to accept a SINGLE input class
# `<Query>QueryInput` (args are never inlined on the field) — parallel to mutations' `<Command>Input`.
# The input is non-null when any arg is required, nullable when all args are optional filters. Declare
# args here as usual; the codegen produces the input type + value-object inputs for any entity-typed arg.
queries:

  phoneCountries:
    description: "Selectable phone countries for the dialing-code picker (static reference data; the picker sends back the dialingCode '+33')."
    returns: { $ref: '#/types/PhoneCountry', array: true }
    slice: V0

  operationStatus:
    description: >
      Poll a journaled command's status by its messageId acceptance handle (the pull counterpart of
      the operationStatusChanged subscription, ADR-20260720-015500). Open to every role path (roles omitted) but OWNERSHIP-SCOPED in
      the resolver: the row is returned only to the journaling actor (JWT subject match), the
      journaling session (X-SESSION-ID match — anonymous users), or ADMIN; anything else resolves
      null (no existence oracle). Transient — served from the command_journal, no View_*.
    args:
      messageId: { $ref: 'scalars.yaml#/MessageId', required: true }
    returns: { $ref: '#/types/Operation', nullable: true }
    slice: V0

  paymentStatus:
    description: >
      The checkout payment state for an order (ADR-20260720-015500): paymentIntentId, clientSecret
      while the run is in flight, and the folded PaymentStatus — the read-side home of the values
      placeOrder used to return. Served from the PlaceOrderProcess run row (the declared exception
      to PM-table privacy). Literal roles [PUBLIC, CUSTOMER, ADMIN] (#13/#31): the checkout paths
      only, ownership-scoped in the resolver — the
      checkout's customer, its anonymous session (X-SESSION-ID), or ADMIN; strangers resolve null
      (never an existence oracle).
    args:
      orderId: { $ref: 'scalars.yaml#/OrderId', required: true }
    returns: { $ref: '#/types/PaymentIntent', nullable: true }
    roles: [PUBLIC, CUSTOMER, ADMIN]
    slice: V0

  me:
    description: "The signed-in customer's own profile (resolves the session authRef → Customer via Customer)."
    returns: { $ref: '#/types/CustomerProfile', nullable: true }
    roles: [CUSTOMER]
    slice: V1
  favoriteRestaurants:
    description: "The customer's favorited restaurants (Customer.favorite_restaurant_ids joined to Restaurant)."
    args:
      customerId: { $ref: 'scalars.yaml#/CustomerId', required: true }
    returns: { $ref: '#/types/Restaurant', array: true }
    roles: [CUSTOMER]
    slice: V1

  restaurants:
    description: >
      Discover: public list of restaurants. All args are optional filters resolved by the read side
      (Restaurant); the query returns only matching restaurants. `list` selects a curated/
      personalized shelf (the read model resolves its members).
    args:
      search: { type: string }                              # free-text name match
      tags: { $ref: 'scalars.yaml#/Tag', array: true }      # cuisine/attribute tags (ALL must match)
      serviceType: { $ref: 'scalars.yaml#/ServiceType' }    # offers DELIVERY or COLLECTION
      openNow: { type: boolean }                            # currently within opening hours
      city: { $ref: 'scalars.yaml#/CityName' }
      priceRange: { $ref: 'scalars.yaml#/PriceRange' }
      list: { $ref: 'scalars.yaml#/RestaurantListKey' }     # curated/personalized shelf (e.g. ORDER_AGAIN)
      listingStatus: { $ref: 'scalars.yaml#/RestaurantListingStatus' }   # filter by partnership funnel
      orderableOnly: { type: boolean }                      # only orderable (active partner) restaurants; non-partner cards show by default
    returns: { $ref: '#/types/Restaurant', array: true }
    slice: V0

  catalog:
    description: "A restaurant's full catalog (categories → products → offers + option lists)."
    args:
      restaurantId: { $ref: 'scalars.yaml#/RestaurantId', required: true }
    returns: { $ref: '#/types/Catalog', nullable: true }
    slice: V0
  categories:
    description: >
      The category tree of a restaurant's catalog (for filtering & product discovery). Derived from
      Catalog.tree — categories are not a separate aggregate, so there is no dedicated view.
    args:
      restaurantId: { $ref: 'scalars.yaml#/RestaurantId', required: true }
    returns: { $ref: '#/types/CatalogCategory', array: true }
    slice: V0
  restaurant:
    description: "A restaurant + its catalog by slug (multi-tenant resolution by Host or /r/{slug})."
    args:
      slug: { $ref: 'scalars.yaml#/Slug', required: true }
    returns: { $ref: '#/types/Restaurant', nullable: true }
    slice: V0

  carts:
    description: "A customer's carts (one OPEN cart per restaurant)."
    args:
      customerId: { $ref: 'scalars.yaml#/CustomerId', required: true }
    returns: { $ref: '#/types/Cart', array: true }
    roles: [CUSTOMER, ADMIN]
    slice: V0
  cart:
    description: "A single cart by id (session-scoped; readable by the guest/customer who owns it)."
    args:
      id: { $ref: 'scalars.yaml#/CartId', required: true }
    returns: { $ref: '#/types/Cart', nullable: true }
    slice: V0

  orders:
    description: >
      Orders, optionally scoped by customer and/or restaurant and filtered by status. Serves both the
      customer's own history and the restaurant back-office queue; ownership/scope enforced server-side.
    args:
      customerId: { $ref: 'scalars.yaml#/CustomerId' }
      restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
      status: { $ref: 'scalars.yaml#/OrderStatus' }
    returns: { $ref: '#/types/Order', array: true }
    roles: [CUSTOMER, RESTAURANT, RESTAURANT_ACCOUNT, ADMIN]
    slice: V0
  order:
    description: "Order tracking by id; owning customer or the restaurant/admin. Ownership enforced server-side."
    args:
      id: { $ref: 'scalars.yaml#/OrderId', required: true }
    returns: { $ref: '#/types/Order', nullable: true }
    roles: [CUSTOMER, RESTAURANT, RESTAURANT_ACCOUNT, ADMIN]
    slice: V0

  delivery:
    description: "The delivery job of an order (tracking); owning customer, the restaurant/admin, or the assigned rider. Ownership enforced server-side."
    args:
      orderId: { $ref: 'scalars.yaml#/OrderId', required: true }
    returns: { $ref: '#/types/DeliveryJob', nullable: true }
    roles: [CUSTOMER, RESTAURANT, RESTAURANT_ACCOUNT, RIDER, ADMIN]
    slice: V0
  myDeliveries:
    description: "The independent rider's assigned/available delivery jobs (rider app)."
    args:
      status: { $ref: 'scalars.yaml#/DeliveryStatus' }
    returns: { $ref: '#/types/DeliveryJob', array: true }
    roles: [RIDER]
    slice: V0
  restaurantDeliveries:
    description: "A restaurant's active delivery jobs (delivery board; ownership enforced server-side)."
    args:
      restaurantId: { $ref: 'scalars.yaml#/RestaurantId', required: true }
      status: { $ref: 'scalars.yaml#/DeliveryStatus' }
    returns: { $ref: '#/types/DeliveryJob', array: true }
    roles: [RESTAURANT, RESTAURANT_ACCOUNT]
    slice: V0

  pendingRefunds:
    description: >
      The refund queue (RefundProcess): refunds opened for decision, with their lifecycle status
      (status = REQUESTED is the pending, awaiting-decision queue). The restaurant sees its own orders'
      refunds (restaurant-scoped, ownership enforced server-side); an admin arbitrates across restaurants.
    args:
      restaurantId: { $ref: 'scalars.yaml#/RestaurantId' }
      status: { $ref: 'scalars.yaml#/RefundStatus' }
    returns: { $ref: '#/types/Refund', array: true }
    roles: [RESTAURANT, ADMIN]
    slice: V0

  restaurantLocationsByAccount:
    description: "All restaurant locations under an account (back-office; ownership enforced server-side)."
    args:
      accountId: { $ref: 'scalars.yaml#/RestaurantAccountId', required: true }
    returns: { $ref: '#/types/Restaurant', array: true }
    roles: [ADMIN, RESTAURANT_ACCOUNT]
    slice: V1

  prospectionPipeline:
    description: "B2B prospection pipeline (admin): scored prospects, optionally filtered by minimum score / pipeline status."
    args:
      minScore: { $ref: 'scalars.yaml#/ProspectionScore' }
      status: { $ref: 'scalars.yaml#/ProspectPipelineStatus' }
    returns: { $ref: '#/types/Prospect', array: true }
    roles: [ADMIN]
    slice: V1

  pricingPolicy:
    description: "The active Captain service-fee policy (admin; calibration/transparency)."
    returns: { $ref: '#/types/PricingPolicy', array: true }
    roles: [ADMIN]
    slice: V1

  uberEstimationPolicy:
    description: "The active per-cuisine Uber Eats mark-up coefficients (admin; calibration/transparency)."
    returns: { $ref: '#/types/UberEstimationPolicy', array: true }
    roles: [ADMIN]
    slice: V1

  uberSplitPolicy:
    description: "The active Uber Eats split/fee assumptions for the estimated comparison (admin; calibration/transparency)."
    returns: { $ref: '#/types/UberSplitPolicy', array: true }
    roles: [ADMIN]
    slice: V1




# --- Writes (mutations) ---------------------------------------------------------------------------
# One mutation = one command, ACCEPTANCE-FIRST (ADR-20260720-015500). The input type is GENERATED
# from the command's payload in commands.yaml (`<Command>Input`), so commands are NOT re-described
# here — only the GraphQL-specific parts are: `roles` (→ @auth/@public) and `slice`. Every mutation
# additionally takes an optional `metadata: MetadataInput` (#/inputs) and returns the ONE shared
# `MutationAcceptance` payload (envelope echo + operationStatus). Mutations declare NO per-operation
# payload (the validator forbids it): business outcomes are reads — poll/subscribe operationStatus,
# and read the domain results from the read models (checkout's Stripe handle: queries/paymentStatus).
mutations:

  addCartLine:
    command: { $ref: 'commands.yaml#/AddCartLine' }
    slice: V0
  removeCartLine:
    command: { $ref: 'commands.yaml#/RemoveCartLine' }
    slice: V0
