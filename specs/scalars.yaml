# --- Identity & Slugs ---

RestaurantAccountId:
  type: string
  format: uuid
  description: "Restaurant account (HubRise: restaurant) — groups one or more Restaurant locations."

RestaurantId:
  type: string
  format: uuid
  description: "A single restaurant location (HubRise: location), belonging to a RestaurantAccount."

CatalogId:
  type: string
  format: uuid
  description: "Catalog id (HubRise: catalog)."

ProductCategoryId:
  type: string
  format: uuid

ProductId:
  type: string
  format: uuid
  description: "A product groups one or more offers (HubRise: product)."

SessionId:
  type: string
  format: uuid
  description: "A session is a temporary auth token (ADR-0041) for a visitor or customer, used to bind carts and track the user across devices."

OfferId:
  type: string
  format: uuid
  description: "A purchasable offer with its own price (HubRise: SKU)."

OptionListId:
  type: string
  format: uuid

OptionId:
  type: string
  format: uuid

OrderId:
  type: string
  format: uuid

CustomerId:
  type: string
  format: uuid

CartId:
  type: string
  format: uuid

CartLineId:
  type: string
  format: uuid
  description: "Identifies a line within a cart, used to edit its quantity or remove it."

CorrelationId:
  type: string
  format: uuid
  description: >
    Correlates a command with the events/state it produces. Returned by every mutation payload so the
    client can track the outcome via the read side (matches domain_events.correlation_id).

CauseId:
  type: string
  format: uuid
  description: >
    Causation id: the id of the message/event that directly caused this one (matches
    domain_events.cause_id). Threads a cause→effect chain through the log; null for a root command.

MessageId:
  type: string
  format: uuid
  description: >
    Unique id of one command submission — the idempotency key of the write path (command_journal pk,
    ADR-20260720-015300). Client-suppliable via MetadataInput; server-generated (UUIDv7) when absent.
    A replayed messageId with an identical payload acknowledges against the original; the same id
    with a different payload is rejected (Conflict). Events emitted by the command carry it as
    domain_events.cause_id.

TraceId:
  type: string
  pattern: '^[0-9a-f]{32}$'
  description: >
    W3C trace-id (from the inbound `traceparent` header, or server-started). Response-only technical
    tracing identifier — never client-suppliable, never a substitute for correlationId (P-02).

DeliveryJobId:
  type: string
  format: uuid
  description: "Identifies one DeliveryJob (a single delivery of an order from restaurant to customer)."

RiderId:
  type: string
  format: uuid
  description: "An independent Captain rider (courier). Null on a partner-fulfilled job (the partner's courier is name/phone only)."

PaymentIntentId:
  type: string
  maxLength: 255
  description: "Stripe PaymentIntent id (provider reference). Example: 'pi_3Nabc...'."

RefundId:
  type: string
  maxLength: 255
  description: "Stripe Refund id (provider reference). Example: 're_3Nabc...'."

UserId:
  type: string
  format: uuid

AddressId:
  type: string
  format: uuid
  description: "Identifies a saved address in a customer's address book."

PaymentMethodId:
  type: string
  maxLength: 255
  description: "Stripe PaymentMethod id (provider reference). Example: 'pm_1Nabc...'."

ImageId:
  type: string
  format: uuid

ExternalReference:
  type: string
  maxLength: 128
  description: >
    External reference code (HubRise `ref`), unique within its scope.
    Used for idempotent import/sync and as a stable reference inside orders.
    Example: 'MARGHERITA', 'CAT-PIZZAS'.

ExternalIdentifierKey:
  type: string
  maxLength: 64
  description: >
    Key of a generic external identifier kept on a Restaurant listing (see entities.yaml#/ExternalIdentifier).
    Open vocabulary preserving the ORIGINAL source key; well-known values: 'siret', 'naf', 'google_place_id',
    'hubrise_ref'. NOTE: external ids are NOT assumed unique — one SIRET can host several dark-kitchen brands;
    cross-reference sources (a google_place_id usually distinguishes them).

GooglePlaceId:
  type: string
  maxLength: 255
  description: "Google Maps Place id identifying the establishment (enrichment / Business Profile)."

Latitude:
  type: number
  minimum: -90
  maximum: 90
  description: "WGS84 latitude in decimal degrees."

Longitude:
  type: number
  minimum: -180
  maximum: 180
  description: "WGS84 longitude in decimal degrees."

GoogleRating:
  type: number
  minimum: 0
  maximum: 5
  description: "Google Maps / Business Profile average rating (0–5), enrichment only."

WebUrl:
  type: string
  pattern: "^https?://"
  maxLength: 2048
  description: "An http(s) URL — restaurant website or the Google Business Profile 'Order online' link."

Slug:
  type: string
  pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
  maxLength: 80
  description: >
    URL-safe identifier for restaurants. Lowercase, dash-separated.
    Example: 'chez-marco', 'tokyo-sushi'.

# --- Names (strongly typed, no reuse) ---

RestaurantDisplayName:
  type: string
  maxLength: 140
  description: >
    Public label shown to customers. Can be short and brand-oriented.
    Example: 'Chez Marco', 'Tokyo Sushi'.

RestaurantLegalName:
  type: string
  maxLength: 255
  description: >
    Legal entity name used for invoices and contracts.
    Example: 'SARL CHEZ MARCO', 'TOKYO SUSHI RESTAURATION SAS'.

CatalogName:
  type: string
  maxLength: 140

CatalogCategoryName:
  type: string
  maxLength: 80

ProductName:
  type: string
  maxLength: 140

ProductDescription:
  type: string
  maxLength: 2000

OfferName:
  type: string
  maxLength: 140
  description: >
    Offer label, unique within a product (HubRise SKU name).
    Example: 'Small', 'Large', 'Default'.

OptionListName:
  type: string
  maxLength: 140

OptionName:
  type: string
  maxLength: 140

# --- Tags ---

Tag:
  type: string
  maxLength: 80
  description: "Free-form label (HubRise: tags). Example: 'vegan', 'spicy', 'eco'."

# --- Contact & Address ---

EmailAddress:
  type: string
  format: email
  maxLength: 255

PhoneNumber:
  type: string
  maxLength: 32
  description: >
    Canonical E.164 phone (e.g. '+33612345678'). Composed server-side from DialingCode + NationalPhoneNumber
    and stored on events/views. Validation enforced at application level.

DialingCode:
  type: string
  pattern: "^\\+[0-9]{1,4}$"
  description: >
    Country dialing/calling code in '+NN' form (e.g. '+33', '+1'). This is what the phone-country picker
    emits and what the auth commands receive — NOT the ISO country code.

NationalPhoneNumber:
  type: string
  maxLength: 24
  description: "National (subscriber) part of a phone number, without the dialing code. E.g. '0612345678' or '612345678'."

OtpCode:
  type: string
  pattern: "^[0-9]{4,8}$"
  description: "One-time SMS code from Supabase Auth (sent via Twilio; a mock provider in dev)."

EmailVerificationToken:
  type: string
  maxLength: 512
  description: "Opaque Supabase token from an email magic link; verified server-side (never trusted as a bare client claim)."

AddressLine:
  type: string
  maxLength: 255

CityName:
  type: string
  maxLength: 120

PostalCode:
  type: string
  maxLength: 20

CountryCode:
  type: string
  pattern: "^[A-Z]{2}$"
  description: "ISO 3166-1 alpha-2 country code. Example: 'FR'."

TimeZone:
  type: string
  maxLength: 64
  description: "IANA timezone. Example: 'Europe/Paris'."

Locale:
  type: string
  pattern: "^[a-z]{2}-[A-Z]{2}$"
  maxLength: 5
  description: >
    i18n culture code, language-REGION (BCP 47 / .NET CultureInfo). Example: 'fr-FR', 'en-US'. Drives
    the UI language AND the display of dates, times and numbers (paired with TimeZone for the zone).

# --- Money & Currencies ---
# We keep a stronger model than HubRise (which serialises "9.80 EUR" as a string):
# amount is an integer in minor units + an explicit currency, wrapped in the
# Money value object (see entities.yaml#/Money).

CurrencyCode:
  type: string
  pattern: "^[A-Z]{3}$"
  description: "ISO 4217 currency code. Example: 'EUR'."

MoneyCents:
  type: integer
  minimum: 0
  description: "Monetary amount in minor units (e.g. cents)."

TaxRatePercent:
  type: number
  minimum: 0
  maximum: 100
  description: "Percentage tax rate. Example: 10.0 for 10%."

MarginPercent:
  type: number
  minimum: 0
  maximum: 100
  description: >
    A restaurant's food margin (%), input to the proportional Captain service fee (ADR-0016/0017):
    the restaurant's variable contribution scales with clamp((margin−55)/(70−55),0,1). Example: 62.0.

# --- Stock ---

Quantity:
  type: number
  minimum: 0
  description: >
    Stock quantity in units. Decimals allowed to match HubRise inventory.
    0 means out of stock.

# --- Customer / Order ---

CustomerDisplayName:
  type: string
  maxLength: 140

OrderNote:
  type: string
  maxLength: 1000

# --- Ratings ---

StarRating:
  type: integer
  minimum: 0
  maximum: 5
  description: "Restaurant rating in stars (0–5), given by the customer on a delivered order."

ThumbRating:
  type: string
  enum: [UP, DOWN]
  description: "Rider rating: thumbs up or down."

RatingComment:
  type: string
  maxLength: 1000
  description: "Free-text comment accompanying a restaurant rating."

# --- Time ---

Weekday:
  type: string
  enum:
    - MONDAY
    - TUESDAY
    - WEDNESDAY
    - THURSDAY
    - FRIDAY
    - SATURDAY
    - SUNDAY

TimeOfDay:
  type: string
  pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
  description: "Local time of day, HH:mm (HubRise opening_hours format)."

# --- Enums (logical, not tied to specific language) ---

ServiceType:
  type: string
  enum: [DELIVERY, COLLECTION] 
  description: >
    Aligned with HubRise service types. COLLECTION == customer pickup.
    (EAT_IN is not offered by Captain.Food but is kept in TaxRate for catalog fidelity.)

OrderStatus:
  type: string
  enum:
    - PLACED
    - ACCEPTED
    - REJECTED
    - PREPARING
    - READY
    - OUT_FOR_DELIVERY
    - DELIVERED
    - CANCELLED_BY_CUSTOMER
    - CANCELLED_BY_RESTAURANT

# Lifecycle of a DeliveryJob, orthogonal to OrderStatus (a delivery is a separate aggregate).
DeliveryStatus:
  type: string
  enum:
    - PENDING           # job requested, awaiting a courier (partner or independent rider)
    - ASSIGNED          # a courier/rider has accepted it
    - PICKED_UP         # collected from the restaurant
    - OUT_FOR_DELIVERY  # en route to the customer
    - DELIVERED         # handed over — terminal (success)
    - FAILED            # could not be delivered — terminal
    - CANCELLED         # cancelled before delivery — terminal
  description: "Status of one delivery, reported by the partner (inbound) or driven by an independent rider's commands."

RiderStatus:
  type: string
  enum:
    - OFFLINE        # not accepting jobs
    - AVAILABLE      # online, can be offered jobs
    - ON_DELIVERY    # currently fulfilling a delivery
    - SUSPENDED      # blocked by admin — terminal until reinstated
  description: "Availability/lifecycle status of an independent Captain rider."

# Who fulfils a delivery: an external delivery PARTNER (e.g. Avelo37, with its own couriers) or an
# INDEPENDENT Captain rider (RIDER role) accepting the job directly. Both converge on one DeliveryJob.
DeliveryProvider:
  type: string
  enum: [PARTNER, INDEPENDENT]
  description: "Fulfilment channel of a delivery: PARTNER (e.g. Avelo37) or INDEPENDENT (a Captain rider)."

RestaurantStatus:
  type: string
  enum:
    - DRAFT
    - ACTIVE
    - INACTIVE

RestaurantListingStatus:
  type: string
  enum:
    - NON_PARTNER       # public listing seeded from open data (Sirene/Google); not orderable, no agreement
    - PASSIVE_PARTNER   # menu synced (e.g. HubRise) but no signed contract; not orderable
    - ACTIVE_PARTNER    # signed partner; orderable when also RestaurantStatus ACTIVE and not PAUSED
  description: >
    Partnership funnel of a restaurant LISTING, orthogonal to RestaurantStatus (the operational
    DRAFT/ACTIVE/INACTIVE state). Orderable ⇔ ACTIVE_PARTNER + RestaurantStatus ACTIVE + acceptance ≠ PAUSED.

GbpLinkStatus:
  type: string
  enum: [UNSET, CONFIGURED, VERIFIED, BROKEN]
  description: "State of the restaurant's Google Business Profile 'Order online' link to {slug}.captain.food (ADR-0021; V1)."

ProspectionScore:
  type: integer
  minimum: 0
  maximum: 10
  description: "B2B prospection priority (0–10), COMPUTED by the ProspectionPipeline projection from listing facts (ADR-0020) — never stored in an event."

ProspectPipelineStatus:
  type: string
  enum: [NEW, CONTACTED, COLD, REPLIED, CONVERTED]
  description: "Prospect funnel stage, DERIVED in the pipeline projection: NEW (no contact) → CONTACTED → COLD (J+21) / REPLIED, and CONVERTED when the restaurant reaches ACTIVE_PARTNER."

OutreachChannel:
  type: string
  enum: [EMAIL, SLACK, PHONE]
  description: "Channel of a prospection contact (email via Resend, Slack alert, or phone)."

TipRecipient:
  type: string
  enum: [RIDER, RESTAURANT, CAPTAIN]
  description: >
    Who a tip goes to (ADR-012). Tips are separate from the core 3-way split and Captain skims 0% (100%
    passes through); a tip to CAPTAIN is the tipper's explicit choice, not a cut of others' tips.

Tipper:
  type: string
  enum: [CUSTOMER, RESTAURANT]
  description: >
    Who gives a tip: the CUSTOMER (may tip rider/restaurant/Captain) or the RESTAURANT (may tip rider/
    Captain — e.g. thanking the courier). Derived server-side from the caller's role, not client-supplied.

CartStatus:
  type: string
  enum:
    - OPEN          # being built (possibly by a guest); persists indefinitely (Uber Eats style)
    - CHECKED_OUT   # converted to an Order at checkout
  description: >
    Lifecycle of a cart. Only an OPEN cart accepts line edits or checkout. Carts are never
    abandoned/expired — they persist until checked out, so there is no abandonment state.

OrderAcceptanceMode:
  type: string
  enum: [NORMAL, BUSY, PAUSED]
  description: "Current order acceptance mode of a restaurant (HubRise: order_acceptance)."

PaymentStatus:
  type: string
  enum: [PENDING, CAPTURED, FAILED, REFUNDED]
  description: "Order payment state, folded from Stripe facts (PaymentIntentCreated/Captured/Failed/Refunded)."

RefundStatus:
  type: string
  enum: [REQUESTED, APPROVED, DENIED, REFUNDED]
  description: >
    Lifecycle of a refund request as read models fold it from the domain facts (View_PendingRefunds):
    REQUESTED on RefundOpened (awaiting a restaurant/admin decision), APPROVED on RefundApproved
    (Stripe refund requested), DENIED on RefundDenied, REFUNDED once Stripe settles (PaymentRefunded).
    Distinct from RefundProcessStatus, the RefundProcess state-table run status.

OperationStatus:
  type: string
  enum: [PENDING, SUCCEEDED, REJECTED, FAILED]
  description: >
    Live status of a command/operation streamed by the operationStatusChanged subscription:
    PENDING (accepted, in flight), SUCCEEDED, REJECTED (business invariant), FAILED (technical error)."

# --- Write-path journal lifecycles (database/tables/journals.yaml, ADR-20260720-015300/-015400) ---
# Enum $ref columns are stored as the compact ordinal + a seeded ref_<enum> table (ADR-0037), so the
# value ORDER below is a frozen contract once migrated — append-only forever.

CommandJournalStatus:
  type: string
  enum: [RECEIVED, SUCCEEDED, REJECTED, FAILED]
  description: >
    Lifecycle of a journaled command: RECEIVED (durably accepted, handler spawned), then SUCCEEDED,
    REJECTED (business invariant) or FAILED (technical). Maps onto the API OperationStatus
    (RECEIVED → PENDING). A duplicate submission is an acceptance-response attribute, not a status —
    the journal row keeps the original's real state.

CommandChannel:
  type: string
  enum: [GRAPHQL, WORKER, INTERNAL]
  description: >
    Surface a journaled command arrived through: the GraphQL BFF dispatch, an on-app drain/enrichment
    worker (e.g. the HubRise enricher), or an internal trigger endpoint.

InboundEventStatus:
  type: string
  enum: [RECEIVED, DELIVERED, FAILED]
  description: >
    Lifecycle of an adapted inbound business event (inbound_events row): RECEIVED (staged by the
    adapter ACL), DELIVERED (appended through the normal write path — includes the aggregate's
    already-recorded no-op), FAILED (delivery error, left for retry/inspection).

# --- Process-manager state statuses (processmanager.yaml state tables) ---

PaymentProcessStatus:
  type: string
  enum:
    - AWAITING_PAYMENT_RESULT  # PaymentIntent created, cart locked; waiting for the Stripe outcome
    - ORDER_PLACED             # payment captured; Order materialized and cart closed — terminal (success)
    - FAILED                   # payment failed; cart stays OPEN — terminal (failure)
  description: "State of one PlaceOrderProcess checkout run (payment_process_manager row, keyed by cart)."

RefundProcessStatus:
  type: string
  enum:
    - PENDING_APPROVAL          # a refundable fact opened the request; waiting for a restaurant/admin decision
    - APPROVED_AWAITING_SETTLEMENT  # approved (restaurant or admin); Stripe refund requested, waiting for PaymentRefunded
    - DENIED                    # admin denied — terminal
    - REFUNDED                  # Stripe reported the settled refund — terminal (success)
  description: "State of one RefundProcess run (refund_process_manager row, keyed by order). Refunds are approved by the restaurant (own orders) or an admin."

DeliveryDispatchProcessStatus:
  type: string
  enum:
    - OFFERED           # DeliveryRequested delivered to the DeliveryJob; job offered to partner/riders (a bounded re-offer returns here)
    - ACCEPTED          # a partner/rider accepted the job
    - FAILED            # offer attempts exhausted (cap 3, ADR-20260720-004556): DeliveryDispatchFailed recorded — terminal (manual handling)
    - COMPLETED         # delivery done and order closed — terminal
  description: "State of one DeliveryDispatchProcess run (delivery_dispatch_process_manager row, keyed by order). FAILED keeps REOFFER_REQUIRED's ordinal slot (both flag manual handling; ADR-20260720-004556)."

# Manual listing flag, set by the restaurant/admin. Useful for UI.
# Orthogonal to StockStatus: an item is orderable when AVAILABLE *and* stock > 0.
CatalogItemAvailability:
  type: string
  enum:
    - AVAILABLE
    - UNAVAILABLE

# Derived from Stock.quantity vs Stock.lowStockThreshold.
StockStatus:
  type: string
  enum:
    - IN_STOCK
    - LOW_STOCK      # quantity <= lowStockThreshold (risky level)
    - OUT_OF_STOCK   # quantity == 0

# --- Discovery / filtering ---

PriceRange:
  type: string
  enum: [BUDGET, MODERATE, PREMIUM]
  description: "Coarse price tier of a restaurant, used as a discovery filter (UI: $ / $$ / $$$)."

CuisineCategory:
  type: string
  enum: [FAST_FOOD, PIZZA, TRADITIONAL, BISTRONOMIC, FOOD_TRUCK]
  description: >
    A restaurant's SINGLE primary/representative cuisine bucket, used only to select ONE Uber Eats mark-up
    coefficient in View_UberEstimationPolicy (ADR-0024): FAST_FOOD 1.30, PIZZA 1.35, TRADITIONAL 1.40,
    BISTRONOMIC 1.45, FOOD_TRUCK 1.35. NOT for discovery — a restaurant may belong to several cuisines for
    browsing/filtering; that is the multi-valued `Restaurant.tags`. This is deliberately one value because
    the estimate needs a single coefficient.

# Whether an Uber Eats comparison figure is the restaurant's real HubRise price (ADR-0023, opt-in)
# or a labelled estimate derived from mark-up coefficients (ADR-0024). V0 shows ESTIMATED.
ComparisonBasis:
  type: string
  enum: [ESTIMATED, REAL]
  description: >
    Provenance of an Uber Eats comparison amount: REAL (the restaurant's own Uber prices, shared via
    HubRise after explicit opt-in — ADR-0023) or ESTIMATED (coefficient-based, always labelled — ADR-0024).

RestaurantListKey:
  type: string
  enum:
    - ORDER_AGAIN      # restaurants the customer has ordered from before
    - RECOMMENDED      # "Places you might like" / "Tailored to your taste"
    - TOP_DEALS        # "Most loved deals on Captain.Food"
    - GREEN_PACKAGING  # "Spots using Green Packaging"
  description: >
    Named, read-side-curated/personalized discovery shelf for the restaurants query. The read model
    resolves the actual member restaurants (editorial rules / customer history); the client just
    asks for a list by key.

# --- Test mode (ADR-0038) ---

Mode:
  type: string
  enum: [LIVE, TEST]
  description: >
    Whether an aggregate is production (LIVE) or a non-production TEST fixture coexisting in prod
    (ADR-0038, Stripe-`livemode`-style). Set at creation, immutable; absent = LIVE. TEST data is isolated
    from payouts, analytics and real notifications; a TEST order may target a LIVE restaurant to validate
    the real receipt path.

# --- Caller persona / user type ---

# Caller user type (a.k.a. persona / role). Established by the GraphQL path: the master
# api.yaml is filtered per user type via @auth / @public, and `domain_events.user_type`
# records which one authored an event. EXTERNAL = third-party ACL callers (Stripe, HubRise, Avelo37).
UserType:
  type: string
  enum:
    - PUBLIC             # anonymous visitor                       -> /public/graphql
    - CUSTOMER           # authenticated end user                  -> /customer/graphql
    - RESTAURANT_ACCOUNT # account: locations + catalog          -> /restaurant-account/graphql
    - RESTAURANT         # single location: order ops            -> /restaurant/graphql
    - RIDER              # delivery partner / courier              -> /rider/graphql   (mostly post-V0)
    - ADMIN              # platform operator                       -> /admin/graphql
    - EXTERNAL           # third-party ACL (Stripe/HubRise/Avelo37) -> /external/graphql
