# Apply database migrations with sqlx-cli (ADR-0043) — GATED on a green CI run.
#
# Runs ONLY after the `ci` workflow succeeds on main (build + tests + spec validation + no drift), so we
# never deploy SQL to Supabase for a commit that doesn't compile, fails tests, or is out of sync with the
# specs. `sqlx migrate run` is idempotent (applies only pending migrations), so running it after every green
# build is safe. Requires repo secret DATABASE_URL = the Supabase Session-pooler string (5432, ?sslmode=require).
#
# Ordering vs Render: Render auto-deploys in parallel; the app's /health version gate holds a new deploy back
# (503) until this job has applied pending migrations, so ordering is self-correcting.
name: db-migrate

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    # Only proceed when the gating CI run passed.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }} # the exact commit that passed CI
      - uses: taiki-e/install-action@v2 # Node 24; installs a prebuilt sqlx-cli in seconds (no toolchain/cargo-install)
        with:
          tool: sqlx-cli
      - name: Apply migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: sqlx migrate run --source migrations
