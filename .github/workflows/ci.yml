name: ci

# Enforces the operating-model rule "specs/*.yaml are the source of truth; everything else is
# generated". On every push/PR we validate the DSL, regenerate every artifact, and fail if the result
# differs from what was committed — i.e. someone changed the specs (or an emitter) without regenerating.
# This guarantees the committed generated artifacts never drift from the specs.
#
# The gate is the Rust codegen (tools/codegen-rs, ADR-0034). The earlier TypeScript codegen reached full
# parity (byte-identical artifacts + identical validation issue set) and has been retired.
# The gate runs on EVERY branch push (not just main) so a feature branch is validated even before a
# PR exists; `pull_request` stays for forked PRs. Duplicate push+PR runs on an open PR are accepted.
on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  codegen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      # Cache ~/.cargo + target/ keyed on Cargo.lock + toolchain, so repeat runs only recompile the crates
      # that actually changed (not the ~200 dependencies) — the main CI-duration win. (db-migrate needs no
      # build cache: it runs a prebuilt sqlx-cli, so there is no artifact worth sharing between the two.)
      - uses: Swatinem/rust-cache@v2

      - name: Build the workspace (codegen + all layer crates — enforces the ADR-0035 dependency graph)
        run: cargo build --workspace --verbose

      - name: Unit tests (whole workspace)
        run: cargo test --workspace --verbose

      - name: Validate the specs (full validator §1–§11 — the blocking gate)
        run: cargo run --manifest-path tools/codegen-rs/Cargo.toml -- --check --specs specs

      - name: Regenerate every artifact + fail on spec↔generation drift
        run: |
          # Regenerate, then fail if the result differs from what's committed. EOL-tolerant: the repo is
          # authored on Windows (CRLF) while CI runs on Linux (LF), and the generator's output inherits its
          # line endings from the source — only genuine content drift should fail, never CRLF-vs-LF.
          cargo run --manifest-path tools/codegen-rs/Cargo.toml -- --specs specs
          if ! git diff --quiet --ignore-cr-at-eol; then
            echo "::error::Generated artifacts are stale — run 'make generate' and commit the result so the repo matches specs/."
            git --no-pager diff --ignore-cr-at-eol --stat
            git --no-pager diff --ignore-cr-at-eol
            exit 1
          fi
          # Catch brand-new generated files that were never committed.
          untracked="$(git ls-files --others --exclude-standard)"
          if [ -n "$untracked" ]; then
            echo "::error::New generated files are not committed — run 'make generate' and commit:"
            echo "$untracked"
            exit 1
          fi
          echo "✓ generated artifacts match the specs"
