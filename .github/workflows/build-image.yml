# Build the server image in CI, then hand Render a PRE-BUILT image to run (ADR-20260721-175411).
#
# WHY: Render meters "build-pipeline minutes". Compiling the Rust workspace on Render repeatedly blew the
# account's build-pipeline spend cap ($0.00) and failed deploys — every merge to `main` triggered a full
# cargo build. GitHub Actions is free and unlimited on standard runners for this PUBLIC repo, so we build
# the Docker image HERE (the same cargo-chef Dockerfile, with a buildx layer cache), push it to GHCR, and
# then trigger Render to PULL and run it. Render never compiles Rust again — it only pulls an image.
#
# Gated exactly like db-migrate.yml (ADR-0043): runs ONLY after the `ci` workflow succeeds on `main`, so we
# never publish an image for a commit that fails build / tests / spec-validation. Ordering vs migrations is
# self-correcting: the app's /health schema-version gate holds the new deploy (503) until db-migrate has
# applied pending migrations.
#
# Docs-only skip: a merge that touches only specs/docs/ADRs/tooling does not change the deployed binary, so
# the "Decide whether the deployable image changed" step below diffs the merge and SKIPS the build+deploy
# for those (fail-safe: builds if the diff can't be computed). `workflow_run` can't use `paths:`, hence the
# in-job diff. Consequence: the live `X-VERSION` reflects the last CODE commit, not every docs merge — which
# is correct, since the running binary genuinely didn't change.
name: build-image

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

# Least privilege: read the repo, write packages (push to GHCR). Nothing else.
permissions:
  contents: read
  packages: write

concurrency:
  group: build-image
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/captain-food/captain-food

jobs:
  build-and-deploy:
    # Only proceed when the gating CI run actually passed.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }} # the exact commit that passed CI
          fetch-depth: 2 # need HEAD^ to diff the merge and decide if the image actually changed

      # Skip the rebuild+deploy when a merge only touched specs/docs/ADRs/tooling — none of that changes the
      # deployed `server` binary, so redeploying would just churn an identical image. `workflow_run` triggers
      # can't use `paths:`, so we diff in-job. Fail-safe: if the diff can't be computed, we BUILD (never skip
      # a deploy we're unsure about). Deploy-relevant paths = the `server` binary's inputs + the image build.
      - name: Decide whether the deployable image changed
        id: filter
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if ! git rev-parse "${SHA}^" >/dev/null 2>&1; then
            echo "parent commit unavailable — building to be safe"
            echo "build=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          changed="$(git diff --name-only "${SHA}^" "${SHA}")"
          echo "changed files:"; echo "$changed"
          if echo "$changed" | grep -qE '^(crates/|Cargo\.toml$|Cargo\.lock$|Dockerfile$|\.dockerignore$|rust-toolchain\.toml$)'; then
            echo "→ deploy-relevant change: BUILD"; echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "→ docs/spec/tooling-only change: SKIP build+deploy"; echo "build=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3
        if: steps.filter.outputs.build == 'true'

      - name: Log in to GHCR
        if: steps.filter.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # scoped by the workflow's `packages: write`

      - name: Compute the short commit SHA (7 chars, as GitHub displays it)
        if: steps.filter.outputs.build == 'true'
        id: vars
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: echo "short=${SHA:0:7}" >> "$GITHUB_OUTPUT" # e.g. 829f4ad — human-readable version label

      - name: Build and push (cargo-chef Dockerfile + buildx GHA layer cache)
        if: steps.filter.outputs.build == 'true'
        id: build # exposes steps.build.outputs.digest — the content-addressed image reference
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # `sha-<short>` = a human/git-readable tag (correlates the image to a commit, matches the SHA
          # GitHub shows); `latest` is ONLY the blueprint bootstrap seed — deploys never resolve either
          # (they pin the digest below). The digest (steps.build.outputs.digest) is the reference each
          # deploy actually runs, so the short tag being human-friendly costs nothing in precision.
          tags: |
            ${{ env.IMAGE }}:sha-${{ steps.vars.outputs.short }}
            ${{ env.IMAGE }}:latest
          # Bake the build identity into the image (env + OCI labels) so the running app reports it at
          # /health — the short git SHA is the readable version; the digest remains the exact identity.
          build-args: |
            CAPTAIN_BUILD_VERSION=${{ steps.vars.outputs.short }}
          # Persist the cargo-chef dependency layer across runs — only changed app crates recompile,
          # so warm builds are minutes, not the full cold compile.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render to deploy the pinned image (by immutable digest)
        if: steps.filter.outputs.build == 'true'
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::repo secret RENDER_DEPLOY_HOOK_URL is not set — image pushed but Render was not told to deploy it"
            exit 1
          fi
          if [ -z "$DIGEST" ]; then
            echo "::error::no image digest from the build step — refusing to deploy an unpinned reference"
            exit 1
          fi
          # Deploy by DIGEST — content-addressed, so the reference is cryptographically immutable and can
          # never be repointed (stronger than a tag, which can be moved). The `imgURL` query param tells the
          # Render image-backed deploy hook the EXACT image to run (Render docs: "Deploy hooks for
          # image-backed services"). `latest` is never what production resolves.
          REF="${IMAGE}@${DIGEST}"
          curl -fsS -X POST "${HOOK}&imgURL=${REF}" >/dev/null
          echo "✓ triggered Render deploy of ${REF} (sha-${{ steps.vars.outputs.short }})"
