# Stale-claim reaper (issue #39, ADR-20260720-233000): a `status/in-progress` claim with >24h of
# silence (no issue comments, no linked-PR/commit references — the reaper's own comments don't
# count) is released back to the queue, so a crashed session never holds an issue hostage.
name: stale-claim-reaper
on:
  schedule:
    - cron: "17 * * * *"   # hourly, off the :00 rush
  workflow_dispatch: {}
permissions:
  issues: write
jobs:
  reap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const MARKER = '<!-- stale-claim-reaper -->';
            const DAY_MS = 24 * 60 * 60 * 1000;
            const now = Date.now();
            const { owner, repo } = context.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', labels: 'status/in-progress', per_page: 100,
            });
            for (const issue of issues) {
              if (issue.pull_request) continue; // claims live on issues, not PRs
              const timeline = await github.paginate(github.rest.issues.listEventsForTimeline, {
                owner, repo, issue_number: issue.number, per_page: 100,
              });
              // The claim starts at the LAST time the label was applied.
              const claims = timeline.filter(e => e.event === 'labeled' && e.label?.name === 'status/in-progress');
              const claimedAt = claims.length ? Date.parse(claims[claims.length - 1].created_at) : Date.parse(issue.created_at);
              if (now - claimedAt < DAY_MS) continue;
              // Activity since the claim: comments (not the reaper's) or PR/commit references.
              const active = timeline.some(e => {
                const t = Date.parse(e.created_at ?? e.author_association ? e.created_at : 0);
                if (!e.created_at || Date.parse(e.created_at) <= claimedAt) return false;
                if (e.event === 'commented') return !(e.body ?? '').includes(MARKER);
                return ['cross-referenced', 'referenced', 'connected'].includes(e.event);
              });
              if (active) continue;
              await github.rest.issues.removeLabel({ owner, repo, issue_number: issue.number, name: 'status/in-progress' })
                .catch(() => {});
              await github.rest.issues.createComment({
                owner, repo, issue_number: issue.number,
                body: `${MARKER}\n⏰ **Claim expired** — \`status/in-progress\` was set over 24h ago with no comments, commits or linked-PR activity since. The issue is back in the queue (BACKLOG.md claim protocol, ADR-20260720-233000). Re-claim by re-adding the label with a fresh claim comment.`,
              });
            }
